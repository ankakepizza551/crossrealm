<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Realm - Solo Play</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .card { width: 80px; height: 120px; border-radius: 8px; color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .card:hover { transform: translateY(-10px); }
        .field-card { width: 100px; height: 150px; border-radius: 12px; border: 4px solid #fff; margin: 20px auto; color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hand { display: flex; justifyContent: center; gap: 10px; margin-top: 30px; flex-wrap: wrap; padding: 10px; }
        .turn-indicator { padding: 10px; font-size: 1.2em; background: #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const REALMS = {
            GEAR:    { name: '歯車', color: '#B8860B' },
            ICEAGE:  { name: '氷河期', color: '#ADD8E6' },
            FOUNTAIN:{ name: '噴水', color: '#00BFFF' },
            BATTERY: { name: 'バッテリー', color: '#FFFF00' },
            MACHINE: { name: '機械', color: '#00FF7F' },
            ARCHIVE: { name: '古文書', color: '#DEB887' },
            PLANET:  { name: '惑星', color: '#FFFACD', isWild: true },
            RUINS:   { name: '廃墟', color: '#696969', isWild: true }
        };

        const createDeck = () => {
            const realms = Object.keys(REALMS);
            let deck = [];
            realms.forEach(realm => {
                for (let i = 0; i <= 9; i++) {
                    deck.push({ id: Math.random().toString(36).substr(2, 9), realm, number: i });
                }
            });
            return deck.sort(() => Math.random() - 0.5);
        };

        const App = () => {
            const [deck, setDeck] = useState([]);
            const [fieldCard, setFieldCard] = useState(null);
            const [hands, setHands] = useState([[], []]); // プレイヤー0と1の手札
            const [turn, setTurn] = useState(0); // 0か1

            // 初回ゲーム開始処理
            useEffect(() => {
                const newDeck = createDeck();
                const fCard = newDeck.pop();
                const h1 = newDeck.splice(0, 5);
                const h2 = newDeck.splice(0, 5);
                setDeck(newDeck);
                setFieldCard(fCard);
                setHands([h1, h2]);
            }, []);

            const canPlay = (card) => {
                if (REALMS[card.realm].isWild) return true;
                if (REALMS[fieldCard.realm].isWild) return true;
                return card.realm === fieldCard.realm || card.number === fieldCard.number;
            };

            const playCard = (playerIndex, card) => {
                if (turn !== playerIndex) return;
                if (!canPlay(card)) return;

                // 場のカードを更新
                setFieldCard(card);
                // 手札を減らす
                const newHands = [...hands];
                newHands[playerIndex] = hands[playerIndex].filter(c => c.id !== card.id);
                setHands(newHands);
                // ターン交代
                setTurn(turn === 0 ? 1 : 0);
            };

            if (!fieldCard) return <div>読み込み中...</div>;

            return (
                <div>
                    <h1>Cross Realm Solo</h1>
                    <div className="turn-indicator" style={{color: turn === 0 ? '#00FF7F' : '#FF7F50'}}>
                        {turn === 0 ? "プレイヤー1の番" : "プレイヤー2の番"}
                    </div>

                    <div className="field-card" style={{backgroundColor: REALMS[fieldCard.realm].color}}>
                        <small>{REALMS[fieldCard.realm].name}</small>
                        <div style={{fontSize: '3em'}}>{fieldCard.number}</div>
                    </div>

                    <hr />

                    {[0, 1].map(idx => (
                        <div key={idx} style={{opacity: turn === idx ? 1 : 0.3, pointerEvents: turn === idx ? 'auto' : 'none'}}>
                            <h3>プレイヤー {idx + 1} の手札</h3>
                            <div className="hand">
                                {hands[idx].map(card => (
                                    <div 
                                        key={card.id} 
                                        className="card" 
                                        style={{
                                            backgroundColor: REALMS[card.realm].color,
                                            opacity: canPlay(card) ? 1 : 0.5
                                        }}
                                        onClick={() => playCard(idx, card)}
                                    >
                                        <small>{REALMS[card.realm].name}</small>
                                        <div>{card.number}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
