                setTilt({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, '--mx': `${((e.clientX - rect.left)/rect.width)*100}%`, '--my': `${((e.clientY - rect.top)/rect.height)*100}%`, transition: 'none' });
            };
            const reset = () => { setIsHovered(false); setTilt({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: '0.4s ease-out' }); };
            
            return (
                <div 
                    className={`card-wrapper-3d ${isHovered ? 'hovered' : ''} ${!playable && !isField ? 'not-playable' : ''}`} 
                    style={{ ...style, zIndex: isField ? 'auto' : (isHovered ? 1000 : index), cursor: playable && !isField ? 'pointer' : 'default' }} 
                    onMouseMove={handleMove} onMouseLeave={reset} onMouseEnter={() => playable && !isField && setIsHovered(true)} onClick={() => playable && !isField && onClick()} ref={cardRef}
                >
                    <div className={`card-3d mat-${rData.theme}`} style={{ '--r-color': rData.color, '--r-color-glow': rData.glow, '--r-color-dim': rData.dim, '--r-color-bright': rData.bright, transform: `${(isHovered && !isField) ? 'translateY(-20px) scale(1.15)' : ''} ${tilt.transform}` }}>
                        <div className="card-content">
                            {rData.theme === 'steam' && <div className="steam-meter-mini"><div className="steam-needle" style={{position:'absolute', top:'50%', left:'50%', width:'1px', height:'8px', background:'#f33', transformOrigin:'bottom', transform:'translate(-50%,-100%) rotate(-30deg)'}}></div></div>}
                            {rData.theme === 'fantasy' && <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', opacity:0.3}}><svg viewBox="0 0 100 100" className="w-[120%] h-[120%] animate-[arcane-shimmer_20s_linear_infinite]" style={{color:rData.color}}><circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" strokeWidth="1" strokeDasharray="2 4"/><path d="M50 5 L89 75 L11 75 Z" fill="none" stroke="currentColor" strokeWidth="0.5"/></svg></div>}
                            {rData.theme === 'cyber' && <div className="cyber-rain-mini">{[...Array(6)].map((_,i)=><div key={i} className="rain-bit-mini" style={{left:`${i*18}%`, animationDelay:`${i*0.3}s`}}>1010</div>)}</div>}
                            
                            <div className="identity-label-new"><span>{displayRealm}</span></div>
                            {isSpecial && displayRealm === 'GEAR' && <div className="badge-mini">DRAW +2</div>}
                            {isSpecial && displayRealm === 'MACHINE' && <div className="badge-mini" style={{background:'#1a012a', borderLeftColor:rData.color}}>REVERSE</div>}

                            <div className="card-icon-overload" style={{ color: rData.color }}><IconRenderer realmKey={displayRealm} isSpecial={isSpecial} /></div>
                            <div className="card-footer-peak"><span>{rData.n}</span></div>
                        </div>
                        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-60" style={{ background: `radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 65%)` }}></div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [bgRealm, setBgRealm] = useState('GEAR');
            const logTerminalRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); setSocket(s);
                s.on('update-game', setGs);
                return () => s.disconnect();
            }, []);

            useEffect(() => { if (logTerminalRef.current) logTerminalRef.current.scrollTop = logTerminalRef.current.scrollHeight; }, [gs?.logs]);

            const currentRealm = (gs?.status === 'playing' && gs?.fieldCard) ? gs.fieldCard.realm : bgRealm;
            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                return (me?.hand || []).slice().sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (card) => {
                if (gs?.currentTurnPlayerId !== socket?.id || !card || !gs?.fieldCard) return false;
                if (gs?.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm; const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS' || field === 'PLANET' || field === 'RUINS') return true;
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                const cycle = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                if (['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(field) && field === h) return false;
                return field === h || (cycle[field]?.includes(h));
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                window.safePlay('play');
                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) setSelectorCard(card);
                else socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined });
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': REALMS[currentRealm]?.color || '#000' }}>
                    <div className="bg-container">
                        <div className="layer-steam"></div><div className="layer-fantasy"></div><div className="layer-cyber"></div>
                    </div>
                    <div className="bg-magic-aura"></div>
                    
                    {!joined ? (
                        <div className="overlay">
                            <div className="magic-ring-bg"></div>
                            {/* v17.3 完全復元: 接続パネル */}
                            <div className="panel hex-bg" style={{ padding: '50px 30px', background: 'rgba(5,10,15,0.95)', border: '2px solid var(--accent)', borderRadius: '10px', clipPath: 'polygon(0 40px, 40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%)' }}>
                                <div className="hud-frame"><div className="hud-corner hud-tl"></div><div className="hud-corner hud-tr"></div><div className="hud-corner hud-bl"></div><div className="hud-corner hud-br"></div></div>
                                <div className="text-center mb-10">
                                    <h1 className="logo-main"><span>CROSS</span><span className="cross font-cyber">X</span><span>REALM</span></h1>
                                    <div className="logo-sub">ETERNAL PUNK EDITION</div>
                                </div>
                                <div className="space-y-6" style={{position:'relative', zIndex: 200}}>
                                    <input type="text" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} />
                                    <input type="text" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                    <button onClick={()=>{ window.unlockAudio(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-main">接続開始</button>
                                </div>
                            </div>
                        </div>
                    ) : (gs?.status === 'waiting') ? (
                        <div className="overlay">
                            <div className="magic-ring-bg"></div>
                            {/* v17.3 完全復元: 待機パネル (4スロット) */}
                            <div className="panel hex-bg" style={{padding: '40px 30px', background: 'rgba(10,5,20,0.95)', border: '1px solid var(--magic-purple)', clipPath: 'polygon(0 30px, 30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%)'}}>
                                <div className="hud-frame"><div className="hud-corner hud-tl" style={{borderColor:'#8A2BE2'}}></div><div className="hud-corner hud-tr" style={{borderColor:'#8A2BE2'}}></div><div className="hud-corner hud-bl" style={{borderColor:'#8A2BE2'}}></div><div className="hud-corner hud-br" style={{borderColor:'#8A2BE2'}}></div></div>
                                <div className="text-center mb-8"><div className="text-3xl text-steam-gold font-bold font-['Cinzel']">ROOM: {room}</div></div>
                                <div className="space-y-2 mb-6 max-h-[300px] overflow-y-auto">
                                    {gs?.players?.map((p, idx) => (
                                        <div key={p.id} className="waiting-player">
                                            <span className="font-bold">{p.isBot ? '🤖' : '👤'} {p.name}</span>
                                            {idx === 0 && <div className="bg-steam-gold text-black text-[10px] px-2 font-black">HOST</div>}
                                        </div>
                                    ))}
                                    {[...Array(Math.max(0, 4 - (gs?.players?.length || 0)))].map((_, i) => (
                                        <div key={`empty-${i}`} className="waiting-player empty">
                                            <span className="opacity-50">空きスロット</span>
                                        </div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div className="flex gap-4">
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="flex-1 p-2 border border-magic-purple text-[#e2b0ff] font-bold rounded">CPU追加</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="flex-1 btn-main" disabled={gs?.players?.length < 2}>開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : gs?.fieldCard && (
                        <div className="game-container">
                            <div className="turn-direction">DIRECTION: {gs?.isReversed ? '⟲ REVERSE' : '⟳ NORMAL'}</div>
                            <div className="opponents-area">
                                {gs?.players?.map(p => (
                                    <div key={p.id} className={`opp-row ${gs?.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="flex justify-between items-center text-xs mb-1">
                                            <div className="font-bold">{p.id === socket?.id ? '⭐' : '👤'} {p.name}</div>
                                            <div className="text-accent font-black">{p.handCount}</div>
                                        </div>
                                        <div className="relative w-full h-8 flex justify-start">
                                            {[...Array(Math.min(p.handCount, 4))].map((_, i) => <div key={i} className="mini-card-back" style={{left: `${i*6}px`, zIndex: i}} />)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="cycle-bar">{CYCLE_ORDER.map(r => (<div key={r} className="cycle-item"><div className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}></div><div className="text-[9px] mt-1 opacity-50">{REALMS[r].n}</div></div>))}</div>
                            <div className="field">
                                <div className={`text-xs mb-2 font-bold ${gs?.currentTurnPlayerId === socket?.id ? 'text-accent' : 'text-slate-500'}`}>{gs?.currentTurnPlayerId === socket?.id ? 'YOUR TURN' : 'WAITING'}</div>
                                <div className="relative w-[90px] h-[130px]">
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border border-dashed border-white/20 rounded-full animate-[gear-spin_20s_linear_infinite]"></div>
                                    <div className="relative z-10"><CardView card={gs?.fieldCard} isField={true} /></div>
                                </div>
                                <div className="info-panel mt-4"><div className="realm-title">{REALMS[currentRealm]?.n}</div><div className="text-[10px] opacity-60 mt-1 leading-tight">{REALMS[currentRealm]?.desc}</div></div>
                            </div>
                            <div ref={logTerminalRef} className="log-terminal">{gs?.logs?.slice(-10).map((log) => (<div key={log.id} className={`log-line ${log.text.includes('PLAY') ? 'play' : ''}`}>{log.text}</div>))}</div>
                            <div className="hand-container"><div className="hand-flex">{(() => {
                                const count = sortedHand.length; const overlap = count > 8 ? (window.innerWidth * 0.8 / count) : 60;
                                return sortedHand.map((card, i) => (<CardView key={card.id || i} card={card} playable={canPlay(card)} onClick={() => handlePlay(card)} index={i} style={{ marginLeft: i === 0 ? 0 : `-${90 - overlap}px` }} />));
                            })()}</div></div>
                            <div className="action-row"><button className="btn-main" disabled={gs?.currentTurnPlayerId !== socket?.id} onClick={() => socket.emit('draw-card',{roomId:room})}>{gs?.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : 'ドロー'}</button></div>
                        </div>
                    )}
                    {selectorCard && (
                        <div className="overlay" style={{zIndex: 100000}}>
                            <div className="panel hex-bg" style={{padding: '40px 20px', background: 'rgba(10,5,20,0.95)', border: '2px solid var(--steam-gold)', clipPath: 'polygon(0 30px, 30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%)'}}>
                                <h3 className="text-xl font-bold text-center mb-6 text-steam-gold font-['Cinzel']">属性選択</h3>
                                <div className="grid grid-cols-2 gap-3" style={{position:'relative', zIndex:10}}>{CYCLE_ORDER.map(r => (<button key={r} className="p-3 border border-white/20 rounded flex items-center gap-2 hover:bg-white/10" style={{color: REALMS[r].color}} onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}><div className="w-5 h-5"><IconRenderer realmKey={r} isSpecial={false} /></div><span className="font-bold">{REALMS[r].n}</span></button>))}</div>
                                <button onClick={()=>setSelectorCard(null)} className="w-full mt-4 text-white/40 text-xs py-2" style={{position:'relative', zIndex:10}}>キャンセル</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
