        .mute-btn-peak-omega { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; background: rgba(0,0,0,0.85); border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; color: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.4s; }

    <script>
        // === オーディオコア ===
        const SFX_MAP = { turn: 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3', play: 'https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3', draw: 'https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3', alert: 'https://assets.mixkit.co/active_storage/sfx/2862/2862-preview.mp3' };
        window.sfxPool = {}; 
        for(let k in SFX_MAP) { 
            window.sfxPool[k] = new Audio(SFX_MAP[k]); 
            window.sfxPool[k].preload = 'auto'; 
        }
        window.isMutedGlobal = false;

        window.safePlay = (k) => { 
            if (window.isMutedGlobal) return; 
            try { 
                const sound = window.sfxPool[k].cloneNode();
                sound.volume = 0.5;
                sound.play().catch(e => {}); 
            } catch(e){} 
        };

        window.unlockAudio = () => { 
            for(let k in window.sfxPool) { 
                window.sfxPool[k].volume = 0; 
                window.sfxPool[k].play().then(()=> { 
                    window.sfxPool[k].pause(); 
                }).catch(()=>{}); 
            } 
        };
    </script>

            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: sw, className: "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /><path d="M9 10h6" strokeWidth="1.5" opacity={spec ? 1 : 0} /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ card, playable, onClick, isField, style, index = 0 }) => {
            if (!card?.realm) return null;
            let dr = card.realm;
            if (card.wasRuins) dr = 'RUINS'; else if (card.wasPlanet) dr = 'PLANET'; else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) dr = 'FOUNTAIN';
            const spec = card.isSpecial || card.wasFountain;
            const rData = REALMS[dr] || REALMS.GEAR;
            const cardRef = useRef(null);
            const [tilt, setTilt] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });
            const [hov, setHov] = useState(false);

            const handleMove = (e) => {
                if (!playable && !isField) return;
                const r = cardRef.current.getBoundingClientRect();
                const rx = ((e.clientY - r.top - r.height/2) / (r.height/2)) * -26;
                const ry = ((e.clientX - r.left - r.width/2) / (r.width/2)) * 26;
                setTilt({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, '--mx': `${((e.clientX - r.left)/r.width)*100}%`, '--my': `${((e.clientY - r.top)/r.height)*100}%`, transition: 'none' });
            };
            const reset = () => { setHov(false); setTilt({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: '0.8s cubic-bezier(0.23, 1, 0.32, 1)' }); };

            return (
                <div className={`card-wrapper-3d ${hov ? 'z-[4000]' : ''} ${!playable && !isField ? 'not-playable' : ''}`} style={style} onMouseMove={handleMove} onMouseLeave={reset} onMouseEnter={() => playable && !isField && setHov(true)} onClick={() => playable && !isField && onClick()} ref={cardRef}>
                    <div className={`card-3d mat-${rData.theme}`} style={{'--r-color': rData.color, '--r-color-glow': rData.glow, '--r-color-dim': rData.dim, '--r-color-bright': rData.bright, transform: `${(hov && !isField) ? 'translateY(-28px) scale(1.2)' : ''} ${tilt.transform}`}}>
                        <div className="card-content">
                            {rData.theme === 'steam' && (
                                <>
                                    <div className="steam-gauge-mega"><div className="steam-hand"></div></div>
                                    <div className="rivet-omega top-2 left-2"/><div className="rivet-omega top-2 right-2"/><div className="rivet-omega bottom-2 left-2"/><div className="rivet-omega bottom-2 right-2"/>
                                </>
                            )}
                            {rData.theme === 'fantasy' && <div className="arcane-ring-mega"><svg viewBox="0 0 100 100" style={{color:rData.color, width:'140%', height:'140%'}}><circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" strokeWidth="1.3" strokeDasharray="3 4"/><path d="M50 5 L89 75 L11 75 Z" fill="none" stroke="currentColor" strokeWidth="0.7"/><circle cx="50" cy="50" r="24" fill="none" stroke="currentColor" strokeWidth="3" strokeDasharray="6 2"/></svg></div>}
                            {rData.theme === 'cyber' && <div className="cyber-matrix-layer">{[...Array(6)].map((_,i)=><div key={i} className="matrix-unit" style={{left:`${i*15+5}%`, animationDelay:`${i*0.4}s`}}>101101</div>)}</div>}

                            <div className="card-label-tag"><span>{dr}</span></div>
                            {spec && dr === 'GEAR' && <div className="badge-mega"><span>DRAW +2</span></div>}
                            {spec && dr === 'MACHINE' && <div className="badge-mega" style={{background:'#1a012a', borderLeftColor:rData.color}}><span>REVERSE</span></div>}
                            <div className="card-icon-Omega" style={{ color: rData.color }}><IconRenderer r={dr} spec={spec} /></div>
                            
                            <div className="card-footer-Omega" style={{ fontFamily: rData.font }}><span>{rData.n}</span></div>
                        </div>
                        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-90" style={{ background: `radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 60%)` }}></div>
                    </div>
                </div>
            );
        };

        const SparkleVFX = () => {
            const sparks = useMemo(() => [...Array(25)].map((_, i) => ({ id: i, x: Math.random() * 100, y: Math.random() * 100, tx: (Math.random() - 0.5) * 500, ty: (Math.random() - 0.5) * 500, delay: Math.random() * 5, size: Math.random() * 4 + 1 })), []);
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    {sparks.map(s => (
                        <div key={s.id} className="absolute bg-[#FFD700] rounded-full blur-[0.5px]" style={{ left: `${s.x}%`, top: `${s.y}%`, width: `${s.size}px`, height: `${s.size}px`, '--tx': `${s.tx}px`, '--ty': `${s.ty}px`, animation: `spark-float 6s infinite`, animationDelay: `${s.delay}s` }} />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selector, setSelector] = useState(null);
            const [bgR, setBgR] = useState('GEAR');
            const [mute, setMute] = useState(false);
            const logEndRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); setSocket(s);
                s.on('update-game', setGs);
                return () => s.disconnect();
            }, []);

            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollTop = logEndRef.current.scrollHeight; }, [gs?.logs]);

            const toggleMute = () => { const n = !mute; setMute(n); window.isMutedGlobal = n; };
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';

            const currentR = (gs?.status === 'playing' && gs?.fieldCard) ? gs.fieldCard.realm : bgR;
            const nextPlayableRealms = NEXT_REALMS_MAP[currentR] || [];

            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                return (me?.hand || []).slice().sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (c) => {
                if (!isMyTurn || !c || !gs?.fieldCard) return false;
                if (gs?.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const h = c.realm; const f = currentR;
                if (h === 'PLANET' || h === 'RUINS' || f === 'PLANET' || f === 'RUINS') return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                
                if (['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(f) && f === h) return false;
                return f === h || (nextPlayableRealms.includes(h));
            };

            const handlePlay = (c) => {
                if (!canPlay(c)) return;
                window.safePlay('play');
                const isW = (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial));
                if (isW && sortedHand.length > 1) setSelector(c);
                else socket.emit('play-card', { roomId: room.toUpperCase(), card: c, chosenRealm: isW ? 'GEAR' : undefined });
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': REALMS[currentR]?.color || '#000' }}>
                    <div className="bg-core">
                        <div className="layer-vortex" />
                        <div className="layer-grid" />
                        <div className="layer-nebula" />
                        {[...Array(40)].map((_, i) => (
                            <div key={i} className="particle-mega" style={{ left: `${Math.random() * 100}%`, width: `${Math.random()*6+1}px`, height: `${Math.random()*6+1}px`, '--d': `${2 + Math.random() * 5}s`, '--x': `${(Math.random() - 0.5) * 200}px`, background: i % 2 === 0 ? 'var(--accent)' : 'var(--steam-gold)', animationDelay: `${Math.random() * 6}s` }} />
                        ))}
                    </div>
                    
                    {!joined ? (
                        <div className="h-full flex items-center justify-center relative z-10 w-full px-4">
                            <div className="panel-omega">
                                <SparkleVFX />
                                <div className="logo-stack">
                                    <div className="logo-row row-cross">CROSS</div>
                                    <div className="row-x">X</div>
                                    <div className="logo-row row-realm">REALM</div>
                                    <div className="sub-banner-omega">
                                        <div className="sub-text-final">ETERNAL PUNK EDITION</div>
                                    </div>
                                </div>
                                <div className="relative z-[600] mt-4 w-full">
                                    <input type="text" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} />
                                    <input type="text" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                    <button onClick={()=>{ window.unlockAudio(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-omega-singularity">接続開始</button>
                                </div>
                            </div>
                        </div>
                    ) : (gs?.status === 'waiting') ? (
                        <div className="h-full flex items-center justify-center relative z-10 w-full px-4">
                            <div className="panel-omega" style={{borderColor: 'var(--magic-purple)', maxWidth: '480px'}}>
                                <div className="text-center mb-10"><div className="text-4xl text-steam-gold font-bold tracking-widest steam-glow" style={{fontFamily:'Cinzel'}}>ROOM: {room || gs.roomId}</div></div>
                                <div className="space-y-3 mb-12">
                                    {[...Array(4)].map((_, i) => {
                                        const p = gs?.players?.[i];
                                        return (
                                            <div key={i} className={`slot-Omega-Final ${!p ? 'empty' : ''}`}>
                                                <div className="flex items-center gap-5 overflow-hidden">
                                                    <div className={`w-12 h-12 flex-shrink-0 rounded-full ${p ? 'bg-accent/20 text-accent border border-accent/60 shadow-[0_0_20px_var(--accent)]' : 'bg-white/5 text-white/5 border border-white/10'} flex items-center justify-center font-bold text-2xl`}>{p ? '👤' : ''}</div>
                                                    <span className="slot-name-tag">{p ? p.name : '空きスロット'}</span>
                                                </div>
                                                {p && i === 0 && <div className="bg-[#D4AF37] flex-shrink-0 text-black text-[12px] px-4 py-1 font-black rounded-sm shadow-xl">HOST</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div className="flex gap-4">
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="flex-1 p-4 border border-magic-purple text-[#e2b0ff] font-bold rounded-lg text-lg bg-magic-purple/20">CPU追加</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="flex-1 btn-omega-singularity" disabled={gs?.players?.length < 2}>開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : gs?.fieldCard && (
                        <div className="game-ui-container">
                            <div className="hud-header-bar">
                                <span>DIRECTION: {gs?.isReversed ? '⟲ REVERSE' : '⟳ NORMAL'}</span>
                                <div onClick={toggleMute} className="mute-btn-peak-omega">{mute ? '🔇' : '🔊'}</div>
                            </div>
                            <div className="opp-mega-grid">
                                {gs?.players?.map(p => (
                                    <div key={p.id} className={`opp-card-omega-peak ${gs?.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="flex justify-between items-center text-xs mb-2">
                                            <div className="font-bold truncate max-w-[80%]">{p.id === socket?.id ? '⭐' : '👤'} {p.name}</div>
                                            <div className="text-accent font-black text-sm">{p.handCount}</div>
                                        </div>
                                        <div className="relative h-[34px] w-full">
                                            {[...Array(Math.min(p.handCount, 4))].map((_, i) => <div key={i} className="mini-back-final" style={{left: `${i*8}px`, zIndex: i}} />)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {/* === サイクルバー（点滅ガイド機能付き） === */}
                            <div className="cycle-strip-classic">
                                {CYCLE_ORDER.map(r => {
                                    const isActive = currentR === r;
                                    const isNext = nextPlayableRealms.includes(r);
                                    
                                    return (
                                        <div key={r} className="cycle-node-container" style={{'--c': REALMS[r].color}}>
                                            <div className={`cycle-node-omega ${isActive ? 'active' : ''} ${isNext && !isActive ? 'next-blink' : ''}`} 
                                                 style={{background: isActive ? 'var(--c)' : 'rgba(255,255,255,0.15)'}}/>
                                            <div className={`cycle-label ${isActive ? 'active' : ''} ${isNext && !isActive ? 'next-blink-text' : ''}`}>
                                                {REALMS[r].n}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="field-core-omega">
                                <div className={`text-[11px] font-black tracking-[8px] uppercase z-20 ${isMyTurn ? 'text-accent animate-pulse drop-shadow-[0_0_8px_var(--accent)]' : 'text-slate-500'}`}>{isMyTurn ? 'YOUR TURN' : 'WAITING...'}</div>
                                <div className="relative my-2" style={{ width: 'var(--card-w)', height: 'var(--card-h)' }}>
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0 pointer-events-none">
                                        <div className="magic-ring-core" />
                                    </div>
                                    <div className="relative z-10 w-full h-full flex items-center justify-center">
                                        <CardView card={gs?.fieldCard} isField={true} style={{width: '100%', height: '100%'}} />
                                    </div>
                                </div>
                                <div className="info-panel-mega relative z-20">
                                    <div style={{fontFamily:'Cinzel', fontSize: 'clamp(14px, 4vw, 20px)', fontWeight: 900, color: REALMS[currentR]?.color, textShadow: `0 0 20px ${REALMS[currentR]?.color}`}}>{REALMS[currentR]?.n}</div>
                                    <div className="text-[10px] opacity-80 mt-1 leading-none font-black tracking-widest">{REALMS[currentR]?.desc}</div>
                                </div>
                            </div>

                            <div ref={logEndRef} className="terminal-log-omega">{gs?.logs?.slice(-10).map((l) => (<div key={l.id} className={`mb-1 ${l.text.includes('PLAY') ? 'text-accent font-bold' : ''}`}>{l.text}</div>))}</div>
                            
                            <div className="hand-Omega-Peak">{(() => {
                                const cnt = sortedHand.length; 
                                const ov = Math.min(75, window.innerWidth * 0.8 / Math.max(cnt, 1));
                                return sortedHand.map((c, i) => (<CardView key={c.id || i} card={c} playable={canPlay(c)} onClick={() => handlePlay(c)} index={i} style={{ marginLeft: i === 0 ? 0 : `-${90 - ov}px` }} />));
                            })()}</div>
                            
                            <div className="action-area-Final">
                                <button className="btn-omega-singularity" disabled={!isMyTurn} onClick={() => { window.safePlay('draw'); socket.emit('draw-card',{roomId:room}); }}>
                                    {gs?.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : 'ドロー'}
                                </button>
                            </div>
                        </div>
                    )}
                    {selector && (
                        <div className="absolute inset-0 flex items-center justify-center p-6 z-[200000] backdrop-filter blur(50px) bg-black/90">
                            <div className="panel-omega" style={{borderColor: 'var(--steam-gold)', padding: '50px 30px'}}>
                                <h3 className="text-3xl font-black text-center mb-12 text-steam-gold steam-glow" style={{fontFamily:'Cinzel'}}>属性を選択</h3>
                                <div className="grid grid-cols-2 gap-6">{CYCLE_ORDER.map(r => (<button key={r} className="p-5 border border-white/20 rounded-lg flex items-center gap-4 hover:bg-white/10" style={{color: REALMS[r].color}} onClick={() => { socket.emit('play-card', {roomId: room, card:selector, chosenRealm:r}); setSelector(null); }}><div className="w-9 h-9"><IconRenderer r={r} spec={false}/></div><span className="font-black text-2xl">{REALMS[r].n}</span></button>))}</div>
                                <button onClick={()=>setSelector(null)} className="w-full mt-12 text-white/40 text-sm py-2 tracking-[15px] font-black uppercase">Cancel</button>
                            </div>
                        </div>
                    )}
                    
                    {/* === ミッション終了（リザルト）画面：日本語化 === */}
                    {gs?.status === 'finished' && (
                        <div className="absolute inset-0 flex items-center justify-center p-4 z-[250000] bg-black/90 backdrop-blur-sm">
                            <div className="panel-omega" style={{borderColor: 'var(--steam-gold)', padding: '40px 20px', width: '100%', maxWidth: '400px'}}>
                                <h2 className="text-3xl md:text-4xl font-black text-center mb-8 text-[#D4AF37] steam-glow" style={{fontFamily: "'Exo 2', sans-serif"}}>{gs.players.slice().sort((a,b) => a.handCount - b.handCount)[0]?.name} 勝利！</h2>
                                <div className="space-y-3 mb-10 max-h-[50vh] overflow-y-auto pr-2">
                                    {gs.players.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                        <div key={p.id} className={`p-4 rounded-xl border flex items-center transition-all ${p.handCount === 0 ? 'border-accent bg-accent/20 scale-[1.02] shadow-[0_0_15px_var(--accent)]' : p.handCount > 10 ? 'border-red-500 bg-red-500/20' : 'border-white/10 opacity-70'}`}>
                                            <span className="font-black text-xl mr-4 italic text-slate-400" style={{fontFamily: "'Exo 2', sans-serif"}}>{i+1}位</span>
                                            <div className="flex-1 overflow-hidden">
                                                <div className="font-black text-lg tracking-wider uppercase truncate">{p.name}</div>
                                                {p.handCount > 10 && <div className="text-[10px] text-red-500 tracking-widest font-black mt-1">システムオーバーロード</div>}
                                                {p.handCount === 0 && <div className="text-[10px] text-accent tracking-widest font-black mt-1">ミッションクリア</div>}
                                            </div>
                                            <span className={`font-black text-2xl ml-3 ${p.handCount > 10 ? 'text-red-500' : 'text-accent'}`} style={{fontFamily:'Orbitron'}}>{p.handCount}</span>
                                        </div>
                                    ))}
                                </div>
                                {gs.players[0]?.id === socket?.id ? (
                                    <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-omega-singularity w-full text-xl">
                                        もう一度プレイ
                                    </button>
                                ) : (
                                    <div className="text-center text-slate-400 font-bold tracking-widest text-sm py-4">ホストの再戦操作を待機中...</div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
