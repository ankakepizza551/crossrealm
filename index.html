<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --danger: #FF4500;
            --bg: #030303; 
            --card-w: 130px; 
            --card-h: 185px;
            --opp-card-w: 35px;
            --opp-card-h: 50px;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 16:9 縦型コンテナ */
        .viewport-container {
            width: 100%; height: 100%; max-width: 550px;
            background: var(--bg); position: relative; overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            display: flex; flex-direction: column;
            border: 1px solid var(--border);
        }

        /* 背景演出：グリッドと透かし */
        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 45px 45px; pointer-events: none; z-index: 0;
            opacity: 0.3;
        }
        .bg-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 100px; font-weight: 900; opacity: 0.03; pointer-events: none;
            white-space: nowrap; z-index: 0; letter-spacing: 10px;
        }
        .bg-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 40%, var(--realm-color, #111) 0%, transparent 75%);
            opacity: 0.35; pointer-events: none; z-index: 0;
            transition: 2s ease;
        }

        .game-container { 
            display: flex; flex-direction: column; flex-grow: 1; height: 100%; width: 100%; 
            padding: 12px; box-sizing: border-box; position: relative; z-index: 1;
        }

        /* 相手エリア */
        .opponents-area {
            display: flex; flex-direction: column; gap: 6px; padding: 10px; margin-bottom: 5px;
        }
        .opponent-row {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.02); padding: 5px 12px; border-radius: 12px;
            border: 1.5px solid var(--border); transition: 0.3s;
        }
        .opponent-row.active { 
            border-color: var(--accent); 
            box-shadow: 0 0 15px var(--accent); 
            background: rgba(64,224,208,0.08); 
        }
        .opp-name { font-size: 13px; font-weight: bold; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 属性サイクル判例 */
        .cycle-legend {
            display: flex; align-items: center; justify-content: center;
            padding: 8px; gap: 4px; background: rgba(0,0,0,0.7);
            border-radius: 12px; border: 1.5px solid var(--border);
            margin: 5px 10px; flex-wrap: wrap;
        }
        .legend-item {
            font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 6px;
            transition: 0.4s; opacity: 0.25;
        }
        .legend-item.active { 
            opacity: 1; background: rgba(255,255,255,0.15); border: 1px solid var(--active-color);
            box-shadow: 0 0 15px var(--active-color); transform: scale(1.1);
        }
        .legend-item.next { opacity: 0.6; }

        .glass-panel {
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(30px);
            border: 1.5px solid var(--border); border-radius: 24px;
        }

        /* カードデザイン */
        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 16px; border: 2px solid rgba(255,255,255,0.15);
            background: #000; position: relative; transition: 0.4s cubic-bezier(0.18, 0.9, 0.35, 1.15); 
            overflow: hidden; cursor: pointer; flex-shrink: 0;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: 0.3s;}
        .card:hover img { opacity: 1; }
        .card-ui { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.92); 
            padding: 10px 0; text-align: center; font-size: 15px; font-weight: 900;
            border-top: 3px solid var(--realm-color); letter-spacing: 1px;
        }

        /* ホバーポップアップ */
        .hand-card:not(.disabled):hover {
            transform: translateY(-30px);
            z-index: 100;
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 25px var(--accent);
        }

        /* フォーカス状態 */
        .hand-card.focused {
            transform: translateY(-65px) scale(1.3) !important;
            z-index: 500 !important;
            box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 40px var(--accent);
            border-color: #fff;
        }

        .hand-card.disabled { opacity: 0.25; filter: grayscale(0.5); cursor: not-allowed; }

        .center-stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        
        /* アクションボタン */
        .btn-action { 
            padding: 20px 45px; border-radius: 50px; border: 3.5px solid var(--accent); 
            background: rgba(0,0,0,0.8); color: var(--accent); font-weight: 900; 
            cursor: pointer; font-size: 20px; transition: 0.3s; letter-spacing: 3px;
            text-transform: uppercase;
        }
        .btn-action:hover:not(:disabled) { 
            background: var(--accent); color: #000; 
            box-shadow: 0 0 35px var(--accent);
            transform: translateY(-2px);
        }
        .btn-action:active:not(:disabled) { transform: translateY(1px); }

        /* 手札コンテナ */
        .hand-container { 
            padding: 45px 0; width: 100%; overflow-x: auto; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .hand-container::-webkit-scrollbar { height: 5px; }
        .hand-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .hand-flex { 
            display: flex; padding: 0 100px; width: max-content; margin: 0 auto;
            align-items: flex-end; height: 280px;
        }

        .slot { transition: 0.45s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; }
        
        .hand-info-bar { text-align: center; font-size: 15px; margin-top: -15px; z-index: 10; padding: 10px; font-weight: 900; letter-spacing: 1px;}

        /* YOUR TURN 透かし表示 */
        @keyframes turnPulse {
            0% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 0.2; transform: scale(0.95); }
        }
        .turn-watermark {
            position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; font-weight: 900; color: var(--accent);
            pointer-events: none; z-index: 0; opacity: 0.3;
            animation: turnPulse 2s infinite; letter-spacing: 10px;
        }

        .btn-exit {
            background: rgba(255, 68, 68, 0.15); border: 2px solid #ff4444; color: #ff4444;
            padding: 8px 16px; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 900;
            transition: 0.3s;
        }
        .btn-exit:hover { background: #ff4444; color: #fff; box-shadow: 0 0 20px #ff4444; }

        .special-badge {
            background: var(--badge-bg, #FF4500); color: white;
            padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 900;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2);
        }

        /* 終了モーダル */
        .result-card {
            padding: 40px; text-align: center; width: 85%;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-title { font-size: 32px; color: var(--accent); letter-spacing: 5px; margin-bottom: 10px; font-weight: 900; }
        .winner-name { font-size: 24px; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }

        .overlay { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; padding: 25px;
        }

        @media (max-width: 500px) {
            :root { --card-w: 115px; --card-h: 165px; }
            .hand-flex { padding: 0 50px; height: 230px; }
            .btn-action { font-size: 18px; padding: 15px 35px; }
            .result-title { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="viewport-container" id="viewport">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', canDuplicate: true, desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', canDuplicate: false, desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', canDuplicate: true, desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', canDuplicate: false, desc: 'エネルギーが充填。' },
            MACHINE: { n: '機械', color: '#ADFF2F', canDuplicate: true, desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', canDuplicate: false, desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];
        const SORT_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE', 'PLANET', 'RUINS'];

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [focusedCardId, setFocusedCardId] = useState(null);
            const handContainerRef = useRef(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                const handleWheel = (e) => { if (handContainerRef.current) handContainerRef.current.scrollLeft += e.deltaY; };
                const container = handContainerRef.current;
                if (container) container.addEventListener('wheel', handleWheel);
                return () => {
                    socket.off('update-game');
                    if (container) container.removeEventListener('wheel', handleWheel);
                };
            }, [joined]);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id && gs?.status === 'playing';
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            const sortedHand = useMemo(() => {
                if (!me.hand) return [];
                return [...me.hand].sort((a, b) => SORT_ORDER.indexOf(a.realm) - SORT_ORDER.indexOf(b.realm));
            }, [me.hand]);

            const dynamicMargin = useMemo(() => {
                const count = sortedHand.length;
                if (count <= 1) return 0;
                const base = window.innerWidth < 450 ? 75 : 90;
                return -(base + Math.min(15, count * 1.3));
            }, [sortedHand.length]);

            const nextRealm = useMemo(() => {
                if (!gs?.fieldCard) return null;
                const idx = CYCLE_ORDER.indexOf(gs.fieldCard.realm);
                if (idx === -1) return null;
                return CYCLE_ORDER[(idx + 1) % 6];
            }, [gs?.fieldCard]);

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial); 
                const f = gs.fieldCard.realm;
                const h = c.realm;           
                if (REALMS[h].w || REALMS[f].w) return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                if (f === 'ICEAGE' && h === 'BATTERY') return true;
                if (f === 'ARCHIVE' && h === 'ICEAGE') return true;
                if (f === h) return REALMS[h].canDuplicate;
                return (h === nextRealm);
            };

            const CardView = ({ card, disabled, onClick, isField, isFocused }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.wasFountain) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div 
                        className={`card ${isField ? 'field-card' : 'hand-card'} ${disabled ? 'disabled' : ''} ${isFocused ? 'focused' : ''}`} 
                        onClick={onClick} 
                        style={isField ? {borderColor: REALMS[card.realm].color, scale: '1.1'} : {}}
                    >
                        <div style={{position:'absolute', top:10, left:10, display:'flex', flexDirection:'column', gap:4, zIndex:5}}>
                            {card.realm === 'GEAR' && card.isSpecial && <div className="special-badge">+2 DRAW</div>}
                            {(card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) && <div className="special-badge" style={{'--badge-bg':'#00CED1'}}>WILD</div>}
                            {card.realm === 'MACHINE' && card.isSpecial && <div className="special-badge" style={{'--badge-bg':'#ADFF2F', color:'#000'}}>REVERSE</div>}
                        </div>
                        <img src={src} alt={card.realm} />
                        <div className="card-ui" style={{'--realm-color': REALMS[card.realm].color}}>{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay">
                    <div className="bg-grid"></div>
                    <div className="bg-watermark">CROSS REALM</div>
                    <h1 style={{letterSpacing:12, fontSize:40, color: 'var(--accent)', marginBottom: 50, fontWeight:900, textShadow:'0 0 20px var(--accent)'}}>CROSS REALM</h1>
                    <div className="glass-panel" style={{padding:35, width:'85%', display:'flex', flexDirection:'column', gap:20, zIndex:1}}>
                        <input style={{padding:18, borderRadius:15, border:'2.5px solid #333', background:'#000', color:'#fff', fontSize:18, textAlign:'center'}} placeholder="コールサイン (名前)" value={name} maxLength={10} onChange={e=>setName(e.target.value.toUpperCase())} />
                        <input style={{padding:18, borderRadius:15, border:'2.5px solid #333', background:'#000', color:'#fff', fontSize:18, textAlign:'center'}} placeholder="ルームコード" value={room} onChange={e=>setRoom(e.target.value)} />
                        <button className="btn-action" onClick={()=>{if(room&&name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>LOGIN</button>
                    </div>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="bg-grid"></div>
                    <div className="glass-panel" style={{padding:'40px', textAlign:'center', width:'80%', zIndex:1}}>
                        <h2 style={{fontSize:26, marginBottom:25, letterSpacing:4, color:'var(--accent)'}}>WAITING FOR PILOTS...</h2>
                        <div style={{margin:'20px 0', textAlign:'left', fontSize:18, background:'rgba(255,255,255,0.05)', padding:20, borderRadius:15}}>
                            {gs?.players?.map((p, idx) => <div key={`${p.id}-${idx}`} style={{padding:'10px 0', borderBottom:'1.2px solid #222'}}>● {p.name}</div>)}
                        </div>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 ? (
                            <button className="btn-action" style={{width:'100%'}} onClick={()=>socket.emit('start-game',{roomId:room})}>ACTIVATE SYSTEM</button>
                        ) : <p style={{fontSize:14, opacity:0.6}}>ホストの起動を待機中...</p>}
                    </div>
                </div>
            );

            return (
                <div className={`game-container ${isMyTurn ? 'my-turn-active' : ''}`} style={{'--realm-color': REALMS[gs.fieldCard.realm].color}}>
                    <div className="bg-aura"></div>
                    <div className="bg-grid"></div>
                    <div className="bg-watermark">CROSS REALM</div>
                    {isMyTurn && <div className="turn-watermark">YOUR TURN</div>}
                    
                    {/* 対戦相手 */}
                    <div className="opponents-area">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5, padding:'0 5px'}}>
                            <span style={{fontSize:14, fontWeight:900, color:'var(--accent)', letterSpacing:2}}>PILOTS</span>
                            <button className="btn-exit" onClick={() => window.location.reload()}>LEAVE</button>
                        </div>
                        <div style={{display:'flex', flexDirection:'column', gap:8}}>
                            {others.map((p, idx) => (
                                <div key={`${p.id}-${idx}`} className={`opponent-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-info">
                                        <div className="opp-name">{p.name}</div>
                                        <div style={{fontSize:11, color:'var(--accent)', fontWeight:900}}>{p.handCount} CARDS</div>
                                    </div>
                                    <div className="opp-cards-visual">
                                        {[...Array(p.handCount)].map((_, i) => (
                                            <div key={i} className="opp-card-back" />
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 判例 */}
                    <div className="cycle-legend glass-panel">
                        {CYCLE_ORDER.map((r, i) => (
                            <React.Fragment key={r}>
                                <div className={`legend-item ${gs.fieldCard.realm === r ? 'active' : (r === nextRealm ? 'next' : '')}`} style={{'--active-color': REALMS[r].color}}>
                                    {REALMS[r].n}
                                </div>
                                {i < CYCLE_ORDER.length - 1 && <span className="legend-arrow">→</span>}
                                {i === CYCLE_ORDER.length - 1 && <span className="legend-arrow">↺</span>}
                            </React.Fragment>
                        ))}
                    </div>

                    <div className="center-stage">
                        <div style={{display:'flex', alignItems:'center', gap: 20, width:'100%', justifyContent:'center'}}>
                            <CardView card={gs.fieldCard} isField={true} />
                            <div style={{maxWidth: '220px'}}>
                                <div style={{fontSize:30, color:REALMS[gs.fieldCard.realm].color, fontWeight:900, textShadow:`0 0 25px ${REALMS[gs.fieldCard.realm].color}`}}>{REALMS[gs.fieldCard.realm].n}</div>
                                <div style={{fontSize:14, opacity:0.8, marginTop:12, lineHeight:1.5}}>{REALMS[gs.fieldCard.realm].desc}</div>
                                {nextRealm && (
                                    <div className="next-badge" style={{'--next-color': REALMS[nextRealm].color}}>
                                        NEXT: <span style={{color:REALMS[nextRealm].color, fontWeight:900}}>{REALMS[nextRealm].n}</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        <button className="btn-action" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                            {gs.nextDrawAmount > 1 ? `DRAW ${gs.nextDrawAmount} CARDS` : (isMyTurn ? "DRAW / PASS" : "STANDBY")}
                        </button>
                    </div>

                    <div className="hand-info-bar">
                        <span style={{color: me.hand.length >= 10 ? 'var(--danger)' : '#fff'}}>
                            UNIT HAND: {me.hand.length} / 12
                        </span>
                    </div>

                    {/* 手札 */}
                    <div className="hand-container" ref={handContainerRef} onClick={(e) => { if(e.target === e.currentTarget) setFocusedCardId(null); }}>
                        <div className="hand-flex">
                            {sortedHand.map((c, i) => (
                                <div key={`${c.id}-${i}`} className="slot" style={{ marginLeft: i === 0 ? 0 : `${dynamicMargin}px`, zIndex: focusedCardId === c.id ? 500 : i }}>
                                    <CardView 
                                        card={c} 
                                        disabled={!canPlay(c)} 
                                        isFocused={focusedCardId === c.id}
                                        onClick={() => {
                                            if(!canPlay(c)) { setFocusedCardId(null); return; }
                                            if(focusedCardId === c.id) {
                                                const isWild = (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial));
                                                if(isWild) setSelectorCard(c);
                                                else socket.emit('play-card', {roomId:room, card:c});
                                                setFocusedCardId(null);
                                            } else setFocusedCardId(c.id);
                                        }}
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* ゲーム終了画面 */}
                    {gs?.status === 'finished' && (
                        <div className="overlay">
                            <div className="bg-grid"></div>
                            <div className="glass-panel result-card">
                                <h2 className="result-title">MISSION COMPLETE</h2>
                                <div className="winner-name">
                                    <span style={{fontSize:14, opacity:0.6, display:'block', marginBottom:5}}>WINNER</span>
                                    {gs.players.find(p => p.handCount === 0)?.name || 'NONE'}
                                </div>
                                <div style={{display:'flex', flexDirection:'column', gap:15}}>
                                    <button className="btn-action" style={{width:'100%'}} onClick={() => socket.emit('play-again', {roomId: room})}>RESTART MISSION</button>
                                    <button className="btn-exit" style={{width:'100%', padding:15}} onClick={() => window.location.reload()}>EXIT TO TITLE</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 選択モーダル */}
                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay" style={{background:'rgba(0,0,0,0.92)'}}>
                            <div className="glass-panel" style={{padding:30, textAlign:'center', width:'90%'}}>
                                <h3 style={{fontSize:24, marginBottom:25, letterSpacing:4, color:'var(--accent)'}}>SELECT TARGET REALM</h3>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:15}}>
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="btn-action" style={{fontSize:16, padding:20, borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={() => {
                                            if(selectorCard) {
                                                socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r, preventSpecial:true});
                                                setSelectorCard(null);
                                            } else socket.emit('set-initial-realm',{roomId:room, chosenRealm:r});
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
