<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross Realm - Omega Singularity v30.5</title>
    
    <!-- Discord OGP Tags -->
    <meta property="og:title" content="Cross Realm - Omega Singularity v30.5" />
    <meta property="og:description" content="新感覚・属性遷移型カードゲーム「Cross Realm」の世界へようこそ。直感的なルールと深い戦略性が交差するサイバーパンク・カードバトル。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ankakepizza551.github.io/crossrealm/" />
    <meta property="og:image" content="https://ankakepizza551.github.io/crossrealm/ogp.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#40E0D0" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg: #010103; 
            --card-w: clamp(75px, 20.5vw, 86px); 
            --card-h: calc(var(--card-w) * 1.4); 
            --border: rgba(212, 175, 15, 0.45);
        }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Exo 2', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; overflow: hidden; 
        }
        .screen-wrapper { 
            width: 100vw; height: 100vh; height: 100dvh;
            max-width: 480px; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            border-left: 2px solid rgba(212,175,55,0.3); border-right: 2px solid rgba(64,224,208,0.3); 
            background: var(--bg);
        }

        /* アニメーション */
        @keyframes sweepBtn { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes vortex-pulse { 0% { transform: rotate(0deg) scale(1.5); opacity: 0.15; } 50% { transform: rotate(180deg) scale(2.5); opacity: 0.4; } 100% { transform: rotate(360deg) scale(1.5); opacity: 0.15; } }
        @keyframes spark-float { 0% { transform: translateY(0) rotate(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(var(--ty)) translateX(var(--tx)) rotate(360deg); opacity: 0; } }
        @keyframes blink-light { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 12px var(--c); background: var(--c); } }

        /* 背景レイヤー */
        .bg-core { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
        .layer-vortex { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent, rgba(138,43,226,0.2), transparent 40%, rgba(64,224,208,0.15), transparent); animation: vortex-pulse 30s linear infinite; filter: blur(90px); }
        .layer-grid { position: absolute; inset: -50%; background-image: linear-gradient(rgba(64, 224, 208, 0.1) 2.5px, transparent 2.5px), linear-gradient(90deg, rgba(64, 224, 208, 0.1) 2.5px, transparent 2.5px); background-size: 100px 100px; transform: perspective(1000px) rotateX(75deg); animation: grid-scroll 15s linear infinite; mask-image: radial-gradient(circle at center, black, transparent 90%); }
        @keyframes grid-scroll { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
        .layer-nebula { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, var(--realm-color), transparent 75%); opacity: 0.4; transition: 3s ease; mix-blend-mode: color-dodge; }

        /* ロゴ領域 */
        .logo-stack { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 100; margin-bottom: 20px; width: 100%; }
        .logo-row { font-family: 'Cinzel', serif; font-weight: 900; line-height: 0.8; text-transform: uppercase; background: linear-gradient(to bottom, #FFF8DC 0%, #FFD700 40%, #D4AF37 60%, #8B6B23 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 25px rgba(212,175,55,0.7)); white-space: nowrap; }
        .row-cross { font-size: clamp(35px, 11vw, 65px); letter-spacing: 12px; }
        .row-realm { font-size: clamp(35px, 11vw, 65px); letter-spacing: 12px; }
        .row-x { font-family: 'Orbitron', sans-serif; font-size: clamp(60px, 16vw, 100px); color: var(--accent); -webkit-text-fill-color: var(--accent); text-shadow: 0 0 40px var(--accent), 0 0 80px var(--accent); margin: -10px 0; font-weight: 900; }
        .sub-banner-omega { margin-top: 15px; padding: 6px 20px; position: relative; overflow: hidden; background: rgba(0,0,0,0.95); border: 2px solid var(--accent); box-shadow: 0 0 30px var(--accent); display: flex; justify-content: center; align-items: center; clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%); }
        .sub-text-final { font-family: 'Audiowide', sans-serif; font-size: clamp(8px, 2.2vw, 11px); letter-spacing: 4px; color: #fff; position: relative; z-index: 2; text-shadow: 0 0 10px #0ff; white-space: nowrap; text-transform: uppercase; }

        /* カードマテリアル */
        .card-wrapper-3d { width: var(--card-w); height: var(--card-h); perspective: 1000px; position: relative; }
        .card-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); border-radius: 8px; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; overflow: hidden; border-radius: inherit; }

        .mat-steam { background: radial-gradient(circle at 50% 10%, var(--r-color-bright) 0%, #0d0400 100%); border: 3px solid #4a2f1c; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px #000; }
        .mat-fantasy { 
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.85) 100%), 
                        radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%) !important; 
            border: 2.5px solid rgba(255,255,255,0.9) !important; border-radius: 35% 10% !important; box-shadow: 0 0 25px var(--r-color-glow);
        }
        .mat-cyber { background: #000; border: none; clip-path: polygon(0 20%, 20% 0, 100% 0, 100% 80%, 80% 100%, 0 100%); box-shadow: inset 0 0 30px var(--r-color-dim); border-left: 4.5px solid var(--r-color); }
        .mat-void { background: #000; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .card-label-tag { position: absolute; top: 8px; left: 8px; padding: 2px 6px; background: #000; border-left: 3.5px solid var(--r-color); transform: translateZ(40px); z-index: 100; }
        .card-label-tag span { font-size: 8px; font-weight: 900; color: #fff; letter-spacing: 1px; font-family: 'Exo 2', sans-serif;}
        .card-icon-Omega { position: absolute; top: 58%; left: 50%; width: 40px; height: 40px; transform: translate(-50%, -50%) translateZ(60px); filter: drop-shadow(0 0 12px var(--r-color)); z-index: 95; }
        .card-footer-Omega { position: absolute; bottom: 0; width: 100%; padding: 8px 0 5px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%); text-align: center; color: #fff; z-index: 100; transform: translateZ(40px); text-shadow: 0 0 10px var(--r-color); font-weight: 900; font-size: 11px; letter-spacing: 2px; }

        .special-badge-base { position: absolute; top: 6px; right: 6px; background: rgba(200, 0, 0, 0.9); border: 1px solid rgba(255, 100, 100, 0.8); color: #fff; font-size: 7px; font-weight: 900; padding: 2px 4px; text-align: center; border-radius: 4px; transform: translateZ(50px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 200; line-height: 1.1; letter-spacing: 0.5px; display: flex; flex-direction: column; justify-content: center; }
        
        /* UIパーツ */
        .panel-omega { position: relative; z-index: 500; width: 100%; max-width: 440px; background: rgba(8,12,20,0.98); border: 2px solid var(--accent); padding: 25px; clip-path: polygon(0 30px, 30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%); box-shadow: 0 0 120px rgba(64,224,208,0.4); }
        .input-cyber { width: 85%; margin: 0 auto 12px; display: block; padding: 15px; background: rgba(0,0,0,0.9); border: 1.5px solid rgba(64,224,208,0.3); border-bottom: 4px solid var(--accent); color: #fff; text-align: center; font-size: 19px; outline: none; font-family: 'Exo 2', sans-serif; font-weight: 900; letter-spacing: 1.5px; }
        .btn-omega-singularity { display: flex; align-items: center; justify-content: center; min-height: 52px; background: linear-gradient(90deg, #B8860B, #FFDF73, #D4AF37, #B8860B); background-size: 200% auto; color: #000; border: 1.5px solid #FFF8DC; border-radius: 8px; font-weight: 900; font-size: 21px; cursor: pointer; width: 100%; animation: sweepBtn 3s linear infinite; box-shadow: 0 8px 30px rgba(212,175,55,0.5); transition: 0.3s; }
        .btn-omega-singularity:disabled { filter: grayscale(1) brightness(0.5); cursor: not-allowed; opacity: 0.6; animation: none; box-shadow: none; border-color: #333; color: #333; }
        
        .btn-draw-area { min-height: 70px; border-top: 2.5px solid var(--magic-purple); background: rgba(0,0,0,0.95); padding: 10px 15px; z-index: 200; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .btn-sub { min-height: 44px; background: rgba(64,224,208,0.1); border: 1px solid var(--accent); color: var(--accent); font-weight: 900; font-size: 15px; border-radius: 4px; transition: 0.3s; }
        .btn-utility { width: 100%; padding: 11px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; font-weight: 900; font-size: 14px; border-radius: 4px; letter-spacing: 4px; }

        /* 待機画面スロット */
        .slot-Omega-Final { width: 85%; margin: 0 auto 6px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-left: 5px solid var(--accent); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); min-height: 58px; }
        .slot-Omega-Final.empty { opacity: 0.25; border-left-color: rgba(255,255,255,0.2); border-left-style: dashed; }
        .slot-name-tag { font-family: 'Exo 2', sans-serif; font-weight: 900; font-size: 19px; letter-spacing: 1.5px; }

        /* HUD & イラスト */
        .opp-mega-grid { flex-shrink: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 8px 12px; background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 50; }
        .opp-card-omega-peak { padding: 8px 12px; border-radius: 4px; background: rgba(255,255,255,0.04); border-left: 3.5px solid transparent; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; min-height: 52px; }
        .opp-card-omega-peak.active { border-left-color: var(--accent); background: rgba(64,224,208,0.12); box-shadow: 0 0 15px rgba(64,224,208,0.25); }
        
        .card-stack-visual { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); height: 35px; width: 45px; display: flex; justify-content: flex-end; align-items: center; pointer-events: none; }
        .stack-item { position: absolute; height: 32px; width: 23px; background: linear-gradient(135deg, #444, #111); border: 0.5px solid rgba(255,255,255,0.4); border-radius: 2px; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); }

        .cycle-strip-classic { flex-shrink: 0; display: flex; justify-content: space-between; padding: 12px; background: #000; border-bottom: 2px solid var(--border); z-index: 40; }
        .cycle-node-container { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .cycle-light { width: 100%; height: 5px; background: rgba(255,255,255,0.1); margin-top: 6px; border-radius: 2px; }
        .cycle-light.active { background: var(--c); box-shadow: 0 0 12px var(--c); }
        .cycle-light.next { animation: blink-light 1.5s infinite; --c: rgba(255,255,255,0.5); background: rgba(255,255,255,0.2); }
        .cycle-label { font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.3); transition: 0.3s; }
        .cycle-label.active { color: var(--c); text-shadow: 0 0 8px var(--c); }
        
        .field-area-recapped { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; padding: 15px 0; }
        .terminal-log-omega { flex-shrink: 0; height: 55px; margin: 0 12px 10px; padding: 8px 15px; font-size: 12px; background: rgba(0,0,0,0.85); border-left: 5px solid var(--accent); overflow-y: auto; color: #fff; font-family: monospace; z-index: 30; line-height: 1.5; }
        .hand-area-recapped { flex-shrink: 0; display: flex; gap: 4px; padding: 14px 12px; overflow-x: auto; background: rgba(0,0,0,0.92); min-height: 165px; border-top: 1px solid rgba(255,255,255,0.2); z-index: 20; }
        
        .btn-sound-toggle { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); z-index: 1000; width: 44px; height: 44px; background: rgba(0,0,0,0.85); border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px var(--accent); transition: 0.3s; color: var(--accent); }
        .btn-sound-toggle:hover { scale: 1.1; background: var(--accent); color: #000; }

        .not-playable { opacity: 0.6 !important; filter: brightness(0.6) grayscale(50%) !important; transform: translateY(8px) scale(0.95) !important; pointer-events: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#8B4513', bright: '#FF8C00', glow: 'rgba(212,175,55,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#B22222', bright: '#FF3131', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#00BFFF', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#9D00FF', bright: '#E2B0FF', glow: 'rgba(157,0,255,1)', dim: 'rgba(157,0,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#32CD32', bright: '#ADFF2F', glow: 'rgba(50,205,50,1)', dim: 'rgba(50,205,50,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#FFFFFF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#999999', bright: '#CCCCCC', glow: 'rgba(150,150,150,1)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const SORT_WEIGHT = { GEAR:1, ARCHIVE:2, FOUNTAIN:3, ICEAGE:4, MACHINE:5, BATTERY:6, PLANET:7, RUINS:8 };
        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];
        const NEXT_MAP = { GEAR: ['GEAR','ICEAGE'], ICEAGE: ['FOUNTAIN','BATTERY'], FOUNTAIN: ['FOUNTAIN','BATTERY'], BATTERY: ['MACHINE','ARCHIVE'], MACHINE: ['MACHINE','ARCHIVE'], ARCHIVE: ['GEAR','ICEAGE'] };

        const IconRenderer = ({ r, spec, className }) => {
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: spec ? 4 : 2, strokeLinecap: "round", className: className || "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardStackVisual = ({ count, r }) => {
            const maxStack = Math.min(count, 5);
            return (
                <div className="card-stack-visual">
                    {[...Array(maxStack)].map((_, i) => (
                        <div key={i} className="stack-item" style={{ right: `${i * 3.5}px`, bottom: `${i * 2.5}px`, zIndex: i, borderColor: i === maxStack-1 ? REALMS[r]?.bright : 'rgba(255,255,255,0.2)' }} />
                    ))}
                </div>
            );
        };

        const CardView = ({ card, playable, onClick, isField, style, zIndex }) => {
            if (!card?.realm) return null;
            let dr = card.realm;
            if (card.wasRuins) dr = 'RUINS'; else if (card.wasPlanet) dr = 'PLANET'; else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) dr = 'FOUNTAIN';
            const spec = card.isSpecial || card.wasFountain;
            const rData = REALMS[dr] || REALMS.GEAR;
            
            let specialLabel = "";
            if (spec) {
                if (card.realm === 'GEAR') specialLabel = "DRAW 2";
                else if (card.realm === 'MACHINE') specialLabel = "REVERSE";
                else if (card.realm === 'FOUNTAIN') specialLabel = "LIMIT WILD";
                else if (card.realm === 'PLANET' || card.realm === 'RUINS') specialLabel = "WILD";
            }

            const cardRef = useRef(null);
            const [isHovered, setIsHovered] = useState(false);

            const activeStyle = isHovered && !isField ? { transform: 'translateY(-15px)', zIndex: 1000 } : { transform: 'translateY(0)', zIndex: zIndex };

            return (
                <div 
                    className={`card-wrapper-3d ${!playable && !isField ? 'not-playable' : ''}`} 
                    style={{...style, ...activeStyle, transition: 'transform 0.2s, z-index 0s'}} 
                    ref={cardRef} 
                    onMouseEnter={() => playable && setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    onClick={onClick}
                >
                    <div className={`card-3d mat-${rData.theme}`} style={{'--r-color': rData.color, '--r-color-glow': rData.glow, '--r-color-dim': rData.dim || 'rgba(0,0,0,0.5)'}}>
                        <div className="card-content">
                            <div className="card-label-tag"><span>{dr}</span></div>
                            <div className="card-icon-Omega" style={{ color: rData.bright }}><IconRenderer r={dr} spec={spec} /></div>
                            <div className={`card-footer-peak font-['${rData.font}']`}>{rData.n}</div>
                            
                            {spec && (
                                <div className="special-badge-base">
                                    {specialLabel.split(' ').map((word, i) => (
                                        <div key={i}>{word}</div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const SparkleVFX = () => {
            const sparks = useMemo(() => [...Array(30)].map((_, i) => ({ id: i, x: Math.random() * 100, y: Math.random() * 100, tx: (Math.random() - 0.5) * 600, ty: (Math.random() - 0.5) * 600, delay: Math.random() * 8, size: Math.random() * 5 + 2 })), []);
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    {sparks.map(s => (
                        <div key={s.id} className="absolute bg-[#FFD700] rounded-full blur-[1px]" style={{ left: `${s.x}%`, top: `${s.y}%`, width: `${s.size}px`, height: `${s.size}px`, '--tx': `${s.tx}px`, '--ty': `${s.ty}px`, animation: `spark-float 8s infinite`, animationDelay: `${s.delay}s` }} />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selector, setSelector] = useState(null);
            const [isMuted, setIsMuted] = useState(false);
            const logEndRef = useRef(null);
            
            // SE安定再生用キャッシュ
            const audioRefs = useRef({});

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com');
                setSocket(s);
                s.on('update-game', setGs);
                
                // 音声インスタンスの生成とプリロード
                audioRefs.current = {
                    play: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'),
                    draw: new Audio('https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3'),
                    turn: new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3')
                };
                
                return () => s.disconnect();
            }, []);

            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollTop = logEndRef.current.scrollHeight; }, [gs?.logs]);

            const playSnd = (key) => { 
                if(!isMuted && audioRefs.current[key]) { 
                    try { 
                        audioRefs.current[key].currentTime = 0; 
                        audioRefs.current[key].play().catch(() => {}); // iOS等の自動再生ブロック対策
                    } catch(e){} 
                } 
            };

            const isMyTurn = gs?.currentTurnPlayerId === socket?.id;
            const currentR = gs?.fieldCard?.realm || 'GEAR';
            const me = gs?.players.find(p => p.id === socket?.id);
            const nextPlayable = NEXT_MAP[currentR] || [];

            const sortedHand = useMemo(() => {
                if (!me?.hand) return [];
                return [...me.hand].sort((a, b) => {
                    const wa = SORT_WEIGHT[a.realm] || 99;
                    const wb = SORT_WEIGHT[b.realm] || 99;
                    if (wa !== wb) return wa - wb;
                    return (b.isSpecial ? 1 : 0) - (a.isSpecial ? 1 : 0);
                });
            }, [me?.hand]);

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const h = c.realm; const f = currentR;
                if (h === 'PLANET' || h === 'RUINS' || f === 'PLANET' || f === 'RUINS') return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                const transition = ['ICEAGE', 'BATTERY', 'ARCHIVE'];
                if (transition.includes(f) && f === h) return false;
                return f === h || (nextPlayable.includes(h));
            };

            const join = () => { if(room && name) { setJoined(true); socket.emit('join-room', { roomId: room.toUpperCase(), playerName: name }); } };
            const backToTop = () => { setJoined(false); setGs(null); setRoom(''); };

            return (
                <div className="screen-wrapper flex flex-col" style={{'--realm-color': REALMS[currentR]?.color}}>
                    <div className="bg-core"><div className="layer-vortex"/><div className="layer-grid"/><div className="layer-nebula"/></div>
                    
                    <button className="btn-sound-toggle" onClick={() => setIsMuted(!isMuted)}>
                        {isMuted ? (
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5.586 15H4a1 1 0 01-1-1V10a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>
                        ) : (
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1V10a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                        )}
                    </button>

                    {!joined ? (
                        <div className="h-full flex items-center justify-center p-6 z-10">
                            <SparkleVFX />
                            <div className="panel-omega w-full text-center">
                                <div className="logo-stack">
                                    <div className="logo-row row-cross">CROSS</div>
                                    <div className="row-x">X</div>
                                    <div className="logo-row row-realm">REALM</div>
                                    <div className="sub-banner-omega"><div className="sub-text-final">ETERNAL PUNK EDITION</div></div>
                                </div>
                                <div className="mt-8 space-y-4">
                                    <input type="text" className="input-cyber" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} />
                                    <input type="text" className="input-cyber" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                    <button className="btn-omega-singularity mt-4 w-[85%] mx-auto" onClick={join}>接続開始</button>
                                </div>
                            </div>
                        </div>
                    ) : (!gs || gs.status === 'waiting') ? (
                        <div className="h-full flex flex-col items-center justify-center p-6 text-center z-10">
                            <h2 className="text-3xl font-black mb-1.5 text-accent tracking-widest" style={{fontFamily:'Orbitron'}}>待機中...</h2>
                            <div className="mb-4 px-5 py-1.5 border-2 border-accent/30 bg-accent/5 rounded-lg text-sm font-black tracking-[4px]">
                                ルームID: <span className="text-white ml-2">{room}</span>
                            </div>
                            <div className="w-full space-y-1.5 mb-5 max-h-[50dvh] overflow-y-auto no-scrollbar">
                                {[...Array(4)].map((_, i) => {
                                    const p = gs?.players[i];
                                    return (
                                        <div key={i} className={`slot-Omega-Final ${p ? '' : 'empty'}`}>
                                            <span className="slot-name-tag uppercase">{p ? p.name : 'empty linkage'}</span>
                                            {p && i === 0 && <span className="bg-[#D4AF37] text-black text-[10px] px-2.5 py-0.5 font-black rounded shadow-lg">HOST</span>}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="w-[85%] flex flex-col gap-3 mx-auto">
                                {gs?.players[0]?.id === socket?.id && (
                                    <>
                                        <button className="btn-omega-singularity" disabled={gs?.players?.length < 2} onClick={()=>socket.emit('start-game', {roomId:room})}>
                                            {gs?.players?.length < 2 ? '対戦相手を待機中' : 'ゲーム開始'}
                                        </button>
                                        <button className="btn-sub" onClick={()=>socket.emit('add-cpu', {roomId:room})}>CPUを追加する</button>
                                    </>
                                )}
                                <button className="btn-utility" onClick={backToTop}>トップに戻る</button>
                            </div>
                        </div>
                    ) : (
                        <>
                            <div className="opp-mega-grid">
                                {gs.players.map(p => (
                                    <div key={p.id} className={`opp-card-omega-peak ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="flex flex-col">
                                            <span className="font-black text-[13px] truncate max-w-[70px] uppercase">{p.name}</span>
                                            <span className="text-accent font-black text-xl leading-none">{p.handCount}枚</span>
                                        </div>
                                        <CardStackVisual count={p.handCount} r={currentR} />
                                    </div>
                                ))}
                            </div>

                            <div className="cycle-strip-classic">
                                {CYCLE_ORDER.map(r => (
                                    <div key={r} className="cycle-node-container">
                                        <span className={`cycle-label ${currentR===r?'active':''}`} style={{'--c':REALMS[r].bright}}>{REALMS[r].n}</span>
                                        <div className={`cycle-light ${currentR===r?'active':''} ${nextPlayable.includes(r) && currentR!==r?'next':''}`} style={{'--c':REALMS[r].bright}} />
                                    </div>
                                ))}
                            </div>

                            <div className="field-area-recapped">
                                <div className={`mb-4 text-sm font-black tracking-[10px] ${isMyTurn?'text-accent animate-pulse':'text-white/20'}`}>{isMyTurn?'あなたのターン':'同期中...'}</div>
                                <CardView card={gs.fieldCard} isField={true} zIndex={10} />
                                <div className="mt-8 font-black text-4xl tracking-widest uppercase" style={{color: REALMS[currentR].bright, textShadow:`0 0 25px ${REALMS[currentR].color}`}}>{REALMS[currentR].n}</div>
                            </div>

                            <div ref={logEndRef} className="terminal-log-omega no-scrollbar">
                                {gs.logs.slice(-5).map(l => <div key={l.id} className="mb-1">{l.text}</div>)}
                            </div>

                            <div className="hand-area-recapped no-scrollbar">
                                {sortedHand.map((c, i) => {
                                    const playable = canPlay(c);
                                    const overlap = sortedHand.length > 5 ? `-${Math.min(32, (sortedHand.length-5)*8)}px` : '0';
                                    return <CardView key={c.id} card={c} playable={playable} onClick={() => {
                                        if(playable){
                                            playSnd('play');
                                            if(c.realm==='PLANET'||c.realm==='RUINS'||(c.realm==='FOUNTAIN'&&c.isSpecial)){
                                                setSelector(c);
                                            } else {
                                                socket.emit('play-card',{roomId:room, card:c});
                                            }
                                        }
                                    }} style={{ marginLeft: i === 0 ? '0' : overlap }} zIndex={i + 100} />;
                                })}
                            </div>

                            <div className="btn-draw-area">
                                <button className="btn-omega-singularity w-full" disabled={!isMyTurn} onClick={()=>{ playSnd('draw'); socket.emit('draw-card',{roomId:room}); }}>
                                    ドロー ({gs.nextDrawAmount}枚)
                                </button>
                            </div>

                            {selector && (
                                <div className="absolute inset-0 bg-black/95 z-[900] flex items-center justify-center p-8 backdrop-blur-xl">
                                    <div className="panel-omega w-full">
                                        <h3 className="text-center font-black mb-10 text-2xl tracking-widest text-white">属性選択</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {CYCLE_ORDER.map(r => (
                                                <button key={r} className="p-5 border border-white/20 rounded-lg font-black transition-all hover:bg-white/10" style={{color: REALMS[r].bright}} onClick={()=>{ socket.emit('play-card',{roomId:room, card:selector, chosenRealm:r}); setSelector(null); }}>{REALMS[r].n}</button>
                                            ))}
                                        </div>
                                        <button className="w-full mt-10 p-4 border-2 border-red-500/80 bg-red-500/10 text-red-500 font-black tracking-[10px] text-xs rounded hover:bg-red-500/30 transition-all" onClick={()=>setSelector(null)}>キャンセル</button>
                                    </div>
                                </div>
                            )}

                            {gs.status === 'finished' && (
                                <div className="absolute inset-0 bg-black/97 z-[1000] flex flex-col items-center justify-center p-4 text-center backdrop-blur-xl">
                                    <div className="panel-omega w-full border-4 border-accent shadow-[0_0_80px_rgba(64,224,208,0.6)] p-6 max-h-[90vh] flex flex-col overflow-hidden">
                                        <h2 className="text-3xl font-black mb-4 tracking-tighter text-accent" style={{fontFamily:'Cinzel'}}>ミッション終了</h2>
                                        <div className="w-full space-y-2 mb-6 flex-1 overflow-y-auto px-1 no-scrollbar">
                                            {gs.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i) => (
                                                <div key={p.id} className={`p-3 border-l-8 ${i===0?'border-accent bg-accent/20 shadow-[0_0_20px_var(--accent)] scale-[1.02]':'border-white/10 bg-white/5 opacity-80'} flex justify-between items-center rounded-r-lg transition-all`}>
                                                    <div className="flex flex-col items-start"><span className="text-[9px] uppercase font-black text-white/60 tracking-widest">RANK #{i+1}</span><span className="font-bold text-xl uppercase leading-none">{p.name}</span></div>
                                                    <span className="font-black text-3xl font-mono text-white">{p.handCount}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="w-full flex flex-col gap-3 shrink-0">
                                            {gs.players[0]?.id === socket?.id ? (
                                                <>
                                                    <button className="btn-omega-singularity text-xl py-4" onClick={()=>socket.emit('play-again', {roomId:room})}>ゲームを続ける</button>
                                                    <button className="btn-sub py-3 text-sm tracking-[4px]" onClick={()=>socket.emit('play-again', {roomId:room})}>待機室に戻る</button>
                                                </>
                                            ) : (
                                                <div className="text-white/80 text-[11px] py-4 font-black tracking-[6px] border-2 border-white/10 bg-white/5 rounded-lg animate-pulse">ホストの操作を待機中...</div>
                                            )}
                                            <button className="btn-utility py-3 border-white/40 text-white font-black" onClick={backToTop}>トップに戻る</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const ErrorBoundary = ({ children }) => {
            try { return children; } catch(e) { return <div className="p-10 text-red-500 font-black">SYSTEM ERROR: {e.message}</div>; }
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
