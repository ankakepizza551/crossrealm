<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #40E0D0; --bg: #0d0d0d; --card-w: 85px; --card-h: 125px; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .overlay-screen { position: fixed; inset: 0; background: rgba(13,13,13,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .card { width: var(--card-w); height: var(--card-h); border-radius: 10px; border: 2px solid #333; background: #000; position: relative; transition: 0.2s; cursor: pointer; overflow: hidden; }
        .card.disabled { opacity: 0.15; filter: grayscale(0.8); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); padding: 4px 0; text-align: center; pointer-events: none; }
        .badge-icon { position: absolute; top: 5px; right: 5px; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .bg-draw { background: linear-gradient(45deg, #ff4444, #990000); }
        .bg-wild { background: linear-gradient(45deg, #4444ff, #000099); }
        .bg-rev  { background: linear-gradient(45deg, #ffaa00, #996600); }
        .hand-area { position: fixed; bottom: 35px; width: 100%; display: flex; justify-content: center; padding-left: 35px; }
        .slot { margin-left: -35px; transition: 0.25s; }
        .slot:hover { transform: translateY(-30px); margin-right: 25px; z-index: 50 !important; }
        .btn { padding: 10px 25px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .choice-btn { margin: 5px; padding: 10px; border-radius: 5px; border: 1px solid var(--accent); background: transparent; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', canRepeat: true }, ICEAGE: { n: '氷河期', canRepeat: false },
            FOUNTAIN: { n: '噴水', canRepeat: true }, BATTERY: { n: 'バッテリー', canRepeat: false },
            MACHINE: { n: '機械', canRepeat: true }, ARCHIVE: { n: '古文書', canRepeat: false },
            PLANET: { n: '惑星', w: true }, RUINS: { n: '廃墟', w: true }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selector, setSelector] = useState(null); // { card: card }

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                socket.on('game-over', (d) => alert("Winner: " + d.winnerName));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard) return false;
                const f = gs.fieldCard.realm;
                const h = c.realm;
                if (REALMS[h].w) return true;
                if (c.realm === 'FOUNTAIN' && c.isSpecial && (f === 'ICEAGE' || f === 'FOUNTAIN')) return true;
                if (f === h) return REALMS[h].canRepeat;
                if (f === 'GEAR' && h === 'ICEAGE') return true;
                if (f === 'ICEAGE' && h === 'FOUNTAIN') return true;
                if (f === 'FOUNTAIN' && h === 'BATTERY') return true;
                if (f === 'BATTERY' && h === 'MACHINE') return true;
                if (f === 'MACHINE' && h === 'ARCHIVE') return true;
                if (f === 'ARCHIVE' && h === 'GEAR') return true;
                return false;
            };

            const handlePlay = (card) => {
                // 惑星または噴水ワイルドなら属性選択
                if (card.realm === 'PLANET' || (card.realm === 'FOUNTAIN' && card.isSpecial)) {
                    setSelector(card);
                } else {
                    socket.emit('play-card', { roomId: room, card });
                }
            };

            const chooseRealm = (chosenRealm) => {
                socket.emit('play-card', { roomId: room, card: selector, chosenRealm });
                setSelector(null);
            };

            const CardView = ({ card, disabled, onClick, isField = false }) => {
                if (!card) return null;
                let imgName = `${card.realm}.png`;
                if (card.wasRuins) imgName = 'RUINS.png';
                else if (card.wasPlanet) imgName = 'PLANET.png';
                else if (card.realm === 'GEAR') imgName = card.isSpecial ? 'GEAR_frame.png' : 'GEAR.png';
                else if (card.realm === 'FOUNTAIN') imgName = card.isSpecial ? 'FOUNTAIN_wild.png' : 'FOUNTAIN_normal.png';
                else if (card.realm === 'MACHINE') imgName = card.isSpecial ? 'MACHINE_reverse.png' : 'MACHINE_normal.png';

                return (
                    <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                        <img src={`./images/${imgName}`} alt={card.realm} />
                        {card.isSpecial && card.realm === 'GEAR' && <div className="badge-icon bg-draw">＋2</div>}
                        {card.isSpecial && card.realm === 'FOUNTAIN' && <div className="badge-icon bg-wild">WILD</div>}
                        {card.isSpecial && card.realm === 'MACHINE' && <div className="badge-icon bg-rev">REV</div>}
                        <div className="card-ui"><div style={{fontSize:'10px', fontWeight:'bold'}}>{isField ? `場: ${REALMS[card.realm].n}` : REALMS[card.realm].n}</div></div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay-screen">
                    <h1>CROSS REALM</h1>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'10px'}} placeholder="USER NAME" value={name} onChange={e=>setName(e.target.value)} /><br/>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'20px'}} placeholder="ROOM ID" value={room} onChange={e=>setRoom(e.target.value)} /><br/>
                    <button className="btn" onClick={() => { if(room && name) { socket.emit('join-room', { roomId: room, playerName: name }); setJoined(true); } }}>JOIN</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay-screen">
                    <h2>WAITING... ({gs?.players?.length || 0}/4)</h2>
                    {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && <button className="btn" onClick={()=>socket.emit('start-game', {roomId: room})}>START</button>}
                </div>
            );

            return (
                <div style={{textAlign:'center', paddingTop:'50px'}}>
                    {selector && (
                        <div className="overlay-screen">
                            <h3>次の属性を選択してください</h3>
                            <div>
                                {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r => (
                                    <button key={r} className="choice-btn" onClick={()=>chooseRealm(r)}>{REALMS[r].n}</button>
                                ))}
                            </div>
                        </div>
                    )}
                    <div style={{fontSize:'11px', color: gs.isReversed ? '#ffaa00' : '#44ff44', fontWeight:'bold'}}>{gs.isReversed ? '◀ REVERSE' : 'NORMAL ▶'}</div>
                    <div style={{margin:'20px auto', display:'inline-block', transform:'scale(1.1)'}}>
                        <CardView card={gs.fieldCard} disabled={false} isField={true} />
                    </div>
                    <div style={{marginTop:'40px'}}><button className="btn" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>DRAW / PASS</button></div>
                    <div className="hand-area">
                        {me.hand.map((c, i) => (
                            <div key={c.id} className="slot" style={{zIndex: i}}>
                                <CardView card={c} disabled={!canPlay(c)} onClick={()=>canPlay(c) && handlePlay(c)} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
