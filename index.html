<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --danger: #FF4500;
            --bg: #000; 
            --card-w: 110px; 
            --card-h: 155px;
            --opp-card-w: 24px;
            --opp-card-h: 36px;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }
        
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Exo 2', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* PCでも縦16:9を維持するためのラッパー */
        .screen-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: calc(100vh * 9 / 16);
            max-height: 100vh;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
        }

        .bg-aurora {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, #000 85%);
            opacity: 0.3; z-index: 0; transition: background 1.5s ease;
            pointer-events: none;
        }

        .game-container {
            flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1;
        }

        /* 相手の手札表示 */
        .opponents-area {
            display: flex; flex-direction: column; gap: 15px; padding: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .opp-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-radius: 12px; background: var(--glass);
            border: 1px solid var(--border); backdrop-filter: blur(5px);
        }
        .opp-row.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(64, 224, 208, 0.2); }
        .opp-info { text-align: left; }
        .opp-name { font-size: 10px; font-weight: 900; opacity: 0.5; letter-spacing: 1px; }
        .opp-hand-visual { display: flex; gap: -8px; margin-top: 5px; }
        .mini-card-back {
            width: var(--opp-card-w); height: var(--opp-card-h);
            background: linear-gradient(135deg, #222, #000);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            margin-left: -18px; box-shadow: -2px 0 5px rgba(0,0,0,0.5);
        }
        .mini-card-back:first-child { margin-left: 0; }

        /* フィールド */
        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .turn-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; opacity: 0.05; pointer-events: none; font-style: italic;
            animation: pulse-text 3s infinite ease-in-out; white-space: nowrap;
        }
        @keyframes pulse-text { 0%, 100% { opacity: 0.03; scale: 1; } 50% { opacity: 0.08; scale: 1.05; } }

        /* カードの判例（凡例） */
        .cycle-legend {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px;
            border: 1px solid var(--border); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; gap: 8px; z-index: 10;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 9px; font-weight: 900; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend-arrow { font-size: 8px; opacity: 0.3; margin-left: 10px; }

        /* カードスタイル */
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 15px; border: 1.5px solid var(--border);
            background: #080808; overflow: hidden; position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6); transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-footer {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85);
            font-size: 9px; font-weight: 900; padding: 6px 0; text-align: center;
            border-top: 2.5px solid var(--r-color); text-transform: uppercase;
        }

        /* 手札のホバー演出：出せるカードだけポップアップ */
        .my-card { margin-left: -45px; transform-origin: bottom center; cursor: pointer; }
        .my-card.playable:hover {
            transform: translateY(-50px) scale(1.3) !important;
            z-index: 1000 !important;
            border-color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 20px rgba(64, 224, 208, 0.4);
        }
        .my-card.not-playable { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        /* アクションボタン */
        .btn-draw {
            position: absolute; right: 20px; bottom: 220px;
            background: var(--accent); color: #000; border: none;
            padding: 15px 25px; border-radius: 30px; font-weight: 900; font-size: 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); cursor: pointer; z-index: 50;
        }
        .btn-draw:disabled { background: #222; color: #555; box-shadow: none; }

        .my-hand-area {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding-bottom: 40px; min-height: 200px; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .hand-container { display: flex; justify-content: center; padding: 0 50px; }

        /* モーダル系 */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .panel { background: #050505; border: 1px solid var(--border); padding: 30px; border-radius: 20px; text-align: center; width: 85%; }
        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .realm-btn { padding: 15px; border-radius: 10px; border: 2px solid var(--border); background: transparent; color: #fff; font-weight: 900; cursor: pointer; font-size: 12px; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .status-badge { background: var(--danger); color: white; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 14px; margin-bottom: 20px; animation: bounce 1s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: 'GEAR', color: '#FF8C00', icon: '⚙️' },
            ICEAGE: { n: 'ICEAGE', color: '#00BFFF', icon: '❄️' },
            FOUNTAIN: { n: 'FOUNTAIN', color: '#4169E1', icon: '⛲' },
            BATTERY: { n: 'BATTERY', color: '#32CD32', icon: '🔋' },
            MACHINE: { n: 'MACHINE', color: '#2F4F4F', icon: '🤖' },
            ARCHIVE: { n: 'ARCHIVE', color: '#8B4513', icon: '📜' },
            PLANET: { n: 'PLANET', color: '#9400D3', icon: '🪐' },
            RUINS: { n: 'RUINS', color: '#696969', icon: '🏛️' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('ALPHA');
            const [name, setName] = useState('PILOT-' + Math.floor(Math.random() * 999));
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [previewStatus, setPreviewStatus] = useState('waiting');

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            const effectiveGameState = useMemo(() => {
                if (gs) return gs;
                if (joined) {
                    return {
                        status: previewStatus,
                        currentTurnPlayerId: 'mock-me',
                        fieldCard: { realm: 'GEAR', isSpecial: false },
                        players: [
                            { id: 'mock-me', name: name, handCount: 5, hand: [
                                { id: 'c1', realm: 'GEAR', isSpecial: true },
                                { id: 'c2', realm: 'ICEAGE', isSpecial: false },
                                { id: 'c3', realm: 'PLANET', isSpecial: false },
                                { id: 'c4', realm: 'ARCHIVE', isSpecial: false },
                                { id: 'c5', realm: 'MACHINE', isSpecial: true }
                            ] },
                            { id: 'mock-1', name: 'Z-NEO', handCount: 3 },
                            { id: 'mock-2', name: 'RAY-X', handCount: 6 }
                        ],
                        nextDrawAmount: 1,
                        isReversed: false
                    };
                }
                return null;
            }, [gs, joined, name, previewStatus]);

            const me = effectiveGameState?.players?.find(p => p.id === (socket?.id || 'mock-me')) || { hand: [] };
            const isMyTurn = effectiveGameState?.currentTurnPlayerId === (socket?.id || 'mock-me');
            const others = effectiveGameState?.players?.filter(p => p.id !== (socket?.id || 'mock-me')) || [];

            const canPlay = (card) => {
                if (!isMyTurn || effectiveGameState.status !== 'playing') return false;
                if (effectiveGameState.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const field = effectiveGameState.fieldCard?.realm || 'GEAR';
                const hand = card.realm;
                if (hand === 'PLANET' || hand === 'RUINS' || (hand === 'FOUNTAIN' && card.isSpecial)) return true;
                if (field === hand) return true;
                const currentIdx = CYCLE_ORDER.indexOf(field);
                if (currentIdx !== -1 && hand === CYCLE_ORDER[(currentIdx + 1) % 6]) return true;
                if (field === 'ARCHIVE' && hand === 'ICEAGE') return true;
                if (field === 'ICEAGE' && hand === 'BATTERY') return true;
                if (field === 'ICEAGE' && hand === 'FOUNTAIN') return true;
                return false;
            };

            const Card = ({ card, playable, onClick, isField }) => {
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';

                return (
                    <div className={`card ${playable ? 'playable' : 'not-playable'} my-card`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/111/444?text=' + card.realm; }} />
                        <div className="card-footer">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            const playCard = (card) => {
                if (!canPlay(card)) return;
                if (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial)) {
                    setSelectorCard(card);
                } else {
                    if (socket?.connected) socket.emit('play-card', { roomId: room, card });
                    else console.log("Preview play");
                }
            };

            if (!joined) {
                return (
                    <div className="screen-wrapper">
                        <div className="overlay">
                            <div className="panel">
                                <h1 style={{color:'var(--accent)', fontSize:24, marginBottom:30, fontWeight:900, fontStyle:'italic'}}>CROSS REALM</h1>
                                <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="PILOT NAME" style={{width:'100%', padding:15, background:'#111', border:'1px solid var(--border)', color:'#fff', marginBottom:15, borderRadius:10, textAlign:'center', fontSize:14}} />
                                <input type="text" value={room} onChange={e=>setRoom(e.target.value)} placeholder="SECTOR ID" style={{width:'100%', padding:15, background:'#111', border:'1px solid var(--border)', color:'#fff', marginBottom:30, borderRadius:10, textAlign:'center', fontSize:14}} />
                                <button onClick={()=>{setJoined(true); if(socket?.connected) socket.emit('join-room',{roomId:room, playerName:name});}} style={{width:'100%', padding:18, background:'var(--accent)', color:'#000', border:'none', borderRadius:10, fontWeight:900, fontSize:16, cursor:'pointer'}}>CONNECT LINK</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (effectiveGameState?.status === 'waiting') {
                return (
                    <div className="screen-wrapper">
                        <div className="container" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%'}}>
                            <h2 style={{letterSpacing:8, opacity:0.6, fontSize:14, fontWeight:900}}>WAITING FOR PLAYER</h2>
                            <div style={{marginTop:10, fontSize:10, color:'var(--accent)', fontWeight:900}}>SECTOR: {room}</div>
                            <div style={{marginTop:30, display:'flex', flexDirection:'column', gap:10, width:'80%'}}>
                                {effectiveGameState.players.map(p => (
                                    <div key={p.id} style={{padding:12, background:'var(--glass)', border:'1px solid var(--border)', borderRadius:10, textAlign:'center', fontSize:12, fontWeight:900}}>
                                        {p.name}
                                    </div>
                                ))}
                            </div>
                            <button onClick={()=>{ if(socket?.connected) socket.emit('start-game',{roomId:room}); else setPreviewStatus('playing'); }} style={{marginTop:40, padding:'15px 40px', borderRadius:30, border:'2px solid var(--accent)', background:'transparent', color:'var(--accent)', fontWeight:900, cursor:'pointer'}}>ENGAGE CORE</button>
                        </div>
                    </div>
                );
            }

            const currentRealm = effectiveGameState?.fieldCard?.realm || 'GEAR';

            return (
                <div className="screen-wrapper">
                    <div className="bg-aurora" style={{ '--realm-color': REALMS[currentRealm].color }}></div>
                    <div className="game-container">
                        
                        <div className="opponents-area">
                            {others.map(p => (
                                <div key={p.id} className={`opp-row ${effectiveGameState.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-info">
                                        <div className="opp-name">{p.name}</div>
                                        <div className="opp-hand-visual">
                                            {[...Array(p.handCount)].map((_, i) => <div key={i} className="mini-card-back" />)}
                                        </div>
                                    </div>
                                    <div style={{fontWeight:900, color:var(--accent), fontSize:16}}>{p.handCount}</div>
                                </div>
                            ))}
                        </div>

                        <div className="field">
                            <div className="turn-indicator">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                            
                            <div className="cycle-legend">
                                <div style={{fontSize:8, fontWeight:900, opacity:0.5, marginBottom:5}}>CYCLE</div>
                                {CYCLE_ORDER.map((r, i) => (
                                    <div key={r} className="legend-item" style={{opacity: currentRealm === r ? 1 : 0.3}}>
                                        <div className="legend-dot" style={{background: REALMS[r].color}} />
                                        <span>{r}</span>
                                    </div>
                                ))}
                                <div className="legend-arrow">▼</div>
                                <div className="legend-item" style={{opacity:0.3}}><div className="legend-dot" style={{background: REALMS['GEAR'].color}} /> GEAR</div>
                            </div>

                            {effectiveGameState.nextDrawAmount > 1 && <div className="status-badge">DRAW +{effectiveGameState.nextDrawAmount} !!</div>}
                            
                            <div className="field-card-container">
                                <Card card={effectiveGameState.fieldCard} playable={true} isField={true} />
                            </div>
                        </div>

                        <button className="btn-draw" disabled={!isMyTurn} onClick={() => {if(socket?.connected) socket.emit('draw-card',{roomId:room})}}>
                            {effectiveGameState.nextDrawAmount > 1 ? `DRAW +${effectiveGameState.nextDrawAmount}` : 'DRAW / PASS'}
                        </button>

                        <div className="my-hand-area">
                            <div className="hand-container">
                                {me.hand.map((card, i) => {
                                    const playable = canPlay(card);
                                    const rotation = (i - (me.hand.length - 1) / 2) * (me.hand.length > 8 ? 4 : 7);
                                    return (
                                        <Card key={card.id} card={card} playable={playable} 
                                              onClick={() => playCard(card)} />
                                    );
                                })}
                            </div>
                            <div style={{textAlign:'center', fontSize:10, fontWeight:900, marginTop:15, opacity:0.5, letterSpacing:2}}>
                                DECK STATUS: {me.hand.length} / 12
                            </div>
                        </div>

                    </div>

                    {(selectorCard || effectiveGameState.needsInitialChoice) && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:16, fontWeight:900, marginBottom:20, color:'var(--accent)'}}>SELECT TARGET REALM</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => {
                                                    if(selectorCard) {
                                                        if(socket?.connected) socket.emit('play-card', {roomId:room, card:selectorCard, chosenRealm:r});
                                                        setSelectorCard(null);
                                                    } else {
                                                        if(socket?.connected) socket.emit('set-initial-realm', {roomId:room, chosenRealm:r});
                                                    }
                                                }}>{r}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {effectiveGameState.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--accent)', fontSize:28, fontWeight:900, fontStyle:'italic'}}>GAME OVER</h2>
                                <div style={{margin:'20px 0', textAlign:'left'}}>
                                    {effectiveGameState.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i)=>(
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'12px 0', borderBottom:'1px solid var(--border)'}}>
                                            <span style={{fontWeight:900, fontSize:12}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--accent)', fontWeight:900}}>{p.handCount} units</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>{ if(socket?.connected) socket.emit('play-again',{roomId:room}); else setPreviewStatus('waiting'); }} style={{width:'100%', padding:15, background:'var(--accent)', color:'#000', border:'none', borderRadius:10, fontWeight:900, cursor:'pointer'}}>REMATCH</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
