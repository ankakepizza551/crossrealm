<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition - v16.2</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; /* Cyber Cyan */
            --steam-gold: #D4AF37; /* Steam Gold */
            --magic-purple: #8A2BE2; /* Fantasy Purple */
            --danger: #FF4500; 
            --bg: #05050A; /* 深淵な夜空 */
            --card-w: 90px; --card-h: 130px; --opp-card-w: 24px; --opp-card-h: 34px; 
            --border: rgba(212, 175, 55, 0.45);
            --guide-gold: #FFD700;
        }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Exo 2', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; min-height: -webkit-fill-available; overflow: hidden; 
        }
        .screen-wrapper { 
            width: 100vw; height: 100vh; height: 100dvh; min-height: -webkit-fill-available;
            max-width: calc(100vh * 9 / 16); max-width: calc(100dvh * 9 / 16); 
            background: var(--bg); position: relative; overflow: hidden; 
            display: flex; flex-direction: column; 
            border-left: 2px solid var(--steam-gold); border-right: 2px solid var(--steam-gold); 
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.2); 
        }
        
        /* --- 背景・レイアウト (オリジナル維持) --- */
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200%; height: 200%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"><circle cx="150" cy="150" r="140" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="0.5"/><circle cx="150" cy="150" r="110" fill="none" stroke="rgba(64,224,208,0.05)" stroke-width="0.5"/><path d="M150 10 L150 290 M10 150 L290 150" stroke="rgba(138,43,226,0.05)" stroke-width="0.5"/><circle cx="150" cy="150" r="80" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.3" stroke-dasharray="4 4"/></svg>'); animation: rotate-eternal 240s linear infinite; }
        @keyframes rotate-eternal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .bg-aurora { position: absolute; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(138,43,226,0.15) 0%, transparent 60%), radial-gradient(circle at 80% 70%, rgba(0,191,255,0.1) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(212,175,55,0.05) 0%, transparent 70%); animation: auroraDrift 15s ease-in-out infinite alternate; z-index: 1; mix-blend-mode: screen; }
        @keyframes auroraDrift { 0% { transform: scale(1) translate(0, 0); opacity: 0.8; } 100% { transform: scale(1.2) translate(20px, -20px); opacity: 1; } }
        .bg-magic-aura { position: absolute; inset: 0; background-color: var(--realm-color); -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%); opacity: 0.4; transition: background-color 3s ease-in-out; mix-blend-mode: overlay; z-index: 1; }
        .bg-cyber-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(64,224,208,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(64,224,208,0.1) 1px, transparent 1px); background-size: 30px 30px; z-index: 2; transform: perspective(600px) rotateX(60deg) translateY(100px) translateZ(-200px); animation: gridMove 15s linear infinite; opacity: 0.3; mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0)); -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0)); }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 30px; } }

        @keyframes titleGlow { 0%, 100% { text-shadow: 0 0 10px rgba(212,175,55,0.8), 0 0 20px rgba(138,43,226,0.6), 0 0 30px rgba(64,224,208,0.4); transform: scale(1); } 50% { text-shadow: 0 0 20px rgba(212,175,55,1), 0 0 40px rgba(138,43,226,0.8), 0 0 60px rgba(64,224,208,0.6); transform: scale(1.02); } }
        @keyframes panelPulse { 0%, 100% { box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 30px rgba(212,175,55,0.1), 0 0 20px rgba(138,43,226,0.2); border-color: rgba(212,175,55,0.5); } 50% { box-shadow: 0 0 80px rgba(0,0,0,1), 0 0 40px rgba(138,43,226,0.4), inset 0 0 50px rgba(212,175,55,0.2); border-color: rgba(212,175,55,1); } }
        @keyframes sweepBtn { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100%; overflow: hidden; }
        .turn-direction { flex-shrink: 0; position: relative; text-align: center; font-size: 16px; font-weight: 900; color: var(--accent); letter-spacing: 2px; background: rgba(0,0,0,0.85); padding: 6px; border-bottom: 1px solid rgba(138,43,226,0.5); display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(138,43,226,0.1); }
        .mute-btn-game { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; background: rgba(0,0,0,0.8); border: 1px solid var(--steam-gold); border-radius: 50%; color: var(--steam-gold); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; }

        .opponents-area { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px 10px; background: rgba(0,0,0,0.7); border-bottom: 1px solid var(--border); backdrop-filter: blur(5px); }
        .opp-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-radius: 6px; background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(138,43,226,0.05)); border-left: 3px solid var(--border); transition: 0.4s; position: relative; overflow: hidden; }
        .opp-row.active { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(64,224,208,0.2), rgba(138,43,226,0.2)); box-shadow: 0 0 15px rgba(138,43,226,0.4); animation: activePulse 1.5s infinite; }
        @keyframes activePulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
        .opp-name { font-weight: 900; font-size: 15px; color: #fff; max-width: 75px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .opp-hand-visual { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
        .mini-cards-stack { position: relative; width: 45px; height: var(--opp-card-h); }
        .mini-card-back { width: var(--opp-card-w); height: var(--opp-card-h); background: linear-gradient(135deg, #2a1a3a, #000); border: 1px solid var(--steam-gold); border-radius: 2px; position: absolute; top: 0; box-shadow: -2px 0 5px rgba(0,0,0,0.8); }

        .cycle-bar { flex-shrink: 0; display: flex; justify-content: space-between; padding: 6px 4px; background: rgba(5,5,15,0.95); border-bottom: 2px solid var(--border); box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 20; }
        .cycle-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .cycle-dot { width: 100%; height: 4px; background: #1a1a2e; border-radius: 2px; transition: 0.3s; }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 12px var(--dot-color), 0 0 20px var(--dot-color); }
        .cycle-dot.next-playable { background: var(--guide-gold); box-shadow: 0 0 15px var(--guide-gold); animation: pulseGold 0.8s infinite alternate; }
        @keyframes pulseGold { from { opacity: 0.3; transform: scaleX(0.7); } to { opacity: 1; transform: scaleX(1); } }
        .cycle-label { font-size: 12px; font-weight: 900; opacity: 0.4; font-family: 'Cinzel', serif; }
        .cycle-item.active .cycle-label { opacity: 1; color: var(--dot-color); text-shadow: 0 0 5px var(--dot-color); }
        .cycle-item.next-playable .cycle-label { opacity: 1; color: var(--guide-gold); text-shadow: 0 0 5px var(--guide-gold); }

        .field { flex: 1; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; position: relative; }
        .info-panel { background: linear-gradient(180deg, rgba(10,10,20,0.95), rgba(0,0,0,0.95)); border: 1px solid var(--steam-gold); padding: 10px 14px; border-radius: 8px; width: 160px; text-align: center; box-shadow: 0 0 30px rgba(138,43,226,0.3); backdrop-filter: blur(5px); }
        .realm-title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900; color: var(--realm-color); text-shadow: 0 0 15px var(--realm-color); }

        .log-terminal-container { flex-shrink: 0; width: 100%; padding: 0 10px; margin-bottom: 5px; z-index: 50; }
        .log-terminal { height: 50px; background: linear-gradient(90deg, rgba(5,5,15,0.9), rgba(20,10,30,0.9)); border: 1px solid rgba(138,43,226,0.4); border-radius: 6px; padding: 4px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; font-family: monospace; box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 10px rgba(138,43,226,0.2); }
        .log-line { font-size: 13px; color: rgba(255,255,255,0.6); white-space: nowrap; text-shadow: 0 0 2px rgba(255,255,255,0.3); }
        .log-line.play { color: var(--accent); font-weight: bold; text-shadow: 0 0 5px var(--accent); }
        .log-line.sys { color: var(--steam-gold); }

        .hand-container { flex-shrink: 0; position: relative; z-index: 9999; width: 100%; overflow: visible; background: linear-gradient(to top, rgba(5,0,15,1) 50%, rgba(0,0,0,0) 100%); }
        .hand-flex { display: flex; justify-content: center; align-items: flex-end; height: 145px; padding-bottom: 0; }
        .action-row { flex-shrink: 0; background: #05000a; border-top: 1px solid rgba(138,43,226,0.4); padding: 8px 15px 15px 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10; box-shadow: 0 -10px 30px rgba(138,43,226,0.2); }

        .overlay { position: absolute; inset: 0; z-index: 50000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); background: rgba(5,0,15,0.7); padding: 25px; overflow: hidden; }
        .panel { position: relative; background: linear-gradient(135deg, rgba(20,15,35,0.95), rgba(5,5,10,1)); border: 1px solid var(--steam-gold); padding: 40px 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 25px; border-radius: 4px; box-sizing: border-box; animation: panelPulse 4s infinite; z-index: 10; }
        .panel-corner1, .panel-corner2 { position: absolute; width: 30px; height: 30px; border-color: var(--steam-gold); border-style: solid; opacity: 0.9; filter: drop-shadow(0 0 5px var(--steam-gold)); }
        .panel-corner1 { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .panel-corner2 { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

        .logo-container { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .logo-main { margin: 0; padding: 0; font-family: 'Cinzel', serif; font-size: clamp(24px, 8vw, 36px); font-weight: 900; letter-spacing: 4px; background: linear-gradient(to bottom, #FFF8DC 0%, #FFD700 30%, #D4AF37 70%, #8B6B23 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.8)); white-space: nowrap; animation: titleGlow 3s infinite alternate; }
        .logo-main span.cross { font-size: 0.8em; color: var(--steam-gold); -webkit-text-fill-color: var(--steam-gold); opacity: 0.9; margin: 0 8px; }
        .logo-sub { font-size: clamp(12px, 4vw, 18px); letter-spacing: 8px; color: var(--accent); font-weight: 900; margin-top: 10px; font-family: 'Exo 2', sans-serif; opacity: 0.9; text-transform: uppercase; white-space: nowrap; text-shadow: 0 0 15px rgba(64,224,208,0.8); }

        .panel input { width: 100%; padding: 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(138,43,226,0.3); border-bottom: 2px solid var(--steam-gold); color: #fff; text-align: center; font-size: 20px; border-radius: 4px; outline: none; box-sizing: border-box; transition: 0.3s; font-family: 'Exo 2', sans-serif; letter-spacing: 2px; }
        .panel input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(64,224,208,0.3), inset 0 0 10px rgba(138,43,226,0.2); }

        .btn-main { display: flex; align-items: center; justify-content: center; min-height: 55px; background: linear-gradient(90deg, #B8860B, #FFDF73, #D4AF37, #B8860B); background-size: 200% auto; color: #000; border: 1px solid #FFF8DC; padding: 0 20px; border-radius: 6px; font-weight: 900; font-size: 20px; cursor: pointer; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 4px; transition: 0.4s; box-shadow: 0 4px 20px rgba(212,175,55,0.5); box-sizing: border-box; animation: sweepBtn 3s linear infinite; line-height: 1; }
        .btn-main:hover { box-shadow: 0 0 40px rgba(212,175,55,0.9); transform: scale(1.02); }
        .btn-main:disabled { background: #222; color: #444; border-color: #333; cursor: not-allowed; box-shadow: none; animation: none; transform: none; }
        
        .btn-sub { display: flex; align-items: center; justify-content: center; min-height: 48px; background: rgba(138,43,226,0.1); border: 1px solid rgba(138,43,226,0.5); color: #d8b4fe; padding: 0 16px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: 900; font-size: 18px; transition: 0.3s; letter-spacing: 2px; box-sizing: border-box; line-height: 1; }
        .btn-sub:hover { background: rgba(138,43,226,0.3); color: #fff; border-color: #c084fc; box-shadow: 0 0 15px rgba(138,43,226,0.5); }

        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .realm-btn { padding: 24px 10px; border: 2px solid var(--steam-gold); background: linear-gradient(180deg, rgba(30,20,40,0.9), rgba(0,0,0,0.9)); color: #fff; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.2s; box-shadow: 0 5px 25px rgba(0,0,0,0.8); }
        .realm-btn:hover { transform: scale(1.05); border-color: #fff; box-shadow: 0 0 35px var(--steam-gold), inset 0 0 20px rgba(255,255,255,0.2); }
        .realm-btn svg { width: 40px; height: 40px; filter: drop-shadow(0 0 8px currentColor); }

        .waiting-list { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 5px; padding-top: 15px; }
        .waiting-player { background: linear-gradient(90deg, rgba(64,224,208,0.1), rgba(138,43,226,0.1)); border: 1px solid rgba(212,175,55,0.3); border-left: 4px solid var(--accent); padding: 16px 22px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); overflow: hidden; }
        .waiting-player.empty { background: rgba(255,255,255,0.02); border: 1px dashed rgba(138,43,226,0.3); opacity: 0.5; overflow: hidden; }
        .host-badge { position: absolute; top: 0; right: 0; background: var(--steam-gold); color: #000; font-size: 11px; font-weight: 900; padding: 3px 10px; border-radius: 0 4px 0 8px; box-shadow: -2px 2px 10px rgba(0,0,0,0.5); }
        
        .sync-dot { width: 10px; height: 10px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transform: rotate(45deg); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; filter: hue-rotate(0deg); } 50% { opacity: 1; filter: hue-rotate(30deg); } }

        .mute-btn { position: absolute; top: 15px; right: 15px; z-index: 60000; background: rgba(20,10,30,0.8); border: 1px solid var(--steam-gold); color: var(--steam-gold); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(138,43,226,0.3); }
        .mute-btn:hover { background: rgba(212, 175, 55, 0.2); transform: scale(1.1); box-shadow: 0 0 20px var(--steam-gold); }

        /* =========================================
           3Dカード専用スタイル (90x130ネイティブ設計)
           ========================================= */
        .font-steampunk { font-family: 'Special Elite', cursive; }
        .font-fantasy { font-family: 'Cinzel Decorative', serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .font-void { font-family: 'Audiowide', cursive; }

        .card-wrapper-3d { position: relative; perspective: 800px; flex-shrink: 0; width: var(--card-w); height: var(--card-h); }
        
        .card-3d { 
            box-sizing: border-box; width: 100%; height: 100%;
            transform-style: preserve-3d; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            border-radius: 4px;
        }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; border-radius: inherit; overflow: hidden; }

        /* 属性アイコン */
        .card-icon-3d { 
            position: absolute; top: 40%; left: 50%; width: 40px; height: 40px; color: var(--r-color); 
            transform: translate(-50%, -50%) translateZ(25px); 
            z-index: 10; filter: drop-shadow(0 0 8px var(--r-color));
            transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 属性ラベル（左上） */
        .identity-label {
            position: absolute; top: 6px; left: 6px; padding: 3px 8px;
            background: rgba(0,0,0,0.9); border-radius: 2px;
            border-left: 3px solid var(--r-color);
            transform: translateZ(20px); z-index: 30;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .identity-label span { color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 1px; }

        /* フッターテキスト */
        .card-footer-3d { 
            position: absolute; bottom: 0; width: 100%; font-size: 13px; font-weight: 900; padding: 15px 0 6px 0; 
            text-align: center; color: #fff; z-index: 30; transform: translateZ(15px); 
            background: linear-gradient(to top, rgba(0,0,0,1) 40%, transparent 100%);
            text-shadow: 0 0 8px var(--r-color); letter-spacing: 2px;
        }

        /* 各テーマの背景と枠線（サイズ調整済） */
        .theme-steampunk { border: 3px solid #3d2416; background: linear-gradient(135deg, #4a2511 0%, #1a0802 100%); box-shadow: 0 5px 15px #000, inset 0 0 30px #000; }
        .theme-steampunk::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.3) 0, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 4px); opacity: 0.7; z-index: 1; }
        
        .theme-fantasy { border-radius: 16px 4px; border: 2px solid rgba(255,255,255,0.8); background: radial-gradient(circle at 50% 50%, #2a1b7e 0%, #05021a 100%); box-shadow: 0 0 15px var(--r-shadow-color), inset 0 0 30px var(--r-shadow-color); }
        
        .theme-cyber { border: none; border-radius: 0px; background: #000; clip-path: polygon(0 10%, 10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%); box-shadow: inset 0 0 20px var(--r-shadow-color); }
        .theme-cyber .cyber-border { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.15); border-left: 6px solid var(--r-color); z-index: 10; }
        
        .theme-void { border: none; background: #000; box-shadow: 0 0 20px var(--r-shadow-color), inset 0 0 50px var(--r-shadow-color); animation: liquid-shape 10s infinite alternate ease-in-out; }
        @keyframes liquid-shape { 0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; } }
        .theme-void .label-bg { background: #fff !important; border-left: 4px solid var(--r-color) !important; box-shadow: 0 0 15px #fff; }
        .theme-void .label-bg span { color: #000 !important; text-shadow: none !important; }

        /* 特殊文字演出（サイズ調整済） */
        .unit-reverse-text { position: absolute; top: 60%; left: 50%; width: 80px; background: var(--r-color); color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 10px; padding: 2px 0; text-align: center; transform: translate(-50%, -50%) translateZ(30px); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); box-shadow: 0 0 10px var(--r-color); animation: glitch-flicker 0.2s infinite alternate; }
        @keyframes glitch-flicker { from { opacity: 1; transform: translate(-50%, -50%) translateZ(30px); } to { opacity: 0.8; transform: translate(-51%, -49%) translateZ(30px); } }

        .effect-text-wild { position: absolute; bottom: 30px; left: 50%; width: 100%; text-align: center; transform: translateX(-50%) translateZ(35px); font-size: 18px; font-weight: 900; font-style: italic; background: linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); background-size: 200% 100%; -webkit-background-clip: text; color: transparent; animation: rainbow-glow 2s linear infinite; filter: drop-shadow(0 0 5px #fff); }
        
        .unit-draw2 { position: absolute; top: 35px; left: -5px; width: 38px; background: #6a1505; border: 2px solid #D4AF37; border-radius: 2px; transform: translateZ(35px) rotate(-10deg); display: flex; flex-direction: column; align-items: center; padding: 4px 0; box-shadow: 3px 2px 10px #000; animation: vibration 0.05s infinite; }
        .unit-draw2 .num { font-size: 20px; font-weight: 900; font-family: 'Special Elite'; color: #fff; line-height: 1; text-shadow: 0 0 5px #f00; }
        .unit-draw2 .txt { font-size: 8px; color: #D4AF37; font-weight: 900; margin-top: 2px; background: #000; width: 100%; text-align: center; }
        @keyframes vibration { 0% { transform: translateZ(35px) rotate(-10.5deg); } 100% { transform: translateZ(35px) rotate(-9.5deg); } }

        /* 反射レイヤー */
        .card-holo { position: absolute; inset: 0; z-index: 49; pointer-events: none; mix-blend-mode: color-dodge; opacity: 0.2; background: linear-gradient(115deg, transparent 20%, #fff 25%, #0ff 35%, #f0f 45%, #ff0 55%, transparent 60%); background-size: 300% 300%; transition: 0.3s; }
        .card-glare { position: absolute; inset: 0; z-index: 50; pointer-events: none; mix-blend-mode: overlay; opacity: 0.35; background: radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 65%); }
        
        /* インタラクション */
        .card-wrapper-3d.hovered { z-index: 1000 !important; }
        .card-wrapper-3d.hovered .card-3d { box-shadow: 0 10px 30px rgba(138,43,226,0.6); }
        .card-wrapper-3d.hovered .card-holo { opacity: 0.8; }
        .card-wrapper-3d.hovered .card-icon-3d { transform: translate(-50%, -50%) translateZ(40px) scale(1.1); filter: drop-shadow(0 0 15px var(--r-color)) brightness(1.5); }

        .not-playable { opacity: 0.5 !important; filter: grayscale(100%) !important; transform: translateY(15px) scale(0.95); z-index: 1 !important; }

    </style>
</head>
<body>
    <script>
        window.sfx = { turn: new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'), play: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'), draw: new Audio('https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3'), alert: new Audio('https://assets.mixkit.co/active_storage/sfx/2862/2862-preview.mp3') };
        Object.values(window.sfx).forEach(a => a.volume = 0.3);
    </script>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', shadow: 'rgba(255, 140, 0, 0.7)', desc: 'セットA：維持。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', shadow: 'rgba(0, 191, 255, 0.9)', desc: 'セットA→B：遷移。' },
            FOUNTAIN: { n: '噴水', color: '#4169E1', shadow: 'rgba(65, 105, 225, 0.9)', desc: 'セットB：維持。' },
            BATTERY: { n: '電池', color: '#32CD32', shadow: 'rgba(50, 205, 50, 0.9)', desc: 'セットB→C：遷移。' },
            MACHINE: { n: '機械', color: '#94A3B8', shadow: 'rgba(148, 163, 184, 0.7)', desc: 'セットC：維持。' },
            ARCHIVE: { n: '古文書', color: '#FF3131', shadow: 'rgba(255, 49, 49, 0.9)', desc: 'セットC→A：遷移。' },
            PLANET: { n: '惑星', color: '#9400D3', shadow: 'rgba(148, 0, 211, 1)', desc: '星々の加護。' },
            RUINS: { n: '廃墟', color: '#FFFFFF', shadow: 'rgba(255, 255, 255, 0.8)', desc: '遺跡の記憶。' }
        };
        const THEMES = { GEAR: 'steampunk', ARCHIVE: 'steampunk', ICEAGE: 'fantasy', FOUNTAIN: 'fantasy', PLANET: 'void', RUINS: 'void', BATTERY: 'cyber', MACHINE: 'cyber' };
        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];
        
        const ICONS = {
            GEAR: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>,
            ICEAGE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m10 20-2.5-2.5L5 20"/><path d="M12 22V2"/><path d="m14 20 2.5-2.5L19 20"/><path d="m10 4-2.5 2.5L5 4"/><path d="m14 4 2.5-2.5L19 4"/><path d="m20 10-2.5 2.5L20 15"/><path d="M22 12H2"/><path d="m4 10 2.5 2.5L4 15"/></svg>,
            FOUNTAIN: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z"></path></svg>,
            BATTERY: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"></rect><line x1="22" x2="22" y1="11" y2="13"></line><line x1="6" x2="6" y1="11" y2="13"></line><line x1="10" x2="10" y1="11" y2="13"></line><line x1="14" x2="14" y1="11" y2="13"></line></svg>,
            MACHINE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>,
            MACHINE_S: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2" opacity="0.5"></rect><path d="M12 8v4l3 3" strokeWidth="2"/><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" strokeWidth="2"/><polyline points="16 8 21 8 21 3" strokeWidth="2"/></svg>,
            ARCHIVE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            PLANET: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            RUINS: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 20h20"></path><path d="M5 20v-8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8"></path><path d="M9 20v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"></path><path d="M5 10V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"></path></svg>
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [error, setError] = useState('');
            const [bgRealm, setBgRealm] = useState('GEAR');
            const [isMuted, setIsMuted] = useState(false); 
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);
            const logTerminalRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); setSocket(s);
                s.on('update-game', (data) => { setGs(data); setError(''); });
                s.on('join-error', (msg) => { setError(msg); setJoined(false); });
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => { s.disconnect(); window.removeEventListener('resize', handleResize); };
            }, []);

            useEffect(() => { if (logTerminalRef.current) logTerminalRef.current.scrollTop = logTerminalRef.current.scrollHeight; }, [gs?.logs]);

            const prevTurnRef = useRef(null);
            useEffect(() => {
                if (gs && gs.status === 'playing') {
                    const isMyTurnNow = gs.currentTurnPlayerId === socket?.id;
                    if (isMyTurnNow && gs.currentTurnPlayerId !== prevTurnRef.current) {
                        if (gs.nextDrawAmount > 1) { window.sfx.alert.currentTime = 0; window.sfx.alert.play().catch(()=>{}); }
                        else { window.sfx.turn.currentTime = 0; window.sfx.turn.play().catch(()=>{}); }
                    }
                    prevTurnRef.current = gs.currentTurnPlayerId;
                }
            }, [gs, socket]);

            useEffect(() => {
                let interval;
                if (!gs || gs.status !== 'playing') {
                    interval = setInterval(() => {
                        setBgRealm(prev => { const idx = CYCLE_ORDER.indexOf(prev); return CYCLE_ORDER[(idx + 1) % CYCLE_ORDER.length]; });
                    }, 4000); 
                }
                return () => { if (interval) clearInterval(interval); };
            }, [gs]);

            const toggleMute = () => { const nextMuted = !isMuted; setIsMuted(nextMuted); Object.values(window.sfx).forEach(a => a.volume = nextMuted ? 0 : 0.3); };
            
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = (gs?.status === 'playing' && gs?.fieldCard) ? gs.fieldCard.realm : bgRealm;
            
            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (card) => {
                if (!isMyTurn || !card || !gs?.fieldCard) return false;
                if (gs?.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm; const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS') return true;
                if (field === 'PLANET' || field === 'RUINS') return true; 
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                const cycle = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                const isTransition = ['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(field);
                if (field === h && isTransition) return false;
                return field === h || (cycle[field] && cycle[field].includes(h));
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                window.sfx.alert.pause(); window.sfx.alert.currentTime = 0;
                window.sfx.play.currentTime = 0; window.sfx.play.play().catch(()=>{});
                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) { setSelectorCard(card); }
                else { socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined }); }
            };
            const handleDraw = () => { 
                window.sfx.alert.pause(); window.sfx.alert.currentTime = 0; 
                window.sfx.draw.currentTime = 0; window.sfx.draw.play().catch(()=>{}); 
                socket.emit('draw-card',{roomId:room}); 
            };

            /* === 完全ネイティブサイズの3Dカードコンポーネント === */
            const CardView = ({ card, playable, onClick, isField, style }) => {
                if (!card || !card.realm) return null;
                let displayRealm = card.realm;
                if (card.wasRuins) displayRealm = 'RUINS'; else if (card.wasPlanet) displayRealm = 'PLANET'; else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) displayRealm = 'FOUNTAIN';
                const isSpecial = card.isSpecial || card.wasFountain;
                
                const isWildType = displayRealm === 'PLANET' || displayRealm === 'RUINS';
                const isFountainWild = displayRealm === 'FOUNTAIN' && isSpecial;
                const theme = THEMES[displayRealm] || 'fantasy';
                const rColor = REALMS[displayRealm] ? REALMS[displayRealm].color : '#fff';
                const shadowColor = REALMS[displayRealm] ? REALMS[displayRealm].shadow : 'rgba(255,255,255,0.4)';
                const fontClass = `font-${theme}`;

                const cardRef = useRef(null);
                const [tiltStyle, setTiltStyle] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });
                const [isHovered, setIsHovered] = useState(false);

                const handleMouseMove = (e) => {
                    if (!playable && !isField) return; 
                    if (isField) return; 
                    if (!cardRef.current) return;
                    const rect = cardRef.current.getBoundingClientRect();
                    const rotateX = ((e.clientY - rect.top - rect.height / 2) / (rect.height / 2)) * -20; 
                    const rotateY = ((e.clientX - rect.left - rect.width / 2) / (rect.width / 2)) * 20;
                    setTiltStyle({ 
                        transform: `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`, 
                        '--mx': `${((e.clientX - rect.left) / rect.width) * 100}%`, 
                        '--my': `${((e.clientY - rect.top) / rect.height) * 100}%`, 
                        transition: 'none' 
                    });
                };

                const handleMouseLeave = () => {
                    setIsHovered(false);
                    setTiltStyle({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: 'all 0.4s ease-out' });
                };

                let iconStyle = { color: rColor };
                if (isWildType || isFountainWild) {
                    iconStyle = { filter: 'drop-shadow(0 0 6px #fff)', stroke: 'url(#rainbow-gradient)' };
                }

                const hoverTranslateY = (isHovered && !isField) ? 'translateY(-15px) scale(1.15)' : '';

                return (
                    <div 
                        className={`card-wrapper-3d ${isHovered ? 'hovered' : ''} ${!playable && !isField ? 'not-playable' : ''}`}
                        style={{ 
                            ...style,
                            zIndex: isField ? 'auto' : (isHovered ? 1000 : 1),
                            cursor: playable && !isField ? 'pointer' : 'default'
                        }}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                        onMouseEnter={() => { if(playable && !isField) setIsHovered(true); }}
                        onClick={() => { if(playable && !isField) onClick(); }}
                        ref={cardRef}
                    >
                        <div 
                            className={`card-3d theme-${theme}`} 
                            style={{
                                '--r-color': rColor, 
                                '--r-shadow-color': shadowColor, 
                                transform: `${hoverTranslateY} ${tiltStyle.transform}`,
                                ...tiltStyle
                            }}
                        >
                            <div className="card-content">
                                {theme === 'cyber' && <div className="cyber-border"></div>}
                                
                                <div className="identity-label label-bg">
                                    <span className={fontClass}>{displayRealm}</span>
                                </div>
                                
                                {displayRealm === 'MACHINE' && isSpecial && (
                                    <div className="unit-reverse-text">REVERSE</div>
                                )}
                                {isFountainWild && (
                                    <div className="effect-text-wild">L-WILD</div>
                                )}
                                {displayRealm === 'GEAR' && isSpecial && (
                                    <div className="unit-draw2"><div className="num">2</div><div className="txt">DRAW</div></div>
                                )}
                                {isWildType && (
                                    <div className="effect-text-wild">P-WILD</div>
                                )}

                                <div className="card-icon-3d" style={iconStyle}>
                                    <svg width="0" height="0" style={{position:'absolute'}}>
                                        <defs>
                                            <linearGradient id="rainbow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                                <stop offset="0%" stopColor="#f00" />
                                                <stop offset="20%" stopColor="#ff0" />
                                                <stop offset="40%" stopColor="#0f0" />
                                                <stop offset="60%" stopColor="#0ff" />
                                                <stop offset="80%" stopColor="#00f" />
                                                <stop offset="100%" stopColor="#f0f" />
                                            </linearGradient>
                                        </defs>
                                    </svg>
                                    {isSpecial && displayRealm === 'MACHINE' ? ICONS.MACHINE_S : ICONS[displayRealm]}
                                </div>
                                <div className={`card-footer-3d ${fontClass}`}>{REALMS[displayRealm] ? REALMS[displayRealm].n : '???'}</div>
                            </div>
                            <div className="card-holo" style={{ backgroundPosition: `var(--mx) var(--my)`, opacity: isSpecial || isWildType ? 0.5 : 0.1 }}></div>
                            <div className="card-glare" style={{ left: `var(--mx)`, top: `var(--my)` }}></div>
                        </div>
                    </div>
                );
            };

            const getNextPlayableRealms = () => {
                const cycleMap = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                const targets = cycleMap[currentRealm] || [];
                const isTransition = ['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(currentRealm);
                return targets.filter(r => !(isTransition && r === currentRealm));
            };

            if (joined && gs?.status === 'playing' && !gs?.fieldCard) {
                return (
                    <div className="screen-wrapper" style={{ justifyContent: 'center', alignItems: 'center' }}>
                        <div className="text-cyan-400 font-cinzel text-2xl animate-pulse">Initializing Field...</div>
                    </div>
                );
            }

            return (
                <div className="screen-wrapper" style={{ '--realm-color': (REALMS[currentRealm] ? REALMS[currentRealm].color : '#000') }}>
                    <div className="bg-layer bg-cyber-grid"></div>
                    <div className="bg-layer bg-aurora"></div>
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-magic-aura" style={{ backgroundColor: (REALMS[currentRealm] ? REALMS[currentRealm].color : '#000') }}></div>
                    
                    {(!joined || (gs && gs.status === 'waiting')) && (
                        <button onClick={toggleMute} className="mute-btn">{isMuted ? '🔇' : '🔊'}</button>
                    )}

                    {!joined && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                <div className="logo-container">
                                    <h1 className="logo-main">CROSS<span className="cross">⨯</span>REALM</h1>
                                    <div className="logo-sub">Eternal Punk Edition</div>
                                </div>
                                {error && <div style={{color:'var(--danger)', fontSize:12, fontWeight:900}}>⚠️ {error}</div>}
                                <div style={{width:'100%', display:'flex', flexDirection:'column', gap:24}}>
                                    <input type="text" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} />
                                    <input type="text" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                </div>
                                <button onClick={()=>{ window.sfx.turn.load(); window.sfx.play.load(); window.sfx.draw.load(); window.sfx.alert.load(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-main">接続開始</button>
                            </div>
                        </div>
                    )}

                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                <div style={{textAlign:'center'}}>
                                    <div className="blink-text" style={{fontSize:16, color:'var(--accent)', fontWeight:900, marginBottom:8, letterSpacing:4}}>AWAITING LINKAGE...</div>
                                    <div style={{fontSize:40, color:'var(--steam-gold)', fontWeight:900, fontFamily:'Cinzel', letterSpacing: 4}}>ルームID: {room}</div>
                                </div>
                                <div className="waiting-list" style={{width:'100%', maxHeight:'300px', overflowY:'auto'}}>
                                    {gs?.players?.map((p, idx) => (
                                        <div key={p.id} className="waiting-player">
                                            {idx === 0 && <div className="host-badge">HOST</div>}
                                            <span style={{fontWeight:900, fontSize:20, color: p.isBot ? 'var(--steam-gold)' : '#fff', textShadow:'0 0 5px rgba(255,255,255,0.2)'}}>
                                                {p.isBot ? '🤖' : '👤'} {p.name}
                                            </span>
                                            {!p.isBot && <div className="sync-dot"></div>}
                                        </div>
                                    ))}
                                    {[...Array(Math.max(0, 4 - (gs?.players?.length || 0)))].map((_, i) => (
                                        <div key={i} className="waiting-player empty"><span style={{fontSize:18, letterSpacing:1}}>空きスロット</span></div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div style={{display:'flex', gap:15, width:'100%', marginTop: 10}}>
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="btn-sub" style={{height: 60}}>CPU追加</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" disabled={gs?.players?.length < 2} style={{height: 60}}>ゲーム開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {joined && gs?.status === 'playing' && gs?.fieldCard && (
                        <div className="game-container">
                            <div className="turn-direction">
                                <span>DIRECTION: <span style={{transform: gs?.isReversed ? 'rotate(180deg)' : 'rotate(0deg)', transition:'0.5s', display:'inline-block'}}>{gs?.isReversed ? '⟲' : '⟳'}</span> {gs?.isReversed ? 'REVERSE' : 'NORMAL'}</span>
                                <button onClick={toggleMute} className="mute-btn-game" title="ミュート切替">{isMuted ? '🔇' : '🔊'}</button>
                            </div>
                            
                            <div className="opponents-area">
                                {gs?.players?.map(p => (
                                    <div key={p.id} className={`opp-row ${gs?.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-name">{p.isBot ? '🤖' : (p.id === socket?.id ? '⭐' : '👤')} {p.name}</div>
                                        <div className="opp-hand-visual">
                                            <div style={{fontWeight:900, color: 'var(--accent)', fontSize:20, textShadow: '0 0 5px var(--accent)', minWidth: '20px', textAlign: 'right'}}>{p?.handCount || 0}</div>
                                            <div className="mini-cards-stack">
                                                {[...Array(Math.max(0, Math.min(p?.handCount || 0, 5)))].map((_, i) => (<div key={i} className="mini-card-back" style={{left: `${i * 6}px`, zIndex: i}} />))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => {
                                    const nextRealms = getNextPlayableRealms();
                                    const isNext = nextRealms.includes(r) && r !== currentRealm;
                                    return (
                                        <div key={r} className={`cycle-item ${currentRealm === r ? 'active' : ''} ${isNext ? 'next-playable' : ''}`}>
                                            <div className={`cycle-dot ${currentRealm === r ? 'active' : ''} ${isNext ? 'next-playable' : ''}`} style={{'--dot-color': REALMS[r].color}}></div>
                                            <div className="cycle-label">{REALMS[r].n}</div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="field">
                                <div style={{fontFamily:'Cinzel', fontSize: 15, opacity: 0.5}}>{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                                {gs?.nextDrawAmount > 1 && <div style={{color: 'var(--danger)', fontWeight:900, fontSize:26, textShadow:'0 0 10px #f00'}}>DRAW +{gs.nextDrawAmount}</div>}
                                <div style={{display:'flex', alignItems:'center', gap:15}}>
                                    <div style={{position: 'relative', width: 'var(--card-w)', height: 'var(--card-h)'}}>
                                        {gs?.playHistory?.map((card, i) => (
                                            <div key={`hist-${i}-${card?.id || i}`} style={{ position: 'absolute', top: 0, left: 0, transform: `rotate(${(i * 5) % 10 - 5}deg) translate(${i*-1}px, ${i*-1}px)`, zIndex: i + 1, opacity: 0.35 }}>
                                                <CardView card={card} isField={true} />
                                            </div>
                                        ))}
                                        <div style={{ position: 'absolute', top: 0, left: 0, zIndex: 100 }}>
                                            <CardView card={gs?.fieldCard} isField={true} />
                                        </div>
                                    </div>
                                    <div className="info-panel">
                                        <div className="realm-title">{REALMS[currentRealm] ? REALMS[currentRealm].n : '???'}</div>
                                        <div style={{fontSize:12, opacity:0.8, marginTop:4, lineHeight:1.2}}>{REALMS[currentRealm] ? REALMS[currentRealm].desc : ''}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="log-terminal-container">
                                <div className="log-terminal" ref={logTerminalRef}>
                                    {gs?.logs?.map((log) => (
                                        <div key={log.id} className={`log-line ${log?.text?.includes('PLAY') ? 'play' : (log?.text?.includes('SYS') ? 'sys' : '')}`}>
                                            {log?.text}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="hand-container">
                                <div className="hand-flex">
                                    {(() => {
                                        const totalCards = sortedHand?.length || 0;
                                        const maxHandWidth = Math.min(windowWidth * 0.95, 550);
                                        const cardW = 90; 
                                        let overlap = 55; 
                                        if (totalCards > 1) { 
                                            const idealWidth = cardW + (totalCards - 1) * overlap; 
                                            if (idealWidth > maxHandWidth) { overlap = (maxHandWidth - cardW) / (totalCards - 1); } 
                                        }
                                        const containerW = totalCards > 0 ? cardW + (totalCards - 1) * overlap : 0;
                                        const marginL = overlap - cardW;
                                        return (
                                            <div style={{ display: 'flex', justifySelf: 'center', width: '100%', justifyContent: 'center' }}>
                                                <div style={{ display: 'flex', alignItems: 'flex-end', width: `${containerW}px`, position: 'relative' }}>
                                                    {sortedHand.map((card, index) => (
                                                        <CardView 
                                                            key={card?.id || index} 
                                                            card={card} 
                                                            playable={canPlay(card)} 
                                                            onClick={() => handlePlay(card)} 
                                                            style={{ marginLeft: index === 0 ? '0px' : `${marginL}px` }} 
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                            
                            <div className="action-row">
                                <div style={{textAlign:'center', fontSize:14, fontWeight:900, color:'var(--steam-gold)', letterSpacing: '2px'}}>
                                    SYNC: {sortedHand?.length || 0} / {gs?.handLimit || 10}
                                </div>
                                <button className="btn-main" disabled={!isMyTurn} onClick={handleDraw} style={{boxShadow: isMyTurn ? '0 0 20px rgba(138,43,226,0.6)' : 'none', border: isMyTurn ? '1.5px solid #fff' : '1px solid #444' }}>
                                    {gs?.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : (isMyTurn ? 'ドロー' : '待機中...')}
                                </button>
                            </div>
                        </div>
                    )}

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                <h3 style={{fontSize:26, fontWeight:900, color:'var(--steam-gold)', fontFamily:'Cinzel', textAlign:'center', marginBottom: 10}}>CHOOSE REALM</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}>
                                            {ICONS[r]} <span>{REALMS[r].n}</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} className="btn-sub">CANCEL</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (() => {
                        const winner = gs?.players?.find(p => p.handCount === 0);
                        let resTitle = winner ? `${winner.name} WIN!` : "OVERLOAD";
                        return (
                            <div className="overlay">
                                <div className="panel">
                                    <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                    <h2 style={{color: winner ? "var(--accent)" : "var(--danger)", fontSize: 36, fontWeight:900, textShadow: `0 0 20px rgba(64,224,208,0.5)`}}>{resTitle}</h2>
                                    <div style={{width:'100%'}}>{gs?.players?.slice().sort((a,b) => (a?.handCount || 0) - (b?.handCount || 0)).map((p, i) => (
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid rgba(212,175,55,0.1)'}}>
                                            <span style={{fontWeight:900, fontSize: 18}}>{i+1}. {p.name} {p.id === socket.id && "(YOU)"}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900, fontSize: 18}}>{p.handCount}枚</span>
                                        </div>
                                    ))}</div>
                                    <div style={{display: 'flex', gap: 10, width: '100%'}}>
                                        <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main" style={{height: 60}}>再戦</button>
                                        <button onClick={() => window.location.reload()} className="btn-sub" style={{height: 60}}>終了</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
