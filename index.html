<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --danger: #FF4500;
            --steam-gold: #D4AF37;
            --bg: #050508; 
            --card-w: 120px; 
            --card-h: 170px;
            --border: rgba(212, 175, 55, 0.45);
        }
        
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Exo 2', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .screen-wrapper {
            width: 100vw; height: 100vh;
            max-width: calc(100vh * 9 / 16); max-height: 100vh;
            background: var(--bg);
            position: relative; overflow: hidden;
            box-shadow: 0 0 150px rgba(0,0,0,1);
            display: flex; flex-direction: column;
            border-left: 2px solid var(--steam-gold);
            border-right: 2px solid var(--steam-gold);
        }

        /* 背景演出 */
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
        .bg-magic {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150%; height: 150%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><circle cx="100" cy="100" r="95" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="0.5"/><circle cx="100" cy="100" r="75" fill="none" stroke="rgba(64,224,208,0.03)" stroke-width="0.3"/></svg>');
            animation: rotate-magical 120s linear infinite;
        }
        @keyframes rotate-magical { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        
        .bg-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--realm-color, #111) 0%, transparent 80%);
            opacity: 0.4; transition: 1.5s ease;
        }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* ヘッダーエリア */
        .header {
            background: linear-gradient(to bottom, rgba(10,10,15,0.95), transparent);
            padding: 20px 15px 10px 15px; border-bottom: 1px solid var(--border);
        }
        .opp-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 18px; border-radius: 6px; background: rgba(255,255,255,0.03);
            border-left: 5px solid var(--border); margin-bottom: 8px;
        }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.1); }
        .opp-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--steam-gold); letter-spacing: 2px; }

        /* 属性サイクル（上部横並びに修正） */
        .cycle-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; background: rgba(0,0,0,0.7);
            border-bottom: 1px solid var(--border); gap: 5px;
        }
        .cycle-dot {
            flex: 1; height: 4px; border-radius: 2px; background: #222; position: relative;
        }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 10px var(--dot-color); }
        .cycle-dot.active::after {
            content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; border-radius: 50%; background: var(--dot-color);
            box-shadow: 0 0 15px var(--dot-color);
        }
        .cycle-label { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 900; opacity: 0.5; }

        /* フィールドエリア */
        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }
        
        .field-main-area {
            display: flex; align-items: center; gap: 25px; width: 100%; justify-content: center;
        }

        .info-panel {
            flex: 1; background: rgba(10,10,15,0.85); border: 1.5px solid var(--steam-gold);
            padding: 20px; border-radius: 12px; backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 220px;
        }
        .realm-title { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 900; color: var(--realm-color); margin-bottom: 8px; letter-spacing: 3px; text-shadow: 0 0 15px var(--realm-color); }
        .realm-desc { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.5; opacity: 0.9; }
        .next-hint { margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(212,175,55,0.2); font-size: 12px; font-weight: 900; color: var(--accent); }

        .turn-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif; font-size: 110px; font-weight: 900; opacity: 0.04;
            color: var(--accent); white-space: nowrap; pointer-events: none;
        }

        /* カード */
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 6px; border: 2.5px solid var(--steam-gold);
            background: #000; overflow: hidden; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-footer {
            position: absolute; bottom: 0; width: 100%; background: rgba(10,10,15,0.95);
            font-size: 11px; font-weight: 900; padding: 8px 0; text-align: center;
            border-top: 2.5px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif;
        }

        /* 手札ホバー */
        .my-card { margin-left: -50px; transform-origin: bottom center; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .my-card.playable:hover {
            transform: translateY(-60px) scale(1.4) !important;
            z-index: 1000 !important;
            border-color: #fff;
            box-shadow: 0 35px 70px rgba(0,0,0,1), 0 0 40px var(--accent);
        }
        .my-card.not-playable { opacity: 0.2; filter: grayscale(1) brightness(0.4); }

        /* アクションボタン */
        .action-area { padding: 15px; display: flex; justify-content: center; }
        .btn-main {
            background: linear-gradient(135deg, var(--steam-gold), #B8860B);
            color: #000; border: 3.5px solid #000;
            padding: 18px 0; border-radius: 8px; font-weight: 900; font-size: 18px;
            box-shadow: 0 0 30px rgba(212,175,55,0.4); cursor: pointer;
            width: 90%; letter-spacing: 6px; font-family: 'Cinzel', serif; transition: 0.3s;
        }
        .btn-main:hover:not(:disabled) { filter: brightness(1.2); transform: scale(1.03); box-shadow: 0 0 50px var(--accent); }
        .btn-main:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }

        .hand-area {
            background: linear-gradient(to top, rgba(5,5,10,1) 0%, rgba(5,5,10,0.9) 85%, transparent 100%);
            padding-bottom: 50px; display: flex; flex-direction: column; align-items: center;
        }
        .hand-flex { display: flex; justify-content: center; padding: 20px 60px; min-height: 200px; align-items: flex-end; }

        /* パネル */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .panel { 
            background: #08080c; border: 3px solid var(--steam-gold); padding: 50px 35px; border-radius: 10px;
            text-align: center; width: 85%; display: flex; flex-direction: column; align-items: center; gap: 25px;
        }
        .panel input {
            width: 100%; padding: 20px; background: #000; border: 2px solid var(--steam-gold); 
            color: var(--accent); text-align: center; font-size: 18px; border-radius: 6px; outline: none; font-weight: 700;
        }
        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .realm-btn { padding: 18px; border: 2px solid var(--steam-gold); background: rgba(255,255,255,0.03); color: #fff; font-weight: 900; font-size: 14px; font-family: 'Cinzel', serif; cursor: pointer; }
        .realm-btn:hover { background: var(--steam-gold); color: #000; }

        .status-badge { background: #000; color: var(--danger); border: 2.5px solid var(--danger); padding: 12px 30px; font-weight: 900; font-size: 16px; margin-bottom: 25px; animation: glitch 0.3s infinite; text-transform: uppercase; letter-spacing: 4px; }
        @keyframes glitch { 0% { transform: translate(0); text-shadow: 2px 0 var(--accent); } 50% { transform: translate(-3px, 1px); text-shadow: -2px 0 var(--cyber-pink); } 100% { transform: translate(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', desc: '機構の歯車。次に2枚引かせる。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', desc: '全てを凍結させる領域。' },
            FOUNTAIN: { n: '噴水', color: '#4169E1', desc: '魔法の泉。属性を自在に変える。' },
            BATTERY: { n: 'バッテリー', color: '#32CD32', desc: '動力を蓄える緑の魔力。' },
            MACHINE: { n: '機械', color: '#2F4F4F', desc: '因果を操る。順番を逆転させる。' },
            ARCHIVE: { n: '古文書', color: '#8B4513', desc: '古の記録。智恵の貯蔵庫。' },
            PLANET: { n: '惑星', color: '#9400D3', desc: '星々の加護。属性を上書き。' },
            RUINS: { n: '廃墟', color: '#696969', desc: '遺跡の記憶。属性を上書き。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [previewStatus, setPreviewStatus] = useState('waiting');

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            // 手札の自動ソート (サイクル順)
            const sortedHand = useMemo(() => {
                const playerMe = gs?.players?.find(p => p.id === (socket?.id || 'mock-me'));
                if (!playerMe || !playerMe.hand) return [];
                return [...playerMe.hand].sort((a, b) => {
                    let idxA = CYCLE_ORDER.indexOf(a.realm);
                    let idxB = CYCLE_ORDER.indexOf(b.realm);
                    if (idxA === -1) idxA = 99;
                    if (idxB === -1) idxB = 99;
                    if (idxA !== idxB) return idxA - idxB;
                    return (a.isSpecial ? 0 : 1) - (b.isSpecial ? 0 : 1);
                });
            }, [gs, socket]);

            const isMyTurn = gs?.currentTurnPlayerId === (socket?.id || 'mock-me') && gs?.status === 'playing';
            const currentRealm = gs?.fieldCard?.realm || 'GEAR';
            const nextRealm = useMemo(() => {
                const idx = CYCLE_ORDER.indexOf(currentRealm);
                return idx === -1 ? 'GEAR' : CYCLE_ORDER[(idx + 1) % 6];
            }, [currentRealm]);

            const canPlay = (card) => {
                if (!isMyTurn) return false;
                if (gs.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm;
                if (h === 'PLANET' || h === 'RUINS' || (h === 'FOUNTAIN' && card.isSpecial)) return true;
                if (currentRealm === h) return true;
                if (h === nextRealm) return true;
                if (currentRealm === 'ARCHIVE' && h === 'ICEAGE') return true;
                if (currentRealm === 'ICEAGE' && (h === 'BATTERY' || h === 'FOUNTAIN')) return true;
                return false;
            };

            const CardView = ({ card, playable, onClick, isField }) => {
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';

                return (
                    <div className={`card ${isField ? '' : (playable ? 'playable my-card' : 'not-playable my-card')}`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="screen-wrapper">
                    <div className="overlay">
                        <div className="panel">
                            <h1 style={{color:'var(--steam-gold)', fontSize:32, fontWeight:900, fontFamily:'Cinzel', letterSpacing:6}}>CROSS REALM</h1>
                            <p style={{fontSize:10, color:'var(--accent)', letterSpacing:8, marginBottom:10}}>ETERNAL PUNK PROTOCOL</p>
                            <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="プレイヤー名" />
                            <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} placeholder="ルームID" />
                            <button onClick={()=>{setJoined(true); if(socket?.connected) socket.emit('join-room',{roomId:room, playerName:name});}} className="btn-main">接続</button>
                        </div>
                    </div>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="screen-wrapper">
                    <div className="container" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', padding:40}}>
                        <h2 style={{letterSpacing:10, opacity:0.8, fontSize:20, fontWeight:900, fontFamily:'Cinzel', color:'var(--steam-gold)'}}>AWAITING LINKAGE</h2>
                        <div style={{marginTop:50, display:'flex', flexDirection:'column', gap:18, width:'100%'}}>
                            {gs?.players?.map(p => (
                                <div key={p.id} style={{padding:20, background:'rgba(255,255,255,0.05)', borderLeft:'5px solid var(--steam-gold)', fontSize:16, fontWeight:900}}>
                                    {p.name}
                                </div>
                            ))}
                        </div>
                        {gs?.players?.[0]?.id === socket?.id && (
                            <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" style={{marginTop:70}}>コア起動</button>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="screen-wrapper">
                    <div className="bg-layer bg-magic"></div>
                    <div className="bg-layer bg-aura" style={{ '--realm-color': REALMS[currentRealm].color }}></div>

                    <div className="game-container">
                        <div className="header">
                            {gs.players.filter(p => p.id !== socket.id).map(p => (
                                <div key={p.id} className={`opp-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-name">{p.name}</div>
                                    <div style={{fontWeight:900, color: 'var(--accent)', fontSize:20}}>{p.handCount} Units</div>
                                </div>
                            ))}
                        </div>

                        <div className="cycle-bar">
                            {CYCLE_ORDER.map(r => (
                                <div key={r} className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}>
                                    <div className="cycle-label">{REALMS[r].n}</div>
                                </div>
                            ))}
                        </div>

                        <div className="field">
                            <div className="turn-watermark">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                            {gs.nextDrawAmount > 1 && <div className="status-badge">WARNING: DRAW +{gs.nextDrawAmount}</div>}
                            
                            <div className="field-main-area">
                                <CardView card={gs.fieldCard} isField={true} />
                                <div className="info-panel">
                                    <div className="realm-title" style={{'--realm-color': REALMS[currentRealm].color}}>{REALMS[currentRealm].n}</div>
                                    <div className="realm-desc">{REALMS[currentRealm].desc}</div>
                                    <div className="next-hint">NEXT: <span style={{color: REALMS[nextRealm].color}}>{REALMS[nextRealm].n}</span> / 同属性</div>
                                </div>
                            </div>
                        </div>

                        <div className="action-area">
                            <button className="btn-main" disabled={!isMyTurn} onClick={() => socket.emit('draw-card',{roomId:room})}>
                                {gs.nextDrawAmount > 1 ? `DRAW OVERRIDE +${gs.nextDrawAmount}` : 'カードを引く / パス'}
                            </button>
                        </div>

                        <div className="hand-area">
                            <div className="hand-flex">
                                {sortedHand.map((card) => (
                                    <CardView key={card.id} card={card} playable={canPlay(card)} 
                                              onClick={() => {
                                                if (!canPlay(card)) return;
                                                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                                                if (isWild) setSelectorCard(card);
                                                else socket.emit('play-card', { roomId: room, card });
                                              }} />
                                ))}
                            </div>
                            <div style={{textAlign:'center', fontSize:11, fontWeight:900, marginTop:18, opacity:0.6, color:'var(--steam-gold)', letterSpacing:5}}>
                                CORE SYNC: {sortedHand.length} / 12
                            </div>
                        </div>
                    </div>

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:22, fontWeight:900, marginBottom:15, color:'var(--steam-gold)', fontFamily:'Cinzel'}}>REALM OVERRIDE</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => {
                                                    socket.emit('play-card', {roomId:room, card:selectorCard, chosenRealm:r});
                                                    setSelectorCard(null);
                                                }}>{r}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{marginTop:30, opacity:0.7, color:'#fff', cursor:'pointer', border:'none', background:'none', fontWeight:900}}>キャンセル</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--steam-gold)', fontSize:30, fontWeight:900, fontFamily:'Cinzel'}}>MISSION END</h2>
                                <div style={{width:'100%', margin:'30px 0'}}>
                                    {gs.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i)=>(
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'18px 10px', borderBottom:'1px solid var(--border)', fontSize:18}}>
                                            <span style={{fontWeight:900}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount} Units</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main">再接続</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
