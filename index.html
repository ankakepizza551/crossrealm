<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #40E0D0; --bg: #0d0d0d; --card-w: 80px; --card-h: 115px; --panel: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; }
        
        .game-container { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        /* ヘッダー・対戦相手 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: var(--panel); border-radius: 10px; margin-bottom: 5px; border: 1px solid #222; }
        .opponents { display: flex; gap: 10px; justify-content: center; flex-grow: 1; }
        .opp-box { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; font-size: 11px; border-bottom: 2px solid #444; }
        .opp-box.active { border-bottom-color: var(--accent); background: rgba(64, 224, 208, 0.15); box-shadow: 0 0 10px rgba(64,224,208,0.2); }

        /* 中央エリア */
        .center-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 15px; position: relative; }
        .info-panel { width: 170px; background: var(--panel); padding: 12px; border-radius: 8px; border: 1px solid #333; font-size: 12px; }
        .info-panel h4 { margin: 0 0 5px 0; font-size: 11px; color: #888; text-transform: uppercase; }
        .status-badge { background: #222; padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 14px; display: inline-block; margin-bottom: 5px; }

        /* カード */
        .card { width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 1px solid #444; background: #000; position: relative; transition: 0.2s; cursor: pointer; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .card.disabled { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 3px 0; text-align: center; font-size: 9px; font-weight: bold; }
        .badge { position: absolute; top: 4px; right: 4px; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: bold; z-index: 5; }

        /* 手札 */
        .hand-container { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 15px 15px 0 0; min-height: 140px; border-top: 1px solid #222; }
        .hand-container.my-turn { background: rgba(64, 224, 208, 0.05); border-top-color: var(--accent); box-shadow: inset 0 10px 30px rgba(64, 224, 208, 0.1); }
        .hand-flex { display: flex; justify-content: center; margin-left: 30px; }
        .slot { margin-left: -30px; transition: 0.25s; }
        .slot:hover { transform: translateY(-30px); margin-right: 25px; z-index: 100 !important; }

        /* ボタン・オーバーレイ */
        .btn { padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn:disabled { opacity: 0.2; cursor: default; }
        .choice-btn { margin: 5px; padding: 10px 15px; border-radius: 5px; border: 1px solid var(--accent); background: transparent; color: white; cursor: pointer; min-width: 80px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .warning-text { color: #ff4444; font-weight: bold; font-size: 13px; position: absolute; top: -25px; width: 100%; text-align: center; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', can: true, next: 'ICEAGE', win: '氷河期', desc: '特:ドロー+2' },
            ICEAGE: { n: '氷河期', can: false, next: 'FOUNTAIN', win: '噴水', desc: '連続出し不可' },
            FOUNTAIN: { n: '噴水', can: true, next: 'BATTERY', win: 'バッテリー', desc: '特:ワイルド化' },
            BATTERY: { n: 'バッテリー', can: false, next: 'MACHINE', win: '機械', desc: '連続出し不可' },
            MACHINE: { n: '機械', can: true, next: 'ARCHIVE', win: '古文書', desc: '特:順序反転' },
            ARCHIVE: { n: '古文書', can: false, next: 'GEAR', win: '歯車', desc: '連続出し不可' },
            PLANET: { n: '惑星', w: true, desc: '全属性対応' },
            RUINS: { n: '廃墟', w: true, desc: '全属性対応' }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                socket.on('game-over', (d) => alert("Winner: " + d.winnerName));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const f = gs.fieldCard.realm;
                const h = c.realm;
                if (REALMS[h].w || REALMS[f].w) return true;
                if (c.realm === 'FOUNTAIN' && c.isSpecial && (f === 'ICEAGE' || f === 'FOUNTAIN')) return true;
                if (f === h) return REALMS[h].can;
                const cycle = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];
                const fIdx = cycle.indexOf(f);
                return (fIdx !== -1 && cycle[(fIdx + 1) % 6] === h);
            };

            const CardView = ({ card, disabled, onClick }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                        <img src={src} alt={card.realm} />
                        {card.isSpecial && card.realm === 'GEAR' && <div className="badge" style={{background:'#ff4444'}}>+2</div>}
                        {card.isSpecial && card.realm === 'FOUNTAIN' && <div className="badge" style={{background:'#4444ff'}}>WILD</div>}
                        {card.isSpecial && card.realm === 'MACHINE' && <div className="badge" style={{background:'#ffaa00'}}>REV</div>}
                        <div className="card-ui">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay">
                    <h1 style={{color:'var(--accent)', letterSpacing:'5px', marginBottom:'30px'}}>CROSS REALM</h1>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'10px', textAlign:'center', border:'1px solid #333'}} placeholder="プレイヤー名" value={name} onChange={e=>setName(e.target.value)} />
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'20px', textAlign:'center', border:'1px solid #333'}} placeholder="ルームID" value={room} onChange={e=>setRoom(e.target.value)} />
                    <button className="btn" onClick={()=>{if(room && name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>領域に接続</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <h2>待機中... ({gs?.players?.length || 0}/4)</h2>
                    {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && <button className="btn" onClick={()=>socket.emit('start-game',{roomId:room})}>ゲーム開始</button>}
                </div>
            );

            const fieldInfo = REALMS[gs.fieldCard.realm];

            return (
                <div className="game-container">
                    <div className="top-bar">
                        <div style={{fontSize:'10px', color:gs.isReversed?'orange':'var(--accent)', width:'60px'}}>{gs.isReversed?'◀ REV':'NORM ▶'}</div>
                        <div className="opponents">
                            {others.map(p => (
                                <div key={p.id} className={`opp-box ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    {p.name}: {p.handCount}枚
                                </div>
                            ))}
                        </div>
                        <div style={{fontSize:'10px', textAlign:'right', width:'60px'}}>{isMyTurn ? 'MY TURN' : 'WAIT'}</div>
                    </div>

                    <div className="center-stage">
                        <div className="info-panel">
                            <h4>現在の領域</h4>
                            <div className="status-badge">{fieldInfo.n}</div>
                            <div style={{color:'#ccc', marginTop:'5px'}}>
                                {fieldInfo.w ? '好きな属性を出せます' : (
                                    <>
                                        <p style={{margin:'2px 0'}}>次: <strong style={{color:'var(--accent)'}}>{REALMS[fieldInfo.next].n}</strong></p>
                                        <p style={{margin:'2px 0'}}>同属性: {fieldInfo.can ? 'OK' : '不可'}</p>
                                        <div style={{fontSize:'10px', color:'#777', marginTop:'5px'}}>{fieldInfo.desc}</div>
                                    </>
                                )}
                            </div>
                        </div>

                        <div style={{transform:'scale(1.3)'}}>
                            <CardView card={gs.fieldCard} />
                        </div>

                        <div className="info-panel" style={{width:'140px', textAlign:'center'}}>
                            <button className="btn" style={{width:'100%', whiteSpace:'pre-wrap'}} onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                                {gs.nextDrawAmount > 1 ? `回避不可\n+${gs.nextDrawAmount}枚ドロー` : "カードを引く"}
                            </button>
                        </div>
                    </div>

                    <div className={`hand-container ${isMyTurn ? 'my-turn' : ''}`}>
                        {gs.nextDrawAmount > 1 && isMyTurn && <div className="warning-text">ドロー累積中！「歯車(+2)」以外出せません！</div>}
                        <div className="hand-flex">
                            {me.hand.map((c,i)=>(
                                <div key={c.id} className="slot" style={{zIndex:i}}>
                                    <CardView card={c} disabled={!canPlay(c)} onClick={()=>(c.realm==='PLANET'||(c.realm==='FOUNTAIN'&&c.isSpecial))?setSelectorCard(c):socket.emit('play-card',{roomId:room, card:c})}/>
                                </div>
                            ))}
                        </div>
                    </div>

                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay">
                            <h3 style={{marginBottom:'20px'}}>次なる領域を選択</h3>
                            <div style={{display:'flex', flexWrap:'wrap', justifyContent:'center', maxWidth:'300px'}}>
                                {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r=>(
                                    <button key={r} className="choice-btn" onClick={()=>{
                                        if(selectorCard) { socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }
                                        else { socket.emit('set-initial-realm',{roomId:room, chosenRealm:r}); }
                                    }}>{REALMS[r].n}</button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
