<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition - v17.3</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg: #05050A; --card-w: 90px; --card-h: 130px; --opp-card-w: 24px; --opp-card-h: 34px; 
            --border: rgba(212, 175, 55, 0.45); --guide-gold: #FFD700;
        }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Exo 2', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; min-height: -webkit-fill-available; overflow: hidden; 
        }
        .screen-wrapper { 
            width: 100vw; height: 100vh; height: 100dvh; min-height: -webkit-fill-available;
            max-width: calc(100vh * 9 / 16); max-width: calc(100dvh * 9 / 16); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            border-left: 2px solid rgba(212,175,55,0.4); border-right: 2px solid rgba(64,224,208,0.4); 
            box-shadow: 0 0 80px rgba(138, 43, 226, 0.3); background: var(--bg);
        }

        /* === 3界ごちゃまぜ背景 (光彩強化版) === */
        .bg-container { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .layer-fantasy { position: absolute; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.3), transparent 60%), radial-gradient(circle at 80% 70%, rgba(0, 191, 255, 0.25), transparent 60%); animation: pulse-magic 8s infinite alternate; mix-blend-mode: screen; }
        @keyframes pulse-magic { 0% { opacity: 0.6; filter: hue-rotate(0deg) scale(1); } 100% { opacity: 1; filter: hue-rotate(30deg) scale(1.1); } }
        .layer-cyber { position: absolute; inset: -50%; background-image: linear-gradient(rgba(64, 224, 208, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(64, 224, 208, 0.15) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(800px) rotateX(60deg) translateY(100px) translateZ(-200px); animation: grid-move 12s linear infinite; mask-image: radial-gradient(circle at center, black, transparent 80%); -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%); mix-blend-mode: screen; }
        @keyframes grid-move { 0% { transform: perspective(800px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform: perspective(800px) rotateX(60deg) translateY(50px) translateZ(-200px); } }
        .layer-steam { position: absolute; inset: 0; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="3" stroke-dasharray="8 6"/><circle cx="50" cy="50" r="25" fill="none" stroke="rgba(184,134,11,0.08)" stroke-width="2" stroke-dasharray="4 4"/></svg>'); background-position: center; animation: gear-spin 60s linear infinite; opacity: 1; }
        @keyframes gear-spin { 100% { transform: rotate(360deg); } }
        .bg-magic-aura { position: absolute; inset: 0; background-color: var(--realm-color); -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); opacity: 0.5; transition: background-color 1.5s ease; mix-blend-mode: screen; z-index: 1; }

        /* === 光の粒子 === */
        .particle { position: absolute; bottom: -20px; border-radius: 50%; opacity: 0; animation: float-up var(--d) ease-in infinite; mix-blend-mode: screen; }
        @keyframes float-up { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 0.8; } 100% { transform: translateY(-100vh) translateX(var(--x)) scale(2); opacity: 0; } }

        /* === ゴリゴリHUD用エフェクト === */
        .magic-ring-bg { position: absolute; top: 50%; left: 50%; width: 140vw; height: 140vw; max-width: 800px; max-height: 800px; transform: translate(-50%, -50%); border-radius: 50%; border: 3px dashed rgba(64,224,208,0.3); box-shadow: 0 0 80px rgba(64,224,208,0.2); animation: gear-spin 40s linear infinite; pointer-events: none; z-index: 1; }
        .magic-ring-bg::after { content: ''; position: absolute; inset: 20px; border-radius: 50%; border: 2px solid rgba(138,43,226,0.3); animation: gear-spin 20s linear infinite reverse; }
        .hex-bg { background-image: linear-gradient(30deg, transparent 45%, rgba(64,224,208,0.03) 45%, rgba(64,224,208,0.03) 55%, transparent 55%), linear-gradient(-30deg, transparent 45%, rgba(138,43,226,0.03) 45%, rgba(138,43,226,0.03) 55%, transparent 55%); background-size: 30px 50px; }
        .hud-frame { position: absolute; inset: 0; pointer-events: none; border: 2px solid rgba(64,224,208,0.5); clip-path: polygon(0 40px, 40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%); box-shadow: inset 0 0 30px rgba(64,224,208,0.2); }
        .hud-corner { position: absolute; width: 25px; height: 25px; border: 3px solid #40E0D0; filter: drop-shadow(0 0 8px #40E0D0); }
        .hud-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .hud-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .hud-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .hud-br { bottom: 0; right: 0; border-left: none; border-top: none; }

        /* === フォント === */
        .font-base { font-family: 'Exo 2', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glitch-text { animation: glitch-anim 3s infinite; }
        @keyframes glitch-anim { 0%, 96% { transform: translate(0); text-shadow: none; } 98% { transform: translate(-3px, 2px); text-shadow: 3px 0 #f00, -3px 0 #0ff; } 100% { transform: translate(3px, -2px); text-shadow: -3px 0 #f00, 3px 0 #0ff; } }
        .steam-glow { text-shadow: 0 0 15px #D4AF37, 0 0 30px #8B4513; }
        .cyber-glow { text-shadow: 0 0 15px #40E0D0, 0 0 30px #008B8B; }
        .magic-glow { text-shadow: 0 0 15px #8A2BE2, 0 0 30px #4B0082; }

        /* === UIパネル群 === */
        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100%; overflow: hidden; }
        .turn-direction { flex-shrink: 0; position: relative; text-align: center; font-size: 14px; font-weight: 900; color: var(--accent); letter-spacing: 4px; background: linear-gradient(90deg, transparent, rgba(0,40,40,0.9), transparent); padding: 6px; border-bottom: 2px solid rgba(64,224,208,0.6); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(64,224,208,0.2); font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px var(--accent); }
        .mute-btn-game { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; background: rgba(0,0,0,0.8); border: 1px solid var(--steam-gold); border-radius: 50%; color: var(--steam-gold); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; box-shadow: 0 0 15px rgba(212,175,55,0.4); transition: 0.3s; }
        .mute-btn-game:hover { box-shadow: 0 0 25px var(--steam-gold); transform: translateY(-50%) scale(1.1); }

        /* 相手の表示エリア（名前の省略を完全になくすための2段組レイアウト） */
        .opponents-area { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 12px; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(212,175,55,0.5); backdrop-filter: blur(10px); }
        .opp-row { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 6px; padding: 8px 10px; border-radius: 6px; background: linear-gradient(135deg, rgba(20,20,30,0.9), rgba(5,5,10,0.95)); border-left: 3px solid rgba(255,255,255,0.3); transition: 0.4s; position: relative; overflow: hidden; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .opp-row.active { border-left-color: var(--accent); background: linear-gradient(135deg, rgba(64,224,208,0.3), rgba(138,43,226,0.2)); box-shadow: 0 0 20px rgba(64,224,208,0.5), inset 0 0 20px rgba(138,43,226,0.4); animation: activePulse 1.5s infinite; }
        @keyframes activePulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
        /* 1行まるごと使って名前を表示 */
        .opp-name { font-weight: 900; font-size: 13px; color: #fff; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 0 5px rgba(255,255,255,0.5); text-align: left; font-family: 'Exo 2', sans-serif; letter-spacing: 0px; }
        .opp-hand-visual { display: flex; align-items: center; width: 100%; justify-content: space-between; }
        .mini-cards-stack { position: relative; width: 50px; height: var(--opp-card-h); }
        .mini-card-back { width: var(--opp-card-w); height: var(--opp-card-h); background: linear-gradient(135deg, #4a1a6a, #000); border: 1px solid var(--steam-gold); border-radius: 2px; position: absolute; top: 0; box-shadow: -3px 0 8px rgba(0,0,0,0.9); }

        .cycle-bar { flex-shrink: 0; display: flex; justify-content: space-between; padding: 6px 4px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--border); box-shadow: 0 8px 25px rgba(0,0,0,0.9); z-index: 20; backdrop-filter: blur(10px); }
        .cycle-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .cycle-dot { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; transition: 0.3s; }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 15px var(--dot-color), 0 0 30px var(--dot-color); height: 4px; }
        .cycle-dot.next-playable { background: var(--guide-gold); box-shadow: 0 0 15px var(--guide-gold); animation: pulseGold 0.8s infinite alternate; }
        @keyframes pulseGold { from { opacity: 0.3; transform: scaleX(0.7); } to { opacity: 1; transform: scaleX(1.1); } }
        .cycle-label { font-size: 11px; font-weight: 900; opacity: 0.5; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .cycle-item.active .cycle-label { opacity: 1; color: var(--dot-color); text-shadow: 0 0 10px var(--dot-color); }
        .cycle-item.next-playable .cycle-label { opacity: 1; color: var(--guide-gold); text-shadow: 0 0 10px var(--guide-gold); }

        /* === 究極魔法陣 === */
        .field { flex: 1; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; position: relative; }
        .field-magic-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; border: 3px dashed var(--realm-color); box-shadow: 0 0 40px var(--realm-color), inset 0 0 30px var(--realm-color); animation: spin-slow 15s linear infinite; pointer-events: none; z-index: 0; opacity: 0.7; transition: border-color 0.5s, box-shadow 0.5s; mix-blend-mode: screen; }
        .field-magic-circle::after { content: ''; position: absolute; inset: -20px; border-radius: 50%; border: 2px solid var(--realm-color); box-shadow: 0 0 20px var(--realm-color); opacity: 0.6; animation: spin-slow 10s linear infinite reverse; }
        @keyframes spin-slow { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .info-panel { border: 1px solid rgba(212,175,55,0.8); padding: 10px 14px; border-radius: 8px; width: 160px; text-align: center; position: relative; z-index: 10; box-shadow: 0 0 30px rgba(212,175,55,0.2); background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(12px); }
        .realm-title { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 900; color: var(--realm-color); text-shadow: 0 0 30px var(--realm-color); letter-spacing: 2px; }

        .log-terminal-container { flex-shrink: 0; width: 100%; padding: 0 10px; margin-bottom: 15px; z-index: 50; }
        .log-terminal { height: 50px; padding: 4px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; font-family: 'Orbitron', monospace; font-size: 11px; background: linear-gradient(135deg, rgba(0, 30, 30, 0.8), rgba(0, 0, 0, 0.95)); border-left: 3px solid #40E0D0; border-radius: 6px; box-shadow: 0 0 25px rgba(64, 224, 208, 0.3), inset 0 0 25px rgba(64, 224, 208, 0.2); }
        .log-line { color: rgba(255,255,255,0.7); white-space: nowrap; text-shadow: 0 0 2px rgba(255,255,255,0.4); }
        .log-line.play { color: var(--accent); font-weight: bold; text-shadow: 0 0 15px var(--accent); }
        .log-line.sys { color: var(--steam-gold); text-shadow: 0 0 10px var(--steam-gold); }

        .hand-container { flex-shrink: 0; position: relative; z-index: 9999; width: 100%; overflow: visible; background: linear-gradient(to top, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%); }
        .hand-flex { display: flex; justify-content: center; align-items: flex-end; height: 165px; padding-bottom: 20px; }
        .action-row { flex-shrink: 0; border-top: 2px solid rgba(138,43,226,0.8); padding: 8px 15px 15px 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10; box-shadow: 0 -10px 30px rgba(138,43,226,0.3); background: linear-gradient(135deg, rgba(50,25,10,0.85), rgba(10,5,2,0.95)); }

        .overlay { position: absolute; inset: 0; z-index: 50000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); background: rgba(5,5,15,0.85); padding: 25px; overflow: hidden; }

        .logo-container { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .logo-main { margin: 0; padding: 0; font-family: 'Cinzel', serif; font-size: clamp(14px, 8vw, 36px); font-weight: 900; letter-spacing: 2px; background: linear-gradient(to bottom, #FFF8DC 0%, #FFD700 30%, #D4AF37 70%, #8B6B23 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 5px 20px rgba(212,175,55,0.8)); display: flex; justify-content: center; align-items: center; white-space: nowrap; animation: titleGlow 3s infinite alternate; z-index: 20;}
        .logo-main span.cross { font-size: 0.8em; color: var(--steam-gold); -webkit-text-fill-color: var(--steam-gold); opacity: 0.9; margin: 0 4px; }
        .logo-sub { font-size: clamp(9px, 3vw, 18px); letter-spacing: 4px; color: var(--accent); font-weight: 900; margin-top: 8px; font-family: 'Exo 2', sans-serif; opacity: 1; text-transform: uppercase; white-space: nowrap; text-shadow: 0 0 25px rgba(64,224,208,1); z-index: 20;}

        .panel input { width: 100%; padding: 20px; background: rgba(0,0,0,0.8); border: 1px solid rgba(64,224,208,0.5); border-bottom: 3px solid var(--accent); color: #fff; text-align: center; font-size: 20px; outline: none; box-sizing: border-box; transition: 0.3s; font-family: 'Exo 2', sans-serif; letter-spacing: 2px; font-weight: bold; white-space: nowrap; box-shadow: inset 0 0 20px rgba(0,0,0,0.9); z-index: 20; position: relative;}
        .panel input:focus { border-color: var(--accent); box-shadow: 0 0 35px rgba(64,224,208,0.6), inset 0 0 25px rgba(138,43,226,0.5); transform: scale(1.02); }

        .btn-main { display: flex; align-items: center; justify-content: center; min-height: 55px; background: linear-gradient(90deg, #B8860B, #FFDF73, #D4AF37, #B8860B); background-size: 200% auto; color: #000; border: 1px solid #FFF8DC; padding: 0 20px; border-radius: 6px; font-weight: 900; font-size: 20px; cursor: pointer; width: 100%; font-family: 'Exo 2', sans-serif; letter-spacing: 4px; transition: 0.4s; box-shadow: 0 5px 35px rgba(212,175,55,0.8); box-sizing: border-box; animation: sweepBtn 3s linear infinite; line-height: 1; white-space: nowrap; position: relative; overflow: hidden; z-index: 20;}
        .btn-main::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); transform: skewX(-20deg); animation: btn-flare 3s infinite; }
        @keyframes btn-flare { 0% { left: -100%; } 50%, 100% { left: 200%; } }
        .btn-main:hover { box-shadow: 0 0 60px rgba(212,175,55,1); transform: scale(1.04); }
        .btn-main:disabled { background: #222; color: #444; border-color: #333; cursor: not-allowed; box-shadow: none; animation: none; transform: none; }
        .btn-main:disabled::after { display: none; }
        
        .btn-sub { display: flex; align-items: center; justify-content: center; min-height: 48px; background: rgba(138,43,226,0.25); border: 1px solid rgba(138,43,226,0.9); color: #e2b0ff; padding: 0 16px; width: 100%; cursor: pointer; border-radius: 6px; font-weight: 900; font-size: 18px; transition: 0.3s; letter-spacing: 2px; box-sizing: border-box; line-height: 1; text-shadow: 0 0 15px rgba(138,43,226,0.9); font-family: 'Exo 2', sans-serif; white-space: nowrap; box-shadow: inset 0 0 20px rgba(138,43,226,0.4); z-index: 20; position: relative;}
        .btn-sub:hover { background: rgba(138,43,226,0.6); color: #fff; border-color: #fff; box-shadow: 0 0 30px rgba(138,43,226,0.9); transform: scale(1.03); }

        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; z-index: 20; position: relative;}
        .realm-btn { padding: 20px 10px; border: 2px solid var(--steam-gold); background: linear-gradient(180deg, rgba(30,20,40,0.9), rgba(0,0,0,0.9)); color: #fff; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.2s; box-shadow: 0 5px 30px rgba(0,0,0,0.9); z-index: 20;}
        .realm-btn:hover { transform: scale(1.08); border-color: #fff; box-shadow: 0 0 45px var(--steam-gold), inset 0 0 30px rgba(255,255,255,0.4); }
        .realm-btn svg { width: 40px; height: 40px; filter: drop-shadow(0 0 15px currentColor); transition: 0.3s; }
        .realm-btn:hover svg { filter: drop-shadow(0 0 25px currentColor) brightness(1.8); transform: scale(1.1); }

        .waiting-list { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 5px; padding-top: 15px; z-index: 20; position: relative;}
        /* 待機リストもHUD風にナナメ切り抜き */
        .waiting-player { background: linear-gradient(90deg, rgba(64,224,208,0.2), rgba(138,43,226,0.2)); border: 1px solid rgba(212,175,55,0.6); border-left: 4px solid var(--accent); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: relative; box-shadow: inset 0 0 25px rgba(0,0,0,0.9); overflow: hidden; clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); }
        .waiting-player.empty { background: rgba(255,255,255,0.05); border: 1px dashed rgba(138,43,226,0.6); opacity: 0.6; overflow: hidden; }
        .host-badge { position: absolute; top: 0; right: 0; background: var(--steam-gold); color: #000; font-size: 11px; font-weight: 900; padding: 3px 10px; border-radius: 0 0 0 8px; box-shadow: -2px 2px 10px rgba(0,0,0,0.5); }
        
        .sync-dot { width: 12px; height: 12px; background: var(--accent); box-shadow: 0 0 30px var(--accent); transform: rotate(45deg); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; filter: hue-rotate(0deg); } 50% { opacity: 1; filter: hue-rotate(30deg); } }

        /* =========================================
           3Dカード専用スタイル
           ========================================= */
        .card-wrapper-3d { position: relative; perspective: 800px; flex-shrink: 0; width: var(--card-w); height: var(--card-h); }
        .card-3d { box-sizing: border-box; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,1); border-radius: 4px; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; border-radius: inherit; overflow: hidden; }

        .card-icon-3d { position: absolute; top: 40%; left: 50%; width: 40px; height: 40px; color: var(--r-color); transform: translate(-50%, -50%) translateZ(30px); z-index: 10; filter: drop-shadow(0 0 15px var(--r-color)); transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1); }
        .identity-label { position: absolute; top: 6px; left: 6px; padding: 3px 8px; background: rgba(0,0,0,0.9); border-radius: 2px; border-left: 3px solid var(--r-color); transform: translateZ(25px); z-index: 30; box-shadow: 0 3px 8px rgba(0,0,0,0.8); }
        .identity-label span { color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 1px; }
        .card-footer-3d { position: absolute; bottom: 0; width: 100%; font-size: 13px; font-weight: 900; padding: 15px 0 6px 0; text-align: center; color: #fff; z-index: 30; transform: translateZ(20px); background: linear-gradient(to top, rgba(0,0,0,1) 40%, transparent 100%); text-shadow: 0 0 10px var(--r-color); letter-spacing: 2px; }

        .theme-steampunk { border: 3px solid #3d2416; background: linear-gradient(135deg, #4a2511 0%, #1a0802 100%); box-shadow: 0 8px 30px #000, inset 0 0 45px #000; }
        .theme-steampunk::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.5) 0, rgba(0,0,0,0.5) 2px, transparent 2px, transparent 4px); opacity: 0.9; z-index: 1; }
        .theme-fantasy { border-radius: 16px 4px; border: 2px solid rgba(255,255,255,0.9); background: radial-gradient(circle at 50% 50%, #2a1b7e 0%, #05021a 100%); box-shadow: 0 0 25px var(--r-shadow-color), inset 0 0 50px var(--r-shadow-color); }
        .theme-cyber { border: none; border-radius: 0px; background: #000; clip-path: polygon(0 10%, 10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%); box-shadow: inset 0 0 40px var(--r-shadow-color); }

    <script>
        // === オーディオの完全並列再生（プール）化 ===
        // 連打や非同期エラーを完璧に防ぐため、各音源を5つずつ生成して順繰りに使い回す
        const SFX_URLS = {
            turn: 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3',
            play: 'https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3',
            draw: 'https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3',
            alert: 'https://assets.mixkit.co/active_storage/sfx/2862/2862-preview.mp3'
        };
        
        window.sfxPools = {};
        window.sfxIndex = {};
        for(let key in SFX_URLS){
            window.sfxPools[key] = Array.from({length: 5}, () => {
                let a = new Audio(SFX_URLS[key]);
                a.preload = 'auto';
                a.volume = 0.3;
                return a;
            });
            window.sfxIndex[key] = 0;
        }
        window.isMutedGlobal = false;

        window.safePlay = (type) => {
            if (window.isMutedGlobal) return;
            try {
                const pool = window.sfxPools[type];
                const idx = window.sfxIndex[type];
                const a = pool[idx];
                a.pause();
                a.currentTime = 0;
                a.volume = 0.3;
                const p = a.play();
                if(p !== undefined) p.catch(()=>{});
                window.sfxIndex[type] = (idx + 1) % pool.length; // 次のインスタンスへ
            } catch(e){}
        };

        window.safeStop = (type) => {
            try {
                window.sfxPools[type].forEach(a => {
                    a.pause();
                    a.currentTime = 0;
                });
            } catch(e){}
        };

        window.audioUnlocked = false;
        window.unlockAudio = () => {
            if (window.audioUnlocked) return;
            for(let key in window.sfxPools){
                window.sfxPools[key].forEach(a => {
                    try {
                        a.volume = 0;
                        const p = a.play();
                        if(p !== undefined) {
                            p.then(() => {
                                a.pause();
                                a.currentTime = 0;
                                a.volume = window.isMutedGlobal ? 0 : 0.3;
                            }).catch(()=>{});
                        }
                    } catch(e){}
                });
            }
            window.audioUnlocked = true;
            ['touchstart', 'touchend', 'mousedown', 'click'].forEach(e => document.removeEventListener(e, window.unlockAudio));
        };
        ['touchstart', 'touchend', 'mousedown', 'click'].forEach(e => document.addEventListener(e, window.unlockAudio, {once: true}));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', shadow: 'rgba(255, 140, 0, 0.7)', desc: 'セットA：維持。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', shadow: 'rgba(0, 191, 255, 0.9)', desc: 'セットA→B：遷移。' },

            BATTERY: { n: '電池', color: '#32CD32', shadow: 'rgba(50, 205, 50, 0.9)', desc: 'セットB→C：遷移。' },
            MACHINE: { n: '機械', color: '#94A3B8', shadow: 'rgba(148, 163, 184, 0.7)', desc: 'セットC：維持。' },
            ARCHIVE: { n: '古文書', color: '#FF3131', shadow: 'rgba(255, 49, 49, 0.9)', desc: 'セットC→A：遷移。' },
            PLANET: { n: '惑星', color: '#9400D3', shadow: 'rgba(148, 0, 211, 1)', desc: '星々の加護。' },
            RUINS: { n: '廃墟', color: '#FFFFFF', shadow: 'rgba(255, 255, 255, 0.8)', desc: '遺跡の記憶。' }

        const THEMES = { GEAR: 'steampunk', ARCHIVE: 'steampunk', ICEAGE: 'fantasy', FOUNTAIN: 'fantasy', PLANET: 'void', RUINS: 'void', BATTERY: 'cyber', MACHINE: 'cyber' };
        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];
        
        const ICONS = {
            GEAR: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>,
            ICEAGE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m10 20-2.5-2.5L5 20"/><path d="M12 22V2"/><path d="m14 20 2.5-2.5L19 20"/><path d="m10 4-2.5 2.5L5 4"/><path d="m14 4 2.5-2.5L19 4"/><path d="m20 10-2.5 2.5L20 15"/><path d="M22 12H2"/><path d="m4 10 2.5 2.5L4 15"/></svg>,
            FOUNTAIN: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z"></path></svg>,
            BATTERY: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"></rect><line x1="22" x2="22" y1="11" y2="13"></line><line x1="6" x2="6" y1="11" y2="13"></line><line x1="10" x2="10" y1="11" y2="13"></line><line x1="14" x2="14" y1="11" y2="13"></line></svg>,
            MACHINE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>,
            MACHINE_S: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2" opacity="0.5"></rect><path d="M12 8v4l3 3" strokeWidth="2"/><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" strokeWidth="2"/><polyline points="16 8 21 8 21 3" strokeWidth="2"/></svg>,
            ARCHIVE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            PLANET: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            RUINS: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 20h20"></path><path d="M5 20v-8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8"></path><path d="M9 20v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"></path></svg>
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [error, setError] = useState('');
            const [bgRealm, setBgRealm] = useState('GEAR');
            const [isMuted, setIsMuted] = useState(false); 
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);
            const logTerminalRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('connect', () => setIsConnected(true));
                s.on('disconnect', () => setIsConnected(false));
                s.on('update-game', (data) => { setGs(data); setError(''); });
                s.on('join-error', (msg) => { setError(msg); setJoined(false); });
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => { s.off('connect'); s.off('disconnect'); s.disconnect(); window.removeEventListener('resize', handleResize); };
            }, []);

            useEffect(() => { if (logTerminalRef.current) logTerminalRef.current.scrollTop = logTerminalRef.current.scrollHeight; }, [gs?.logs]);

            const prevTurnRef = useRef(null);
            useEffect(() => {
                if (gs && gs.status === 'playing') {
                    const isMyTurnNow = gs.currentTurnPlayerId === socket?.id;
                    if (isMyTurnNow && gs.currentTurnPlayerId !== prevTurnRef.current) {
                        if (gs.nextDrawAmount > 1) { window.safePlay('alert'); }
                        else { window.safePlay('turn'); }
                    }
                    prevTurnRef.current = gs.currentTurnPlayerId;
                }
            }, [gs, socket]);

            useEffect(() => {
                let interval;
                if (!gs || gs.status !== 'playing') {
                    interval = setInterval(() => { setBgRealm(prev => { const idx = CYCLE_ORDER.indexOf(prev); return CYCLE_ORDER[(idx + 1) % CYCLE_ORDER.length]; }); }, 4000); 
                }
                return () => { if (interval) clearInterval(interval); };
            }, [gs]);

            const toggleMute = () => { 
                const nextMuted = !isMuted; 
                setIsMuted(nextMuted); 
                window.isMutedGlobal = nextMuted;
            };
            
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = (gs?.status === 'playing' && gs?.fieldCard) ? gs.fieldCard.realm : bgRealm;
            
            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (card) => {
                if (!isMyTurn || !card || !gs?.fieldCard) return false;
                if (gs?.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm; const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS') return true;
                if (field === 'PLANET' || field === 'RUINS') return true; 
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                const cycle = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                const isTransition = ['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(field);
                if (field === h && isTransition) return false;
                return field === h || (cycle[field] && cycle[field].includes(h));
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                
                // ブザーを確実に止めてからプレイ音
                window.safeStop('alert');
                window.safePlay('play');
                
                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) { setSelectorCard(card); }
                else { socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined }); }
            };

            const handleDraw = () => { 
                window.safeStop('alert');
                window.safePlay('draw');
                socket.emit('draw-card',{roomId:room}); 
            };

            const CardView = ({ card, playable, onClick, isField, style, index = 0 }) => {
                if (!card || !card.realm) return null;
                let displayRealm = card.realm;
                if (card.wasRuins) displayRealm = 'RUINS'; else if (card.wasPlanet) displayRealm = 'PLANET'; else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) displayRealm = 'FOUNTAIN';
                const isSpecial = card.isSpecial || card.wasFountain;
                
                const isWildType = displayRealm === 'PLANET' || displayRealm === 'RUINS';
                const isFountainWild = displayRealm === 'FOUNTAIN' && isSpecial;
                const theme = THEMES[displayRealm] || 'fantasy';
                const rColor = REALMS[displayRealm] ? REALMS[displayRealm].color : '#fff';
                const shadowColor = REALMS[displayRealm] ? REALMS[displayRealm].shadow : 'rgba(255,255,255,0.4)';
                const fontClass = `font-${theme}`;

                const cardRef = useRef(null);
                const [tiltStyle, setTiltStyle] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });
                const [isHovered, setIsHovered] = useState(false);

                const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

                const handleMouseMove = (e) => {
                    if (!playable && !isField) return; 
                    if (isField || isTouchDevice) return; 
                    if (!cardRef.current) return;
                    const rect = cardRef.current.getBoundingClientRect();
                    const rotateX = ((e.clientY - rect.top - rect.height / 2) / (rect.height / 2)) * -20; 
                    const rotateY = ((e.clientX - rect.left - rect.width / 2) / (rect.width / 2)) * 20;
                    setTiltStyle({ transform: `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`, '--mx': `${((e.clientX - rect.left) / rect.width) * 100}%`, '--my': `${((e.clientY - rect.top) / rect.height) * 100}%`, transition: 'none' });
                };

                const handleMouseLeave = () => {
                    if (isTouchDevice) return;
                    setIsHovered(false);
                    setTiltStyle({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: 'all 0.4s ease-out' });
                };

                const handleMouseEnter = () => { if (playable && !isField && !isTouchDevice) setIsHovered(true); };
                const handleCardAction = (e) => { if (playable && !isField) { if (e.type === 'touchend') e.preventDefault(); onClick(); } };

                let iconStyle = { color: rColor };
                if (isWildType || isFountainWild) { iconStyle = { filter: 'drop-shadow(0 0 6px #fff)', stroke: 'url(#rainbow-gradient)' }; }

                const hoverTranslateY = (isHovered && !isField) ? 'translateY(-20px) scale(1.15)' : '';
                const zOffset = isField ? 0 : index * 2;
                const finalZIndex = isField ? 'auto' : (isHovered ? 1000 : index);

                return (
                    <div 
                        className={`card-wrapper-3d ${isHovered ? 'hovered' : ''} ${!playable && !isField ? 'not-playable' : ''}`}
                        style={{ ...style, zIndex: finalZIndex, cursor: playable && !isField ? 'pointer' : 'default' }}
                        onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} onMouseEnter={handleMouseEnter} onClick={handleCardAction} onTouchEnd={handleCardAction} ref={cardRef}
                    >
                        <div className={`card-3d theme-${theme}`} style={{ '--r-color': rColor, '--r-shadow-color': shadowColor, transform: `${hoverTranslateY} ${tiltStyle.transform} translateZ(${zOffset}px)`, ...tiltStyle }}>
                            <div className="card-content">
                                {theme === 'cyber' && <div className="cyber-border"></div>}
                                <div className="identity-label label-bg"><span className={fontClass}>{displayRealm}</span></div>
                                {displayRealm === 'MACHINE' && isSpecial && <div className="unit-reverse-text">REVERSE</div>}
                                {isFountainWild && <div className="effect-text-wild">L-WILD</div>}
                                {displayRealm === 'GEAR' && isSpecial && <div className="unit-draw2"><div className="num">2</div><div className="txt">DRAW</div></div>}
                                {isWildType && <div className="effect-text-wild">P-WILD</div>}

                                <div className="card-icon-3d" style={iconStyle}>
                                    <svg width="0" height="0" style={{position:'absolute'}}><defs><linearGradient id="rainbow-gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#f00" /><stop offset="20%" stopColor="#ff0" /><stop offset="40%" stopColor="#0f0" /><stop offset="60%" stopColor="#0ff" /><stop offset="80%" stopColor="#00f" /><stop offset="100%" stopColor="#f0f" /></linearGradient></defs></svg>
                                    {isSpecial && displayRealm === 'MACHINE' ? ICONS.MACHINE_S : ICONS[displayRealm]}
                                </div>
                                <div className={`card-footer-3d ${fontClass}`}>{REALMS[displayRealm] ? REALMS[displayRealm].n : '???'}</div>
                            </div>
                            <div className="card-holo" style={{ backgroundPosition: `var(--mx) var(--my)`, opacity: isSpecial || isWildType ? 0.5 : 0.1 }}></div>
                            <div className="card-glare" style={{ left: `var(--mx)`, top: `var(--my)` }}></div>
                        </div>
                    </div>
                );
            };

            const getNextPlayableRealms = () => {
                const cycleMap = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                const targets = cycleMap[currentRealm] || [];
                const isTransition = ['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(currentRealm);
                return targets.filter(r => !(isTransition && r === currentRealm));
            };

            if (joined && gs?.status === 'playing' && !gs?.fieldCard) {
                return (
                    <div className="screen-wrapper" style={{ justifyContent: 'center', alignItems: 'center' }}>
                        <div className="bg-container"><div className="layer-cyber"></div></div>
                        <div className="text-[#40E0D0] font-cyber text-2xl animate-pulse cyber-glow">Initializing Field...</div>
                    </div>
                );
            }

            return (
                <div className="screen-wrapper" style={{ '--realm-color': (REALMS[currentRealm] ? REALMS[currentRealm].color : '#000') }}>
                    
                    <div className="bg-container">
                        <div className="layer-steam"></div>
                        <div className="layer-fantasy"></div>
                        <div className="layer-cyber"></div>
                        
                        {/* 上昇する光の粒子群 (ゴリゴリ増量・発光強化) */}
                        {[...Array(30)].map((_, i) => (
                            <div key={i} className="particle" style={{
                                left: `${Math.random() * 100}%`,
                                width: `${3 + Math.random() * 5}px`,
                                height: `${3 + Math.random() * 5}px`,
                                '--d': `${5 + Math.random() * 8}s`,
                                '--x': `${(Math.random() - 0.5) * 150}px`,
                                background: ['#D4AF37', '#40E0D0', '#8A2BE2', '#FF4500'][Math.floor(Math.random()*4)],
                                color: ['#D4AF37', '#40E0D0', '#8A2BE2', '#FF4500'][Math.floor(Math.random()*4)],
                                boxShadow: '0 0 20px currentColor, 0 0 40px currentColor',
                                animationDelay: `${Math.random() * 5}s`
                            }}></div>
                        ))}
                    </div>
                    <div className="bg-magic-aura"></div>
                    
                    {!isConnected && (
                        <div className="connection-alert">通信切断 - 再接続中...</div>
                    )}

                    {(!joined || (gs && gs.status === 'waiting')) && (
                        <button onClick={toggleMute} className="mute-btn">{isMuted ? '🔇' : '🔊'}</button>
                    )}

                    {!joined && (
                        <div className="overlay">
                            <div className="magic-ring-bg"></div>
                            {/* ゴリゴリHUDパネル */}
                            <div className="panel panel-cyber hex-bg" style={{ zIndex: 10, padding: '50px 30px', clipPath: 'polygon(0 40px, 40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%)', border: 'none', background: 'rgba(5,10,15,0.95)', boxShadow: '0 0 50px rgba(64,224,208,0.5), inset 0 0 50px rgba(138,43,226,0.3)' }}>
                                <div className="hud-frame">
                                    <div className="hud-corner hud-tl"></div>
                                    <div className="hud-corner hud-tr"></div>
                                    <div className="hud-corner hud-bl"></div>
                                    <div className="hud-corner hud-br"></div>
                                </div>
                                <div className="logo-container" style={{zIndex: 20}}>
                                    <h1 className="logo-main steam-glow">
                                        <span>CROSS</span>
                                        <span className="text-[#40E0D0] glitch-text cross font-cyber">X</span>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#8A2BE2] via-[#e2b0ff] to-[#40E0D0] magic-glow">REALM</span>
                                    </h1>
                                    <div className="logo-sub cyber-glow">Eternal Punk Edition</div>
                                </div>
                                {error && <div style={{color:'var(--danger)', fontSize:12, fontWeight:900, zIndex: 20}} className="glitch-text">⚠️ {error}</div>}
                                <div style={{width:'100%', zIndex: 20, marginBottom: '24px'}}>
                                    <input type="text" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} className="font-base" style={{marginBottom: '24px'}} />
                                    <input type="text" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} className="font-base" />
                                </div>
                                <button onClick={()=>{ window.unlockAudio(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-main panel-steam text-white font-base" style={{zIndex: 20}}>接続開始</button>
                            </div>
                        </div>
                    )}

                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="magic-ring-bg"></div>
                            <div className="panel glass-mixed hex-bg" style={{zIndex: 10, padding: '40px 30px', clipPath: 'polygon(0 30px, 30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%)', background: 'rgba(10,5,20,0.95)', border: 'none', boxShadow: '0 0 50px rgba(138,43,226,0.4), inset 0 0 30px rgba(212,175,55,0.2)'}}>
                                <div className="hud-frame" style={{borderColor: 'rgba(138,43,226,0.5)', boxShadow: 'inset 0 0 30px rgba(138,43,226,0.2)'}}>
                                    <div className="hud-corner hud-tl" style={{borderColor: '#8A2BE2', filter: 'drop-shadow(0 0 5px #8A2BE2)'}}></div>
                                    <div className="hud-corner hud-tr" style={{borderColor: '#8A2BE2', filter: 'drop-shadow(0 0 5px #8A2BE2)'}}></div>
                                    <div className="hud-corner hud-bl" style={{borderColor: '#8A2BE2', filter: 'drop-shadow(0 0 5px #8A2BE2)'}}></div>
                                    <div className="hud-corner hud-br" style={{borderColor: '#8A2BE2', filter: 'drop-shadow(0 0 5px #8A2BE2)'}}></div>
                                </div>
                                <div style={{textAlign:'center', zIndex: 20}}>
                                    <div className="blink-text font-cyber" style={{fontSize:16, color:'var(--accent)', fontWeight:900, marginBottom:8, letterSpacing:4}}>AWAITING LINKAGE...</div>
                                    <div style={{fontSize:40, color:'var(--steam-gold)', fontWeight:900, fontFamily:'Cinzel', letterSpacing: 4}} className="steam-glow font-base">ルームID: {room}</div>
                                </div>
                                <div className="waiting-list" style={{width:'100%', maxHeight:'300px', overflowY:'auto', zIndex: 20}}>
                                    {gs?.players?.map((p, idx) => (
                                        <div key={p.id} className="waiting-player" style={{clipPath: 'polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px))'}}>
                                            {idx === 0 && <div className="host-badge font-base">HOST</div>}
                                            <span style={{fontWeight:900, fontSize:18, color: p.isBot ? 'var(--steam-gold)' : '#fff', textShadow:'0 0 5px rgba(255,255,255,0.2)'}} className="font-base">
                                                {p.isBot ? '🤖' : '👤'} {p.name}
                                            </span>
                                            {!p.isBot && <div className="sync-dot"></div>}
                                        </div>
                                    ))}
                                    {[...Array(Math.max(0, 4 - (gs?.players?.length || 0)))].map((_, i) => (
                                        <div key={i} className="waiting-player empty" style={{clipPath: 'polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px))'}}>
                                            <span style={{fontSize:16, letterSpacing:1}} className="font-base">空きスロット</span>
                                        </div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div style={{display:'flex', width:'100%', marginTop: 10, zIndex: 20}}>
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="btn-sub panel-magic text-white font-base" style={{height: 60, marginRight: '15px'}}>CPU追加</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main panel-cyber text-[#40E0D0] font-base" disabled={gs?.players?.length < 2} style={{height: 60}}>ゲーム開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {joined && gs?.status === 'playing' && gs?.fieldCard && (
                        <div className="game-container">
                            <div className="turn-direction panel-cyber" style={{border: 'none', borderBottom: '2px solid var(--accent)'}}>
                                <span className="font-base">DIRECTION: <span style={{transform: gs?.isReversed ? 'rotate(180deg)' : 'rotate(0deg)', transition:'0.5s', display:'inline-block'}}>{gs?.isReversed ? '⟲' : '⟳'}</span> {gs?.isReversed ? 'REVERSE' : 'NORMAL'}</span>
                                <button onClick={toggleMute} className="mute-btn-game panel-steam" title="ミュート切替">{isMuted ? '🔇' : '🔊'}</button>
                            </div>
                            
                            {/* === 名前省略問題を解消した2段組レイアウト === */}
                            <div className="opponents-area glass-mixed">
                                {gs?.players?.map(p => (
                                    <div key={p.id} className={`opp-row ${gs?.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-name font-base">{p.isBot ? '🤖' : (p.id === socket?.id ? '⭐' : '👤')} {p.name}</div>
                                        <div className="opp-hand-visual">
                                            <div style={{fontWeight:900, color: 'var(--accent)', fontSize:18, textShadow: '0 0 5px var(--accent)', textAlign: 'left'}} className="font-base">{p?.handCount || 0}</div>
                                            <div className="mini-cards-stack">
                                                {[...Array(Math.max(0, Math.min(p?.handCount || 0, 5)))].map((_, i) => (<div key={i} className="mini-card-back" style={{left: `${i * 6}px`, zIndex: i}} />))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => {
                                    const nextRealms = getNextPlayableRealms();
                                    const isNext = nextRealms.includes(r) && r !== currentRealm;
                                    return (
                                        <div key={r} className={`cycle-item ${currentRealm === r ? 'active' : ''} ${isNext ? 'next-playable' : ''}`}>
                                            <div className={`cycle-dot ${currentRealm === r ? 'active' : ''} ${isNext ? 'next-playable' : ''}`} style={{'--dot-color': REALMS[r].color}}></div>
                                            <div className="cycle-label font-base">{REALMS[r].n}</div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="field">
                                <div style={{fontFamily:'Cinzel', fontSize: 16, opacity: 0.8, letterSpacing: '4px'}} className={isMyTurn ? 'text-[#40E0D0] cyber-glow font-base' : 'text-slate-500 font-base'}>{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                                {gs?.nextDrawAmount > 1 && <div style={{color: 'var(--danger)', fontWeight:900, fontSize:26, textShadow:'0 0 10px #f00'}} className="glitch-text font-base">DRAW +{gs.nextDrawAmount}</div>}
                                
                                <div style={{display:'flex', alignItems:'center', gap:20, position: 'relative'}}>
                                    {/* 究極魔法陣 & 演算リング */}
                                    <div className="field-magic-circle"></div>

                                    <div style={{position: 'relative', width: 'var(--card-w)', height: 'var(--card-h)'}}>
                                        {gs?.playHistory?.map((card, i) => (
                                            <div key={`hist-${i}-${card?.id || i}`} style={{ position: 'absolute', top: 0, left: 0, transform: `rotate(${(i * 5) % 10 - 5}deg) translate(${i*-1}px, ${i*-1}px)`, zIndex: i + 1, opacity: 0.35 }}>
                                                <CardView card={card} isField={true} />
                                            </div>
                                        ))}
                                        <div style={{ position: 'absolute', top: 0, left: 0, zIndex: 100 }}>
                                            <CardView card={gs?.fieldCard} isField={true} />
                                        </div>
                                    </div>
                                    <div className="info-panel glass-mixed" style={{borderLeft: 'none', borderRight: 'none'}}>
                                        <div className="realm-title font-base">{REALMS[currentRealm] ? REALMS[currentRealm].n : '???'}</div>
                                        <div style={{fontSize:12, opacity:0.8, marginTop:4, lineHeight:1.2}} className="font-base">{REALMS[currentRealm] ? REALMS[currentRealm].desc : ''}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="log-terminal-container">
                                <div className="log-terminal panel-cyber font-base">
                                    {gs?.logs?.map((log) => (
                                        <div key={log.id} className={`log-line ${log?.text?.includes('PLAY') ? 'play' : (log?.text?.includes('SYS') ? 'sys' : '')}`}>
                                            {log?.text}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="hand-container">
                                <div className="hand-flex">
                                    {(() => {
                                        const totalCards = sortedHand?.length || 0;
                                        const maxHandWidth = Math.min(windowWidth * 0.95, 550);
                                        const cardW = 90; let overlap = 55; 
                                        if (totalCards > 1) { const idealWidth = cardW + (totalCards - 1) * overlap; if (idealWidth > maxHandWidth) { overlap = (maxHandWidth - cardW) / (totalCards - 1); } }
                                        const containerW = totalCards > 0 ? cardW + (totalCards - 1) * overlap : 0;
                                        const marginL = overlap - cardW;
                                        return (
                                            <div style={{ display: 'flex', justifySelf: 'center', width: '100%', justifyContent: 'center' }}>
                                                <div style={{ display: 'flex', alignItems: 'flex-end', width: `${containerW}px`, position: 'relative' }}>
                                                    {sortedHand.map((card, index) => (
                                                        <CardView key={card?.id || index} card={card} playable={canPlay(card)} onClick={() => handlePlay(card)} index={index} style={{ marginLeft: index === 0 ? '0px' : `${marginL}px` }} />
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                            
                            <div className="action-row panel-steam" style={{borderBottom: 'none', borderLeft: 'none', borderRight: 'none', borderRadius: 0}}>
                                <div style={{textAlign:'center', fontSize:14, fontWeight:900, color:'var(--steam-gold)', letterSpacing: '2px'}} className="font-cyber steam-glow">
                                    SYNC: {sortedHand?.length || 0} / {gs?.handLimit || 10}
                                </div>
                                <button 
                                    className={`btn-main font-base ${isMyTurn ? 'panel-cyber text-[#40E0D0]' : 'bg-[#222] text-[#555]'}`}
                                    disabled={!isMyTurn} 
                                    onClick={(e)=>{ e.preventDefault(); handleDraw(); }} 
                                    onTouchEnd={(e)=>{ e.preventDefault(); handleDraw(); }}
                                >
                                    {gs?.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : (isMyTurn ? 'ドロー' : '待機中...')}
                                </button>
                            </div>
                        </div>
                    )}

                    {selectorCard && (
                        <div className="overlay" style={{zIndex: 100000}}>
                            <div className="panel panel-magic">
                                <h3 style={{fontSize:26, fontWeight:900, color:'#e2b0ff', fontFamily:'Cinzel Decorative', textAlign:'center', marginBottom: 10}} className="magic-glow font-base">属性を選択</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color, textShadow: `0 0 10px ${REALMS[r].color}`}} onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}>
                                            {ICONS[r]} <span className="font-base text-sm">{REALMS[r].n}</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} className="btn-sub bg-black/50 text-white border-white/30 font-base">キャンセル</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (() => {
                        const winner = gs?.players?.find(p => p.handCount === 0);
                        let resTitle = winner ? `${winner.name} WIN!` : "OVERLOAD";
                        return (
                            <div className="overlay">
                                <div className={`panel ${winner ? 'panel-cyber' : 'panel-steam'}`}>
                                    <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                    <h2 className={`font-base tracking-widest text-4xl font-black ${winner ? 'text-[#40E0D0] cyber-glow' : 'text-[#FF4500] glitch-text'}`} style={{textShadow: `0 0 20px ${winner ? 'var(--accent)' : 'var(--danger)'}`}}>{resTitle}</h2>
                                    <div style={{width:'100%'}} className="font-base">{gs?.players?.slice().sort((a,b) => (a?.handCount || 0) - (b?.handCount || 0)).map((p, i) => (
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'15px 10px', borderBottom:'1px solid rgba(255,255,255,0.1)', background: p.handCount === 0 ? 'rgba(64,224,208,0.1)' : 'transparent'}}>
                                            <span style={{fontWeight:900, fontSize: 18, color: p.handCount === 0 ? '#40E0D0' : '#fff'}}>#{i+1} {p.name} {p.id === socket.id && "(YOU)"}</span>
                                            <span style={{color: p.handCount === 0 ? '#40E0D0' : 'var(--steam-gold)', fontWeight:900, fontSize: 18}}>{p.handCount}枚</span>
                                        </div>
                                    ))}</div>
                                    <div style={{display: 'flex', width: '100%'}}>
                                        <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main panel-steam text-white font-base" style={{height: 60, marginRight: '10px'}}>再戦</button>
                                        <button onClick={() => window.location.reload()} className="btn-sub panel-cyber text-white font-base" style={{height: 60}}>終了</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
