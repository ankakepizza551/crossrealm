<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Aether Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --bg: #050505; 
            --card-w: 85px; 
            --card-h: 125px;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden; transition: background 1s ease;
        }

        .bg-aura {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, transparent 70%);
            opacity: 0.15; pointer-events: none; z-index: -1;
            transition: 1.5s ease;
        }

        .game-container { 
            display: flex; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; 
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; margin-bottom: 10px; }
        
        .card-wrapper { perspective: 1000px; transition: 0.3s; }
        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: #000; position: relative; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            overflow: hidden; cursor: pointer; transform-style: preserve-3d;
        }
        .card:hover { 
            transform: rotateY(15deg) rotateX(5deg) translateY(-20px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px var(--accent);
            border-color: var(--accent);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }

        .center-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 30px; }
        .main-field { position: relative; padding: 20px; border-radius: 50%; background: radial-gradient(circle, rgba(64,224,208,0.1) 0%, transparent 70%); }

        .btn { 
            padding: 12px 25px; border-radius: 30px; border: 1px solid var(--accent); background: transparent; 
            color: var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        .btn:disabled { opacity: 0.2; border-color: #444; color: #444; }

        .hand-container { padding: 20px; border-radius: 30px 30px 0 0; min-height: 160px; transition: 0.5s; }
        .my-turn-active { border-top: 1px solid var(--accent); background: linear-gradient(to top, rgba(64,224,208,0.05), transparent); }
        .hand-flex { display: flex; justify-content: center; margin-left: 30px; }
        .slot { margin-left: -30px; transition: 0.25s; }
        .slot:hover { transform: translateY(-30px); margin-right: 25px; z-index: 100 !important; }

        .badge { position: absolute; top: 6px; right: 6px; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .winner-text { font-size: 48px; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px var(--accent); margin-bottom: 10px; }
        .warning-text { color: #ff4444; font-weight: bold; font-size: 13px; position: absolute; top: -25px; width: 100%; text-align: center; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // サーバーのURLを自分のものに書き換えてください（例: https://xxx.onrender.com）
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', next: 'ICEAGE', desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', next: 'FOUNTAIN', desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', next: 'BATTERY', desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', next: 'MACHINE', desc: 'エネルギーが充填される。' },
            MACHINE: { n: '機械', color: '#ADFF2F', next: 'ARCHIVE', desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', next: 'GEAR', desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            // クラッシュ防止：gsとfieldCardが存在するかチェック
            const currentRealmColor = useMemo(() => {
                if (gs && gs.fieldCard && REALMS[gs.fieldCard.realm]) {
                    return REALMS[gs.fieldCard.realm].color;
                }
                return '#40E0D0'; // デフォルト色
            }, [gs]);

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const f = gs.fieldCard.realm;
                const h = c.realm;
                if (REALMS[h].w || REALMS[f].w) return true;
                if (c.realm === 'FOUNTAIN' && c.isSpecial && (f === 'ICEAGE' || f === 'FOUNTAIN')) return true;
                if (f === h) return (h === 'GEAR' || h === 'FOUNTAIN' || h === 'MACHINE');
                const cycle = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];
                const fIdx = cycle.indexOf(f);
                return (fIdx !== -1 && cycle[(fIdx + 1) % 6] === h);
            };

            const CardView = ({ card, disabled, onClick }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className="card-wrapper">
                        <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                            <img src={src} alt={card.realm} onError={(e) => { e.target.style.display='none'; e.target.parentNode.style.background='#222'; }} />
                            {card.isSpecial && card.realm === 'GEAR' && <div className="badge" style={{background:'#FF4500'}}>+2</div>}
                            {card.isSpecial && card.realm === 'FOUNTAIN' && <div className="badge" style={{background:'#00CED1'}}>WILD</div>}
                            {card.isSpecial && card.realm === 'MACHINE' && <div className="badge" style={{background:'#FFA500'}}>REV</div>}
                            <div className="card-ui" style={{borderTop:`2px solid ${REALMS[card.realm].color}`}}>{REALMS[card.realm].n}</div>
                        </div>
                    </div>
                );
            };

            if (gs?.status === 'finished') {
                const winner = gs.players.find(p => p.handCount === 0);
                const amIReady = gs.readyPlayers?.includes(socket.id);
                return (
                    <div className="result-overlay">
                        <div className="winner-text">{winner?.name} WIN</div>
                        <div style={{display:'flex', gap:'20px'}}>
                            <button className="btn" onClick={() => socket.emit('play-again', {roomId: room})} disabled={amIReady}>
                                {amIReady ? 'WAITING...' : 'RETRY'}
                            </button>
                            <button className="btn" style={{borderColor:'#444', color:'#888'}} onClick={() => {
                                socket.emit('leave-room', {roomId: room}); setJoined(false); setGs(null);
                            }}>EXIT</button>
                        </div>
                    </div>
                );
            }

            if (!joined) return (
                <div className="overlay" style={{background:'var(--bg)'}}>
                    <div className="bg-aura" style={{'--realm-color': '#40E0D0', opacity: 0.3}}></div>
                    <h1 style={{fontSize:'42px', letterSpacing:'12px', fontWeight:'900', color:'var(--accent)'}}>CROSS REALM</h1>
                    <input className="btn" style={{background:'#000', marginBottom:'15px', width:'240px', textAlign:'center'}} placeholder="名前" value={name} onChange={e=>setName(e.target.value)} />
                    <input className="btn" style={{background:'#000', marginBottom:'30px', width:'240px', textAlign:'center'}} placeholder="ルームID" value={room} onChange={e=>setRoom(e.target.value)} />
                    <button className="btn" style={{width:'240px', background:'var(--accent)', color:'#000'}} onClick={()=>{if(room && name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>LOGIN</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="glass-panel" style={{padding:'40px 60px'}}>
                        <h2>WAITING... ({gs?.players?.length || 0}/4)</h2>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && 
                            <button className="btn" style={{marginTop:'20px'}} onClick={()=>socket.emit('start-game',{roomId:room})}>START</button>
                        }
                    </div>
                </div>
            );

            const fieldInfo = REALMS[gs.fieldCard.realm];

            return (
                <div className="game-container" style={{'--realm-color': currentRealmColor}}>
                    <div className="bg-aura"></div>
                    <div className="top-bar glass-panel">
                        <div style={{fontSize:'12px', color:gs.isReversed?'orange':currentRealmColor, fontWeight:'bold'}}>
                            {gs.isReversed ? '◀ REVERSE' : 'NORMAL ▶'}
                        </div>
                        <div className="opponents">
                            {others.map(p => (
                                <div key={p.id} className={`opp-box glass-panel ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`} style={{padding: '5px 15px', borderColor: gs.currentTurnPlayerId === p.id ? currentRealmColor : 'transparent'}}>
                                    {p.name}: {p.handCount}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="center-stage">
                        <div className="info-panel glass-panel" style={{padding: '20px', width:'180px'}}>
                            <div style={{fontSize:'20px', color:currentRealmColor, fontWeight:'bold'}}>{fieldInfo.n}</div>
                            <p style={{fontSize:'11px', opacity:0.7}}>{fieldInfo.desc}</p>
                        </div>
                        <div className="main-field">
                            <div style={{transform:'scale(1.4)'}}><CardView card={gs.fieldCard} /></div>
                        </div>
                        <div className="info-panel glass-panel" style={{width:'150px', textAlign:'center', padding:'20px'}}>
                            <button className="btn" style={{width:'100%'}} onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                                {gs.nextDrawAmount > 1 ? `DRAW +${gs.nextDrawAmount}` : "DRAW"}
                            </button>
                        </div>
                    </div>

                    <div className={`hand-container ${isMyTurn ? 'my-turn-active' : ''}`}>
                        {gs.nextDrawAmount > 1 && isMyTurn && <div className="warning-text">MUST DRAW {gs.nextDrawAmount} CARDS</div>}
                        <div className="hand-flex">
                            {me.hand.map((c,i)=>(
                                <div key={c.id} className="slot" style={{zIndex:i}}>
                                    <CardView card={c} disabled={!canPlay(c)} onClick={()=>(c.realm==='PLANET'||(c.realm==='FOUNTAIN'&&c.isSpecial))?setSelectorCard(c):socket.emit('play-card',{roomId:room, card:c})}/>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* ポップアップ */}
                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay">
                            <div className="glass-panel" style={{padding:'30px'}}>
                                <h3>SELECT REALM</h3>
                                <div style={{display:'flex', flexWrap:'wrap', justifyContent:'center', maxWidth:'320px'}}>
                                    {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r=>(
                                        <button key={r} className="btn" style={{margin:'6px', borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={()=>{
                                            if(selectorCard) { socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }
                                            else { socket.emit('set-initial-realm',{roomId:room, chosenRealm:r}); }
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
