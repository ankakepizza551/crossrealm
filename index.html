<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical UI -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #40E0D0; --bg: #0d0d0d; --card-w: 80px; --card-h: 115px; --panel: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* レイアウト構造 */
        .game-container { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        /* ヘッダー・対戦相手 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--panel); border-radius: 10px; margin-bottom: 10px; }
        .opponents { display: flex; gap: 10px; justify-content: center; flex-grow: 1; }
        .opp-box { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 5px; font-size: 12px; border-left: 3px solid #666; }
        .opp-box.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.2); }

        /* 中央エリア */
        .center-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 20px; position: relative; }
        .info-panel { width: 180px; background: var(--panel); padding: 15px; border-radius: 10px; border: 1px solid #333; font-size: 13px; line-height: 1.6; }
        .info-panel h4 { margin: 0 0 8px 0; color: var(--accent); border-bottom: 1px solid #333; }

        /* カード・手札 */
        .card { width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 1px solid #444; background: #000; position: relative; transition: 0.2s; cursor: pointer; overflow: hidden; }
        .card.disabled { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 3px 0; text-align: center; font-size: 9px; }
        
        .hand-container { background: var(--panel); padding: 15px; border-radius: 15px 15px 0 0; position: relative; min-height: 140px; }
        .hand-container.my-turn { background: rgba(64, 224, 208, 0.08); box-shadow: inset 0 0 20px rgba(64, 224, 208, 0.2); }
        .hand-flex { display: flex; justify-content: center; margin-left: 30px; }
        .slot { margin-left: -30px; transition: 0.2s; }
        .slot:hover { transform: translateY(-25px); margin-right: 20px; z-index: 100 !important; }

        /* 共通部品 */
        .btn { padding: 10px 25px; border-radius: 20px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.3; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .badge { position: absolute; top: 4px; right: 4px; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: bold; }
        .warning-text { color: #ff4444; font-weight: bold; font-size: 14px; position: absolute; top: -25px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', can: true, desc: '【有利】氷河期に勝利。特殊カードで次のプレイヤーに+2枚ドロー。' },
            ICEAGE: { n: '氷河期', can: false, desc: '【有利】噴水に勝利。連続出しは不可。' },
            FOUNTAIN: { n: '噴水', can: true, desc: '【有利】バッテリーに勝利。特殊カードはワイルド属性として機能。' },
            BATTERY: { n: 'バッテリー', can: false, desc: '【有利】機械に勝利。連続出しは不可。' },
            MACHINE: { n: '機械', can: true, desc: '【有利】古文書に勝利。特殊カードで進行順を反転。' },
            ARCHIVE: { n: '古文書', can: false, desc: '【有利】歯車に勝利。連続出しは不可。' },
            PLANET: { n: '惑星', w: true, desc: '【ワイルド】どの属性にもなれる。' },
            RUINS: { n: '廃墟', w: true, desc: '【ワイルド】どの属性にもなれる。' }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                socket.on('game-over', (d) => alert("勝者: " + d.winnerName));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const f = gs.fieldCard.realm;
                const h = c.realm;
                if (REALMS[h].w || REALMS[f].w) return true;
                if (c.realm === 'FOUNTAIN' && c.isSpecial && (f === 'ICEAGE' || f === 'FOUNTAIN')) return true;
                if (f === h) return REALMS[h].can;
                const cycle = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];
                const fIdx = cycle.indexOf(f);
                return (fIdx !== -1 && cycle[(fIdx + 1) % 6] === h);
            };

            const CardView = ({ card, disabled, onClick, field = false }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                        <img src={src} alt={card.realm} />
                        {card.isSpecial && card.realm === 'GEAR' && <div className="badge" style={{background:'red'}}>+2</div>}
                        {card.isSpecial && card.realm === 'FOUNTAIN' && <div className="badge" style={{background:'blue'}}>WILD</div>}
                        {card.isSpecial && card.realm === 'MACHINE' && <div className="badge" style={{background:'orange'}}>REV</div>}
                        <div className="card-ui">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay">
                    <h1 style={{color:'var(--accent)', letterSpacing:'4px'}}>CROSS REALM</h1>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'10px', textAlign:'center'}} placeholder="名前" value={name} onChange={e=>setName(e.target.value)} /><br/>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'20px', textAlign:'center'}} placeholder="ルームID" value={room} onChange={e=>setRoom(e.target.value)} /><br/>
                    <button className="btn" onClick={()=>{if(room && name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>領域へ入る</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <h2>待機中... ({gs?.players?.length || 0}/4)</h2>
                    {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && <button className="btn" onClick={()=>socket.emit('start-game',{roomId:room})}>探索開始</button>}
                </div>
            );

            return (
                <div className="game-container">
                    {/* 上部：対戦相手の情報 */}
                    <div className="top-bar">
                        <div style={{fontSize:'12px', color:gs.isReversed?'orange':'var(--accent)'}}>{gs.isReversed?'◀ 反転中':'進行順 ▶'}</div>
                        <div className="opponents">
                            {others.map(p => (
                                <div key={p.id} className={`opp-box ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    {p.name}: {p.handCount}枚
                                </div>
                            ))}
                        </div>
                        <div style={{fontSize:'12px'}}>{isMyTurn ? 'あなたの番です' : '待機中'}</div>
                    </div>

                    {/* 中央：フィールドと説明 */}
                    <div className="center-stage">
                        <div className="info-panel">
                            <h4>現在の領域</h4>
                            <p><strong>{REALMS[gs.fieldCard.realm].n}</strong></p>
                            <p style={{fontSize:'11px', color:'#aaa'}}>{REALMS[gs.fieldCard.realm].desc}</p>
                        </div>

                        <div style={{transform:'scale(1.3)'}}>
                            <CardView card={gs.fieldCard} field={true} />
                        </div>

                        <div style={{width:'180px', textAlign:'left'}}>
                            <button className="btn" style={{width:'100%'}} onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                                {gs.nextDrawAmount > 1 ? `強制ドロー (+${gs.nextDrawAmount})` : "ドロー / パス"}
                            </button>
                        </div>
                    </div>

                    {/* 下部：自分の手札 */}
                    <div className={`hand-container ${isMyTurn ? 'my-turn' : ''}`}>
                        {gs.nextDrawAmount > 1 && isMyTurn && <div className="warning-text">ドロー累積中！回避するには「歯車(+2)」を出すしかありません。</div>}
                        <div className="hand-flex">
                            {me.hand.map((c,i)=>(
                                <div key={c.id} className="slot" style={{zIndex:i}}>
                                    <CardView card={c} disabled={!canPlay(c)} onClick={()=>(c.realm==='PLANET'||(c.realm==='FOUNTAIN'&&c.isSpecial))?setSelectorCard(c):socket.emit('play-card',{roomId:room, card:c})}/>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 属性選択ポップアップ */}
                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay">
                            <h3>次なる領域を選択</h3>
                            <div style={{display:'flex', flexWrap:'wrap', justifyContent:'center', maxWidth:'400px'}}>
                                {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r=>(
                                    <button key={r} className="choice-btn" onClick={()=>{
                                        if(selectorCard) { socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }
                                        else { socket.emit('set-initial-realm',{roomId:room, chosenRealm:r}); }
                                    }}>{REALMS[r].n}</button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
