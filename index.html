<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Ver 1.2 -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #40E0D0; --bg: #0d0d0d; --card-w: 85px; --card-h: 125px; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .overlay { position: fixed; inset: 0; background: rgba(13,13,13,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .card { width: var(--card-w); height: var(--card-h); border-radius: 10px; border: 2px solid #333; background: #000; position: relative; transition: 0.2s; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card.disabled { opacity: 0.15; filter: grayscale(0.9); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 4px 0; text-align: center; font-size: 10px; font-weight: bold; }
        .badge { position: absolute; top: 5px; right: 5px; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 10; }
        .hand-area { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: center; padding-left: 35px; }
        .slot { margin-left: -35px; transition: 0.25s; }
        .slot:hover { transform: translateY(-30px); margin-right: 25px; z-index: 100 !important; }
        .btn { padding: 12px 30px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .choice-btn { margin: 6px; padding: 10px 18px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: white; cursor: pointer; }
        .warning { color: #ff4444; font-weight: bold; font-size: 18px; margin-bottom: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', can: true }, ICEAGE: { n: '氷河期', can: false },
            FOUNTAIN: { n: '噴水', can: true }, BATTERY: { n: 'バッテリー', can: false },
            MACHINE: { n: '機械', can: true }, ARCHIVE: { n: '古文書', can: false },
            PLANET: { n: '惑星', w: true }, RUINS: { n: '廃墟', w: true }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                socket.on('game-over', (d) => alert("Winner: " + d.winnerName));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const f = gs.fieldCard.realm;
                const h = c.realm;
                if (REALMS[h].w || REALMS[f].w) return true;
                if (c.realm === 'FOUNTAIN' && c.isSpecial && (f === 'ICEAGE' || f === 'FOUNTAIN')) return true;
                if (f === h) return REALMS[h].can;
                const cycle = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];
                const fIdx = cycle.indexOf(f);
                return (fIdx !== -1 && cycle[(fIdx + 1) % 6] === h);
            };

            const CardView = ({ card, disabled, onClick, field = false }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                        <img src={src} alt={card.realm} />
                        {card.isSpecial && card.realm === 'GEAR' && <div className="badge" style={{background:'red'}}>+2</div>}
                        {card.isSpecial && card.realm === 'FOUNTAIN' && <div className="badge" style={{background:'blue'}}>WILD</div>}
                        {card.isSpecial && card.realm === 'MACHINE' && <div className="badge" style={{background:'orange'}}>REV</div>}
                        <div className="card-ui">{field ? `FIELD: ${REALMS[card.realm].n}` : REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay">
                    <h1 style={{color:'var(--accent)'}}>CROSS REALM</h1>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'10px', textAlign:'center'}} placeholder="NAME" value={name} onChange={e=>setName(e.target.value)} /><br/>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'20px', textAlign:'center'}} placeholder="ROOM ID" value={room} onChange={e=>setRoom(e.target.value)} /><br/>
                    <button className="btn" onClick={()=>{if(room && name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>ENTER</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <h2>WAITING ({gs?.players?.length || 0}/4)</h2>
                    {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && <button className="btn" onClick={()=>socket.emit('start-game',{roomId:room})}>START</button>}
                </div>
            );

            return (
                <div style={{textAlign:'center', paddingTop:'40px'}}>
                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay">
                            <h3>SELECT REALM</h3>
                            {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r=>(
                                <button key={r} className="choice-btn" onClick={()=>{
                                    if(selectorCard) { socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }
                                    else { socket.emit('set-initial-realm',{roomId:room, chosenRealm:r}); }
                                }}>{REALMS[r].n}</button>
                            ))}
                        </div>
                    )}
                    <div style={{fontSize:'12px', color:gs.isReversed?'orange':'#44ff44', marginBottom:'10px'}}>{gs.isReversed?'◀ REVERSE':'NORMAL ▶'}</div>
                    {gs.nextDrawAmount > 1 && isMyTurn && <div className="warning">WARNING: +{gs.nextDrawAmount}!</div>}
                    <div style={{margin:'10px auto', display:'inline-block', transform:'scale(1.1)'}}><CardView card={gs.fieldCard} field={true} /></div>
                    <div style={{marginTop:'30px'}}>
                        <button className="btn" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn || gs.needsInitialChoice}>
                            {gs.nextDrawAmount > 1 ? `TAKE ${gs.nextDrawAmount} CARDS` : "DRAW / PASS"}
                        </button>
                    </div>
                    <div className="hand-area">
                        {me.hand.map((c,i)=>(
                            <div key={c.id} className="slot" style={{zIndex:i}}>
                                <CardView card={c} disabled={!canPlay(c)} onClick={()=>(c.realm==='PLANET'||(c.realm==='FOUNTAIN'&&c.isSpecial))?setSelectorCard(c):socket.emit('play-card',{roomId:room, card:c})}/>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
