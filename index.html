<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross Realm - Omega Singularity v128.0 CLASSIC UI</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg-deep: #020208; 
            --card-w: clamp(48px, 14vw, 74px); 
            --card-h: calc(var(--card-w) * 1.4); 
        }
        body { 
            margin: 0; background: #000; color: white; font-family: 'Exo 2', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; overflow: hidden; 
        }

        /* === アニメーション === */
        @keyframes flow-border-nova { 0% { border-color: var(--steam-gold); box-shadow: 0 0 15px var(--steam-gold); } 33% { border-color: var(--magic-purple); box-shadow: 0 0 15px var(--magic-purple); } 66% { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); } 100% { border-color: var(--steam-gold); box-shadow: 0 0 15px var(--steam-gold); } }
        @keyframes logo-shine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes emblem-pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1) drop-shadow(0 0 15px var(--accent)); } 50% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.3) drop-shadow(0 0 35px var(--accent)); } }
        @keyframes draw-pulse { 0%, 100% { filter: brightness(1); box-shadow: 0 0 15px var(--steam-gold); } 50% { filter: brightness(1.3); box-shadow: 0 0 30px var(--steam-gold); } }
        @keyframes gear-roll { 0% { transform: translate(var(--sx), var(--sy)) rotate(0deg); opacity: 0; } 5% { opacity: var(--op); } 95% { opacity: var(--op); } 100% { transform: translate(var(--ex), var(--ey)) rotate(var(--rot)); opacity: 0; } }
        @keyframes magic-mega-zoom { 0% { transform: translate(var(--sx), -300px) scale(0.3) rotate(0deg); opacity: 0; } 20% { opacity: var(--op); } 80% { opacity: var(--op); } 100% { transform: translate(var(--ex), 120vh) scale(4.5) rotate(var(--rot)); opacity: 0; } }
        @keyframes rotate-inner { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-outer { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes pulse-shimmer { 0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); transform: scale(1); } 50% { opacity: 1; filter: drop-shadow(0 0 8px #fff) brightness(1.5); transform: scale(1.1); color: #fff; } }

        /* === 究極のカードエフェクト用アニメーション (維持) === */
        @keyframes steam-rise-heavy {
            0% { transform: translateY(30%) translateX(var(--drift-start)) scale(0.5) rotate(0deg); opacity: 0; filter: blur(4px); }
            15% { opacity: 0.85; filter: blur(6px); }
            100% { transform: translateY(-130%) translateX(var(--drift-end)) scale(4) rotate(var(--rot)); opacity: 0; filter: blur(15px); }
        }
        @keyframes ripple-expand { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
        @keyframes cyber-glitch-color {
            0%, 94%, 100% { filter: none; transform: translate(0); }
            95% { filter: drop-shadow(-3px 0 #ff00ea) drop-shadow(3px 0 #00ffff); transform: translate(2px, -0.5px); }
            97% { filter: drop-shadow(2px 0 #ff0000) drop-shadow(-2px 0 #00ff00); transform: translate(-2px, 0.5px); }
            99% { filter: brightness(1.8); }
        }
        @keyframes cyber-scanline { from { transform: translateY(-100%); } to { transform: translateY(100%); } }
        @keyframes void-pulse-wave { 0%, 100% { transform: scale(1); opacity: 0.2; filter: blur(5px); } 50% { transform: scale(1.4); opacity: 0.5; filter: blur(12px); } }

        .screen-wrapper { 
            width: 100vw; height: 100vh; height: 100dvh; max-width: 480px; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            background: #000; border: 4px solid var(--accent); animation: flow-border-nova 10s infinite ease-in-out;
        }

        .astral-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; background: #000; }
        .matrix-code-canvas { position: absolute; inset: 0; z-index: 2; opacity: 0.5; pointer-events: none; mix-blend-mode: screen; }
        .flow-gear { position: absolute; top: 0; left: 0; animation: gear-roll var(--dur) linear infinite; opacity: 0; z-index: 3; filter: drop-shadow(0 0 10px var(--glow-color)) drop-shadow(0 0 5px var(--glow-color)); }
        .flow-magic { position: absolute; top: 0; left: 0; animation: magic-mega-zoom var(--dur) ease-in-out infinite; opacity: 0; z-index: 3; filter: drop-shadow(0 0 25px var(--glow-color)); }

        .ui-viewport { position: relative; z-index: 100; width: 100%; height: 100%; display: flex; flex-direction: column; pointer-events: auto; overflow-y: auto; overflow-x: hidden; }

        .volume-btn-fixed { position: absolute; left: 12px; top: 40%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; border: 2.5px solid var(--accent); display: flex; justify-content: center; align-items: center; color: var(--accent); background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); cursor: pointer; z-index: 950; transition: 0.3s; }

        /* === トップ画面 (シンプルUIへ回帰) === */
        .top-logo-area { position: relative; width: 100%; height: 260px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1rem; }
        .emblem-bg-layer { position: absolute; top: 50%; left: 50%; width: 220px; height: 220px; z-index: 1; animation: emblem-pulse 8s infinite ease-in-out; pointer-events: none; opacity: 0.9; }
        .logo-text-layer { position: relative; z-index: 10; text-align: center; }
        .main-logo-text { font-family: 'Cinzel', serif; font-weight: 950; font-size: clamp(2.5rem, 10vw, 3.6rem); line-height: 0.85; background: linear-gradient(90deg, #fff, var(--steam-gold), #fff, var(--magic-purple), #fff, var(--accent), #fff); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: logo-shine 6s linear infinite; letter-spacing: 12px; filter: drop-shadow(0 0 10px rgba(0,0,0,1)); }
        
        .trinity-flavor-box { background: rgba(0,0,0,0.92); border: 1.5px solid rgba(255,255,255,0.25); border-left: 6px solid var(--accent); padding: 1.2rem; border-radius: 4px 14px 14px 4px; margin: 0 1.5rem 1.2rem; box-shadow: 0 20px 60px rgba(0,0,0,1); text-align: center; backdrop-filter: blur(10px); flex-shrink: 0; }
        .f-steam { font-family: 'Special Elite', cursive; color: var(--steam-gold); font-size: 1.1rem; text-shadow: 0 0 8px var(--steam-gold); }
        .f-fantasy { font-family: 'Cinzel Decorative', cursive; color: var(--magic-purple); font-size: 1.2rem; text-shadow: 0 0 10px var(--magic-purple); }
        .f-cyber { font-family: 'Orbitron', sans-serif; color: var(--accent); font-size: 1rem; font-weight: 950; text-shadow: 0 0 10px var(--accent); }

        .input-wrap { position: relative; width: 100%; margin-bottom: 1rem; padding: 0 2rem; display: flex; flex-direction: column; flex-shrink: 0; }
        .input-wrap::before { content: ''; position: absolute; left: 2rem; top: 0; width: 4px; height: 100%; background: var(--accent); box-shadow: 0 0 12px var(--accent); z-index: 10; }
        .input-label-tech { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-bottom: 6px; padding-left: 14px; text-transform: uppercase; }
        .input-field-nova { width: 100%; padding: 14px 16px 14px 26px; background: rgba(0,0,0,0.95) !important; border: 1px solid rgba(255,255,255,0.2); color: #fff !important; font-weight: 900; font-size: 1.2rem; outline: none; border-radius: 2px; }

        .system-status-bar { margin-top: auto; padding: 14px 24px; border-top: 2px solid rgba(255,255,255,0.15); font-family: 'Orbitron', sans-serif; font-size: 11px; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); width: 100%; flex-shrink: 0; }
        .status-tag { color: #fff; background: var(--accent); padding: 2px 8px; border-radius: 2px; font-weight: 900; animation: pulse-shimmer 1.5s infinite; }

        /* 待機画面 */
        .waiting-room-list { overflow-y: auto; max-height: 48vh; padding: 4px; margin: 0 1.2rem 10px 80px; flex-shrink: 0; } 
        .waiting-slot-box { background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 6px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; min-height: 56px; box-shadow: 0 8px 25px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .waiting-slot-box.active { border-left: 8px solid var(--accent); border-color: rgba(64,224,208,0.8); }
        .waiting-name { font-weight: 950; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

        /* === HUD (シンプルUIへ回帰) === */
        .player-hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px 8px; background: rgba(0,0,0,0.95); border-bottom: 2.5px solid rgba(255,255,255,0.15); flex-shrink: 0; }
        .player-slot { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; padding: 4px 10px; position: relative; height: 52px; display: flex; flex-direction: column; justify-content: center; }
        .player-slot.active { background: rgba(255,255,255,0.15); border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .player-slot.eliminated { filter: grayscale(100%) brightness(0.4); border-color: var(--danger); overflow: hidden; }
        
        .p-info-count { font-size: 18px; font-weight: 1000; color: #fff; font-family: 'Orbitron'; line-height: 1; margin-top: 1px; }
        .p-info-name { font-size: 10px; font-weight: 900; opacity: 0.9; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 75%; }
        .eliminated-tag { position: absolute; inset: 0; background: rgba(255,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 1000; color: var(--danger); letter-spacing: 4px; transform: rotate(-5deg); text-shadow: 0 0 10px #000; z-index: 20; }
        
        /* 手札アイコン: 元の控えめな重なりに戻す */
        .hand-stack-visual { position: absolute; top: 8px; right: 28px; width: 14px; height: 20px; z-index: 10; opacity: 0.9; }

        /* 凡例バー */
        .realm-legend-nav { display: flex !important; flex-direction: row !important; justify-content: space-around !important; background: rgba(0,0,0,0.95); border-bottom: 1.5px solid rgba(255,255,255,0.15); padding: 8px 2px; flex-shrink: 0; width: 100%; height: auto; align-items: center; z-index: 10; }
        .legend-label { font-size: 11px; font-weight: 950; color: rgba(255,255,255,0.3); white-space: nowrap; margin-bottom: 4px; transition: 0.3s; }
        .legend-label.playable { animation: pulse-shimmer 1.5s infinite ease-in-out; color: var(--accent); }
        .legend-underline { width: 80%; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .legend-underline.playable-light { box-shadow: 0 0 8px var(--r-color); background: rgba(255,255,255,0.2); }
        .legend-underline.active { background: var(--r-color) !important; box-shadow: 0 0 10px var(--r-color), 0 0 5px #fff; }

        /* フィールド */
        .field-main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; padding: 5px 0; min-height: 160px; flex-shrink: 0; z-index: 5; }
        .tactical-cycle-wheel { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 160px; height: 160px; opacity: 0.95; pointer-events: none; z-index: 100; overflow: visible; }
        .field-kanji-text { font-size: 48px; font-weight: 1000; letter-spacing: 12px; margin-top: 10px; text-shadow: 0 0 40px var(--r-color); font-family: 'Cinzel Decorative', serif; }

        /* ログ */
        .tactical-log-box { width: 94%; margin: 2px auto 4px; background: rgba(0,0,0,0.95); border: 1.5px solid rgba(255,255,255,0.2); border-left: 5px solid var(--accent); height: 56px; border-radius: 4px; padding: 4px 12px; overflow-y: auto; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .log-entry { font-size: 11px; font-weight: 800; color: rgba(255,255,255,1); margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* === 手札とホバーアクション === */
        .hand-container { display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; justify-content: center !important; align-items: flex-end !important; width: 100%; padding: 15px 10px 10px; overflow-x: auto; background: rgba(0,0,0,0.7); border-top: 1.5px solid rgba(255,255,255,0.15); min-height: 125px; flex-shrink: 0; }
        
        .card-anchor { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; pointer-events: auto; margin-right: -10px; flex-shrink: 0; position: relative; }
        @media (hover: hover) { 
            .card-anchor.playable:hover { transform: translateY(-10px) scale(1.05); z-index: 500; filter: brightness(1.15); margin-right: -5px; margin-left: -5px; } 
        }
        
        .card-anchor.not-playable { opacity: 0.45 !important; filter: grayscale(60%) brightness(0.65) !important; transform: scale(0.95); pointer-events: none !important; cursor: default; }
        .card-anchor.is-my-turn.playable { pointer-events: auto; }
        .card-anchor.selected { transform: translateY(-20px) scale(1.15); z-index: 500; filter: brightness(1.25); border: 2.5px solid #fff; border-radius: 8px; margin-right: 15px; margin-left: 15px; }

        /* ドローボタン */
        .draw-action-footer { width: 100%; padding: 0 10px 10px; flex-shrink: 0; }
        .btn-mega-draw { width: 100%; height: 60px; background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); color: #000; font-weight: 1000; font-size: 22px; letter-spacing: 8px; clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); cursor: pointer; transition: 0.3s; }
        .btn-mega-draw:not(:disabled) { animation: draw-pulse 3s infinite ease-in-out; }
        .btn-mega-draw:disabled { background: #1a1a1a; color: #444; filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; clip-path: none; border: 1px solid #333; animation: none; }

        /* === 究極のカード装飾・エフェクト統合 (ここだけ維持) === */
        .card-content { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: inherit; }
        
        .mat-steam { background: radial-gradient(circle at 50% 0%, var(--r-color-bright) 0%, #1a0f05 100%); border: calc(var(--card-w)*0.07) solid #3d2616; border-radius: 8px; box-shadow: 0 15px 40px #000; overflow: hidden; }
        .steam-rivet { position: absolute; width: 5px; height: 5px; background: #2a1a10; border-radius: 50%; box-shadow: inset 1px 1px 2px #fff3, 1px 1px 4px #000; z-index: 10; }
        .r-tl { top: 4px; left: 4px; } .r-tr { top: 4px; right: 4px; } .r-bl { bottom: 4px; left: 4px; } .r-br { bottom: 4px; right: 4px; }
        .steam-particle { position: absolute; bottom: -20px; left: var(--l); width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.3) 50%, transparent 70%); border-radius: 50%; animation: steam-rise-heavy var(--d) infinite ease-in; animation-delay: var(--delay); mix-blend-mode: screen; }
        .steam-core-glow { position: absolute; bottom: -5px; left: 0; width: 100%; height: 20px; background: linear-gradient(to top, rgba(255,255,255,0.25), transparent); filter: blur(8px); z-index: 2; }
        
        .mat-fantasy { background: radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%); border: calc(var(--card-w)*0.02) solid rgba(255,255,255,0.9); border-radius: 35% 10% !important; box-shadow: 0 0 40px var(--r-color-glow); overflow: hidden; }
        .ripple { position: absolute; top: 50%; left: 50%; width: 180px; height: 180px; border: 4px solid rgba(255,255,255,0.6); border-radius: 50%; animation: ripple-expand 4s infinite cubic-bezier(0.165, 0.84, 0.44, 1); animation-delay: var(--delay); opacity: 0; }
        .magic-circle-bg { position: absolute; top: 55%; left: 50%; width: 140px; height: 140px; transform: translate(-50%, -50%); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 1; animation: rotate-inner 25s linear infinite; }

        .mat-cyber { background: #000; border: none; clip-path: polygon(0 15%, 15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%); box-shadow: inset 0 0 80px var(--r-color-dim); border-left: calc(var(--card-w)*0.06) solid var(--r-color); animation: cyber-glitch-color 4s infinite; overflow: hidden; }
        .cyber-fx-scanline { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: linear-gradient(to bottom, transparent 0%, rgba(64,224,208,0.12) 50%, transparent 100%); background-size: 100% 50px; animation: cyber-scanline 1.6s linear infinite; }
        .cyber-circuit { position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0); background-size: 12px 12px; }

        .mat-void-planet, .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); border-radius: 50% !important; box-shadow: 0 0 30px #fff2; overflow: hidden; border: none; }
        .void-fluctuation { position: absolute; inset: 0; background: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 10px, rgba(255,255,255,0.04) 11px, rgba(255,255,255,0.04) 12px); animation: void-pulse-wave 8s infinite ease-in-out; }
        .void-singularity-ring { position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; transform: translate(-50%, -50%); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 50%; }

        .card-info-top { position: absolute; top: 6%; left: 6%; padding: 3% 8%; background: #000; border-left: calc(var(--card-w)*0.04) solid var(--r-color); z-index: 50; border-radius: 1px; }
        .card-info-top span { font-size: calc(var(--card-w)*0.068); font-weight: 950; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .card-footer-peak { position: absolute; bottom: 0; width: 100%; padding: 25% 0 12%; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); text-align: center; color: #fff; z-index: 50; font-weight: 900; font-size: calc(var(--card-w)*0.16); text-shadow: 0 0 15px var(--r-color); }
        .special-badge-base { position: absolute; left: -8px; top: 38%; background: linear-gradient(90deg, #e60000, #800000); border: 1.5px solid #FFF; color: #FFF; font-size: 8px; font-weight: 1000; padding: 4px 8px; text-align: center; border-radius: 3px 8px 8px 3px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 200; line-height: 1.1; text-transform: uppercase; letter-spacing: 0.5px; transform: rotate(-4deg); }

        /* リザルト画面 */
        .result-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.99); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(25px); overflow-y: auto; overflow-x: hidden; }
        .result-title { font-family: 'Cinzel', serif; font-size: clamp(1rem, 7vw, 2.2rem); font-weight: 950; letter-spacing: 0px; color: var(--steam-gold); margin-bottom: 1.5rem; text-shadow: 0 0 25px var(--steam-gold); width: 100%; text-align: center; line-height: 1.1; overflow-wrap: break-word; max-width: 100%; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        // === 定数 ===
        const REALMS = {
            GEAR:    { n: '歯車', color: '#FF8C00', bright: '#FFD700', glow: 'rgba(255,140,0,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#FF3131', bright: '#FF6347', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#87CEFA', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(173,252,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#E2B0FF', bright: '#DDA0DD', glow: 'rgba(226,176,255,1)', dim: 'rgba(226,176,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#ADFF2F', bright: '#7FFF00', glow: 'rgba(173,255,47,1)', dim: 'rgba(173,255,47,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#F0F8FF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#CCCCCC', bright: '#D3D3D3', glow: 'rgba(204,204,204,1)', theme: 'void-ruins', font: 'Audiowide' }

        const MatrixSequentialRain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); let animationId;
                const updateSize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                updateSize();
                const fontSize = 16; const columns = Math.floor(canvas.width / fontSize);
                const heads = new Array(columns).fill(0).map(() => Math.floor(Math.random() * (canvas.height / fontSize)));
                
                // 背景マトリックスも以前のシンプルな色味(緑・紫)に戻す
                const draw = () => {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = `900 ${fontSize}px Orbitron`;
                    for (let i = 0; i < columns; i++) {
                        if (Math.random() > 0.96) {
                            const x = i * fontSize; const y = heads[i] * fontSize;
                            ctx.fillStyle = Math.random() > 0.5 ? '#00FF00' : '#AA00FF';
                            ctx.fillText(Math.floor(Math.random()*2).toString(), x, y);
                            heads[i]++; if (heads[i] * fontSize > canvas.height && Math.random() > 0.98) heads[i] = 0;
                        }
                    }
                    animationId = requestAnimationFrame(draw);
                };
                draw();
                window.addEventListener('resize', updateSize);
                return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', updateSize); };
            }, []);
            return <canvas ref={canvasRef} className="matrix-code-canvas" />;
        };

        // === SE再生機能 (三位一体シンセサイザーは好評なので維持) ===
        let audioCtx = null;
        const playSE = (type, muted) => {
            if (muted) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const now = audioCtx.currentTime;
                
                if (type === 'play') {
                    const oscC = audioCtx.createOscillator(); const gainC = audioCtx.createGain();
                    oscC.connect(gainC); gainC.connect(audioCtx.destination); oscC.type = 'square';
                    oscC.frequency.setValueAtTime(800, now); oscC.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gainC.gain.setValueAtTime(0.1, now); gainC.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    oscC.start(now); oscC.stop(now + 0.1);

                    const oscF = audioCtx.createOscillator(); const gainF = audioCtx.createGain();
                    oscF.connect(gainF); gainF.connect(audioCtx.destination); oscF.type = 'sine';
                    oscF.frequency.setValueAtTime(1200, now); oscF.frequency.linearRampToValueAtTime(2000, now + 0.2);
                    gainF.gain.setValueAtTime(0, now); gainF.gain.linearRampToValueAtTime(0.15, now + 0.05); gainF.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    oscF.start(now); oscF.stop(now + 0.2);

                } else if (type === 'draw') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
                    osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                    
                    const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(300, now + 0.03); osc2.frequency.exponentialRampToValueAtTime(50, now + 0.08);
                    gain2.gain.setValueAtTime(0, now); gain2.gain.setValueAtTime(0.1, now + 0.03); gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc2.start(now + 0.03); osc2.stop(now + 0.08);

                } else if (type === 'start') {
                    const oscS = audioCtx.createOscillator(); const gainS = audioCtx.createGain();
                    oscS.connect(gainS); gainS.connect(audioCtx.destination); oscS.type = 'sawtooth';
                    oscS.frequency.setValueAtTime(50, now); oscS.frequency.linearRampToValueAtTime(100, now + 0.5);
                    gainS.gain.setValueAtTime(0.2, now); gainS.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscS.start(now); oscS.stop(now + 0.5);

                    const oscC = audioCtx.createOscillator(); const gainC = audioCtx.createGain();
                    oscC.connect(gainC); gainC.connect(audioCtx.destination); oscC.type = 'square';
                    oscC.frequency.setValueAtTime(200, now + 0.1); oscC.frequency.exponentialRampToValueAtTime(800, now + 0.6);
                    gainC.gain.setValueAtTime(0, now); gainC.gain.setValueAtTime(0.1, now + 0.1); gainC.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    oscC.start(now + 0.1); oscC.stop(now + 0.6);

                } else if (type === 'cancel') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                    
                    const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.type = 'square';
                    osc2.frequency.setValueAtTime(160, now);
                    osc2.frequency.exponentialRampToValueAtTime(85, now + 0.25);
                    gain2.gain.setValueAtTime(0.1, now); gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc2.start(now); osc2.stop(now + 0.25);
                }
            } catch (e) {
                console.error("Audio play failed", e);
            }
        };

        const AstralBackground = () => {
            const items = useMemo(() => {
                const arr = [];
                for(let i=0; i<5; i++) arr.push({ id: `m${i}`, type: 'magic', color: i%2?'#00F3FF':'#1E90FF', sx: `${(Math.random()*60)-30}vw`, ex: `${(Math.random()*20)-10}vw`, delay: `${Math.random()*20}s`, dur: `${16+Math.random()*12}s`, op: 0.4, rot: `${360+Math.random()*720}deg` });

            return (

                        if (it.type === 'gear') {
                            return (
                                <div key={it.id} className="flow-gear" style={{ '--sx': it.sx, '--ex': it.ex, '--sy': it.sy, '--ey': it.ey, '--delay': it.delay, '--dur': it.dur, '--op': it.op, '--rot': it.rot, '--glow-color': it.color, width: '150px', height: '150px', animationDelay: it.delay }}>
                                    <GearSVG color={it.color} />
                                </div>
                            );
                        } else {
                            return (
                                <div key={it.id} className="flow-magic" style={{ '--sx': it.sx, '--ex': it.ex, '--delay': it.delay, '--dur': it.dur, '--op': it.op, '--rot': it.rot, '--glow-color': it.color, width: '130px', height: '130px', animationDelay: it.delay }}>
                                    <MagicCircleSVG color={it.color} />
                                </div>
                            );
                        }
                    })}
                </div>
            );
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selector, setSelector] = useState(null);
            const [muted, setMuted] = useState(false);
            const [selectedCardId, setSelectedCardId] = useState(null);
            const logContainerRef = useRef(null);

            useEffect(() => {
                socket.on('update-game', setGs);
                return () => socket.off('update-game');
            }, []);

            useEffect(() => { if (logContainerRef.current) logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight; }, [gs?.logs]);
            useEffect(() => { setSelectedCardId(null); }, [gs?.currentTurnPlayerId]);

            const currentR = gs?.fieldCard?.realm || 'GEAR';
            const me = gs?.players.find(p => p.id === socket?.id);
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && !me?.isEliminated;

            const sortedHand = useMemo(() => {
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => (SORT_WEIGHT[a.realm]-SORT_WEIGHT[b.realm]) || (b.isSpecial-a.isSpecial));
            }, [me?.hand]);

            const playableRealms = useMemo(() => {
                if (!gs?.fieldCard) return [];
                const checkSim = (r) => {
                    const h = r; const f = gs.fieldCard.realm;
                    if (h === 'PLANET' || h === 'RUINS' || f === 'PLANET' || f === 'RUINS') return true;
                    if (h === 'FOUNTAIN' && gs.fieldCard.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                    if (['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(f) && f === h) return false;
                    return f === h || (NEXT_MAP[f] && NEXT_MAP[f].includes(h));
                };
                return Object.keys(REALMS).filter(r => checkSim(r));
            }, [gs?.fieldCard]);

            const sortedResultPlayers = useMemo(() => {
                if (!gs?.players) return [];
                return [...gs.players].sort((a,b) => {
                    if (a.isEliminated && !b.isEliminated) return 1;
                    if (!a.isEliminated && b.isEliminated) return -1;
                    return a.handCount - b.handCount;
                });
            }, [gs?.players]);

            useEffect(() => {
                const initAudio = () => {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    document.removeEventListener('click', initAudio);
                    document.removeEventListener('touchstart', initAudio);
                };
                document.addEventListener('click', initAudio);
                document.addEventListener('touchstart', initAudio);
                return () => {
                    document.removeEventListener('click', initAudio);
                    document.removeEventListener('touchstart', initAudio);
                };
            }, []);

            const join = () => { if(room && name) { playSE('start', muted); setJoined(true); socket.emit('join-room', { roomId: room.toUpperCase(), playerName: name }); } };
            const leave = () => { if (room) { playSE('cancel', muted); socket.emit('leave-room', { roomId: room.toUpperCase() }); setJoined(false); setGs(null); } };

            const goToTopPage = () => {
                playSE('cancel', muted);
                if (room) socket.emit('leave-room', { roomId: room.toUpperCase() });
                window.location.reload();
            };

            const handleCardClick = (c, isPlayable) => {
                if (!isMyTurn || !isPlayable) return;
                playSE('play', muted);
                const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                if (!isMobile) {
                    if (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial)) setSelector(c);
                    else socket.emit('play-card', { roomId: room, card: c });
                } else {
                    if (selectedCardId === c.id) {
                        if (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial)) setSelector(c);
                        else socket.emit('play-card', { roomId: room, card: c });
                        setSelectedCardId(null);
                    } else { setSelectedCardId(c.id); }
                }
            };

            const canPlayCheck = (room, card) => {
                if (!room || !card || !room.fieldCard) return false;
                if (room.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const field = room.fieldCard.realm; const h = card.realm;
                if (h === 'PLANET' || h === 'RUINS' || field === 'PLANET' || field === 'RUINS') return true;
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                if (['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(field) && field === h) return false;
                return field === h || (NEXT_MAP[field] && NEXT_MAP[field].includes(h));
            };

            return (
                <div className="screen-wrapper" style={{'--r-color': REALMS[currentR]?.color}}>
                    <AstralBackground />
                    <div className="ui-viewport">
                        <div className="volume-btn-fixed" onClick={() => setMuted(!muted)}>
                            {muted ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5 opacity-40"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" /></svg> : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" /></svg>}
                        </div>

                        {!joined ? (
                            <div className="h-full flex flex-col items-center justify-center overflow-y-auto no-scrollbar">
                                <div className="top-logo-area">
                                    <div className="emblem-bg-layer"><SingularityEmblem /></div>
                                    <div className="logo-text-layer">
                                        <div className="main-logo-text">CROSS</div>
                                        <div className="main-logo-text" style={{fontSize:'3.2rem', marginTop:'-0.5rem'}}>REALM</div>
                                        <div className="text-accent font-['Audiowide'] text-[0.85rem] mt-2 tracking-[6px] animate-pulse">- OMEGA SINGULARITY -</div>
                                    </div>
                                </div>
                                <div className="trinity-flavor-box">
                                    <div className="flavor-line">
                                        <span className="f-steam">真鍮</span><span className="text-white/80 font-black">の爆鳴、</span>
                                        <span className="f-fantasy">星界</span><span className="text-white/80 font-black">の共鳴、</span>
                                        <span className="f-cyber">電脳</span><span className="text-white/80 font-black">の火花。</span>
                                    </div>
                                    <div className="mt-2"><span className="text-white/70 font-black text-[0.8rem]">次元の境界は消失し、特異点へと収束する。</span></div>
                                </div>
                                <div className="space-y-4 w-full px-4">
                                    <div className="input-wrap">
                                        <label className="input-label-tech">PILOT IDENT</label>
                                        <input type="text" className="input-field-nova" value={name} placeholder="INPUT_NAME..." onChange={e => setName(e.target.value)} maxLength={10} />
                                    </div>
                                    <div className="input-wrap">
                                        <label className="input-label-tech">SECTOR CODE</label>
                                        <input type="text" className="input-field-nova" value={room} placeholder="INPUT_CODE..." onChange={e => setRoom(e.target.value.toUpperCase())} />
                                    </div>
                                    <button className="w-full p-5 text-xl font-black bg-gradient-to-r from-amber-400 to-amber-600 text-black rounded-sm mt-1 shadow-xl active:scale-95 transition-all" onClick={join}>LINK START</button>
                                </div>
                                <div className="system-status-bar">
                                    <span>SYSTEM_STATUS: <span className="status-tag">ACTIVE</span></span>
                                    <span>VER: <span className="text-white/80 font-black ml-1">128.0_CLASSIC_UI</span></span>
                                </div>
                            </div>
                        ) : (!gs || gs.status === 'waiting') ? (
                            <div className="h-full flex flex-col items-center justify-center p-4 text-center overflow-y-auto no-scrollbar">
                                <h2 className="text-3xl font-black mb-6 tracking-[10px] font-['Orbitron'] text-white animate-pulse uppercase">Awaiting_Sync</h2>
                                <div className="waiting-room-list w-full no-scrollbar">
                                    {[...Array(5)].map((_, i) => {
                                        const p = gs?.players[i];
                                        return (
                                            <div key={i} className={`waiting-slot-box ${p?'active shadow-[0_0_15px_rgba(64,224,208,0.2)]':'opacity-20 border-dashed'}`}>
                                                <span className="waiting-name text-[14px] font-black">{p ? p.name : '--- VACANT ---'}</span>
                                                {p && i === 0 && <span className="bg-white text-black text-[10px] px-3 py-1 font-black rounded shadow-lg">MASTER</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="w-full mt-2 px-4 flex flex-col items-center">
                                    {gs?.players[0]?.id === socket?.id && (
                                        <div className="flex gap-3 w-full mb-3">
                                            <button className="flex-1 p-5 bg-black/80 border border-white/40 backdrop-blur-md text-white font-black text-[12px] tracking-[2px] uppercase rounded-sm" disabled={gs?.players?.length >= 5} onClick={()=>{
                                                playSE('play', muted);
                                                const botNames = ['X-TREME','A.L.I.C.E','G.E.A.R','N.U.L.L'];
                                                socket.emit('add-cpu', {roomId: room.toUpperCase(), botName: botNames[Math.floor(Math.random()*botNames.length)]});
                                            }}>CPU追加</button>
                                            <button className="flex-[2] p-5 bg-gradient-to-r from-amber-400 to-amber-600 text-black font-black text-xl rounded-sm shadow-2xl" disabled={gs?.players?.length < 2} onClick={()=>{ playSE('start', muted); socket.emit('start-game', {roomId:room}); }}>ミッション開始</button>
                                        </div>
                                    )}
                                    <button className="btn-cancel-sync" style={{display:'inline-block', padding:'10px 30px', background:'rgba(0,0,0,0.9)', border:'2px solid var(--accent)', color:'#fff', fontFamily:'Orbitron', fontSize:'11px', fontWeight:'900', letterSpacing:'4px', borderRadius:'30px', cursor:'pointer'}} onClick={leave}>CANCEL SYNC</button>
                                </div>
                            </div>
                        ) : (gs.status === 'finished') ? (
                            <div className="result-screen">
                                <h2 className="result-title uppercase tracking-tighter">Mission_Complete</h2>
                                
                                <div className="flex flex-row items-end justify-center w-full max-w-[440px] h-[220px] gap-1 mt-4 mb-8 px-2">
                                    {sortedResultPlayers.map((p, i) => {
                                        const order = i === 0 ? 3 : i === 1 ? 2 : i === 2 ? 4 : i === 3 ? 1 : 5;
                                        const height = i === 0 ? '120px' : i === 1 ? '90px' : i === 2 ? '70px' : i === 3 ? '50px' : '40px';
                                        const color = i === 0 ? 'var(--steam-gold)' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : 'var(--accent)';
                                        
                                        return (
                                            <div key={p.id} className="flex flex-col items-center justify-end w-[20%] relative" style={{ order }}>
                                                {p.isEliminated && <div className="absolute top-[-20px] text-[8px] text-red-500 font-bold bg-black/90 px-1 rounded border border-red-500/50 z-10">BURST</div>}
                                                
                                                <div className="text-[9px] md:text-[10px] font-bold truncate w-full text-center mb-1" 
                                                     style={{ color: p.isEliminated ? 'gray' : 'white', textDecoration: p.isEliminated ? 'line-through' : 'none' }}>
                                                    {p.name}
                                                </div>
                                                <div className="text-[11px] md:text-[13px] font-black mb-2 font-['Orbitron']">{p.handCount}枚</div>
                                                
                                                <div className="w-full flex items-start justify-center pt-2 rounded-t-md border-t-[3px] border-x border-white/10" 
                                                     style={{ height, background: `linear-gradient(to bottom, rgba(255,255,255,0.1), transparent)`, borderTopColor: color }}>
                                                    <span className="font-['Orbitron'] font-black text-xl md:text-2xl mt-1 drop-shadow-md" style={{ color }}>{i + 1}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="w-full max-w-xs flex flex-col gap-3">
                                    <button className="w-full py-5 text-xl font-black bg-gradient-to-r from-amber-400 to-amber-600 text-black rounded-sm shadow-2xl uppercase tracking-[2px]" onClick={() => { playSE('start', muted); socket.emit('start-game', { roomId: room }); }}>同じメンバーで再戦</button>
                                    <button className="w-full py-3 text-xs font-black bg-transparent border border-white/30 text-white hover:bg-white/10 transition-colors rounded-sm uppercase tracking-[2px]" onClick={() => { playSE('play', muted); socket.emit('play-again', { roomId: room }); }}>待機画面へ戻る</button>
                                    <button className="w-full py-3 text-xs font-black bg-black/50 border border-white/10 text-white/50 hover:bg-white/5 transition-colors rounded-sm uppercase tracking-[2px] mt-2" onClick={goToTopPage}>タイトル画面へ戻る</button>
                                </div>
                            </div>
                        ) : (
                            <>
                                <div className="player-hud-grid">
                                    {gs.players.filter(p => p.id !== socket?.id).map(p => (
                                        <PlayerSlot key={p.id} player={p} isCurrent={gs.currentTurnPlayerId === p.id} color={gs.currentTurnPlayerId === p.id ? 'var(--accent)' : 'rgba(255,255,255,0.25)'} />
                                    ))}
                                </div>
                                
                                <div className="realm-legend-nav">
                                    {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r => (
                                        <div key={r} className="legend-item flex flex-col items-center">
                                            <div className={`legend-label ${gs.fieldCard.realm === r ? 'text-white font-black scale-110' : ''} ${playableRealms.includes(r) ? 'playable' : ''}`}>{REALMS[r].n}</div>
                                            <div className={`legend-underline ${gs.fieldCard.realm === r ? 'active' : ''} ${playableRealms.includes(r) ? 'playable-light' : ''}`} style={{ '--r-color': REALMS[r].color }} />
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="field-main-area">
                                    <div className="field-status-text uppercase font-black text-[11px] mb-1 z-10">{isMyTurn?'Your Turn':me?.isEliminated?'Spectating...':'Awaiting Sync...'}</div>
                                    <div className="relative flex items-center justify-center w-full overflow-visible z-10">
                                        <CardView card={gs.fieldCard} isField={true} isMyTurn={isMyTurn} />
                                        <CycleDiagramSmall currentRealm={gs.fieldCard.realm} />
                                    </div>
                                    <div className="field-kanji-text uppercase font-black" style={{color: REALMS[currentR].bright}}>{REALMS[currentR].n}</div>
                                </div>
                                
                                <div className="tactical-log-box no-scrollbar" ref={logContainerRef}>
                                    {gs.logs && gs.logs.length > 0 ? (
                                        gs.logs.slice(-10).map(l => <div key={l.id} className="log-entry">≫ {l.text}</div>)
                                    ) : (
                                        <div className="opacity-40 italic text-xs">特異点解析中...</div>
                                    )}
                                </div>
                                
                                <div className="hand-container no-scrollbar">
                                    {sortedHand.map((c, i) => {
                                        const isPlayable = canPlayCheck(gs, c);
                                        return <CardView key={c.id} card={c} playable={isPlayable} isSelected={selectedCardId === c.id} isMyTurn={isMyTurn} onClick={() => handleCardClick(c, isPlayable)} />;
                                    })}
                                </div>
                                
                                <div className="draw-action-footer">
                                    <button className="btn-mega-draw active:scale-95 shadow-2xl" disabled={!isMyTurn} onClick={()=>{ playSE('draw', muted); socket.emit('draw-card',{roomId:room}); }}>ドロー ({gs.nextDrawAmount}枚)</button>
                                </div>
                                
                                {selector && (
                                    <div className="fixed inset-0 bg-black/99 z-[1000] flex items-center justify-center p-8 backdrop-blur-[50px]">
                                        <div className="w-full max-w-sm bg-black/90 p-12 text-center rounded-3xl border-2 border-white/20">
                                            <h3 className="font-black mb-10 text-3xl tracking-[15px] text-white uppercase text-xs">属性選択</h3>
                                            <div className="grid grid-cols-2 gap-6">
                                                {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r => <button key={r} className="p-6 border-2 border-white/20 font-black text-lg hover:bg-white/10 transition-all scale-110" style={{color: REALMS[r].bright}} onClick={()=>{ playSE('play', muted); socket.emit('play-card',{roomId:room, card:selector, chosenRealm:r}); setSelector(null); }}>{REALMS[r].n}</button>)}
                                            </div>
                                            <button className="w-full mt-10 p-4 text-white/50 text-sm tracking-[10px] font-black border border-white/15 uppercase" onClick={() => { playSE('cancel', muted); setSelector(null); }}>キャンセル</button>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
