<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --bg: #050505; 
            --card-w: 80px; 
            --card-h: 115px;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden; transition: background 1s ease;
        }

        .bg-aura {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, transparent 70%);
            opacity: 0.15; pointer-events: none; z-index: -1;
            transition: 1.5s ease;
        }

        .game-container { 
            display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; 
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .cycle-guide {
            position: fixed; display: flex; z-index: 50; transition: 0.3s;
            background: rgba(0,0,0,0.6); padding: 8px; gap: 5px; align-items: center;
        }

        @media (min-width: 769px) {
            .cycle-guide { right: 20px; top: 50%; transform: translateY(-50%); flex-direction: column; border-left: 1px solid var(--border); }
            .center-stage { padding-right: 100px; }
        }

        @media (max-width: 768px) {
            .cycle-guide { top: 65px; left: 10px; right: 10px; justify-content: center; border-bottom: 1px solid var(--border); border-radius: 8px; }
            .guide-arrow { transform: rotate(-90deg); }
            .center-stage { flex-direction: column; gap: 20px; justify-content: center; }
            :root { --card-w: 70px; --card-h: 100px; }
        }

        .guide-item {
            font-size: 9px; padding: 4px 8px; border-radius: 4px;
            border: 1px solid transparent; transition: 0.3s; color: #666; white-space: nowrap;
        }
        .guide-item.active {
            color: #fff; border-color: var(--active-color);
            box-shadow: 0 0 10px var(--active-color); background: var(--active-color);
            transform: scale(1.05); font-weight: bold;
        }
        .guide-arrow { font-size: 9px; opacity: 0.3; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; margin-bottom: 5px; height: 45px; }
        
        .card-wrapper { perspective: 1000px; transition: 0.3s; }
        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: #000; position: relative; transition: 0.3s; overflow: hidden; cursor: pointer;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 10px var(--accent); }
        .card.disabled { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 2px 0; text-align: center; font-size: 9px; font-weight: bold; }

        .center-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .main-field { position: relative; display: flex; justify-content: center; align-items: center; }

        .btn { 
            padding: 10px 20px; border-radius: 20px; border: 1px solid var(--accent); background: transparent; 
            color: var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 11px;
        }
        .btn:hover:not(:disabled) { background: var(--accent); color: #000; }
        .btn:disabled { opacity: 0.2; }

        .hand-container { padding: 5px; border-radius: 20px 20px 0 0; min-height: 130px; position: relative; overflow-x: auto; overflow-y: hidden; }
        .my-turn-active { border-top: 1px solid var(--accent); background: linear-gradient(to top, rgba(64,224,208,0.05), transparent); }
        .hand-flex { display: flex; justify-content: center; min-width: max-content; padding: 0 20px; }
        .slot { margin-left: -30px; transition: 0.2s; }
        .slot:first-child { margin-left: 0; }

        .badge { position: absolute; top: 4px; right: 4px; font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: bold; z-index: 10; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .winner-text { font-size: 32px; font-weight: 900; color: var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', next: 'ICEAGE', canDuplicate: true, desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', next: 'FOUNTAIN', canDuplicate: false, desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', next: 'BATTERY', canDuplicate: true, desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', next: 'MACHINE', canDuplicate: false, desc: 'エネルギーが充填される。' },
            MACHINE: { n: '機械', color: '#ADFF2F', next: 'ARCHIVE', canDuplicate: true, desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', next: 'GEAR', canDuplicate: false, desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const CYCLE_ORDER = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            const currentRealmColor = useMemo(() => {
                if (gs && gs.fieldCard && REALMS[gs.fieldCard.realm]) return REALMS[gs.fieldCard.realm].color;
                return '#40E0D0';
            }, [gs]);

            // --- 精密なルール判定ロジック ---
            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                
                // ドロー攻撃スタック時：特殊歯車のみOK
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial); 

                const f = gs.fieldCard.realm; // 場の属性
                const h = c.realm;           // 出そうとしているカードの属性

                // 1. 手札がWILD属性(PLANET, RUINS)ならどこでもOK
                if (REALMS[h].w) return true;

                // 2. 場のカードがWILD系属性ならどこでもOK
                if (REALMS[f].w) return true;

                // 3. 【重要修正】噴水WILDの判定
                if (h === 'FOUNTAIN' && c.isSpecial) {
                    // 氷河期の上、または噴水同士なら出せる
                    return (f === 'ICEAGE' || f === 'FOUNTAIN');
                }

                // 4. 同じ属性（ただし氷河期などはDuplicate不可）
                if (f === h) return REALMS[h].canDuplicate;

                // 5. 属性サイクル（次の属性）
                const fIdx = CYCLE_ORDER.indexOf(f);
                if (fIdx !== -1) {
                    const nextRealm = CYCLE_ORDER[(fIdx + 1) % 6];
                    return (h === nextRealm);
                }
                return false;
            };

            const CardView = ({ card, disabled, onClick }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className="card-wrapper">
                        <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                            <img src={src} alt={card.realm} onError={(e) => { e.target.style.display='none'; e.target.parentNode.style.background='#111'; }} />
                            {card.realm === 'GEAR' && card.isSpecial && <div className="badge" style={{background:'#FF4500'}}>+2</div>}
                            {card.realm === 'FOUNTAIN' && card.isSpecial && <div className="badge" style={{background:'#00CED1'}}>WILD</div>}
                            {card.realm === 'MACHINE' && card.isSpecial && <div className="badge" style={{background:'#FFA500'}}>REV</div>}
                            <div className="card-ui" style={{borderTop:`2px solid ${REALMS[card.realm].color}`}}>{REALMS[card.realm].n}</div>
                        </div>
                    </div>
                );
            };

            if (gs?.status === 'finished') {
                const winner = gs.players.find(p => p.handCount === 0);
                return (
                    <div className="result-overlay">
                        <div className="winner-text">{winner?.name} WIN</div>
                        <button className="btn" onClick={() => socket.emit('play-again', {roomId: room})}>REBOOT</button>
                    </div>
                );
            }

            if (!joined) return (
                <div className="overlay">
                    <h1 style={{fontSize:'28px', letterSpacing:'8px', color:'var(--accent)'}}>CROSS REALM</h1>
                    <div style={{display:'flex', flexDirection:'column', gap:'10px', marginTop:'20px'}}>
                        <input className="btn" style={{width:'200px'}} placeholder="NAME" value={name} onChange={e=>setName(e.target.value)} />
                        <input className="btn" style={{width:'200px'}} placeholder="ROOM ID" value={room} onChange={e=>setRoom(e.target.value)} />
                        <button className="btn" style={{background:'var(--accent)', color:'#000'}} onClick={()=>{if(room&&name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>LOGIN</button>
                    </div>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="glass-panel" style={{padding:'30px'}}>
                        <p>WAITING PLAYERS ({gs?.players?.length || 0}/4)</p>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && 
                            <button className="btn" style={{marginTop:'15px'}} onClick={()=>socket.emit('start-game',{roomId:room})}>START</button>
                        }
                    </div>
                </div>
            );

            return (
                <div className="game-container" style={{'--realm-color': currentRealmColor}}>
                    <div className="bg-aura"></div>
                    
                    <div className="cycle-guide">
                        {CYCLE_ORDER.map((r, i) => (
                            <React.Fragment key={r}>
                                <div className={`guide-item ${gs.fieldCard.realm === r ? 'active' : ''}`} style={{'--active-color': REALMS[r].color}}>
                                    {REALMS[r].n}
                                </div>
                                {i < 5 && <div className="guide-arrow">▶</div>}
                            </React.Fragment>
                        ))}
                    </div>

                    <div className="top-bar glass-panel">
                        <div style={{fontSize:'10px', color:gs.isReversed?'orange':currentRealmColor, fontWeight:'bold'}}>{gs.isReversed ? '◀ REV' : 'NORM ▶'}</div>
                        <div style={{display:'flex', gap:'5px'}}>
                            {others.map(p => <div key={p.id} className="glass-panel" style={{padding: '2px 8px', fontSize:'9px'}}>{p.name.substring(0,5)}:{p.handCount}</div>)}
                        </div>
                    </div>

                    <div className="center-stage">
                        <div className="main-field">
                            <CardView card={gs.fieldCard} />
                            <div style={{marginLeft: '20px'}}>
                                <div style={{fontSize:'14px', color:currentRealmColor, fontWeight:'bold'}}>{REALMS[gs.fieldCard.realm].n}</div>
                                <div style={{fontSize:'9px', opacity:0.6, maxWidth:'80px'}}>{REALMS[gs.fieldCard.realm].desc}</div>
                            </div>
                        </div>
                        <button className="btn" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                            {gs.nextDrawAmount > 1 ? `DRAW +${gs.nextDrawAmount}` : "DRAW / PASS"}
                        </button>
                    </div>

                    <div className={`hand-container ${isMyTurn ? 'my-turn-active' : ''}`}>
                        <div className="hand-flex">
                            {me.hand.map((c,i)=>(
                                <div key={c.id} className="slot" style={{zIndex:i}}>
                                    <CardView card={c} disabled={!canPlay(c)} onClick={()=>{
                                        if(!canPlay(c)) return;
                                        if(c.realm==='PLANET'||c.realm==='RUINS'||(c.realm==='FOUNTAIN'&&c.isSpecial)) setSelectorCard(c);
                                        else socket.emit('play-card',{roomId:room, card:c});
                                    }}/>
                                </div>
                            ))}
                        </div>
                    </div>

                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay">
                            <div className="glass-panel" style={{padding:'20px'}}>
                                <h4 style={{margin:'0 0 15px 0'}}>SELECT REALM</h4>
                                <div style={{display:'flex', flexWrap:'wrap', justifyContent:'center', maxWidth:'280px'}}>
                                    {CYCLE_ORDER.map(r=>(
                                        <button key={r} className="btn" style={{margin:'4px', borderColor:REALMS[r].color, color:REALMS[r].color, fontSize:'10px'}} onClick={()=>{
                                            if(selectorCard) {
                                                socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r, preventSpecial:true});
                                                setSelectorCard(null);
                                            }
                                            else socket.emit('set-initial-realm',{roomId:room, chosenRealm:r});
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
