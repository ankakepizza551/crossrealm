<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #40E0D0; --bg: #0d0d0d; --card-w: 90px; --card-h: 130px; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .overlay-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .card { width: var(--card-w); height: var(--card-h); border-radius: 10px; border: 2px solid #333; background: #000; position: relative; transition: 0.2s; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card.disabled { opacity: 0.2; filter: grayscale(0.8); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); padding: 4px 0; text-align: center; pointer-events: none; }
        .badge-icon { position: absolute; top: 5px; right: 5px; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-shadow: 0 0 3px #000; }
        .bg-draw { background: linear-gradient(45deg, #ff4444, #990000); }
        .bg-wild { background: linear-gradient(45deg, #4444ff, #000099); }
        .bg-rev  { background: linear-gradient(45deg, #ffaa00, #996600); }
        .hand-area { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: center; padding-left: 40px; }
        .slot { margin-left: -40px; transition: 0.25s; }
        .slot:hover { transform: translateY(-35px); margin-right: 30px; z-index: 100 !important; }
        .btn { padding: 12px 35px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com'); 

        const REALMS = {
            GEAR:    { n: '歯車', canRepeat: true },
            ICEAGE:  { n: '氷河期', canRepeat: false },
            FOUNTAIN:{ n: '噴水', canRepeat: true },
            BATTERY: { n: 'バッテリー', canRepeat: false },
            MACHINE: { n: '機械', canRepeat: true },
            ARCHIVE: { n: '古文書', canRepeat: false },
            PLANET:  { n: '惑星', w: true },
            RUINS:   { n: '廃墟', w: true }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                socket.on('game-over', (d) => alert("Winner: " + d.winnerName));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard) return false;
                const f = gs.fieldCard.realm;
                const h = c.realm;
                if (REALMS[h].w) return true;
                if (c.realm === 'FOUNTAIN' && c.isSpecial && (f === 'ICEAGE' || f === 'FOUNTAIN')) return true;
                if (f === h) return REALMS[h].canRepeat;
                if (f === 'GEAR' && h === 'ICEAGE') return true;
                if (f === 'ICEAGE' && h === 'FOUNTAIN') return true;
                if (f === 'FOUNTAIN' && h === 'BATTERY') return true;
                if (f === 'BATTERY' && h === 'MACHINE') return true;
                if (f === 'MACHINE' && h === 'ARCHIVE') return true;
                if (f === 'ARCHIVE' && h === 'GEAR') return true;
                return false;
            };

            const CardView = ({ card, disabled, onClick }) => {
                if (!card) return null;
                let imgName = `${card.realm}.png`;
                if (card.realm === 'GEAR') {
                    imgName = card.isSpecial ? 'GEAR_frame.png' : 'GEAR.png';
                } else if (card.realm === 'FOUNTAIN') {
                    imgName = card.isSpecial ? 'FOUNTAIN_wild.png' : 'FOUNTAIN_normal.png';
                } else if (card.realm === 'MACHINE') {
                    imgName = card.isSpecial ? 'MACHINE_reverse.png' : 'MACHINE_normal.png';
                }

                return (
                    <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                        <img src={`./images/${imgName}`} alt={card.realm} />
                        {card.isSpecial && card.realm === 'GEAR' && <div className="badge-icon bg-draw">＋2</div>}
                        {card.isSpecial && card.realm === 'FOUNTAIN' && <div className="badge-icon bg-wild">WILD</div>}
                        {card.isSpecial && card.realm === 'MACHINE' && <div className="badge-icon bg-rev">REV</div>}
                        <div className="card-ui">
                            <div style={{fontSize:'10px', fontWeight:'bold'}}>{REALMS[card.realm]?.n}</div>
                        </div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay-screen">
                    <h1 style={{color:'var(--accent)', letterSpacing:'5px'}}>CROSS REALM</h1>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'10px'}} placeholder="NAME" value={name} onChange={e=>setName(e.target.value)} /><br/>
                    <input className="btn" style={{background:'#111', color:'#fff', marginBottom:'20px'}} placeholder="ROOM ID" value={room} onChange={e=>setRoom(e.target.value)} /><br/>
                    <button className="btn" onClick={() => { if(room && name) { socket.emit('join-room', { roomId: room, playerName: name }); setJoined(true); } }}>ENTER</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay-screen">
                    <h2>WAITING... ({gs?.players?.length || 0}/4)</h2>
                    {gs?.players?.[0]?.id === socket.id && <button className="btn" onClick={()=>socket.emit('start-game', {roomId: room})}>START</button>}
                </div>
            );

            return (
                <div style={{textAlign:'center', paddingTop:'40px'}}>
                    <div style={{fontSize:'11px', color: gs.isReversed ? '#ffaa00' : '#44ff44', fontWeight:'bold', letterSpacing:'2px'}}>
                        {gs.isReversed ? '◀ REVERSE FLOW' : 'NORMAL FLOW ▶'}
                    </div>
                    <div style={{margin:'20px auto', display:'inline-block', transform:'scale(1.2)'}}>
                        <CardView card={gs.fieldCard} disabled={false} />
                    </div>
                    <div style={{marginTop:'45px'}}>
                        <button className="btn" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                            {gs.nextDrawAmount > 1 ? `DRAW ${gs.nextDrawAmount}` : "DRAW / PASS"}
                        </button>
                    </div>
                    <div className="hand-area">
                        {me.hand.map((c, i) => (
                            <div key={c.id} className="slot" style={{zIndex: i}}>
                                <CardView card={c} disabled={!canPlay(c)} onClick={()=>canPlay(c) && socket.emit('play-card',{roomId:room, card:c})} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
