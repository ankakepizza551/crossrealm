<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --danger: #FF4500;
            --bg: #030303; 
            --card-w: 130px; 
            --card-h: 185px;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 背景演出（オーラ） */
        .bg-aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, #000 80%);
            opacity: 0.2; z-index: -1; transition: background 1.5s ease;
        }

        .container {
            display: flex; flex-direction: column; height: 100vh; position: relative;
            background: radial-gradient(circle at top right, rgba(64, 224, 208, 0.05), transparent 40%);
        }

        /* プレイヤーエリア */
        .opponents {
            display: flex; justify-content: center; gap: 20px; padding: 25px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 10;
        }
        .opp-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 12px; min-width: 130px;
            text-align: center; backdrop-filter: blur(8px); transition: all 0.4s;
        }
        .opp-card.active { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(64, 224, 208, 0.2), inset 0 0 10px rgba(64, 224, 208, 0.1); 
            transform: translateY(5px);
        }
        .opp-name { font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.6; letter-spacing: 1px; }
        .opp-count { font-size: 20px; font-weight: 900; color: var(--accent); }

        /* フィールドエリア */
        .field {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .field-card-container {
            position: relative; z-index: 5;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* カード基本スタイル */
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 18px; border: 1.5px solid var(--border);
            background: #0a0a0a; display: flex; flex-direction: column;
            overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-header { 
            height: 35%; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 15px; letter-spacing: 1px;
            background: rgba(255,255,255,0.03);
        }
        .card-body { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 45px; }
        .card-footer { 
            height: 25%; padding: 8px; font-size: 10px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.4); opacity: 0.7;
            display: flex; align-items: center; justify-content: center;
        }

        .status-badge {
            background: var(--danger); color: white; padding: 8px 20px; border-radius: 30px;
            font-weight: 900; font-size: 16px; margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
            animation: bounce 1.2s infinite; z-index: 10;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.05); } }

        /* 手札エリア */
        .my-hand-area {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            padding: 40px 20px 60px 20px; position: relative;
            z-index: 20;
        }
        .hand-container {
            display: flex; justify-content: center; height: 210px;
            align-items: flex-end; perspective: 1200px;
        }
        .my-card {
            margin-left: -50px; cursor: pointer; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transform-origin: bottom center;
        }
        .my-card:first-child { margin-left: 0; }
        .my-card:hover { 
            transform: translateY(-50px) rotate(0deg) scale(1.2) !important; 
            z-index: 100 !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .my-card.playable { border-color: rgba(255,255,255,0.6); }
        .my-card.not-playable { opacity: 0.3; filter: grayscale(1) blur(1px); cursor: not-allowed; }

        /* アクションボタン */
        .btn-draw {
            position: absolute; right: 50px; bottom: 160px;
            background: var(--accent); color: #000; border: none;
            padding: 18px 45px; border-radius: 40px; font-weight: 900;
            font-size: 16px; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.3s ease; z-index: 30;
        }
        .btn-draw:hover { transform: scale(1.08) translateY(-3px); box-shadow: 0 20px 40px rgba(64, 224, 208, 0.3); }
        .btn-draw:active { transform: scale(0.95); }
        .btn-draw:disabled { background: #222; color: #555; cursor: not-allowed; transform: none; box-shadow: none; }

        /* モーダル */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .panel {
            background: #080808; border: 1.5px solid var(--border);
            padding: 45px; border-radius: 28px; text-align: center; width: 90%; max-width: 420px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }
        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .realm-btn {
            padding: 18px; border: 1.5px solid var(--border); border-radius: 14px;
            background: rgba(255,255,255,0.02); color: white; font-weight: 900; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px; letter-spacing: 1px;
        }
        .realm-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.03); }

        /* レルムカラー・定義 */
        .r-gear { background: linear-gradient(135deg, #FF8C00, #FFA500); --r-color: #FF8C00; }
        .r-iceage { background: linear-gradient(135deg, #00BFFF, #1E90FF); --r-color: #00BFFF; }
        .r-fountain { background: linear-gradient(135deg, #4169E1, #0000FF); --r-color: #4169E1; }
        .r-battery { background: linear-gradient(135deg, #32CD32, #7FFF00); --r-color: #32CD32; }
        .r-machine { background: linear-gradient(135deg, #2F4F4F, #008080); --r-color: #2F4F4F; }
        .r-archive { background: linear-gradient(135deg, #8B4513, #A0522D); --r-color: #8B4513; }
        .r-planet { background: linear-gradient(135deg, #9400D3, #8B008B); --r-color: #9400D3; }
        .r-ruins { background: linear-gradient(135deg, #696969, #808080); --r-color: #696969; }

        /* 背景透かし文字 */
        .turn-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 140px; font-weight: 900; opacity: 0.04; pointer-events: none;
            white-space: nowrap; z-index: 0; letter-spacing: -5px; font-style: italic;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: 'GEAR', color: '#FF8C00', icon: '⚙️', class: 'r-gear' },
            ICEAGE: { n: 'ICEAGE', color: '#00BFFF', icon: '❄️', class: 'r-iceage' },
            FOUNTAIN: { n: 'FOUNTAIN', color: '#4169E1', icon: '⛲', class: 'r-fountain' },
            BATTERY: { n: 'BATTERY', color: '#32CD32', icon: '🔋', class: 'r-battery' },
            MACHINE: { n: 'MACHINE', color: '#2F4F4F', icon: '🤖', class: 'r-machine' },
            ARCHIVE: { n: 'ARCHIVE', color: '#8B4513', icon: '📜', class: 'r-archive' },
            PLANET: { n: 'PLANET', color: '#9400D3', icon: '🪐', class: 'r-planet' },
            RUINS: { n: 'RUINS', color: '#696969', icon: '🏛️', class: 'r-ruins' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('ALPHA');
            const [name, setName] = useState('USER-' + Math.floor(Math.random() * 999));
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                const s = io(); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            const me = gs?.players?.find(p => p.id === socket?.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id;
            const others = gs?.players?.filter(p => p.id !== socket?.id) || [];

            const canPlay = (card) => {
                if (!isMyTurn || gs.status !== 'playing' || gs.needsInitialChoice) return false;
                
                // ドロー攻撃中の制限
                if (gs.nextDrawAmount > 1) {
                    return (card.realm === 'GEAR' && card.isSpecial);
                }

                const field = gs.fieldCard.realm;
                const hand = card.realm;

                // ワイルド系
                if (hand === 'PLANET' || hand === 'RUINS') return true;
                if (hand === 'FOUNTAIN' && card.isSpecial) return true;
                
                // 同じレルム
                if (field === hand) return true;

                // サイクル
                const currentIdx = CYCLE_ORDER.indexOf(field);
                const nextRealm = CYCLE_ORDER[(currentIdx + 1) % 6];
                if (hand === nextRealm) return true;

                // 特殊コンボ
                if (field === 'ARCHIVE' && hand === 'ICEAGE') return true;
                if (field === 'ICEAGE' && hand === 'BATTERY') return true;
                if (field === 'ICEAGE' && hand === 'FOUNTAIN') return true;

                return false;
            };

            const playCard = (card) => {
                if (!canPlay(card)) return;
                if (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial)) {
                    setSelectorCard(card);
                } else {
                    socket.emit('play-card', { roomId: room, card });
                }
            };

            const selectRealm = (r) => {
                socket.emit('play-card', { roomId: room, card: selectorCard, chosenRealm: r });
                setSelectorCard(null);
            };

            if (!joined) {
                return (
                    <div className="overlay">
                        <div className="panel">
                            <h1 style={{color:'var(--accent)', fontSize:32, marginBottom:40, fontWeight:900, letterSpacing:4, fontStyle:'italic'}}>CROSS REALM</h1>
                            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="PILOT NAME" style={{width:'100%', padding:18, background:'#000', border:'1.5px solid var(--border)', color:'#fff', marginBottom:15, borderRadius:14, fontSize:14, fontWeight:'bold'}} />
                            <input type="text" value={room} onChange={e=>setRoom(e.target.value)} placeholder="SECTOR ID" style={{width:'100%', padding:18, background:'#000', border:'1.5px solid var(--border)', color:'#fff', marginBottom:25, borderRadius:14, fontSize:14, fontWeight:'bold'}} />
                            <button onClick={()=>{socket.emit('join-room',{roomId:room, playerName:name}); setJoined(true);}} style={{width:'100%', padding:18, background:'var(--accent)', color:'#000', border:'none', borderRadius:14, fontWeight:900, fontSize:16, cursor:'pointer', letterSpacing:1}}>INITIALIZE LINK</button>
                        </div>
                    </div>
                );
            }

            if (!gs || gs.status === 'waiting') {
                return (
                    <div className="container" style={{justifyContent:'center', alignItems:'center'}}>
                        <div style={{width:50, height:50, border:'4px solid rgba(64, 224, 208, 0.1)', borderTopColor:'var(--accent)', borderRadius:'50%', animation:'spin 1s linear infinite'}}></div>
                        <h2 style={{letterSpacing:12, opacity:0.6, marginTop:30, fontSize:16, fontWeight:900}}>WAITING FOR PLAYER</h2>
                        <div style={{marginTop:10, opacity:0.4, fontSize:12, fontWeight:900, letterSpacing:2, color:'var(--accent)'}}>SECTOR ID: {room}</div>
                        
                        <div style={{marginTop:30, display:'flex', gap:12}}>
                            {gs?.players.map(p => <div key={p.id} style={{padding:'8px 20px', background:'var(--glass)', borderRadius:30, border:'1.5px solid var(--border)', fontSize:12, fontWeight:900}}>{p.name}</div>)}
                        </div>
                        {gs?.players[0]?.id === socket?.id && gs?.players.length >= 2 && (
                            <button onClick={()=>socket.emit('start-game',{roomId:room})} style={{marginTop:50, padding:'18px 50px', borderRadius:40, border:'2px solid var(--accent)', background:'transparent', color:'var(--accent)', fontWeight:900, cursor:'pointer', fontSize:18, transition:'0.3s'}}>ENGAGE CORE</button>
                        )}
                        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                    </div>
                );
            }

            return (
                <div className="container" style={{ '--realm-color': REALMS[gs.fieldCard.realm]?.color }}>
                    <div className="bg-aurora"></div>
                    
                    <div className="opponents scrollbar-hide">
                        {others.map(p => (
                            <div key={p.id} className={`opp-card ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                <div className="opp-name">{p.name}</div>
                                <div className="opp-count">{p.handCount}</div>
                            </div>
                        ))}
                    </div>

                    <div className="field">
                        <div className="turn-indicator">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                        
                        {gs.nextDrawAmount > 1 && (
                            <div className="status-badge">DRAW +{gs.nextDrawAmount} !!</div>
                        )}
                        {gs.isReversed && (
                            <div style={{color:'var(--accent)', fontSize:13, fontWeight:900, marginBottom:15, letterSpacing:2}}>🔄 REVERSE ACTIVE</div>
                        )}

                        <div className="field-card-container">
                            <div className={`card ${REALMS[gs.fieldCard.realm].class}`}>
                                <div className="card-header">{REALMS[gs.fieldCard.realm].n}</div>
                                <div className="card-body">{REALMS[gs.fieldCard.realm].icon}</div>
                                <div className="card-footer">
                                    {gs.fieldCard.isSpecial ? 'SPECIAL ABILITY' : 'NORMAL UNIT'}
                                </div>
                            </div>
                        </div>
                    </div>

                    <button className="btn-draw" disabled={!isMyTurn} onClick={()=>socket.emit('draw-card',{roomId:room})}>
                        {gs.nextDrawAmount > 1 ? `DRAW +${gs.nextDrawAmount}` : 'DRAW / PASS'}
                    </button>

                    <div className="my-hand-area">
                        <div className="hand-container">
                            {me.hand.map((card, i) => {
                                const playable = canPlay(card);
                                const rotation = (i - (me.hand.length - 1) / 2) * (me.hand.length > 8 ? 4 : 7);
                                const xOff = (i - (me.hand.length - 1) / 2) * (me.hand.length > 10 ? 30 : 0);
                                return (
                                    <div 
                                        key={card.id} 
                                        className={`card my-card ${REALMS[card.realm].class} ${playable ? 'playable' : 'not-playable'}`}
                                        style={{ transform: `rotate(${rotation}deg) translateX(${xOff}px)` }}
                                        onClick={() => playCard(card)}
                                    >
                                        <div className="card-header">{REALMS[card.realm].n}</div>
                                        <div className="card-body">{REALMS[card.realm].icon}</div>
                                        {card.isSpecial && <div style={{position:'absolute', top:8, right:8, fontSize:12}}>⭐</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:20, fontWeight:900, marginBottom:25, letterSpacing:2}}>SELECT TARGET REALM</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={()=>selectRealm(r)}>
                                            {REALMS[r].n}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{marginTop:30, opacity:0.4, background:'transparent', border:'none', color:'#fff', cursor:'pointer', fontWeight:900, fontSize:12}}>CANCEL TRANSITION</button>
                            </div>
                        </div>
                    )}

                    {gs.needsInitialChoice && gs.players[0].id === socket.id && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:20, fontWeight:900, marginBottom:25, letterSpacing:2}}>INITIAL STABILITY</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={()=>socket.emit('set-initial-realm',{roomId:room, chosenRealm:r})}>
                                            {REALMS[r].n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {gs.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--accent)', fontSize:38, fontWeight:900, fontStyle:'italic', marginBottom:10}}>GAME OVER</h2>
                                <p style={{fontSize:12, opacity:0.5, marginBottom:30, fontWeight:900}}>MISSION COMPLETE</p>
                                <div style={{margin:'20px 0'}}>
                                    {gs.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i)=>(
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'15px 10px', borderBottom:'1px solid var(--border)'}}>
                                            <span style={{fontWeight:900, fontSize:14}}>{i+1}. {p.name} {p.id === socket.id && "(YOU)"}</span>
                                            <span style={{color:'var(--accent)', fontWeight:900}}>{p.handCount} units</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>socket.emit('play-again',{roomId:room})} style={{width:'100%', padding:20, background:'var(--accent)', color:'#000', border:'none', borderRadius:16, fontWeight:900, fontSize:18, marginTop:20, cursor:'pointer'}}>RE-ESTABLISH LINK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
