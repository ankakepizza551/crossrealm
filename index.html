<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --danger: #FF4500; --bg: #050508; 
            --card-w: 92px; --card-h: 130px; --opp-card-w: 30px; --opp-card-h: 42px; --border: rgba(212, 175, 55, 0.45);
        }
        body { margin: 0; background: #000; color: white; font-family: 'Exo 2', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen-wrapper { width: 100vw; height: 100vh; max-width: calc(100vh * 9 / 16); max-height: 100vh; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; border-left: 2px solid var(--steam-gold); border-right: 2px solid var(--steam-gold); }
        
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180%; height: 180%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/><circle cx="100" cy="100" r="75" fill="none" stroke="rgba(64,224,208,0.05)" stroke-width="0.4"/></svg>'); animation: rotate-eternal 180s linear infinite; }
        @keyframes rotate-eternal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .bg-magic-aura { position: absolute; inset: 0; background: radial-gradient(circle at center, var(--realm-color, rgba(64, 224, 208, 0.2)) 0%, transparent 85%); opacity: 0.5; transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .bg-scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.15) 50%); background-size: 100% 4px; z-index: 5; }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100%; }

        .opponents-area { display: flex; flex-direction: column; gap: 8px; padding: 10px; border-bottom: 2px solid var(--border); background: rgba(0,0,0,0.5); }
        .opp-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border-left: 5px solid var(--border); }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.12); }
        .opp-name { font-weight: 900; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

        .cycle-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 25px 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--border); position: relative; gap: 4px; }
        .cycle-dot { flex: 1; height: 4px; background: #1a1a1a; position: relative; }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 10px var(--dot-color); }
        .cycle-label { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 900; opacity: 0.5; font-family: 'Cinzel', serif; white-space: nowrap; }

        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; position: relative; }
        .info-panel { background: rgba(10,10,15,0.95); border: 2px solid var(--steam-gold); padding: 12px; border-radius: 10px; max-width: 160px; text-align: center; }

        /* 手札エリア: 飛び出しを許可するために padding-top を巨大化 */
        .hand-container { position: relative; z-index: 9999; width: 100%; overflow: visible; background: linear-gradient(to top, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%); }
        .hand-flex { display: flex; padding: 100px 80px 25px 80px; min-height: 250px; align-items: flex-end; overflow-x: auto; overflow-y: visible; margin-top: -100px; box-sizing: border-box; }
        .hand-flex::-webkit-scrollbar { height: 4px; }
        .hand-flex::-webkit-scrollbar-thumb { background: var(--steam-gold); }

        .action-row { background: #000; border-top: 1px solid rgba(212,175,55,0.3); padding: 15px 0 35px 0; display: flex; justify-content: center; z-index: 10; position: relative; }

        .card { width: var(--card-w); height: var(--card-h); border-radius: 6px; border: 2.5px solid var(--steam-gold); background: #000; overflow: hidden; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,1); flex-shrink: 0; transition: 0.25s cubic-bezier(0.2, 1, 0.3, 1); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-footer { position: absolute; bottom: 0; width: 100%; background: rgba(5,5,10,0.98); font-size: 10px; font-weight: 900; padding: 3px 0; text-align: center; border-top: 2px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif; }

        .my-card { margin-left: -45px; transform-origin: bottom center; cursor: pointer; position: relative; }
        .my-card:first-child { margin-left: 0; }
        /* ホバー: 100pxの余裕があるため、もう切り取られません */
        .my-card.playable:hover { transform: translateY(-70px) scale(1.5) !important; z-index: 10000 !important; border-color: #fff; box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 40px var(--accent); }
        .my-card.not-playable { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        /* パネル */
        .overlay { position: absolute; inset: 0; z-index: 50000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); background: rgba(0,0,0,0.7); padding: 30px; }
        .panel { background: rgba(10, 10, 15, 0.98); border: 2px solid var(--border); padding: 35px 25px; border-radius: 20px; text-align: center; width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .waiting-list { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .waiting-player { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }

        .btn-main { background: linear-gradient(135deg, var(--steam-gold), #B8860B); color: #000; border: none; padding: 18px 0; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 4px; }
        .logo-main { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 900; letter-spacing: 8px; color: var(--steam-gold); }
        .panel input { width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 2px solid rgba(212,175,55,0.2); color: var(--accent); text-align: center; font-size: 16px; border-radius: 10px; outline: none; box-sizing: border-box; }
        .error-msg { color: var(--danger); font-size: 14px; font-weight: 900; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 8px; border: 1px solid var(--danger); width: 100%; }
        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .realm-btn { padding: 14px; border: 2px solid var(--steam-gold); background: rgba(255,255,255,0.05); color: #fff; font-weight: 900; font-family: 'Cinzel', serif; cursor: pointer; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', desc: 'セットA：維持。', effect: '特殊(S): +2ドロー' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', desc: 'セットA→B：遷移。', effect: '' },
            FOUNTAIN: { n: '噴水', color: '#4169E1', desc: 'セットB：維持。', effect: '特殊(S): 限定ワイルド' },
            BATTERY: { n: '電池', color: '#32CD32', desc: 'セットB→C：遷移。', effect: '' },
            MACHINE: { n: '機械', color: '#2F4F4F', desc: 'セットC：維持。', effect: '特殊(S): 順番反転' },
            ARCHIVE: { n: '古文書', color: '#8B4513', desc: 'セットC→A：遷移。', effect: '' },
            PLANET: { n: '惑星', color: '#9400D3', desc: '星々の加護。', effect: 'ワイルド' },
            RUINS: { n: '廃墟', color: '#696969', desc: '遺跡の記憶。', effect: 'ワイルド' }
        };
        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [error, setError] = useState('');

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => { setGs(data); setError(''); });
                s.on('join-error', (msg) => { setError(msg); setJoined(false); });
                return () => s.disconnect();
            }, []);

            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = gs?.fieldCard?.realm || 'GEAR';

            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (card) => {
                if (!isMyTurn) return false;
                if (gs.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm;
                const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS') return true;
                if (field === 'PLANET' || field === 'RUINS') return true; 
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                switch (field) {
                    case 'GEAR': return (h === 'GEAR' || h === 'ICEAGE');
                    case 'ICEAGE': return (h === 'FOUNTAIN' || h === 'BATTERY');
                    case 'FOUNTAIN': return (h === 'FOUNTAIN' || h === 'BATTERY');
                    case 'BATTERY': return (h === 'MACHINE' || h === 'ARCHIVE'); 
                    case 'MACHINE': return (h === 'MACHINE' || h === 'ARCHIVE');
                    case 'ARCHIVE': return (h === 'GEAR' || h === 'ICEAGE');
                    default: return true;
                }
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) {
                    setSelectorCard(card);
                } else {
                    socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined });
                }
            };

            const CardView = ({ card, playable, onClick, isField }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';
                return (
                    <div className={`card ${isField ? '' : (playable ? 'playable my-card' : 'not-playable my-card')}`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">{(REALMS[card.realm]).n} {card.isSpecial ? '(S)' : ''}</div>
                    </div>
                );
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': REALMS[currentRealm].color }}>
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-magic-aura"></div>
                    <div className="bg-layer bg-scanline"></div>

                    {!joined && (
                        <div className="overlay">
                            <div className="panel">
                                <h1 className="logo-main">CROSS REALM</h1>
                                {error && <div className="error-msg">{error}</div>}
                                <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="プレイヤー名" maxLength={10} />
                                <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} placeholder="ルームID" />
                                <button onClick={()=>{setJoined(true); socket.emit('join-room',{roomId:room, playerName:name});}} className="btn-main">接続開始</button>
                            </div>
                        </div>
                    )}

                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="panel">
                                <div>
                                    <h2 style={{letterSpacing:3, opacity:0.5, fontSize:11, fontWeight:900, marginBottom:5}}>AWAITING LINKAGE</h2>
                                    <div style={{fontSize:22, color:'var(--accent)', fontWeight:900, fontFamily:'Exo 2'}}>SECTOR: {room}</div>
                                </div>
                                <div className="waiting-list">
                                    {gs?.players?.map(p => (
                                        <div key={p.id} className="waiting-player">
                                            <span style={{fontWeight:900}}>👤 {p.name}</span>
                                            <div style={{width:8, height:8, background:'var(--accent)', borderRadius:'50%'}}></div>
                                        </div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" disabled={gs?.players?.length < 2}>ゲーム開始</button>
                                )}
                            </div>
                        </div>
                    )}

                    {joined && gs?.status === 'playing' && (
                        <div className="game-container">
                            <div className="opponents-area">
                                {gs.players.filter(p => p.id !== socket?.id).map(p => (
                                    <div key={p.id} className={`opp-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-name">{p.name}</div>
                                        <div style={{fontWeight:900, color: 'var(--accent)', fontSize:16}}>{p.handCount}枚</div>
                                    </div>
                                ))}
                            </div>
                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => (
                                    <div key={r} className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}>
                                        <div className="cycle-label">{REALMS[r].n}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="field">
                                <div style={{fontFamily:'Cinzel', fontSize: 10, opacity: 0.5}}>{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                                {gs.nextDrawAmount > 1 && <div style={{color: 'var(--danger)', fontWeight:900, fontSize:20}}>DRAW +{gs.nextDrawAmount}</div>}
                                <div style={{display:'flex', alignItems:'center', gap:15}}>
                                    <CardView card={gs.fieldCard} isField={true} />
                                    <div className="info-panel">
                                        <div className="realm-title">{REALMS[currentRealm].n}</div>
                                        <div style={{fontSize:11, opacity:0.8}}>{REALMS[currentRealm].desc}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="hand-container">
                                <div className="hand-flex">
                                    {sortedHand.map((card) => (
                                        <CardView key={card.id} card={card} playable={canPlay(card)} onClick={() => handlePlay(card)} />
                                    ))}
                                </div>
                            </div>
                            <div className="action-row">
                                <button className="btn-main" disabled={!isMyTurn} onClick={() => socket.emit('draw-card',{roomId:room})}>
                                    {gs.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : (isMyTurn ? 'カードを引く' : '待機中...')}
                                </button>
                            </div>
                        </div>
                    )}

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:22, fontWeight:900, color:'var(--steam-gold)', fontFamily:'Cinzel'}}>属性を選択</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{color:'#fff', cursor:'pointer', border:'none', background:'none', fontWeight:900, fontSize:15}}>キャンセル</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--steam-gold)', fontSize:28, fontFamily:'Cinzel'}}>MISSION END</h2>
                                <div style={{width:'100%'}}>
                                    {gs.players.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'12px 0', borderBottom:'1px solid rgba(212,175,55,0.2)'}}>
                                            <span style={{fontWeight:900}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount}枚</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main">再起動</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
