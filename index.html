<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --cyber-pink: #FF00FF;
            --steam-gold: #D4AF37;
            --magic-purple: #8A2BE2;
            --danger: #FF4500;
            --bg: #050508; 
            --card-w: 110px; 
            --card-h: 155px;
            --opp-card-w: 24px;
            --opp-card-h: 36px;
            --border: rgba(212, 175, 55, 0.4);
        }
        
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Exo 2', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 縦16:9を維持するためのラッパー */
        .screen-wrapper {
            width: 100vw; height: 100vh;
            max-width: calc(100vh * 9 / 16); max-height: 100vh;
            background: var(--bg);
            position: relative; overflow: hidden;
            box-shadow: 0 0 120px rgba(0,0,0,1);
            display: flex; flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* 背景レイヤー：複合デザイン */
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
        
        /* 透かし魔法陣 */
        .bg-watermark-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150%; height: 150%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="0.5"/><circle cx="100" cy="100" r="70" fill="none" stroke="rgba(64,224,208,0.03)" stroke-width="0.5"/><path d="M100 10l10 90h-20z" fill="rgba(212,175,55,0.02)"/></svg>');
            animation: rotate 120s linear infinite;
        }

        /* 歯車の透かし */
        .bg-gears {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><path fill="rgba(212,175,55,0.02)" d="M50 5l5 10h10l-8 7 3 10-10-8-10 8 3-10-8-7h10z"/></svg>');
            animation: rotate-reverse 80s linear infinite;
            opacity: 0.5;
        }

        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .bg-magic-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--realm-color, #111) 0%, transparent 80%);
            opacity: 0.35; transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 走査線（サイバーパンク） */
        .bg-scanline {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 4px; z-index: 5;
        }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* 相手の手札表示 */
        .opponents-area {
            display: flex; flex-direction: column; gap: 10px; padding: 20px 15px;
            background: linear-gradient(to bottom, rgba(5,5,10,0.95), transparent);
            border-bottom: 1px solid var(--border);
        }
        .opp-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; border-radius: 4px; background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--border); transition: all 0.3s;
        }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.08); box-shadow: inset 0 0 15px rgba(64, 224, 208, 0.1); }
        .opp-name { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; color: var(--steam-gold); letter-spacing: 2px; }
        .opp-hand-visual { display: flex; gap: -18px; margin-top: 6px; }
        .mini-card-back {
            width: var(--opp-card-w); height: var(--opp-card-h);
            background: #111; border: 1px solid var(--steam-gold); border-radius: 2px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.8);
        }

        /* フィールド */
        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .field-card-container {
            position: relative; z-index: 10;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
        }

        .turn-indicator-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif; font-size: 100px; font-weight: 900; opacity: 0.06;
            pointer-events: none; color: var(--accent); white-space: nowrap; font-style: italic;
            animation: pulse-aura 4s infinite ease-in-out;
        }
        @keyframes pulse-aura { 0%, 100% { scale: 1; opacity: 0.04; } 50% { scale: 1.1; opacity: 0.08; } }

        /* 凡例（ルーン文字パネル） */
        .cycle-legend {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            background: rgba(10,10,15,0.85); padding: 12px; border: 1.5px solid var(--steam-gold);
            border-radius: 4px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 9px; font-weight: 900; letter-spacing: 1px; }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        /* カードデザイン */
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 4px; border: 2px solid var(--steam-gold);
            background: #000; overflow: hidden; position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
        .card-footer {
            position: absolute; bottom: 0; width: 100%; background: rgba(5,5,8,0.96);
            font-size: 10px; font-weight: 900; padding: 7px 0; text-align: center;
            border-top: 2px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif;
        }

        /* 手札ホバー */
        .my-card { margin-left: -45px; transform-origin: bottom center; cursor: pointer; }
        .my-card.playable:hover {
            transform: translateY(-55px) scale(1.35) !important;
            z-index: 1000 !important;
            border-color: #fff;
            box-shadow: 0 30px 60px rgba(0,0,0,1), 0 0 30px var(--accent);
        }
        .my-card.not-playable { opacity: 0.2; filter: grayscale(1) brightness(0.4); cursor: not-allowed; }

        /* ボタン（接続・アクション） */
        .btn-main {
            background: linear-gradient(135deg, var(--steam-gold), #B8860B);
            color: #000; border: 2px solid #000;
            padding: 15px 0; border-radius: 4px; font-weight: 900; font-size: 14px;
            box-shadow: 0 0 20px rgba(212,175,55,0.3); cursor: pointer;
            width: 85%; transition: all 0.3s; letter-spacing: 5px; font-family: 'Cinzel', serif;
            position: relative; overflow: hidden;
        }
        .btn-main::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: translateX(-100%); transition: 0.6s; }
        .btn-main:hover::before { transform: translateX(100%); }
        .btn-main:hover { filter: brightness(1.2); transform: scale(1.02); box-shadow: 0 0 30px var(--accent); }
        .btn-main:disabled { background: #222; color: #555; box-shadow: none; border-color: #333; cursor: not-allowed; }

        .my-hand-area {
            background: linear-gradient(to top, rgba(5,5,10,1), transparent);
            padding-bottom: 40px; display: flex; flex-direction: column; align-items: center;
        }
        .hand-container { display: flex; justify-content: center; padding: 20px 50px; min-height: 190px; align-items: flex-end; }

        /* パネル・モーダル */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .panel { 
            background: #08080c; border: 2px solid var(--steam-gold); 
            padding: 50px 30px; border-radius: 4px; text-align: center; 
            width: 82%; display: flex; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 0 50px rgba(212,175,55,0.2), inset 0 0 20px rgba(0,0,0,0.9);
        }
        .panel input {
            width: 100%; padding: 18px; background: #000; border: 1px solid var(--steam-gold); 
            color: var(--accent); text-align: center; font-size: 15px; font-family: 'Exo 2', sans-serif;
            border-radius: 2px; outline: none; transition: 0.3s;
        }
        .panel input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(64,224,208,0.2); }

        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .realm-btn { 
            padding: 14px; border: 1.5px solid var(--steam-gold); 
            background: rgba(255,255,255,0.02); color: #fff; font-weight: 900; 
            cursor: pointer; font-size: 12px; transition: 0.3s; font-family: 'Cinzel', serif;
        }
        .realm-btn:hover { background: var(--steam-gold); color: #000; }

        .status-badge { 
            background: #000; color: var(--danger); border: 1px solid var(--danger);
            padding: 10px 25px; font-weight: 900; font-size: 13px; margin-bottom: 25px; 
            animation: glitch-anim 0.4s infinite; text-transform: uppercase; letter-spacing: 3px;
        }
        @keyframes glitch-anim {
            0% { transform: translate(0); text-shadow: 2px 0 var(--accent); }
            50% { transform: translate(-2px, 1px); text-shadow: -2px 0 var(--cyber-pink); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: 'GEAR', color: '#FF8C00' },
            ICEAGE: { n: 'ICEAGE', color: '#00BFFF' },
            FOUNTAIN: { n: 'FOUNTAIN', color: '#4169E1' },
            BATTERY: { n: 'BATTERY', color: '#32CD32' },
            MACHINE: { n: 'MACHINE', color: '#2F4F4F' },
            ARCHIVE: { n: 'ARCHIVE', color: '#8B4513' },
            PLANET: { n: 'PLANET', color: '#9400D3' },
            RUINS: { n: 'RUINS', color: '#696969' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState(''); // 初期値を空に
            const [name, setName] = useState(''); // 初期値を空に
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [previewStatus, setPreviewStatus] = useState('waiting');

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            const effectiveGameState = useMemo(() => {
                if (gs) return gs;
                if (joined) {
                    return {
                        status: previewStatus,
                        currentTurnPlayerId: 'mock-me',
                        fieldCard: { realm: 'GEAR', isSpecial: false },
                        players: [
                            { id: 'mock-me', name: name || 'ANONYMOUS', handCount: 5, hand: [
                                { id: 'c1', realm: 'GEAR', isSpecial: true },
                                { id: 'c2', realm: 'ICEAGE', isSpecial: false },
                                { id: 'c3', realm: 'PLANET', isSpecial: false },
                                { id: 'c4', realm: 'ARCHIVE', isSpecial: false },
                                { id: 'c5', realm: 'MACHINE', isSpecial: true }
                            ] },
                            { id: 'mock-1', name: 'CYBER-WITCH', handCount: 4 },
                            { id: 'mock-2', name: 'BRASS-KNIGHT', handCount: 3 }
                        ],
                        nextDrawAmount: 1,
                        isReversed: false
                    };
                }
                return null;
            }, [gs, joined, name, previewStatus]);

            const me = effectiveGameState?.players?.find(p => p.id === (socket?.id || 'mock-me')) || { hand: [] };
            const isMyTurn = effectiveGameState?.currentTurnPlayerId === (socket?.id || 'mock-me');
            const others = effectiveGameState?.players?.filter(p => p.id !== (socket?.id || 'mock-me')) || [];

            const canPlay = (card) => {
                if (!isMyTurn || effectiveGameState.status !== 'playing') return false;
                if (effectiveGameState.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const field = effectiveGameState.fieldCard?.realm || 'GEAR';
                const hand = card.realm;
                if (hand === 'PLANET' || hand === 'RUINS' || (hand === 'FOUNTAIN' && card.isSpecial)) return true;
                if (field === hand) return true;
                const currentIdx = CYCLE_ORDER.indexOf(field);
                if (currentIdx !== -1 && hand === CYCLE_ORDER[(currentIdx + 1) % 6]) return true;
                if (field === 'ARCHIVE' && hand === 'ICEAGE') return true;
                if (field === 'ICEAGE' && hand === 'BATTERY') return true;
                if (field === 'ICEAGE' && hand === 'FOUNTAIN') return true;
                return false;
            };

            const Card = ({ card, playable, onClick }) => {
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';

                return (
                    <div className={`card ${playable ? 'playable' : 'not-playable'} my-card`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) {
                return (
                    <div className="screen-wrapper">
                        <div className="bg-layer bg-scanline"></div>
                        <div className="bg-layer bg-gears"></div>
                        <div className="overlay">
                            <div className="panel">
                                <h1 style={{color:'var(--steam-gold)', fontSize:28, fontWeight:900, fontStyle:'italic', fontFamily:'Cinzel', letterSpacing:4}}>CROSS REALM</h1>
                                <p style={{fontSize:9, color:'var(--accent)', letterSpacing:6, marginBottom:10}}>ETERNAL PUNK PROTOCOL</p>
                                <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="プレイヤー名" />
                                <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} placeholder="ルームID" />
                                <button onClick={()=>{setJoined(true); if(socket?.connected) socket.emit('join-room',{roomId:room, playerName:name});}} className="btn-main">接続</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (effectiveGameState?.status === 'waiting') {
                return (
                    <div className="screen-wrapper">
                        <div className="bg-layer bg-scanline"></div>
                        <div className="bg-layer bg-gears"></div>
                        <div className="container" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', zIndex:10}}>
                            <h2 style={{letterSpacing:10, opacity:0.6, fontSize:14, fontWeight:900, fontFamily:'Cinzel', color:'var(--steam-gold)'}}>AWAITING LINKAGE</h2>
                            <div style={{marginTop:8, fontSize:10, color:'var(--accent)', fontWeight:900, letterSpacing:2}}>ルームID: {room}</div>
                            <div style={{marginTop:40, display:'flex', flexDirection:'column', gap:12, width:'75%'}}>
                                {effectiveGameState.players.map(p => (
                                    <div key={p.id} style={{padding:15, background:'rgba(255,255,255,0.03)', borderLeft:'3px solid var(--steam-gold)', fontSize:12, fontWeight:900, letterSpacing:1}}>
                                        {p.name}
                                    </div>
                                ))}
                            </div>
                            {effectiveGameState.players[0]?.id === (socket?.id || 'mock-me') && (
                                <button onClick={()=>{ if(socket?.connected) { socket.emit('start-game',{roomId:room}); } else { setPreviewStatus('playing'); } }} className="btn-main" style={{marginTop:50, width:'70%'}}>CORE ENGAGE</button>
                            )}
                        </div>
                    </div>
                );
            }

            const currentRealm = effectiveGameState?.fieldCard?.realm || 'GEAR';

            return (
                <div className="screen-wrapper">
                    <div className="bg-layer bg-magic-aura" style={{ '--realm-color': REALMS[currentRealm].color }}></div>
                    <div className="bg-layer bg-watermark-circle"></div>
                    <div className="bg-layer bg-scanline"></div>
                    <div className="bg-layer bg-gears"></div>

                    <div className="game-container">
                        <div className="opponents-area">
                            {others.map(p => (
                                <div key={p.id} className={`opp-row ${effectiveGameState.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-info">
                                        <div className="opp-name">{p.name}</div>
                                        <div className="opp-hand-visual">
                                            {[...Array(p.handCount)].map((_, i) => <div key={i} className="mini-card-back" />)}
                                        </div>
                                    </div>
                                    <div style={{fontWeight:900, color: 'var(--accent)', fontSize:18}}>{p.handCount}</div>
                                </div>
                            ))}
                        </div>

                        <div className="field">
                            <div className="turn-indicator-watermark">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                            
                            <div className="cycle-legend">
                                <div style={{fontSize:8, fontWeight:900, color: 'var(--steam-gold)', opacity:0.5, marginBottom:6, textAlign:'center'}}>CYCLE</div>
                                {CYCLE_ORDER.map((r) => (
                                    <div key={r} className="legend-item" style={{color: REALMS[r].color, opacity: currentRealm === r ? 1 : 0.25}}>
                                        <div className="legend-dot" style={{background: REALMS[r].color}} />
                                        <span>{r}</span>
                                    </div>
                                ))}
                            </div>

                            {effectiveGameState.nextDrawAmount > 1 && <div className="status-badge">WARNING: DRAW +{effectiveGameState.nextDrawAmount}</div>}
                            
                            <div className="field-card-container">
                                <Card card={effectiveGameState.fieldCard} playable={true} />
                            </div>
                        </div>

                        <div className="my-hand-area">
                            <div style={{display:'flex', justifyContent:'center', padding:'15px 0', width:'100%'}}>
                                <button className="btn-main" disabled={!isMyTurn} onClick={() => {if(socket?.connected) socket.emit('draw-card',{roomId:room})}}>
                                    {effectiveGameState.nextDrawAmount > 1 ? `DRAW OVERRIDE +${effectiveGameState.nextDrawAmount}` : '抽出 / パス'}
                                </button>
                            </div>

                            <div className="hand-container">
                                {me.hand.map((card) => (
                                    <Card key={card.id} card={card} playable={canPlay(card)} 
                                          onClick={() => {
                                            if (!canPlay(card)) return;
                                            if (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial)) {
                                                setSelectorCard(card);
                                            } else if (socket?.connected) {
                                                socket.emit('play-card', { roomId: room, card });
                                            }
                                          }} />
                                ))}
                            </div>
                            <div style={{textAlign:'center', fontSize:9, fontWeight:900, marginTop:12, opacity:0.5, color:'var(--steam-gold)', letterSpacing:3}}>
                                SYNC RATE: {me.hand.length} / 12
                            </div>
                        </div>
                    </div>

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:18, fontWeight:900, marginBottom:10, color:'var(--steam-gold)', fontFamily:'Cinzel', letterSpacing:2}}>REALM RE-ALIGN</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => {
                                                    if(socket?.connected) socket.emit('play-card', {roomId:room, card:selectorCard, chosenRealm:r});
                                                    setSelectorCard(null);
                                                }}>{r}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{marginTop:25, opacity:0.5, background:'transparent', border:'none', color:'#fff', cursor:'pointer', fontWeight:900, fontSize:12, letterSpacing:2}}>CANCEL</button>
                            </div>
                        </div>
                    )}

                    {effectiveGameState.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--steam-gold)', fontSize:26, fontWeight:900, fontFamily:'Cinzel', letterSpacing:4}}>MISSION END</h2>
                                <div style={{width:'100%', margin:'20px 0', textAlign:'left'}}>
                                    {effectiveGameState.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i)=>(
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'15px 5px', borderBottom:'1px solid var(--border)', fontSize:12}}>
                                            <span style={{fontWeight:900, color: i===0 ? 'var(--accent)' : '#fff'}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount} Units</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>{ if(socket?.connected) socket.emit('play-again',{roomId:room}); else setPreviewStatus('waiting'); }} className="btn-main">再接続</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
