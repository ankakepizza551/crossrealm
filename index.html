    <script>

        const SFX_URLS = { turn: 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3', play: 'https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3', draw: 'https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3', alert: 'https://assets.mixkit.co/active_storage/sfx/2862/2862-preview.mp3' };
        window.sfxPools = {}; window.sfxIndex = {}; window.stopFlags = {};
        for(let key in SFX_URLS){ window.sfxPools[key] = Array.from({length: 3}, () => new Audio(SFX_URLS[key])); window.sfxIndex[key] = 0; window.stopFlags[key] = false; }
        window.isMutedGlobal = false;
        window.safePlay = (type) => { if (window.isMutedGlobal) return; window.stopFlags[type] = false; try { const pool = window.sfxPools[type]; const idx = window.sfxIndex[type]; const a = pool[idx]; window.sfxIndex[type] = (idx + 1) % pool.length; a.pause(); a.currentTime = 0; a.play().then(() => { if (window.stopFlags[type]) { a.pause(); a.currentTime = 0; } }).catch(()=>{}); } catch(e){} };
        window.safeStop = (type) => { window.stopFlags[type] = true; try { window.sfxPools[type].forEach(a => { a.pause(); a.currentTime = 0; }); } catch(e){} };
        window.audioUnlocked = false;
        window.unlockAudio = () => { if (window.audioUnlocked) return; for(let key in window.sfxPools){ window.sfxPools[key].forEach(a => { a.volume = 0; a.play().then(() => { a.pause(); a.volume = 0.3; }).catch(()=>{}); }); } window.audioUnlocked = true; };
        ['touchstart', 'mousedown'].forEach(e => document.addEventListener(e, window.unlockAudio, {once: true}));

            const props = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: sw, className: "w-full h-full" };
            switch (realmKey) {
                case 'GEAR': return <svg {...props}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...props}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /><path d="M9 10h6" strokeWidth="1.5" opacity={isSpecial ? 1 : 0} /></svg>;
                case 'FOUNTAIN': return <svg {...props}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...props}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...props}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...props}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...props}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...props}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ card, playable, onClick, isField, style, index = 0 }) => {
            if (!card || !card.realm) return null;
            let displayRealm = card.realm;
            if (card.wasRuins) displayRealm = 'RUINS'; else if (card.wasPlanet) displayRealm = 'PLANET'; else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) displayRealm = 'FOUNTAIN';
            const isSpecial = card.isSpecial || card.wasFountain;
            const rData = REALMS[displayRealm] || REALMS.GEAR;
            const cardRef = useRef(null);
            const [tilt, setTilt] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });
            const [isHovered, setIsHovered] = useState(false);

            const handleMove = (e) => {
                if (!playable && !isField) return;
                if (isField || 'ontouchstart' in window) return;
                const rect = cardRef.current.getBoundingClientRect();
                const rx = ((e.clientY - rect.top - rect.height/2) / (rect.height/2)) * -20;
                const ry = ((e.clientX - rect.left - rect.width/2) / (rect.width/2)) * 20;
                setTilt({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, '--mx': `${((e.clientX - rect.left)/rect.width)*100}%`, '--my': `${((e.clientY - rect.top)/rect.height)*100}%`, transition: 'none' });
            };
            const reset = () => { setIsHovered(false); setTilt({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: '0.4s ease-out' }); };
            const hoverY = (isHovered && !isField) ? 'translateY(-20px) scale(1.15)' : '';

            return (
                <div 
                    className={`card-wrapper-3d ${isHovered ? 'hovered' : ''} ${!playable && !isField ? 'not-playable' : ''}`}
                    style={{ ...style, zIndex: isField ? 'auto' : (isHovered ? 1000 : index), cursor: playable && !isField ? 'pointer' : 'default' }}
                    onMouseMove={handleMove} onMouseLeave={reset} onMouseEnter={() => playable && !isField && setIsHovered(true)} onClick={() => playable && !isField && onClick()} ref={cardRef}
                >
                    <div className={`card-3d mat-${rData.theme}`} style={{ '--r-color': rData.color, '--r-color-glow': rData.glow, '--r-color-dim': rData.dim, '--r-color-bright': rData.bright, transform: `${hoverY} ${tilt.transform}`, ...tilt }}>
                        <div className="card-content">
                            {rData.theme === 'steam' && <div className="steam-meter-mini"><div className="steam-needle" style={{position:'absolute', top:'50%', left:'50%', width:'1px', height:'8px', background:'#f33', transformOrigin:'bottom', transform:'translate(-50%,-100%) rotate(-30deg)'}}></div></div>}
                            {rData.theme === 'fantasy' && (
                                <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', opacity:0.3}}>
                                    <svg viewBox="0 0 100 100" className="w-[120%] h-[120%] animate-[arcane-shimmer_20s_linear_infinite]" style={{color:rData.color}}><circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" strokeWidth="1" strokeDasharray="2 4"/><path d="M50 5 L89 75 L11 75 Z" fill="none" stroke="currentColor" strokeWidth="0.5"/></svg>
                                </div>
                            )}
                            {rData.theme === 'cyber' && <div className="cyber-rain-mini">{[...Array(6)].map((_,i)=><div key={i} className="rain-bit-mini" style={{left:`${i*18}%`, animationDelay:`${i*0.3}s`}}>1010</div>)}</div>}

                            <div className="identity-label-new"><span>{displayRealm}</span></div>
                            
                            {isSpecial && displayRealm === 'GEAR' && <div className="badge-mini">DRAW +2</div>}
                            {isSpecial && displayRealm === 'MACHINE' && <div className="badge-mini" style={{background:'#1a012a', borderLeftColor:rData.color}}>REVERSE</div>}

                            <div className="card-icon-overload" style={{ color: rData.color }}><IconRenderer realmKey={displayRealm} isSpecial={isSpecial} /></div>
                            <div className="card-footer-peak"><span>{rData.n}</span></div>
                        </div>
                        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-60" style={{ background: `radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 65%)` }}></div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [error, setError] = useState('');
            const [bgRealm, setBgRealm] = useState('GEAR');
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);
            const logTerminalRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); setSocket(s);
                s.on('connect', () => setIsConnected(true));
                s.on('disconnect', () => setIsConnected(false));
                s.on('update-game', (data) => { setGs(data); setError(''); });
                s.on('join-error', (msg) => { setError(msg); setJoined(false); });
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => { s.disconnect(); window.removeEventListener('resize', handleResize); };
            }, []);

            useEffect(() => { if (logTerminalRef.current) logTerminalRef.current.scrollTop = logTerminalRef.current.scrollHeight; }, [gs?.logs]);

            const prevTurnRef = useRef(null);
            useEffect(() => {
                if (gs?.status === 'playing') {
                    const isMyTurnNow = gs.currentTurnPlayerId === socket?.id;
                    if (isMyTurnNow && gs.currentTurnPlayerId !== prevTurnRef.current) {
                        if (gs.nextDrawAmount > 1) { window.safePlay('alert'); } else { window.safePlay('turn'); }
                    }
                    prevTurnRef.current = gs.currentTurnPlayerId;
                }
            }, [gs, socket]);

            useEffect(() => {
                let interval;
                if (!gs || gs.status !== 'playing') { interval = setInterval(() => { setBgRealm(prev => { const idx = CYCLE_ORDER.indexOf(prev); return CYCLE_ORDER[(idx + 1) % CYCLE_ORDER.length]; }); }, 4000); }
                return () => clearInterval(interval);
            }, [gs]);

            const currentRealm = (gs?.status === 'playing' && gs?.fieldCard) ? gs.fieldCard.realm : bgRealm;
            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (card) => {
                if (gs?.currentTurnPlayerId !== socket?.id || !card || !gs?.fieldCard) return false;
                if (gs?.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm; const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS' || field === 'PLANET' || field === 'RUINS') return true;
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                const cycle = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                if (['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(field) && field === h) return false;
                return field === h || (cycle[field]?.includes(h));
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                window.safeStop('alert'); window.safePlay('play');
                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) setSelectorCard(card);
                else socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined });
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': REALMS[currentRealm]?.color || '#000' }}>
                    <div className="bg-container">
                        <div className="layer-steam"></div><div className="layer-fantasy"></div><div className="layer-cyber"></div>
                        {[...Array(20)].map((_, i) => (
                            <div key={i} className="particle" style={{ left: `${Math.random() * 100}%`, width: '3px', height: '3px', '--d': `${5 + Math.random() * 8}s`, '--x': `${(Math.random() - 0.5) * 100}px`, background: 'var(--accent)', animationDelay: `${Math.random() * 5}s` }}></div>
                        ))}
                    </div>
                    <div className="bg-magic-aura"></div>
                    
                    {!isConnected && <div className="connection-alert">再接続中...</div>}

                    {!joined && (
                        <div className="overlay">
                            <div className="magic-ring-bg"></div>
                            <div className="panel hex-bg" style={{ zIndex: 10, padding: '50px 30px', clipPath: 'polygon(0 40px, 40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%)', border: 'none', background: 'rgba(5,10,15,0.95)', boxShadow: '0 0 50px rgba(64,224,208,0.5), inset 0 0 50px rgba(138,43,226,0.3)' }}>
                                <div className="hud-frame">
                                    <div className="hud-corner hud-tl"></div><div className="hud-corner hud-tr"></div>
                                    <div className="hud-corner hud-bl"></div><div className="hud-corner hud-br"></div>
                                </div>
                                <div className="text-center mb-8">
                                    <h1 className="logo-main steam-glow"><span>CROSS</span><span className="cross font-cyber glitch-text">X</span><span>REALM</span></h1>
                                    <div className="logo-sub cyber-glow">Eternal Punk Edition</div>
                                </div>
                                {error && <div className="text-red-500 text-xs mb-4 text-center font-black">⚠️ {error}</div>}
                                <input type="text" value={name} placeholder="PLAYER NAME" onChange={e=>setName(e.target.value)} maxLength={10} className="font-base mb-6" style={{width:'100%'}} />
                                <input type="text" value={room} placeholder="ROOM ID" onChange={e=>setRoom(e.target.value.toUpperCase())} className="font-base mb-8" style={{width:'100%'}} />
                                <button onClick={()=>{ window.unlockAudio(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-main text-white">接続開始</button>
                            </div>
                        </div>
                    )}

                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="magic-ring-bg"></div>
                            <div className="panel hex-bg" style={{zIndex: 10, padding: '40px 30px', clipPath: 'polygon(0 30px, 30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%)', background: 'rgba(10,5,20,0.95)', boxShadow: '0 0 50px rgba(138,43,226,0.4), inset 0 0 30px rgba(212,175,55,0.2)'}}>
                                <div className="hud-frame" style={{borderColor: 'rgba(138,43,226,0.5)'}}>
                                    <div className="hud-corner hud-tl" style={{borderColor: '#8A2BE2'}}></div><div className="hud-corner hud-tr" style={{borderColor: '#8A2BE2'}}></div>
                                    <div className="hud-corner hud-bl" style={{borderColor: '#8A2BE2'}}></div><div className="hud-corner hud-br" style={{borderColor: '#8A2BE2'}}></div>
                                </div>
                                <div className="text-center mb-6">
                                    <div className="text-accent font-cyber text-xs mb-2 tracking-widest animate-pulse">AWAITING REALM LINKAGE...</div>
                                    <div className="text-3xl text-steam-gold font-bold font-['Cinzel'] tracking-widest steam-glow">ROOM: {room}</div>
                                </div>
                                <div className="space-y-2 mb-6 max-h-[300px] overflow-y-auto">
                                    {gs?.players?.map((p, idx) => (
                                        <div key={p.id} className="waiting-player">
                                            <span className="font-bold">{p.isBot ? '🤖' : '👤'} {p.name}</span>
                                            {idx === 0 && <div className="bg-steam-gold text-black text-[10px] px-2 font-black">HOST</div>}
                                        </div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div className="flex gap-4">
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="flex-1 btn-sub">CPU追加</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="flex-1 btn-main" disabled={gs?.players?.length < 2}>開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {joined && gs?.status === 'playing' && gs?.fieldCard && (
                        <div className="game-container">
                            <div className="turn-direction">
                                <span className="font-bold">DIRECTION: {gs?.isReversed ? '⟲ REVERSE' : '⟳ NORMAL'}</span>
                            </div>
                            
                            <div className="opponents-area">
                                {gs?.players?.map(p => (
                                    <div key={p.id} className={`opp-row ${gs?.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-name font-bold">{p.id === socket?.id ? '⭐' : '👤'} {p.name}</div>
                                        <div className="opp-hand-visual">
                                            <div className="text-accent font-black text-lg">{p.handCount}</div>
                                            <div className="mini-cards-stack">
                                                {[...Array(Math.min(p.handCount, 4))].map((_, i) => <div key={i} className="mini-card-back" style={{left: `${i*6}px`, zIndex: i}} />)}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => (
                                    <div key={r} className={`cycle-item ${currentRealm === r ? 'active' : ''}`}>
                                        <div className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}></div>
                                        <div className="cycle-label">{REALMS[r].n}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="field">
                                <div className={`text-xs font-bold ${gs?.currentTurnPlayerId === socket?.id ? 'text-accent' : 'text-slate-500'}`}>{gs?.currentTurnPlayerId === socket?.id ? 'YOUR TURN' : 'WAITING'}</div>
                                <div className="relative w-[90px] h-[130px]">
                                    <div className="field-magic-circle"></div>
                                    {gs?.playHistory?.slice(-2, -1).map((card, i) => (
                                        <div key={i} className="absolute inset-0 opacity-40" style={{transform: 'rotate(-5deg) translate(-2px, -2px)'}}><CardView card={card} isField={true} /></div>
                                    ))}
                                    <div className="relative z-10"><CardView card={gs?.fieldCard} isField={true} /></div>
                                </div>
                                <div className="info-panel">
                                    <div className="realm-title">{REALMS[currentRealm]?.n}</div>
                                    <div className="text-[10px] opacity-60 leading-tight">{REALMS[currentRealm]?.desc}</div>
                                </div>
                            </div>

                            <div ref={logTerminalRef} className="log-terminal">
                                {gs?.logs?.slice(-10).map((log) => (
                                    <div key={log.id} className={`log-line ${log.text.includes('PLAY') ? 'play' : ''}`}>{log.text}</div>
                                ))}
                            </div>

                            <div className="hand-container">
                                <div className="hand-flex">
                                    {(() => {
                                        const count = sortedHand.length;
                                        const overlap = count > 8 ? (windowWidth * 0.8 / count) : 60;
                                        return sortedHand.map((card, i) => (
                                            <CardView key={card.id || i} card={card} playable={canPlay(card)} onClick={() => handlePlay(card)} index={i} style={{ marginLeft: i === 0 ? 0 : `-${90 - overlap}px` }} />
                                        ));
                                    })()}
                                </div>
                            </div>
                            
                            <div className="action-row">
                                <button className="btn-main" disabled={gs?.currentTurnPlayerId !== socket?.id} onClick={() => { window.safePlay('draw'); socket.emit('draw-card',{roomId:room}); }}>
                                    {gs?.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : 'ドロー'}
                                </button>
                            </div>
                        </div>
                    )}

                    {selectorCard && (
                        <div className="overlay" style={{zIndex: 100000}}>
                            <div className="w-full max-w-sm bg-black/95 p-6 border-2 border-steam-gold rounded-lg hex-bg">
                                <div className="hud-frame" style={{borderColor: 'var(--steam-gold)'}}></div>
                                <h3 className="text-xl font-black text-center mb-6 text-steam-gold font-['Cinzel'] steam-glow">属性を選択</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="p-3 border border-white/20 rounded flex items-center gap-2 hover:bg-white/10" style={{color: REALMS[r].color}} onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}>
                                            <div className="w-5 h-5"><IconRenderer realmKey={r} isSpecial={false} /></div>
                                            <span className="font-bold">{REALMS[r].n}</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} className="w-full mt-4 text-white/40 text-xs py-2">キャンセル</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (
                        <div className="overlay">
                            <div className="bg-black border-4 border-accent p-10 rounded-lg text-center hex-bg relative">
                                <div className="hud-frame"></div>
                                <h2 className="text-4xl font-black text-accent mb-6 font-['Cinzel'] cyber-glow">FINISH</h2>
                                <div className="space-y-3 mb-8">
                                    {gs?.players?.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                        <div key={p.id} className="flex justify-between border-b border-white/10 pb-2">
                                            <span className={i === 0 ? 'text-steam-gold' : 'text-white'}>#{i+1} {p.name}</span>
                                            <span className="font-bold">{p.handCount}枚</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => socket.emit('play-again', {roomId: room})} className="flex-1 btn-main">再戦</button>
                                    <button onClick={() => window.location.reload()} className="flex-1 btn-sub">終了</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
