<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --steam-gold: #D4AF37;
            --danger: #FF4500;
            --bg: #050508; 
            --card-w: 115px; 
            --card-h: 165px;
            --opp-card-w: 32px;
            --opp-card-h: 46px;
            --border: rgba(212, 175, 55, 0.45);
        }
        
        body { margin: 0; background: #000; color: white; font-family: 'Exo 2', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .screen-wrapper {
            width: 100vw; height: 100vh;
            max-width: calc(100vh * 9 / 16); max-height: 100vh;
            background: var(--bg);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            border-left: 2px solid var(--steam-gold); border-right: 2px solid var(--steam-gold);
        }

        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180%; height: 180%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/><circle cx="100" cy="100" r="75" fill="none" stroke="rgba(64,224,208,0.05)" stroke-width="0.4"/></svg>'); animation: rotate-eternal 180s linear infinite; }
        @keyframes rotate-eternal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .bg-magic-aura { position: absolute; inset: 0; background: radial-gradient(circle at center, var(--realm-color, rgba(64, 224, 208, 0.2)) 0%, transparent 85%); opacity: 0.5; transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .bg-scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.15) 50%); background-size: 100% 4px; z-index: 5; }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* 相手エリアの修正 */
        .opponents-area { display: flex; flex-direction: column; gap: 10px; padding: 25px 15px 15px 15px; border-bottom: 2px solid var(--border); z-index: 10; background: rgba(0,0,0,0.5); }
        .opp-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-radius: 12px; background: rgba(255,255,255,0.03); border-left: 6px solid var(--border); transition: 0.3s; gap: 10px; }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.12); box-shadow: inset 0 0 25px rgba(64, 224, 208, 0.2); }
        
        .opp-info { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow: hidden; }
        /* 10文字に対応 */
        .opp-name { 
            font-family: 'Cinzel', serif; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--steam-gold); 
            letter-spacing: 1px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 100%;
        }
        
        .opp-hand-visual { display: flex; height: var(--opp-card-h); align-items: center; overflow: hidden; max-width: 120px; }
        .mini-card-back { 
            width: var(--opp-card-w); height: var(--opp-card-h); 
            background: linear-gradient(135deg, #222, #000); 
            border: 1px solid var(--steam-gold); border-radius: 3px; 
            margin-right: -24px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.5); 
            flex-shrink: 0; position: relative; z-index: 1;
        }

        .cycle-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px 30px 10px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--border); gap: 4px; }
        .cycle-dot { flex: 1; height: 6px; border-radius: 3px; background: #1a1a1a; position: relative; transition: 0.5s; }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 15px var(--dot-color); }
        .cycle-dot.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; border-radius: 50%; background: var(--dot-color); box-shadow: 0 0 20px var(--dot-color), inset 0 0 5px #fff; }
        .cycle-label { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 900; color: #fff; opacity: 0.35; letter-spacing: 0.5px; transition: 0.3s; white-space: nowrap; }

        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; gap: 30px; }
        .field-main-area { display: flex; align-items: center; gap: 30px; width: 100%; justify-content: center; z-index: 10; }

        .info-panel { flex: 1; background: rgba(10,10,15,0.95); border: 2.5px solid var(--steam-gold); padding: 22px; border-radius: 12px; backdrop-filter: blur(15px); box-shadow: 0 0 45px rgba(0,0,0,0.9); max-width: 240px; }
        .realm-title { font-family: 'Cinzel', serif; font-size: 30px; font-weight: 900; color: var(--realm-color); margin-bottom: 10px; letter-spacing: 3px; text-shadow: 0 0 15px var(--realm-color); }

        .action-area { padding: 15px 0; display: flex; justify-content: center; align-items: center; z-index: 110; width: 100%; box-sizing: border-box; }
        .action-area .btn-main { width: 85%; max-width: 400px; }

        .hand-area { background: linear-gradient(to top, rgba(5,5,10,1) 0%, rgba(5,5,10,0.96) 85%, transparent 100%); padding-bottom: 15px; display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 100; }
        .hand-flex { display: flex; justify-content: flex-start; padding: 80px 100px 30px 100px; min-height: 230px; align-items: flex-end; overflow-x: auto; width: 100%; box-sizing: border-box; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .hand-flex::-webkit-scrollbar { height: 4px; }
        .hand-flex::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .hand-flex::-webkit-scrollbar-thumb { background: var(--steam-gold); border-radius: 2px; }

        .card { width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 3.5px solid var(--steam-gold); background: #000; overflow: hidden; position: relative; box-shadow: 0 25px 65px rgba(0,0,0,1); flex-shrink: 0; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
        .card-footer { position: absolute; bottom: 0; width: 100%; background: rgba(5,5,10,0.98); font-size: 14px; font-weight: 900; padding: 10px 0; text-align: center; border-top: 3.5px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif; }

        .my-card { margin-left: -55px; transform-origin: bottom center; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); position: relative; }
        .my-card:first-child { margin-left: 0; }
        .my-card.playable:hover { transform: translateY(-80px) scale(1.5) !important; z-index: 1000 !important; border-color: #fff; box-shadow: 0 45px 90px rgba(0,0,0,1), 0 0 55px var(--accent); }
        .my-card.not-playable { opacity: 0.15; filter: grayscale(1) brightness(0.3); cursor: not-allowed; }

        .overlay { position: absolute; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); background: rgba(0,0,0,0.4); padding: 40px; }
        .panel { background: rgba(10, 10, 15, 0.85); border: 2px solid var(--border); padding: 50px 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; gap: 30px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        .btn-main { background: linear-gradient(135deg, var(--steam-gold), #B8860B); color: #000; border: none; padding: 20px 0; border-radius: 12px; font-weight: 900; font-size: 18px; box-shadow: 0 10px 30px rgba(184, 134, 11, 0.3); cursor: pointer; width: 100%; transition: 0.3s; letter-spacing: 6px; font-family: 'Cinzel', serif; display: flex; align-items: center; justify-content: center; }
        .btn-main:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.2); }

        .logo-main { font-family: 'Cinzel', serif; font-size: 38px; font-weight: 900; letter-spacing: 12px; color: var(--steam-gold); text-shadow: 0 0 20px rgba(212,175,55,0.4); text-align: center; width: 100%; padding-left: 12px; box-sizing: border-box; }
        .logo-sub { font-size: 11px; color: var(--accent); letter-spacing: 8px; opacity: 0.8; text-transform: uppercase; margin-bottom: 20px; text-align: center; padding-left: 8px; }
        .panel input { width: 100%; padding: 18px; background: rgba(0,0,0,0.5); border: 1.5px solid rgba(212,175,55,0.3); color: var(--accent); text-align: center; font-size: 18px; border-radius: 12px; outline: none; font-weight: 700; box-sizing: border-box; }

        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .waiting-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .waiting-player { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.15); padding: 16px 20px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 16px; font-weight: 700; color: #eee; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', desc: 'セットA：維持。', effect: '特殊(S): +2ドロー攻撃' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', desc: 'セットA→B：遷移。', effect: '' },
            FOUNTAIN: { n: '噴水', color: '#4169E1', desc: 'セットB：維持。', effect: '特殊(S): 限定ワイルド' },
            BATTERY: { n: '電池', color: '#32CD32', desc: 'セットB→C：遷移。', effect: '' },
            MACHINE: { n: '機械', color: '#2F4F4F', desc: 'セットC：維持。', effect: '特殊(S): 順番反転' },
            ARCHIVE: { n: '古文書', color: '#8B4513', desc: 'セットC→A：遷移。', effect: '' },
            PLANET: { n: '惑星', color: '#9400D3', desc: '星々の加護。', effect: 'ワイルド' },
            RUINS: { n: '廃墟', color: '#696969', desc: '遺跡の記憶。', effect: 'ワイルド' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = gs?.fieldCard?.realm || 'GEAR';

            const sortedHand = useMemo(() => {
                const playerMe = gs?.players?.find(p => p.id === socket?.id);
                if (!playerMe || !playerMe.hand) return [];
                return [...playerMe.hand].sort((a, b) => {
                    let idxA = CYCLE_ORDER.indexOf(a.realm);
                    let idxB = CYCLE_ORDER.indexOf(b.realm);
                    if (idxA === -1) idxA = 99;
                    if (idxB === -1) idxB = 99;
                    return idxA - idxB;
                });
            }, [gs, socket]);

            const canPlay = (card) => {
                if (!isMyTurn) return false;
                if (gs.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm;
                const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS') return true;
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                
                switch (field) {
                    case 'GEAR':     case '歯車':   return (h === 'GEAR' || h === 'ICEAGE');
                    case 'ICEAGE':   case '氷河期': return (h === 'FOUNTAIN' || h === 'BATTERY');
                    case 'FOUNTAIN': case '噴水':   return (h === 'FOUNTAIN' || h === 'BATTERY');
                    case 'BATTERY':  case '電池':   return (h === 'MACHINE' || h === 'ARCHIVE');
                    case 'MACHINE':  case '機械':   return (h === 'MACHINE' || h === 'ARCHIVE');
                    case 'ARCHIVE':  case '古文書': return (h === 'GEAR' || h === 'ICEAGE');
                    default: return false;
                }
            };

            const hasPlayableCard = useMemo(() => {
                if (!isMyTurn) return false;
                return sortedHand.some(card => canPlay(card));
            }, [sortedHand, isMyTurn, currentRealm, gs?.nextDrawAmount]);

            const CardView = ({ card, playable, onClick, isField }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';

                return (
                    <div className={`card ${isField ? '' : (playable ? 'playable my-card' : 'not-playable my-card')}`} 
                         style={{'--r-color': (REALMS[card.realm] || {color:'#333'}).color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">
                            {(REALMS[card.realm] || {n:card.realm}).n} {card.isSpecial ? '(S)' : ''}
                        </div>
                    </div>
                );
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': (REALMS[currentRealm] || {color:'#111'}).color }}>
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-magic-aura"></div>
                    <div className="bg-layer bg-scanline"></div>

                    {!joined && (
                        <div className="overlay">
                            <div className="panel">
                                <div style={{width: '100%'}}>
                                    <h1 className="logo-main">CROSS REALM</h1>
                                    <p className="logo-sub">Eternal Punk Edition</p>
                                </div>
                                <div style={{width:'100%', display:'flex', flexDirection:'column', gap:15}}>
                                    <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="プレイヤー名" maxLength={10} />
                                    <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} placeholder="ルームID" />
                                </div>
                                <button onClick={()=>{setJoined(true); if(socket?.connected) socket.emit('join-room',{roomId:room, playerName:name});}} className="btn-main">接続</button>
                            </div>
                        </div>
                    )}

                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="panel">
                                <div>
                                    <h2 style={{letterSpacing:8, opacity:0.8, fontSize:14, fontWeight:900, fontFamily:'Cinzel', color:'var(--steam-gold)', marginBottom:10}}>接続待機中</h2>
                                    <div style={{fontSize:24, color:'var(--accent)', fontWeight:900, letterSpacing:4, textShadow:'0 0 10px rgba(64,224,208,0.5)'}}>ルームID: {room}</div>
                                </div>
                                <div className="waiting-list">
                                    {gs?.players?.map(p => (
                                        <div key={p.id} className="waiting-player">
                                            <span>{p.name}</span>
                                            <div className="sync-dot"></div>
                                        </div>
                                    ))}
                                    {[...Array(Math.max(0, 2 - (gs?.players?.length || 0)))].map((_, i) => (
                                        <div key={i} className="waiting-player" style={{opacity:0.2, borderStyle:'dashed'}}>
                                            <span style={{fontSize:12}}>プレイヤー待機...</span>
                                        </div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" disabled={gs?.players?.length < 2}>ゲーム開始</button>
                                )}
                            </div>
                        </div>
                    )}

                    {joined && gs?.status === 'playing' && (
                        <div className="game-container">
                            <div className="opponents-area">
                                {gs.players.filter(p => p.id !== socket?.id).map(p => (
                                    <div key={p.id} className={`opp-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-info">
                                            <div className="opp-name">{p.name}</div>
                                            <div className="opp-hand-visual">
                                                {[...Array(Number(p.handCount))].map((_, i) => (
                                                    <div key={i} className="mini-card-back" />
                                                ))}
                                            </div>
                                        </div>
                                        <div style={{fontWeight:900, color: 'var(--accent)', fontSize:24, minWidth: '85px', textAlign: 'right'}}>{p.handCount} Units</div>
                                    </div>
                                ))}
                            </div>

                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => (
                                    <div key={r} className={`cycle-dot ${currentRealm === r || (REALMS[r] && REALMS[r].n === currentRealm) ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}>
                                        <div className="cycle-label">{REALMS[r].n}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="field">
                                <div className="turn-watermark">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                                {gs.nextDrawAmount > 1 && <div className="status-badge">WARNING: DRAW +{gs.nextDrawAmount}</div>}
                                
                                <div className="field-main-area">
                                    <CardView card={gs.fieldCard} isField={true} />
                                    <div className="info-panel">
                                        <div className="realm-title" style={{'--realm-color': (REALMS[currentRealm] || {color:'#fff'}).color}}>
                                            {(REALMS[currentRealm] || {n:currentRealm}).n}
                                        </div>
                                        <div className="realm-desc">
                                            {(REALMS[currentRealm] || {desc:''}).desc}
                                            {gs.fieldCard?.isSpecial && REALMS[currentRealm]?.effect && (
                                                <div className="effect-badge">{REALMS[currentRealm].effect}</div>
                                            )}
                                        </div>
                                        <div className="next-hint">
                                            {gs.nextDrawAmount > 1 ? "対抗: 歯車(S) のみ" : "ペアサイクルに従ってください"}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="action-area">
                                <button className="btn-main" disabled={!isMyTurn} onClick={() => socket.emit('draw-card',{roomId:room})}>
                                    {gs.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引いて回避` : (isMyTurn ? (hasPlayableCard ? '手札を選択' : 'カードを引く') : '待機中...')}
                                </button>
                            </div>

                            <div className="hand-area">
                                <div className="hand-flex">
                                    {sortedHand.map((card) => (
                                        <CardView key={card.id} card={card} playable={canPlay(card)} 
                                                  onClick={() => {
                                                    if (!canPlay(card)) return;
                                                    const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                                                    if (isWild) setSelectorCard(card);
                                                    else socket.emit('play-card', { roomId: room, card });
                                                  }} />
                                    ))}
                                </div>
                                <div style={{textAlign:'center', fontSize:14, fontWeight:900, marginTop:10, opacity:0.8, color:'var(--steam-gold)', letterSpacing:5}}>
                                    CORE SYNC: {sortedHand.length} / {gs.handLimit}
                                </div>
                            </div>
                        </div>
                    )}

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel" style={{maxWidth:'450px'}}>
                                <h3 style={{fontSize:28, fontWeight:900, marginBottom:15, color:'var(--steam-gold)', fontFamily:'Cinzel'}}>属性変更</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => {
                                                    socket.emit('play-card', {roomId:room, card:selectorCard, chosenRealm:r});
                                                    setSelectorCard(null);
                                                }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{marginTop:20, opacity:0.8, color:'#fff', cursor:'pointer', border:'none', background:'none', fontWeight:900, fontSize:18}}>キャンセル</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--steam-gold)', fontSize:36, fontWeight:900, fontFamily:'Cinzel'}}>結果</h2>
                                <div style={{width:'100%', margin:'30px 0'}}>
                                    {gs.players.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'18px 0', borderBottom:'1px solid rgba(212,175,55,0.2)', fontSize:20}}>
                                            <span style={{fontWeight:900}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount}枚</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main">再接続</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
