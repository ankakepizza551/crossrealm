<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --bg: #050505; 
            --card-w: 85px; 
            --card-h: 125px;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden; transition: background 1s ease;
        }

        .bg-aura {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, transparent 70%);
            opacity: 0.15; pointer-events: none; z-index: -1;
            transition: 1.5s ease;
        }

        .game-container { 
            display: flex; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; 
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; margin-bottom: 10px; height: 50px; }
        
        .card-wrapper { perspective: 1000px; transition: 0.3s; }
        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: #000; position: relative; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            overflow: hidden; cursor: pointer; transform-style: preserve-3d;
        }
        .card:hover { 
            transform: rotateY(10deg) rotateX(5deg) translateY(-15px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px var(--accent);
            border-color: var(--accent);
        }
        .card.disabled { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 4px 0; text-align: center; font-size: 10px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); }

        .center-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 40px; }
        .main-field { position: relative; padding: 30px; border-radius: 50%; background: radial-gradient(circle, rgba(64,224,208,0.05) 0%, transparent 70%); }

        .btn { 
            padding: 12px 25px; border-radius: 30px; border: 1px solid var(--accent); background: transparent; 
            color: var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
        }
        .btn:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        .btn:disabled { opacity: 0.2; border-color: #444; color: #444; }

        .hand-container { padding: 10px; border-radius: 30px 30px 0 0; min-height: 160px; transition: 0.5s; position: relative; }
        .my-turn-active { border-top: 1px solid var(--accent); background: linear-gradient(to top, rgba(64,224,208,0.05), transparent); }
        .hand-flex { display: flex; justify-content: center; margin-left: 30px; }
        .slot { margin-left: -35px; transition: 0.25s; }
        .slot:hover { z-index: 100 !important; }

        .badge { position: absolute; top: 6px; right: 6px; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .winner-text { font-size: 48px; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px var(--accent); margin-bottom: 10px; }
        .warning-text { color: #ff4444; font-weight: bold; font-size: 13px; position: absolute; top: -30px; width: 100%; text-align: center; animation: blink 1s infinite; text-shadow: 0 0 10px #ff4444; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', next: 'ICEAGE', canDuplicate: true, desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', next: 'FOUNTAIN', canDuplicate: false, desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', next: 'BATTERY', canDuplicate: true, desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', next: 'MACHINE', canDuplicate: false, desc: 'エネルギーが充填される。' },
            MACHINE: { n: '機械', color: '#ADFF2F', next: 'ARCHIVE', canDuplicate: true, desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', next: 'GEAR', canDuplicate: false, desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            const currentRealmColor = useMemo(() => {
                if (gs && gs.fieldCard && REALMS[gs.fieldCard.realm]) return REALMS[gs.fieldCard.realm].color;
                return '#40E0D0';
            }, [gs]);

            // --- 精密なルール判定ロジック ---
            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                
                // 1. ドロー攻撃中 (+2累積)
                if (gs.nextDrawAmount > 1) {
                    return (c.realm === 'GEAR' && c.isSpecial); 
                }

                const f = gs.fieldCard.realm; 
                const h = c.realm;           

                // 2. 特殊FOUNTAIN (WILD) または 手札がWILD属性(PLANET, RUINS)
                if ((c.realm === 'FOUNTAIN' && c.isSpecial) || REALMS[h].w) return true;
                
                // 3. 場のカードがWILD系属性の場合（なんでも出せる）
                if (REALMS[f].w) return true;

                // 4. 【噴水の特殊ルール】氷河期(ICEAGE)の上、または噴水同士で出せる
                if (h === 'FOUNTAIN' && (f === 'ICEAGE' || f === 'FOUNTAIN')) {
                    return true;
                }

                // 5. 同じ属性の場合（ICEAGE等は連続出し不可をチェック）
                if (f === h) {
                    return REALMS[h].canDuplicate;
                }

                // 6. 属性サイクルの判定
                const cycle = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];
                const fIdx = cycle.indexOf(f);
                if (fIdx !== -1) {
                    const nextRealm = cycle[(fIdx + 1) % 6];
                    return (h === nextRealm);
                }
                
                return false;
            };

            const CardView = ({ card, disabled, onClick }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className="card-wrapper">
                        <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                            <img src={src} alt={card.realm} onError={(e) => { e.target.style.display='none'; e.target.parentNode.style.background='#111'; }} />
                            {card.realm === 'GEAR' && card.isSpecial && <div className="badge" style={{background:'#FF4500'}}>+2</div>}
                            {card.realm === 'FOUNTAIN' && card.isSpecial && <div className="badge" style={{background:'#00CED1'}}>WILD</div>}
                            {card.realm === 'MACHINE' && card.isSpecial && <div className="badge" style={{background:'#FFA500'}}>REV</div>}
                            <div className="card-ui" style={{borderTop:`2px solid ${REALMS[card.realm].color}`}}>{REALMS[card.realm].n}</div>
                        </div>
                    </div>
                );
            };

            if (gs?.status === 'finished') {
                const winner = gs.players.find(p => p.handCount === 0);
                const amIReady = gs.readyPlayers?.includes(socket.id);
                return (
                    <div className="result-overlay">
                        <div className="winner-text">{winner?.name} WIN</div>
                        <div style={{display:'flex', gap:'20px', marginTop:'20px'}}>
                            <button className="btn" onClick={() => socket.emit('play-again', {roomId: room})} disabled={amIReady}>
                                {amIReady ? 'WAITING...' : 'REBOOT SYSTEM'}
                            </button>
                            <button className="btn" style={{borderColor:'#444', color:'#888'}} onClick={() => {
                                socket.emit('leave-room', {roomId: room}); setJoined(false); setGs(null);
                            }}>EXIT</button>
                        </div>
                    </div>
                );
            }

            if (!joined) return (
                <div className="overlay" style={{background:'var(--bg)'}}>
                    <div className="bg-aura" style={{'--realm-color': '#40E0D0', opacity: 0.3}}></div>
                    <h1 style={{fontSize:'42px', letterSpacing:'12px', fontWeight:'900', color:'var(--accent)'}}>CROSS REALM</h1>
                    <div style={{display:'flex', flexDirection:'column', gap:'15px', marginTop:'30px'}}>
                        <input className="btn" style={{background:'#000', width:'240px', textAlign:'center'}} placeholder="IDENTIFIER" value={name} onChange={e=>setName(e.target.value)} />
                        <input className="btn" style={{background:'#000', width:'240px', textAlign:'center'}} placeholder="CHANNEL ID" value={room} onChange={e=>setRoom(e.target.value)} />
                        <button className="btn" style={{width:'240px', background:'var(--accent)', color:'#000'}} onClick={()=>{if(room && name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>SYNC START</button>
                    </div>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="glass-panel" style={{padding:'40px 60px'}}>
                        <h2 style={{letterSpacing:'4px'}}>WAITING... ({gs?.players?.length || 0}/4)</h2>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && 
                            <button className="btn" style={{marginTop:'20px'}} onClick={()=>socket.emit('start-game',{roomId:room})}>EXECUTE</button>
                        }
                    </div>
                </div>
            );

            const fieldInfo = REALMS[gs.fieldCard.realm];

            return (
                <div className="game-container" style={{'--realm-color': currentRealmColor}}>
                    <div className="bg-aura"></div>
                    <div className="top-bar glass-panel">
                        <div style={{fontSize:'12px', color:gs.isReversed?'orange':currentRealmColor, fontWeight:'bold', width:'100px'}}>
                            {gs.isReversed ? '◀ REVERSE' : 'NORMAL ▶'}
                        </div>
                        <div style={{display:'flex', gap:'10px'}}>
                            {others.map(p => (
                                <div key={p.id} className="glass-panel" style={{padding: '5px 15px', fontSize:'11px', borderColor: gs.currentTurnPlayerId === p.id ? currentRealmColor : 'transparent'}}>
                                    {p.name}: {p.handCount}
                                </div>
                            ))}
                        </div>
                        <div style={{fontSize:'11px', opacity:0.5, textAlign:'right', width:'100px'}}>{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                    </div>

                    <div className="center-stage">
                        <div className="info-panel glass-panel" style={{padding: '20px', width:'180px'}}>
                            <div style={{fontSize:'22px', color:currentRealmColor, fontWeight:'bold', margin:'5px 0'}}>{fieldInfo.n}</div>
                            <p style={{fontSize:'11px', opacity:0.8, lineHeight:'1.4'}}>{fieldInfo.desc}</p>
                            {!fieldInfo.w && <p style={{fontSize:'10px', color:currentRealmColor, marginTop:'10px'}}>NEXT: {REALMS[fieldInfo.next].n}</p>}
                        </div>
                        <div className="main-field">
                            <div style={{transform:'scale(1.5)'}}><CardView card={gs.fieldCard} /></div>
                        </div>
                        <div className="info-panel glass-panel" style={{width:'150px', textAlign:'center', padding:'20px'}}>
                            <button className="btn" style={{width:'100%'}} onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                                {gs.nextDrawAmount > 1 ? `DRAW +${gs.nextDrawAmount}` : "DRAW / PASS"}
                            </button>
                        </div>
                    </div>

                    <div className={`hand-container ${isMyTurn ? 'my-turn-active' : ''}`}>
                        {gs.nextDrawAmount > 1 && isMyTurn && <div className="warning-text">CRITICAL: STACKED DRAW {gs.nextDrawAmount}</div>}
                        <div className="hand-flex">
                            {me.hand.map((c,i)=>(
                                <div key={c.id} className="slot" style={{zIndex:i}}>
                                    <CardView card={c} disabled={!canPlay(c)} onClick={()=>{
                                        if(!canPlay(c)) return;
                                        if(c.realm==='PLANET'||c.realm==='RUINS'||(c.realm==='FOUNTAIN'&&c.isSpecial)) {
                                            setSelectorCard(c);
                                        } else {
                                            socket.emit('play-card',{roomId:room, card:c});
                                        }
                                    }}/>
                                </div>
                            ))}
                        </div>
                    </div>

                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay">
                            <div className="glass-panel" style={{padding:'40px'}}>
                                <h3 style={{marginBottom:'25px', letterSpacing:'4px'}}>SELECT TARGET REALM</h3>
                                <div style={{display:'flex', flexWrap:'wrap', justifyContent:'center', maxWidth:'340px'}}>
                                    {['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'].map(r=>(
                                        <button key={r} className="btn" style={{margin:'6px', borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={()=>{
                                            if(selectorCard) {
                                                // ワイルド系で「歯車」を選んでもドロー効果が発生しないようにサーバーに伝える
                                                socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r, preventSpecial:true});
                                                setSelectorCard(null);
                                            }
                                            else { socket.emit('set-initial-realm',{roomId:room, chosenRealm:r}); }
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
