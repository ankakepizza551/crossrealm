<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --danger: #FF4500; --bg: #050508; 
            /* カードサイズを一回り大きくスケールアップ */
            --card-w: 108px; --card-h: 156px; --opp-card-w: 32px; --opp-card-h: 46px; --border: rgba(212, 175, 55, 0.45);
        }
        body { margin: 0; background: #000; color: white; font-family: 'Exo 2', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen-wrapper { width: 100vw; height: 100vh; max-width: calc(100vh * 9 / 16); max-height: 100vh; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; border-left: 2px solid var(--steam-gold); border-right: 2px solid var(--steam-gold); }
        
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180%; height: 180%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/><circle cx="100" cy="100" r="75" fill="none" stroke="rgba(64,224,208,0.05)" stroke-width="0.4"/></svg>'); animation: rotate-eternal 180s linear infinite; }
        @keyframes rotate-eternal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        
        /* 光の強さと広がりをアップし、色の変化がハッキリ分かるように修正 */
        .bg-magic-aura { position: absolute; inset: 0; background-color: var(--realm-color); -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%); mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%); opacity: 0.7; transition: background-color 3s ease-in-out; }
        
        .bg-scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.2) 50%); background-size: 100% 4px; z-index: 5; }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* 進行方向UI: 14px -> 16px */
        .turn-direction { text-align: center; font-size: 16px; font-weight: 900; color: var(--accent); letter-spacing: 2px; font-family: 'Exo 2', sans-serif; background: rgba(0,0,0,0.5); padding: 8px 12px; border-bottom: 1px solid rgba(64,224,208,0.3); display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.5s; }

        .opponents-area { display: flex; flex-direction: column; gap: 10px; padding: 15px; border-bottom: 2px solid var(--border); background: rgba(0,0,0,0.6); }
        .opp-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 8px; background: rgba(255,255,255,0.04); border-left: 4px solid var(--border); }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.1); box-shadow: inset 0 0 15px rgba(64, 224, 208, 0.15); }
        
        /* 相手の名前: 15px -> 17px */
        .opp-name { font-weight: 900; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; letter-spacing: 1px; color: #fff; }
        
        /* 相手のカード群: 幅を広げて重なりを調整 */
        .opp-hand-visual { display: flex; align-items: center; justify-content: flex-end; position: relative; width: 110px; height: var(--opp-card-h); }
        .mini-card-back { width: var(--opp-card-w); height: var(--opp-card-h); background: linear-gradient(135deg, #333, #000); border: 1px solid var(--steam-gold); border-radius: 3px; position: absolute; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }

        .cycle-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px 28px 10px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--border); position: relative; gap: 4px; }
        .cycle-dot { flex: 1; height: 5px; background: #1a1a1a; position: relative; border-radius: 2px; }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 12px var(--dot-color); }
        
        /* サイクルラベル: 12px -> 14px */
        .cycle-label { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 900; opacity: 0.7; font-family: 'Cinzel', serif; white-space: nowrap; }

        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; position: relative; }
        
        /* バトルログ: 13px -> 15px */
        .battle-log { position: absolute; top: 10px; left: 15px; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; gap: 6px; max-width: 60%; }
        .log-entry { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.6); border-left: 3px solid var(--accent); padding: 8px 14px; border-radius: 0 6px 6px 0; text-shadow: 0 0 3px #000; box-shadow: 0 2px 5px rgba(0,0,0,0.3); backdrop-filter: blur(2px); animation: logAnim 5s forwards; }
        @keyframes logAnim { 0% { transform: translateX(-15px); opacity: 0; } 5% { transform: translateX(0); opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }

        /* インフォパネルと属性タイトル: 26px -> 30px */
        .info-panel { background: rgba(10,10,15,0.98); border: 1px solid var(--steam-gold); padding: 18px; border-radius: 8px; max-width: 210px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px rgba(212,175,55,0.1); }
        .realm-title { font-family: 'Cinzel', serif; font-size: 30px; font-weight: 900; color: var(--realm-color); margin-bottom: 4px; letter-spacing: 2px; text-shadow: 0 0 12px var(--realm-color); }

        .hand-container { position: relative; z-index: 9999; width: 100%; overflow: visible; background: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%); }
        .hand-flex { display: flex; padding: 180px 80px 25px 80px; min-height: 350px; align-items: flex-end; overflow-x: auto; overflow-y: visible; margin-top: -180px; box-sizing: border-box; }
        .hand-flex::-webkit-scrollbar { height: 4px; }
        .hand-flex::-webkit-scrollbar-thumb { background: var(--steam-gold); border-radius: 2px; }

        .action-row { background: #000; border-top: 1px solid rgba(212,175,55,0.3); padding: 15px 0 35px 0; display: flex; justify-content: center; z-index: 10; position: relative; }

        .card { width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 2.5px solid var(--steam-gold); background: #000; overflow: hidden; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,1); flex-shrink: 0; transition: 0.2s cubic-bezier(0.2, 1, 0.3, 1); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* カードフッター文字: 12px -> 14px */
        .card-footer { position: absolute; bottom: 0; width: 100%; background: rgba(5,5,10,0.98); font-size: 14px; font-weight: 900; padding: 5px 0; text-align: center; border-top: 2px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif; }

        /* 手札の重なり調整（カードが大きくなったためマージン変更） */
        .my-card { margin-left: -44px; transform-origin: bottom center; cursor: pointer; position: relative; }
        .my-card:first-child { margin-left: 0; }
        .my-card.playable:hover { transform: translateY(-20px) scale(1.45) !important; z-index: 10000 !important; border-color: #fff; box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 40px var(--accent); }
        .my-card.not-playable { opacity: 0.45; filter: grayscale(0.8) brightness(0.6); cursor: not-allowed; }

        .overlay { position: absolute; inset: 0; z-index: 50000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); background: rgba(0,0,0,0.2); padding: 30px; }
        
        .panel { 
            position: relative;
            background: linear-gradient(135deg, rgba(15,15,20,0.95), rgba(5,5,10,0.98)); 
            border: 1px solid var(--steam-gold); 
            padding: 45px 30px; 
            border-radius: 4px;
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05); 
        }
        .panel::before, .panel::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--steam-gold); border-style: solid; opacity: 0.8; }
        .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .panel::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        .panel-corner1, .panel-corner2 { position: absolute; width: 20px; height: 20px; border-color: var(--steam-gold); border-style: solid; opacity: 0.8; }
        .panel-corner1 { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .panel-corner2 { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        
        /* ラベル・入力フォーム: ラベル13px, フォーム20pxに拡大 */
        .input-group { width: 100%; position: relative; text-align: left; margin-top: 10px; }
        .input-group label { position: absolute; top: -12px; left: 12px; background: #0b0b0e; padding: 0 8px; font-size: 13px; font-weight: 900; color: var(--steam-gold); letter-spacing: 2px; z-index: 1; }
        .panel input { width: 100%; padding: 20px 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(64, 224, 208, 0.3); border-left: 4px solid var(--accent); color: var(--accent); text-align: center; font-size: 20px; border-radius: 4px; outline: none; font-family: 'Exo 2', sans-serif; box-sizing: border-box; transition: 0.3s; text-shadow: 0 0 5px rgba(64, 224, 208, 0.5); }
        .panel input:focus { background: rgba(64, 224, 208, 0.05); border-color: var(--accent); box-shadow: 0 0 15px rgba(64, 224, 208, 0.2), inset 0 0 10px rgba(64, 224, 208, 0.1); }

        .waiting-list { width: 100%; display: flex; flex-direction: column; gap: 12px; margin: 10px 0; }
        .waiting-player { background: linear-gradient(90deg, rgba(64,224,208,0.1), rgba(0,0,0,0)); border: 1px solid rgba(64,224,208,0.2); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; }
        .waiting-player.empty { background: rgba(255,255,255,0.02); border: 1px dashed rgba(212,175,55,0.3); border-left: 1px dashed rgba(212,175,55,0.3); opacity: 0.5; }

        .btn-main { background: linear-gradient(90deg, #B8860B, #D4AF37, #B8860B); background-size: 200% auto; color: #000; border: 1px solid #FFE4B5; padding: 20px 0; border-radius: 4px; font-weight: 900; font-size: 20px; cursor: pointer; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 6px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); transition: 0.4s; overflow: hidden; }
        .btn-main:hover { background-position: right center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); color: #fff; text-shadow: 0 0 5px #000; }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #333; color: #666; border-color: #444; box-shadow: none; cursor: not-allowed; }

        /* 終了（退出）用のサブボタン */
        .btn-sub { background: linear-gradient(90deg, #2a2a30, #3f3f46, #2a2a30); background-size: 200% auto; color: #a1a1aa; border: 1px solid #52525b; padding: 20px 0; border-radius: 4px; font-weight: 900; font-size: 20px; cursor: pointer; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 6px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4); transition: 0.4s; overflow: hidden; }
        .btn-sub:hover { background-position: right center; box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); color: #fff; border-color: #a1a1aa; }
        .btn-sub:active { transform: scale(0.98); }

        /* ロゴ: 44px -> 48px */
        .logo-main { font-family: 'Cinzel', serif; font-size: 48px; font-weight: 900; letter-spacing: 12px; background: linear-gradient(to bottom, #FFE4B5, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); margin-bottom: 2px; }
        
        .sync-dot { width: 10px; height: 10px; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1.5s infinite; transform: rotate(45deg); }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .blink-text { animation: textBlink 2s infinite; }
        @keyframes textBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .error-msg { color: var(--danger); font-weight: 900; font-size: 14px; border: 1px solid var(--danger); padding: 10px; border-radius: 4px; background: rgba(255, 69, 0, 0.1); width: 100%; }
        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
        
        /* 属性選択ボタン: 16px -> 18px */
        .realm-btn { padding: 20px; border: 1px solid var(--steam-gold); background: rgba(255,255,255,0.05); color: #fff; font-weight: 900; font-family: 'Cinzel', serif; cursor: pointer; border-radius: 4px; font-size: 18px; transition: 0.3s; }
        .realm-btn:hover { background: rgba(212,175,55,0.2); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
    </style>
</head>
<body>
    <script>
        const sfx = {
            turn: new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'),
            play: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'),
            draw: new Audio('https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3'),
            alert: new Audio('https://assets.mixkit.co/active_storage/sfx/2862/2862-preview.mp3')
        };
        Object.values(sfx).forEach(a => a.volume = 0.3);
    </script>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', desc: 'セットA：維持。', effect: '特殊(S): +2ドロー' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', desc: 'セットA→B：遷移。', effect: '' },
            FOUNTAIN: { n: '噴水', color: '#4169E1', desc: 'セットB：維持。', effect: '特殊(S): 限定ワイルド' },
            BATTERY: { n: '電池', color: '#32CD32', desc: 'セットB→C：遷移。', effect: '' },
            MACHINE: { n: '機械', color: '#2F4F4F', desc: 'セットC：維持。', effect: '特殊(S): 順番反転' },
            ARCHIVE: { n: '古文書', color: '#8B4513', desc: 'セットC→A：遷移。', effect: '' },
            PLANET: { n: '惑星', color: '#9400D3', desc: '星々の加護。', effect: 'ワイルド' },
            RUINS: { n: '廃墟', color: '#696969', desc: '遺跡の記憶。', effect: 'ワイルド' }
        };
        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [error, setError] = useState('');
            const [bgRealm, setBgRealm] = useState('GEAR');
            
            const prevTurnRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => { setGs(data); setError(''); });
                s.on('join-error', (msg) => { setError(msg); setJoined(false); });
                return () => s.disconnect();
            }, []);

            useEffect(() => {
                if (gs && gs.status === 'playing') {
                    const isMyTurnNow = gs.currentTurnPlayerId === socket?.id;
                    if (isMyTurnNow && prevTurnRef.current !== socket?.id) {
                        if (gs.nextDrawAmount > 1) {
                            sfx.alert.currentTime = 0; sfx.alert.play().catch(()=>{});
                        } else {
                            sfx.turn.currentTime = 0; sfx.turn.play().catch(()=>{});
                        }
                    }
                    prevTurnRef.current = gs.currentTurnPlayerId;
                }
            }, [gs, socket]);

            useEffect(() => {
                let interval;
                if (!gs || gs.status !== 'playing') {
                    interval = setInterval(() => {
                        setBgRealm(prev => {
                            const idx = CYCLE_ORDER.indexOf(prev);
                            return CYCLE_ORDER[(idx + 1) % CYCLE_ORDER.length];
                        });
                    }, 4000); 
                }
                return () => {
                    if (interval) clearInterval(interval);
                };
            }, [gs]);

            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = (gs && gs.status === 'playing') ? (gs?.fieldCard?.realm || 'GEAR') : bgRealm;

            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (card) => {
                if (!isMyTurn) return false;
                if (gs.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm;
                const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS') return true;
                if (field === 'PLANET' || field === 'RUINS') return true; 
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                switch (field) {
                    case 'GEAR': return (h === 'GEAR' || h === 'ICEAGE');
                    case 'ICEAGE': return (h === 'FOUNTAIN' || h === 'BATTERY');
                    case 'FOUNTAIN': return (h === 'FOUNTAIN' || h === 'BATTERY');
                    case 'BATTERY': return (h === 'MACHINE' || h === 'ARCHIVE'); 
                    case 'MACHINE': return (h === 'MACHINE' || h === 'ARCHIVE');
                    case 'ARCHIVE': return (h === 'GEAR' || h === 'ICEAGE');
                    default: return true;
                }
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                sfx.play.currentTime = 0; sfx.play.play().catch(()=>{});

                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) {
                    setSelectorCard(card);
                } else {
                    socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined });
                }
            };

            const handleDraw = () => {
                sfx.draw.currentTime = 0; sfx.draw.play().catch(()=>{});
                socket.emit('draw-card',{roomId:room});
            };

            const CardView = ({ card, playable, onClick, isField }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';
                return (
                    <div className={`card ${isField ? '' : (playable ? 'playable my-card' : 'not-playable my-card')}`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">{(REALMS[card.realm]).n} {card.isSpecial ? '(S)' : ''}</div>
                    </div>
                );
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': REALMS[currentRealm].color }}>
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-magic-aura" style={{ backgroundColor: REALMS[currentRealm].color }}></div>
                    <div className="bg-layer bg-scanline"></div>

                    {/* === トップ画面（ログイン） === */}
                    {!joined && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div>
                                <div className="panel-corner2"></div>
                                
                                <div>
                                    <h1 className="logo-main">CROSS REALM</h1>
                                    <div style={{fontSize: 12, letterSpacing: 8, color: 'var(--accent)', marginTop: '-8px', fontFamily: 'Exo 2', fontWeight: 900}}>ETERNAL PUNK EDITION</div>
                                </div>
                                
                                {error && <div className="error-msg">⚠️ {error}</div>}
                                
                                <div style={{width:'100%', display:'flex', flexDirection:'column', gap:20}}>
                                    <div className="input-group">
                                        <label>プレイヤー名</label>
                                        <input type="text" value={name} onChange={e=>setName(e.target.value)} maxLength={10} />
                                    </div>
                                    <div className="input-group">
                                        <label>ルームID</label>
                                        <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                    </div>
                                </div>
                                <button onClick={()=>{
                                    sfx.turn.load(); sfx.play.load(); sfx.draw.load(); sfx.alert.load();
                                    setJoined(true); 
                                    socket.emit('join-room',{roomId:room, playerName:name});
                                }} className="btn-main">接続開始</button>
                            </div>
                        </div>
                    )}

                    {/* === 待機画面 === */}
                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div>
                                <div className="panel-corner2"></div>

                                <div>
                                    <div className="blink-text" style={{letterSpacing:6, opacity:0.8, fontSize:14, fontWeight:900, marginBottom:8, color:'var(--accent)', fontFamily:'Exo 2'}}>接続待機中...</div>
                                    <div style={{fontSize:36, color:'var(--steam-gold)', fontWeight:900, fontFamily:'Cinzel', letterSpacing: 4}}>ルームID: {room}</div>
                                </div>
                                
                                <div className="waiting-list">
                                    {gs?.players?.map(p => (
                                        <div key={p.id} className="waiting-player">
                                            <span style={{fontWeight:900, fontSize:18, color:'#fff', textShadow:'0 0 5px rgba(255,255,255,0.3)'}}>👤 {p.name}</span>
                                            <div className="sync-dot"></div>
                                        </div>
                                    ))}
                                    {[...Array(Math.max(0, 2 - (gs?.players?.length || 0)))].map((_, i) => (
                                        <div key={i} className="waiting-player empty">
                                            <span style={{fontSize:16, letterSpacing:1}}>プレイヤーを待機中...</span>
                                        </div>
                                    ))}
                                </div>
                                
                                {gs?.players?.[0]?.id === socket?.id ? (
                                    <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" disabled={gs?.players?.length < 2}>システム起動</button>
                                ) : (
                                    <div style={{fontSize: 14, color: 'var(--steam-gold)', fontWeight: 900, letterSpacing: 2}}>ホストの起動待機中...</div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* === プレイ画面 === */}
                    {joined && gs?.status === 'playing' && (
                        <div className="game-container">
                            
                            <div className="turn-direction">
                                TURN DIRECTION: 
                                <span style={{transform: gs.isReversed ? 'rotate(180deg)' : 'rotate(0deg)', transition:'0.5s', display:'inline-block'}}>
                                    {gs.isReversed ? '⟲' : '⟳'}
                                </span>
                                {gs.isReversed ? ' REVERSE' : ' NORMAL'}
                            </div>

                            <div className="opponents-area">
                                {gs.players.filter(p => p.id !== socket?.id).map(p => (
                                    <div key={p.id} className={`opp-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-name">{p.name}</div>
                                        <div className="opp-hand-visual">
                                            {[...Array(Math.min(p.handCount, 5))].map((_, i) => (
                                                <div key={i} className="mini-card-back" style={{right: `${i * 14}px`, zIndex: i}} />
                                            ))}
                                            <div style={{fontWeight:900, color: 'var(--accent)', fontSize:24, position:'absolute', left:-60}}>{p.handCount}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => (
                                    <div key={r} className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}>
                                        <div className="cycle-label">{REALMS[r].n}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="field">
                                {/* バトルログ */}
                                {gs.logs && (
                                    <div className="battle-log">
                                        {gs.logs.map((log) => (
                                            <div key={log.id} className="log-entry">
                                                {log.text}
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div style={{fontFamily:'Cinzel', fontSize: 18, opacity: 0.6, letterSpacing:2}}>{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                                {gs.nextDrawAmount > 1 && <div style={{color: 'var(--danger)', fontWeight:900, fontSize:32, textShadow:'0 0 10px rgba(255,0,0,0.5)'}}>DRAW +{gs.nextDrawAmount}</div>}
                                <div style={{display:'flex', alignItems:'center', gap:20}}>
                                    
                                    <div style={{position: 'relative', width: 'var(--card-w)', height: 'var(--card-h)'}}>
                                        {gs.playHistory?.map((card, i) => {
                                            const isLast = i === gs.playHistory.length - 1;
                                            const rotate = (i * 7) % 15 - 7; 
                                            const offsetX = (gs.playHistory.length - 1 - i) * -2;
                                            const offsetY = (gs.playHistory.length - 1 - i) * -2;
                                            return (
                                                <div key={i} style={{
                                                    position: 'absolute', top: 0, left: 0, 
                                                    transform: `rotate(${rotate}deg) translate(${offsetX}px, ${offsetY}px)`,
                                                    zIndex: i,
                                                    opacity: isLast ? 1 : 0.4,
                                                    pointerEvents: isLast ? 'auto' : 'none'
                                                }}>
                                                    <CardView card={card} isField={true} />
                                                </div>
                                            );
                                        })}
                                        {!gs.playHistory && <CardView card={gs.fieldCard} isField={true} />}
                                    </div>

                                    <div className="info-panel">
                                        <div className="realm-title">{REALMS[currentRealm].n}</div>
                                        <div style={{fontSize:16, opacity:0.8, marginTop:5, lineHeight:1.4}}>{REALMS[currentRealm].desc}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="hand-container">
                                <div className="hand-flex">
                                    {sortedHand.map((card) => (
                                        <CardView key={card.id} card={card} playable={canPlay(card)} onClick={() => handlePlay(card)} />
                                    ))}
                                </div>
                                <div style={{textAlign:'center', fontSize:18, fontWeight:900, paddingBottom: 8, color:'var(--steam-gold)', letterSpacing:4}}>SYNC: {sortedHand.length} / {gs.handLimit}</div>
                            </div>

                            <div className="action-row">
                                <button className="btn-main" disabled={!isMyTurn} onClick={handleDraw} style={{padding: '15px 0', fontSize: '20px'}}>
                                    {gs.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : (isMyTurn ? 'カードを引く' : '待機中...')}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* === ワイルド選択画面 === */}
                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div>
                                <div className="panel-corner2"></div>
                                <h3 style={{fontSize:28, fontWeight:900, color:'var(--steam-gold)', fontFamily:'Cinzel'}}>属性を選択</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{color:'#fff', cursor:'pointer', border:'none', background:'none', fontWeight:900, fontSize:18, opacity:0.6}}>キャンセル</button>
                            </div>
                        </div>
                    )}

                    {/* === リザルト画面 === */}
                    {gs?.status === 'finished' && (() => {
                        const winner = gs.players.find(p => p.handCount === 0);
                        const bursted = gs.players.find(p => p.handCount > gs.handLimit);
                        
                        let resultTitle = "MISSION END";
                        let resultSub = "";
                        let titleColor = "var(--steam-gold)";

                        if (winner) {
                            resultTitle = "MISSION CLEAR";
                            resultSub = `WINNER: ${winner.name}`;
                            titleColor = "var(--accent)";
                        } else if (bursted) {
                            resultTitle = "SYSTEM OVERLOAD";
                            resultSub = `BURST: ${bursted.name}`;
                            titleColor = "var(--danger)";
                        }

                        return (
                            <div className="overlay">
                                <div className="panel" style={{maxWidth: '450px'}}>
                                    <div className="panel-corner1"></div>
                                    <div className="panel-corner2"></div>
                                    
                                    <div style={{marginBottom: '10px'}}>
                                        <h2 style={{color: titleColor, fontSize:40, fontWeight:900, fontFamily:'Cinzel', textShadow: `0 0 20px ${titleColor}`, margin: 0, letterSpacing: 2}}>
                                            {resultTitle}
                                        </h2>
                                        {resultSub && <div style={{fontSize: 24, color: '#fff', fontWeight: 900, marginTop: 10, letterSpacing: 2}}>{resultSub}</div>}
                                    </div>

                                    <div style={{width:'100%', margin:'10px 0'}}>
                                        {gs.players.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                            <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'15px 0', borderBottom:'1px solid rgba(212,175,55,0.2)', alignItems: 'center'}}>
                                                <span style={{fontWeight:900, fontSize:22, display:'flex', alignItems:'center', gap: 8}}>
                                                    {i+1}. {p.name}
                                                    {p.id === socket.id && <span style={{fontSize: 12, color: 'var(--steam-gold)', border: '1px solid var(--steam-gold)', padding: '2px 6px', borderRadius: 4}}>YOU</span>}
                                                </span>
                                                <span style={{color:'var(--steam-gold)', fontWeight:900, fontSize:24}}>{p.handCount}枚</span>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div style={{display: 'flex', gap: 15, width: '100%', marginTop: 10}}>
                                        <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main" style={{padding: '18px 0', fontSize: 20}}>再戦</button>
                                        <button onClick={() => window.location.reload()} className="btn-sub" style={{padding: '18px 0', fontSize: 20}}>終了</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
