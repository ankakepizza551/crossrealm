<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --danger: #FF4500; --bg: #050508; 
            --card-w: 108px; --card-h: 156px; --opp-card-w: 32px; --opp-card-h: 46px; --border: rgba(212, 175, 55, 0.45);
        }
        body { margin: 0; background: #000; color: white; font-family: 'Exo 2', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen-wrapper { width: 100vw; height: 100vh; max-width: calc(100vh * 9 / 16); max-height: 100vh; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; border-left: 2px solid var(--steam-gold); border-right: 2px solid var(--steam-gold); }
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180%; height: 180%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.5"/><circle cx="100" cy="100" r="75" fill="none" stroke="rgba(64,224,208,0.05)" stroke-width="0.4"/></svg>'); animation: rotate-eternal 180s linear infinite; }
        @keyframes rotate-eternal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .bg-magic-aura { position: absolute; inset: 0; background-color: var(--realm-color); -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%); mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%); opacity: 0.7; transition: background-color 3s ease-in-out; }
        .bg-scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.15) 50%); background-size: 100% 4px; z-index: 5; }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }
        .turn-direction { text-align: center; font-size: 14px; font-weight: 900; color: var(--accent); letter-spacing: 2px; background: rgba(0,0,0,0.6); padding: 10px; border-bottom: 1px solid rgba(64,224,208,0.3); display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* 他プレイヤーの表示エリア & ターン中の発光 */
        .opponents-area { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-bottom: 2px solid var(--border); background: rgba(0,0,0,0.6); }
        .opp-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 6px; background: rgba(255,255,255,0.04); border-left: 4px solid var(--border); transition: all 0.4s ease; }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.15); box-shadow: 0 0 20px rgba(64, 224, 208, 0.3), inset 0 0 15px rgba(64, 224, 208, 0.2); animation: activeGlow 2s infinite ease-in-out; }
        @keyframes activeGlow { 0%, 100% { box-shadow: 0 0 10px rgba(64, 224, 208, 0.2); } 50% { box-shadow: 0 0 25px rgba(64, 224, 208, 0.5); } }
        
        .opp-name { font-weight: 900; font-size: 15px; color: #fff; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .opp-hand-visual { display: flex; align-items: center; position: relative; width: 100px; height: var(--opp-card-h); }
        .mini-card-back { width: var(--opp-card-w); height: var(--opp-card-h); background: linear-gradient(135deg, #333, #000); border: 1px solid var(--steam-gold); border-radius: 3px; position: absolute; }

        .cycle-bar { display: flex; justify-content: space-between; padding: 10px 4px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--border); gap: 2px; }
        .cycle-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
        .cycle-dot { width: 100%; height: 5px; background: #1a1a1a; border-radius: 2px; transition: 0.3s; }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 12px var(--dot-color); }
        .cycle-label { font-size: 10px; font-weight: 900; opacity: 0.3; font-family: 'Exo 2', sans-serif; white-space: nowrap; width: 100%; text-align: center; }
        .cycle-item.active .cycle-label { opacity: 1; color: var(--dot-color); text-shadow: 0 0 5px var(--dot-color); }

        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; position: relative; }
        .info-panel { background: rgba(10,10,15,0.95); border: 1px solid var(--steam-gold); padding: 12px; border-radius: 8px; width: 160px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .realm-title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900; color: var(--realm-color); text-shadow: 0 0 10px var(--realm-color); }

        .hand-container { position: relative; z-index: 9999; width: 100%; overflow: visible; background: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%); }
        .hand-flex { display: block; padding: 180px 0 25px 0; min-height: 350px; overflow: visible; margin-top: -180px; box-sizing: border-box; }
        .action-row { background: #000; border-top: 1px solid rgba(212,175,55,0.3); padding: 15px 0 35px 0; display: flex; justify-content: center; position: relative; z-index: 10; }

        .card { width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 2.5px solid var(--r-color); background: #000; overflow: hidden; position: relative; flex-shrink: 0; transition: transform 0.2s cubic-bezier(0.2, 1, 0.3, 1), margin 0.2s; }
        .theme-steampunk { border-color: #B87333; background: radial-gradient(circle at center, #2a1a0a 0%, #000 100%); box-shadow: 0 5px 15px rgba(0,0,0,1), inset 0 0 30px rgba(184,115,51,0.6); }
        .theme-fantasy { border-color: #87CEEB; background: radial-gradient(circle at top, #0f1a24 0%, #000 100%); box-shadow: 0 5px 15px rgba(0,0,0,1), inset 0 0 30px rgba(135,206,235,0.5); }
        .theme-cyber { border-color: #0FF; background: linear-gradient(135deg, #001a1a 0%, #000 100%); box-shadow: 0 5px 15px rgba(0,0,0,1), inset 0 0 30px rgba(0,255,255,0.5); }

        .card.is-special { border-width: 4px; }
        .card-icon { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 54px; height: 54px; color: var(--r-color); filter: drop-shadow(0 0 10px var(--r-color)); z-index: 2; }
        .card-effect-text { position: absolute; bottom: 34px; width: 100%; text-align: center; font-size: 11px; font-weight: 900; color: #fff; text-shadow: 0 0 5px var(--r-color), 0 0 10px #000; letter-spacing: 1.5px; font-family: 'Exo 2', sans-serif; z-index: 3; }
        .card-realm-mini { position: absolute; top: 6px; left: 8px; font-size: 11px; font-weight: 900; color: #fff; text-shadow: 0 0 5px #000; z-index: 3; opacity: 0.8; }
        .card-badge { position: absolute; top: 22px; left: 8px; background: var(--r-color); color: #000; font-size: 10px; font-weight: 900; padding: 2px 5px; border-radius: 3px; z-index: 3; box-shadow: 0 0 8px var(--r-color); }
        .card-footer { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); font-size: 13px; font-weight: 900; padding: 6px 0; text-align: center; border-top: 2px solid var(--r-color); color: #fff; font-family: 'Cinzel', serif; z-index: 3; }

        /* ログイン・待機画面のパネル装飾 */
        .overlay { position: absolute; inset: 0; z-index: 50000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); background: rgba(0,0,0,0.5); padding: 20px; }
        .panel { position: relative; background: linear-gradient(135deg, rgba(15,15,20,0.98), rgba(5,5,10,1)); border: 1px solid var(--steam-gold); padding: 40px 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 25px; box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 30px rgba(212,175,55,0.05); border-radius: 4px; box-sizing: border-box; }
        .panel-corner1, .panel-corner2 { position: absolute; width: 25px; height: 25px; border-color: var(--steam-gold); border-style: solid; opacity: 0.8; }
        .panel-corner1 { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .panel-corner2 { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

        .logo-main { font-family: 'Cinzel', serif; font-size: clamp(22px, 7vw, 34px); font-weight: 900; letter-spacing: 2px; background: linear-gradient(to bottom, #FFE4B5 20%, #D4AF37 50%, #8B6B23 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); white-space: nowrap; }
        .logo-main span.cross { font-size: 0.8em; color: var(--steam-gold); -webkit-text-fill-color: var(--steam-gold); opacity: 0.8; }
        .logo-sub { font-size: clamp(10px, 3.2vw, 14px); letter-spacing: clamp(4px, 1.2vw, 7px); color: var(--accent); text-align: center; font-weight: 900; margin-top: 10px; font-family: 'Exo 2', sans-serif; opacity: 0.8; text-transform: uppercase; white-space: nowrap; width: 100%; text-shadow: 0 0 10px rgba(64,224,208,0.4); }

        .panel input { width: 100%; padding: 18px; background: rgba(0,0,0,0.7); border: 1px solid rgba(212,175,55,0.15); border-bottom: 2px solid var(--steam-gold); color: #fff; text-align: center; font-size: 16px; border-radius: 4px; outline: none; box-sizing: border-box; transition: all 0.3s; font-family: 'Exo 2', sans-serif; }
        .btn-main { background: linear-gradient(90deg, #B8860B, #D4AF37, #B8860B); background-size: 200% auto; color: #000; border: 1px solid #FFE4B5; padding: 18px 0; border-radius: 4px; font-weight: 900; font-size: 18px; cursor: pointer; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 4px; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-main:hover { background-position: right center; box-shadow: 0 0 35px rgba(212,175,55,0.4); color: #fff; text-shadow: 0 0 5px #000; }
        .btn-main:disabled { background: #222; color: #444; border-color: #333; cursor: not-allowed; box-shadow: none; }
        .btn-sub { background: rgba(255,255,255,0.03); border: 1px solid #444; color: #888; padding: 16px 0; width: 100%; cursor: pointer; border-radius: 4px; font-weight: 900; font-size: 16px; transition: 0.3s; letter-spacing: 2px; }

        .waiting-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .waiting-player { background: linear-gradient(90deg, rgba(64,224,208,0.1), transparent); border: 1px solid rgba(64,224,208,0.2); border-left: 4px solid var(--accent); padding: 16px 20px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; }
        .waiting-player.empty { background: rgba(255,255,255,0.02); border: 1px dashed rgba(212,175,55,0.3); opacity: 0.4; }
        .sync-dot { width: 10px; height: 10px; background: var(--accent); box-shadow: 0 0 10px var(--accent); transform: rotate(45deg); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .mute-btn { position: absolute; top: 20px; right: 20px; z-index: 60000; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--steam-gold); color: var(--steam-gold); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .my-card { margin-left: var(--card-margin, -44px); transform-origin: bottom center; cursor: pointer; position: relative; }
        .my-card:first-child { margin-left: 0 !important; }
        .my-card.playable:hover { transform: translateY(-25px) scale(1.45) !important; z-index: 10000 !important; border-color: #fff; }
    </style>
</head>

            MACHINE_S: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><path d="M8 11a4 4 0 0 1 8 0"></path><polyline points="16,11 18,9 14,9" fill="currentColor"></polyline><path d="M16 13a4 4 0 0 1-8 0"></path><polyline points="8,13 6,15 10,15" fill="currentColor"></polyline><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>,
            ARCHIVE: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            PLANET: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            RUINS: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 20h20"></path><path d="M5 20v-8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8"></path><path d="M9 20v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"></path><path d="M5 10V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"></path></svg>
        };
        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [error, setError] = useState('');
            const [bgRealm, setBgRealm] = useState('GEAR');
            const [isMuted, setIsMuted] = useState(false); 
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);
            const prevTurnRef = useRef(null);
            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => { setGs(data); setError(''); });
                s.on('join-error', (msg) => { setError(msg); setJoined(false); });
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => { s.disconnect(); window.removeEventListener('resize', handleResize); };
            }, []);
            useEffect(() => {
                if (gs && gs.status === 'playing') {
                    const isMyTurnNow = gs.currentTurnPlayerId === socket?.id;
                    if (isMyTurnNow && prevTurnRef.current !== socket?.id) {
                        if (gs.nextDrawAmount > 1) { window.sfx.alert.currentTime = 0; window.sfx.alert.play().catch(()=>{}); }
                        else { window.sfx.turn.currentTime = 0; window.sfx.turn.play().catch(()=>{}); }
                    }
                    prevTurnRef.current = gs.currentTurnPlayerId;
                }
            }, [gs, socket]);
            useEffect(() => {
                let interval;
                if (!gs || gs.status !== 'playing') {
                    interval = setInterval(() => {
                        setBgRealm(prev => {
                            const idx = CYCLE_ORDER.indexOf(prev);
                            return CYCLE_ORDER[(idx + 1) % CYCLE_ORDER.length];
                        });
                    }, 4000); 
                }
                return () => { if (interval) clearInterval(interval); };
            }, [gs]);
            const toggleMute = () => {
                const nextMuted = !isMuted;
                setIsMuted(nextMuted);
                Object.values(window.sfx).forEach(a => a.volume = nextMuted ? 0 : 0.3);
            };
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = (gs && gs.status === 'playing') ? (gs?.fieldCard?.realm || 'GEAR') : bgRealm;
            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                if (!me?.hand) return [];
                return [...me.hand].sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);
            const canPlay = (card) => {
                if (!isMyTurn) return false;
                if (gs.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm;
                const field = currentRealm;
                if (h === 'PLANET' || h === 'RUINS') return true;
                if (field === 'PLANET' || field === 'RUINS') return true; 
                if (h === 'FOUNTAIN' && card.isSpecial) return (field === 'ICEAGE' || field === 'FOUNTAIN');
                const cycle = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                return field === h || (cycle[field] && cycle[field].includes(h));
            };
            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                window.sfx.alert.pause(); window.sfx.alert.currentTime = 0;
                window.sfx.play.currentTime = 0; window.sfx.play.play().catch(()=>{});
                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                if (isWild && sortedHand.length > 1) { setSelectorCard(card); }
                else { socket.emit('play-card', { roomId: room.toUpperCase(), card, chosenRealm: isWild ? 'GEAR' : undefined }); }
            };
            const handleDraw = () => {
                window.sfx.alert.pause(); window.sfx.alert.currentTime = 0;
                window.sfx.draw.currentTime = 0; window.sfx.draw.play().catch(()=>{});
                socket.emit('draw-card',{roomId:room});
            };
            const CardView = ({ card, playable, onClick, isField }) => {
                if (!card) return null;
                let displayRealm = card.realm;
                if (card.wasRuins) displayRealm = 'RUINS';
                else if (card.wasPlanet) displayRealm = 'PLANET';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) displayRealm = 'FOUNTAIN';
                const isSpecial = card.isSpecial || card.wasFountain;
                const rColor = REALMS[displayRealm] ? REALMS[displayRealm].color : '#fff';
                const themeClass = `theme-${THEMES[displayRealm] || 'fantasy'}`;
                const iconKey = isSpecial && ICONS[`${displayRealm}_S`] ? `${displayRealm}_S` : displayRealm;
                let effectText = "";
                if (displayRealm === 'PLANET' || displayRealm === 'RUINS' || (displayRealm === 'FOUNTAIN' && isSpecial)) effectText = "WILD";
                else if (displayRealm === 'GEAR' && isSpecial) effectText = "+2 DRAW";
                else if (displayRealm === 'MACHINE' && isSpecial) effectText = "REVERSE";
                return (
                    <div className={`card ${isField ? '' : (playable ? 'playable my-card' : 'not-playable my-card')} ${isSpecial ? 'is-special' : ''} ${themeClass}`} 
                         style={{'--r-color': rColor}} onClick={onClick}>
                        <div className="card-realm-mini">{displayRealm.substring(0, 3)}</div>
                        {isSpecial && <div className="card-badge">S</div>}
                        <div className="card-icon">{ICONS[iconKey]}</div>
                        {effectText && <div className="card-effect-text">{effectText}</div>}
                        <div className="card-footer">{REALMS[displayRealm] ? REALMS[displayRealm].n : '???'}</div>
                    </div>
                );
            };
            return (
                <div className="screen-wrapper" style={{ '--realm-color': (REALMS[currentRealm] ? REALMS[currentRealm].color : '#000') }}>
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-magic-aura" style={{ backgroundColor: (REALMS[currentRealm] ? REALMS[currentRealm].color : '#000') }}></div>
                    <div className="bg-layer bg-scanline"></div>
                    <button onClick={toggleMute} className="mute-btn">{isMuted ? '🔇' : '🔊'}</button>

                    {!joined && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                <div className="logo-container">
                                    <h1 className="logo-main">CROSS <span className="cross">⨯</span> REALM</h1>
                                    <div className="logo-sub">Eternal Punk Edition</div>
                                </div>
                                {error && <div style={{color:'var(--danger)', fontSize:12, fontWeight:900}}>⚠️ {error}</div>}
                                <div style={{width:'100%', display:'flex', flexDirection:'column', gap:24}}>
                                    <div className="input-group">
                                        <input type="text" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} />
                                    </div>
                                    <div className="input-group">
                                        <input type="text" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                    </div>
                                </div>
                                <button onClick={()=>{ window.sfx.turn.load(); window.sfx.play.load(); window.sfx.draw.load(); window.sfx.alert.load(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-main">接続開始</button>
                            </div>
                        </div>
                    )}

                    {joined && (!gs || gs.status === 'waiting') && (
                        <div className="overlay">
                            <div className="panel">
                                <div className="panel-corner1"></div><div className="panel-corner2"></div>
                                <div style={{textAlign:'center'}}>
                                    <div className="blink-text" style={{fontSize:14, color:'var(--accent)', fontWeight:900, marginBottom:8, letterSpacing:4}}>AWAITING LINKAGE...</div>
                                    <div style={{fontSize:36, color:'var(--steam-gold)', fontWeight:900, fontFamily:'Cinzel', letterSpacing: 4}}>ルームID: {room}</div>
                                </div>
                                <div className="waiting-list">
                                    {gs?.players?.map(p => (
                                        <div key={p.id} className="waiting-player">
                                            <span style={{fontWeight:900, fontSize:18, color: p.isBot ? 'var(--steam-gold)' : '#fff', textShadow:'0 0 5px rgba(255,255,255,0.2)'}}>
                                                {p.isBot ? '🤖' : '👤'} {p.name} {p.personality ? `(${p.personality[0]})` : ''}
                                            </span>
                                            {!p.isBot && <div className="sync-dot"></div>}
                                        </div>
                                    ))}
                                    {[...Array(Math.max(0, 4 - (gs?.players?.length || 0)))].map((_, i) => (
                                        <div key={i} className="waiting-player empty"><span style={{fontSize:16, letterSpacing:1}}>プレイヤーを待機中...</span></div>
                                    ))}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div style={{display:'flex', gap:15, width:'100%', marginTop: 10}}>
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="btn-sub" disabled={gs?.players?.length >= 4}>ADD CPU</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" disabled={gs?.players?.length < 2} style={{padding: '16px 0'}}>ゲーム開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {joined && gs?.status === 'playing' && (
                        <div className="game-container">
                            <div className="turn-direction">DIRECTION: <span style={{transform: gs.isReversed ? 'rotate(180deg)' : 'rotate(0deg)', transition:'0.5s', display:'inline-block'}}>{gs.isReversed ? '⟲' : '⟳'}</span> {gs.isReversed ? 'REVERSE' : 'NORMAL'}</div>
                            <div className="opponents-area">
                                {gs.players.filter(p => p.id !== socket?.id).map(p => (
                                    <div key={p.id} className={`opp-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="opp-name">{p.isBot ? '🤖' : '👤'} {p.name}</div>
                                        <div className="opp-hand-visual">
                                            {[...Array(Math.min(p.handCount, 5))].map((_, i) => (<div key={i} className="mini-card-back" style={{right: `${i * 12}px`, zIndex: i}} />))}
                                            <div style={{fontWeight:900, color: 'var(--accent)', fontSize:20, position:'absolute', left:-45}}>{p.handCount}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="cycle-bar">
                                {CYCLE_ORDER.map(r => (
                                    <div key={r} className={`cycle-item ${currentRealm === r ? 'active' : ''}`}>
                                        <div className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}></div>
                                        <div className="cycle-label">{REALMS[r].n}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="field">
                                {gs.logs && (<div className="battle-log">{gs.logs.map((log) => (<div key={log.id} className="log-entry">{log.text}</div>))}</div>)}
                                <div style={{fontFamily:'Cinzel', fontSize: 14, opacity: 0.6, letterSpacing:2}}>{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                                {gs.nextDrawAmount > 1 && <div style={{color: 'var(--danger)', fontWeight:900, fontSize:28, textShadow:'0 0 10px #f00'}}>DRAW +{gs.nextDrawAmount}</div>}
                                <div style={{display:'flex', alignItems:'center', gap:15}}>
                                    <div style={{position: 'relative', width: 'var(--card-w)', height: 'var(--card-h)'}}>
                                        {gs.playHistory?.map((card, i) => (
                                            <div key={`hist-${i}`} style={{ position: 'absolute', top: 0, left: 0, transform: `rotate(${(i * 5) % 10 - 5}deg) translate(${i*-1}px, ${i*-1}px)`, zIndex: i + 1, opacity: 0.4 }}>
                                                <CardView card={card} isField={true} />
                                            </div>
                                        ))}
                                        <div style={{ position: 'absolute', top: 0, left: 0, zIndex: 100 }}>
                                            <CardView card={gs.fieldCard} isField={gs.status === 'playing'} />
                                        </div>
                                    </div>
                                    <div className="info-panel">
                                        <div className="realm-title">{REALMS[currentRealm] ? REALMS[currentRealm].n : '???'}</div>
                                        <div style={{fontSize:12, opacity:0.8, marginTop:5, lineHeight:1.3}}>{REALMS[currentRealm] ? REALMS[currentRealm].desc : 'Unknown Sector'}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="hand-container">
                                <div className="hand-flex">
                                    {(() => {
                                        const totalCards = sortedHand.length;
                                        const maxHandWidth = Math.min(windowWidth * 0.95, 600);
                                        const cardWidth = 108;
                                        let overlap = 64; 
                                        if (totalCards > 1) {
                                            const idealWidth = cardWidth + (totalCards - 1) * overlap;
                                            if (idealWidth > maxHandWidth) { overlap = (maxHandWidth - cardWidth) / (totalCards - 1); }
                                        }
                                        const containerWidth = totalCards > 0 ? cardWidth + (totalCards - 1) * overlap : 0;
                                        const marginLeftVal = overlap - cardWidth;
                                        return (
                                            <div style={{ display: 'flex', alignItems: 'flex-end', width: `${containerWidth}px`, margin: '0 auto', position: 'relative', '--card-margin': `${marginLeftVal}px` }}>
                                                {sortedHand.map((card) => (<CardView key={card.id} card={card} playable={canPlay(card)} onClick={() => handlePlay(card)} />))}
                                            </div>
                                        );
                                    })()}
                                </div>
                                <div style={{textAlign:'center', fontSize:16, fontWeight:900, paddingBottom: 8, color:'var(--steam-gold)', letterSpacing:3}}>SYNC: {sortedHand.length} / {gs.handLimit}</div>
                            </div>
                            <div className="action-row">
                                <button className="btn-main" disabled={!isMyTurn} onClick={handleDraw} style={{height:60}}>
                                    {gs.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : (isMyTurn ? 'ドロー' : '待機中...')}
                                </button>
                            </div>
                        </div>
                    )}
                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel"><div className="panel-corner1"></div><div className="panel-corner2"></div>
                                <h3 style={{fontSize:24, fontWeight:900, color:'var(--steam-gold)', fontFamily:'Cinzel'}}>CHOOSE REALM</h3>
                                <div className="realm-grid">{CYCLE_ORDER.map(r => (<button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={() => { socket.emit('play-card', {roomId: room, card:selectorCard, chosenRealm:r}); setSelectorCard(null); }}>{REALMS[r].n}</button>))}</div>
                                <button onClick={()=>setSelectorCard(null)} className="btn-sub">CANCEL</button>
                            </div>
                        </div>
                    )}
                    {gs?.status === 'finished' && (() => {
                        const winner = gs.players.find(p => p.handCount === 0);
                        const bursted = gs.players.find(p => p.handCount > gs.handLimit);
                        let resTitle = winner ? `${winner.name} WIN!` : "OVERLOAD";
                        let resCol = winner ? "var(--accent)" : "var(--danger)";
                        return (
                            <div className="overlay">
                                <div className="panel"><div className="panel-corner1"></div><div className="panel-corner2"></div>
                                    <h2 style={{color: resCol, fontSize: 32, fontWeight:900, textShadow: `0 0 20px ${resCol}`, wordBreak: 'break-all'}}>{resTitle}</h2>
                                    <div style={{width:'100%'}}>{gs.players.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid rgba(212,175,55,0.1)'}}>
                                            <span style={{fontWeight:900}}>{i+1}. {p.name} {p.id === socket.id && "(YOU)"}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount}枚</span>
                                        </div>
                                    ))}</div>
                                    <div style={{display: 'flex', gap: 10, width: '100%'}}>
                                        <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main">再戦</button>
                                        <button onClick={() => window.location.reload()} className="btn-sub">終了</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
