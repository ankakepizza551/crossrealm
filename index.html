<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --bg: #050505; 
            --card-w: 80px; 
            --card-h: 115px;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden; transition: background 1s ease;
        }

        /* 自分のターン用のアニメーション背景 */
        @keyframes pulseBorder {
            0% { box-shadow: inset 0 0 0px var(--accent); }
            50% { box-shadow: inset 0 0 40px var(--accent); }
            100% { box-shadow: inset 0 0 0px var(--accent); }
        }
        .my-turn-container { animation: pulseBorder 2s infinite; }

        .bg-aura {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, transparent 70%);
            opacity: 0.15; pointer-events: none; z-index: -1;
            transition: 1.5s ease;
        }
        .your-turn-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15vw; font-weight: 900; color: transparent;
            -webkit-text-stroke: 2px rgba(64,224,208, 0.05);
            pointer-events: none; z-index: 0; white-space: nowrap;
        }

        .game-container { 
            display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; 
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 40px 40px; position: relative;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ガイドの見やすさ向上 */
        .cycle-guide {
            position: fixed; display: flex; z-index: 50; transition: 0.3s;
            background: rgba(0,0,0,0.8); padding: 10px; gap: 5px; align-items: center; backdrop-filter: blur(10px);
        }
        .guide-title { font-size: 8px; color: #888; font-weight: bold; writing-mode: vertical-rl; transform: rotate(180deg); margin-right: 5px; letter-spacing: 2px;}

        @media (min-width: 769px) {
            .cycle-guide { right: 20px; top: 50%; transform: translateY(-50%); flex-direction: column; border-left: 1px solid var(--border); border-radius: 12px; }
            .guide-title { writing-mode: horizontal-tb; transform: none; margin-bottom: 5px; }
            .center-stage { padding-right: 120px; }
            .login-title { font-size: 42px; letter-spacing: 12px; }
        }

        @media (max-width: 768px) {
            .cycle-guide { top: 65px; left: 10px; right: 10px; justify-content: center; border-bottom: 1px solid var(--border); border-radius: 8px; }
            .guide-arrow { transform: rotate(-90deg); }
            .guide-title { writing-mode: horizontal-tb; transform: none; margin-right: 10px; }
            .center-stage { flex-direction: column; gap: 20px; justify-content: center; }
            .login-title { font-size: 24px; letter-spacing: 6px; white-space: nowrap; }
            :root { --card-w: 65px; --card-h: 95px; }
        }

        .guide-item {
            font-size: 9px; padding: 4px 8px; border-radius: 4px;
            border: 1px solid transparent; transition: 0.3s; color: #666; white-space: nowrap;
        }
        .guide-item.active {
            color: #fff; border-color: var(--active-color);
            box-shadow: 0 0 15px var(--active-color); background: rgba(0,0,0,0.5);
            transform: scale(1.1); font-weight: bold;
        }
        .guide-arrow { font-size: 9px; opacity: 0.3; }

        .overlay { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; padding: 20px;
        }
        
        /* 相手のカード裏面表示用 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; margin-bottom: 5px; height: 50px; z-index: 10; }
        .opponent-status { display: flex; flex-direction: column; align-items: center; padding: 5px 10px; border-radius: 8px; background: rgba(0,0,0,0.4); border: 1px solid transparent; }
        .opponent-status.active { border-color: var(--realm-color); box-shadow: 0 0 10px var(--realm-color); }
        .mini-card-back { width: 12px; height: 18px; background: linear-gradient(135deg, #111, #333); border: 1px solid #555; border-radius: 2px; margin-left: -6px; box-shadow: -2px 0 5px rgba(0,0,0,0.5); }
        .mini-card-container { display: flex; margin-left: 6px; margin-top: 4px; }

        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: #000; position: relative; transition: 0.3s; overflow: hidden; cursor: pointer;
        }
        .card:hover:not(.disabled) { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 10px var(--accent); z-index: 100;}
        
        /* 【透かし廃止】出せない手札は暗くするだけ */
        .card.disabled { 
            filter: brightness(0.3); border-color: #333; cursor: not-allowed;
            transform: translateY(5px);
        }
        
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 2px 0; text-align: center; font-size: 9px; font-weight: bold; }
        .center-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 10; }
        
        /* 動的ボタン */
        .btn-action { padding: 12px 20px; border-radius: 20px; border: 1px solid var(--accent); background: rgba(0,0,0,0.5); color: var(--accent); font-weight: bold; cursor: pointer; font-size: 11px; transition: 0.3s; backdrop-filter: blur(5px); }
        .btn-action:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        .btn-action:disabled { border-color: #444; color: #666; cursor: not-allowed; }

        .hand-container { padding: 5px; border-radius: 20px 20px 0 0; min-height: 130px; position: relative; z-index: 10; }
        .hand-flex { display: flex; justify-content: center; padding: 0 20px; }
        .slot { margin-left: -30px; transition: 0.2s; }
        .slot:first-child { margin-left: 0; }
        .slot:hover { z-index: 50; }
        .badge { position: absolute; top: 4px; right: 4px; font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: bold; z-index: 10; }

        /* ワイルド選択モーダル（手札を隠さない上部配置） */
        .wild-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 15vh; z-index: 1000;
        }

        .login-title { font-weight: 900; color: var(--accent); margin-bottom: 40px; text-shadow: 0 0 20px rgba(64,224,208,0.3); text-align: center; }
        .input-field { width: 260px; padding: 15px 20px; border-radius: 30px; border: 1.5px solid var(--accent); background: transparent; color: white; font-size: 14px; text-align: center; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .input-field::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 2px; }
        .btn-main { width: 260px; padding: 15px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: 900; font-size: 14px; letter-spacing: 4px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', canDuplicate: true, desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', canDuplicate: false, desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', canDuplicate: true, desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', canDuplicate: false, desc: 'エネルギーが充填される。' },
            MACHINE: { n: '機械', color: '#ADFF2F', canDuplicate: true, desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', canDuplicate: false, desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const CYCLE_ORDER = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE'];
        const SORT_ORDER = ['GEAR','ICEAGE','FOUNTAIN','BATTERY','MACHINE','ARCHIVE','PLANET','RUINS'];

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                return () => socket.off();
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id;
            const activePlayer = gs?.players?.find(p => p.id === gs?.currentTurnPlayerId);
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            // 【機能追加】手札の自動整理（属性順）
            const sortedHand = useMemo(() => {
                if (!me.hand) return [];
                return [...me.hand].sort((a, b) => SORT_ORDER.indexOf(a.realm) - SORT_ORDER.indexOf(b.realm));
            }, [me.hand]);

            const currentRealmColor = useMemo(() => {
                if (gs && gs.fieldCard && REALMS[gs.fieldCard.realm]) return REALMS[gs.fieldCard.realm].color;
                return '#40E0D0';
            }, [gs]);

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial); 
                const f = gs.fieldCard.realm;
                const h = c.realm;           
                if (REALMS[h].w || REALMS[f].w) return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                if (f === 'ICEAGE' && h === 'BATTERY') return true;
                if (f === 'ARCHIVE' && h === 'ICEAGE') return true;

                if (f === h) return REALMS[h].canDuplicate;
                const fIdx = CYCLE_ORDER.indexOf(f);
                if (fIdx !== -1) {
                    const nextRealm = CYCLE_ORDER[(fIdx + 1) % 6];
                    return (h === nextRealm);
                }
                return false;
            };

            const CardView = ({ card, disabled, onClick }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                        <img src={src} alt={card.realm} onError={(e) => { e.target.style.display='none'; e.target.parentNode.style.background='#111'; }} />
                        {card.realm === 'GEAR' && card.isSpecial && <div className="badge" style={{background:'#FF4500'}}>+2</div>}
                        {card.realm === 'FOUNTAIN' && card.isSpecial && <div className="badge" style={{background:'#00CED1'}}>WILD</div>}
                        {card.realm === 'MACHINE' && card.isSpecial && <div className="badge" style={{background:'#FFA500'}}>REV</div>}
                        <div className="card-ui" style={{borderTop:`2px solid ${REALMS[card.realm].color}`}}>{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay">
                    <div className="bg-aura" style={{'--realm-color': '#40E0D0', opacity: 0.2}}></div>
                    <h1 className="login-title">CROSS REALM</h1>
                    <input className="input-field" placeholder="NAME" value={name} onChange={e=>setName(e.target.value)} />
                    <input className="input-field" placeholder="ROOM ID" value={room} onChange={e=>setRoom(e.target.value)} />
                    <button className="btn-main" onClick={()=>{if(room&&name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>LOGIN</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="glass-panel" style={{padding:'40px', textAlign:'center', width:'300px'}}>
                        <h2 style={{letterSpacing:'4px', margin:'0 0 20px 0'}}>WAITING...</h2>
                        <p style={{fontSize:'12px', opacity:0.6}}>PLAYERS: {gs?.players?.length || 0}/4</p>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 && 
                            <button className="btn-main" style={{marginTop:'20px', width:'100%'}} onClick={()=>socket.emit('start-game',{roomId:room})}>EXECUTE</button>
                        }
                    </div>
                </div>
            );

            // 手番ごとのボタンテキスト決定
            let actionBtnText = "WAITING...";
            if (isMyTurn) actionBtnText = gs.nextDrawAmount > 1 ? `DRAW +${gs.nextDrawAmount}` : "DRAW / PASS";
            else if (activePlayer) actionBtnText = `${activePlayer.name.substring(0,8)}'s TURN...`;

            return (
                <div className={`game-container ${isMyTurn ? 'my-turn-container' : ''}`} style={{'--realm-color': currentRealmColor}}>
                    <div className="bg-aura"></div>
                    {isMyTurn && <div className="your-turn-watermark">YOUR TURN</div>}
                    
                    <div className="cycle-guide">
                        <div className="guide-title">RULE GUIDE</div>
                        {CYCLE_ORDER.map((r, i) => (
                            <React.Fragment key={r}>
                                <div className={`guide-item ${gs.fieldCard.realm === r ? 'active' : ''}`} style={{'--active-color': REALMS[r].color}}>
                                    {REALMS[r].n}
                                </div>
                                {i < 5 && <div className="guide-arrow">▶</div>}
                            </React.Fragment>
                        ))}
                    </div>

                    <div className="top-bar glass-panel">
                        <div style={{fontSize:'10px', color:gs.isReversed?'orange':currentRealmColor, fontWeight:'bold', display:'flex', alignItems:'center'}}>
                            {gs.isReversed ? '◀ REVERSE' : 'NORMAL ▶'}
                        </div>
                        <div style={{display:'flex', gap:'10px', overflowX:'auto'}}>
                            {others.map(p => {
                                const isOpponentTurn = gs.currentTurnPlayerId === p.id;
                                return (
                                    <div key={p.id} className={`opponent-status ${isOpponentTurn ? 'active' : ''}`}>
                                        <div style={{fontSize:'9px', color: isOpponentTurn ? currentRealmColor : '#bbb'}}>
                                            {p.name.substring(0,5)} {isOpponentTurn && '🎯'}
                                        </div>
                                        <div className="mini-card-container">
                                            {Array.from({length: p.handCount}).map((_, i) => (
                                                <div key={i} className="mini-card-back"></div>
                                            ))}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>

                    <div className="center-stage">
                        <div style={{position: 'relative', display: 'flex', justifyContent: 'center', alignItems: 'center'}}>
                            <CardView card={gs.fieldCard} />
                            <div style={{marginLeft: '20px'}}>
                                <div style={{fontSize:'14px', color:currentRealmColor, fontWeight:'bold'}}>{REALMS[gs.fieldCard.realm].n}</div>
                                <div style={{fontSize:'9px', opacity:0.6, maxWidth:'80px'}}>{REALMS[gs.fieldCard.realm].desc}</div>
                            </div>
                        </div>
                        <button className="btn-action" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                            {actionBtnText}
                        </button>
                    </div>

                    <div className="hand-container">
                        <div className="hand-flex">
                            {sortedHand.map((c,i)=>(
                                <div key={c.id} className="slot" style={{zIndex:i}}>
                                    <CardView card={c} disabled={!canPlay(c)} onClick={()=>{
                                        if(!canPlay(c)) return;
                                        if(c.realm==='PLANET'||c.realm==='RUINS'||(c.realm==='FOUNTAIN'&&c.isSpecial)) setSelectorCard(c);
                                        else socket.emit('play-card',{roomId:room, card:c});
                                    }}/>
                                </div>
                            ))}
                        </div>
                    </div>

                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="wild-modal-overlay">
                            <div className="glass-panel" style={{padding:'20px', textAlign:'center', background:'rgba(0,0,0,0.85)'}}>
                                <h4 style={{margin:'0 0 15px 0', letterSpacing:'2px'}}>TARGET REALM</h4>
                                <div style={{display:'flex', flexWrap:'wrap', justifyContent:'center', maxWidth:'280px'}}>
                                    {CYCLE_ORDER.map(r=>(
                                        <button key={r} className="btn-action" style={{margin:'4px', borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={()=>{
                                            if(selectorCard) {
                                                socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r, preventSpecial:true});
                                                setSelectorCard(null);
                                            }
                                            else socket.emit('set-initial-realm',{roomId:room, chosenRealm:r});
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
