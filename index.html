<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Exo 2', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-fan-item {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card-fan-item:hover {
            transform: translateY(-40px) scale(1.1) !important;
            z-index: 50 !important;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .active-turn-ring {
            animation: pulse-ring 2s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 定数定義 ---
        const REALMS = {
            GEAR: { n: '歯車', color: 'from-orange-500 to-yellow-600', icon: '⚙️', desc: '機構が動き出す。+2ドロー攻撃。' },
            ICEAGE: { n: '氷河期', color: 'from-cyan-400 to-blue-500', icon: '❄️', desc: 'すべてを凍結させる。古文書を上書き。' },
            FOUNTAIN: { n: '噴水', color: 'from-blue-500 to-indigo-600', icon: '⛲', desc: '魔力が溢れ出す。WILD能力を持つ。' },
            BATTERY: { n: 'バッテリー', color: 'from-yellow-400 to-lime-500', icon: '🔋', desc: '氷河期の中でこそ真価を発揮する。' },
            MACHINE: { n: '機械', color: 'from-green-500 to-emerald-700', icon: '🤖', desc: '因果を逆転させる。リバース発動。' },
            ARCHIVE: { n: '古文書', color: 'from-amber-700 to-orange-900', icon: '📜', desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: 'from-purple-600 to-pink-600', icon: '🪐', desc: '未知の天体。あらゆる領域へ遷移可能。' },
            RUINS: { n: '遺跡', color: 'from-slate-600 to-stone-800', icon: '🏛️', desc: '古の記憶。あらゆる領域へ遷移可能。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        // --- メインコンポーネント ---
        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('ALPHA');
            const [name, setName] = useState('PILOT-' + Math.floor(Math.random() * 900 + 100));
            const [joined, setJoined] = useState(false);
            const [showWildMenu, setShowWildMenu] = useState(null); // card object
            
            const serverUrl = 'https://crossrealm-server.onrender.com'; // 実際のサーバーURLに書き換えてください

            useEffect(() => {
                const s = io(serverUrl);
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            const me = gs?.players?.find(p => p.id === socket?.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const others = gs?.players?.filter(p => p.id !== socket?.id) || [];

            // 出せるかどうかのバリデーション (Tactical Edition ルール)
            const canPlay = (card) => {
                if (!isMyTurn || gs.needsInitialChoice) return false;
                
                // ドロー2蓄積中のバリデーション
                if (gs.nextDrawAmount > 1) {
                    return (card.realm === 'GEAR' && card.isSpecial);
                }

                const field = gs.fieldCard.realm;
                const hand = card.realm;

                // ワイルドカードは常に出せる
                if (hand === 'PLANET' || hand === 'RUINS' || (hand === 'FOUNTAIN' && card.isSpecial)) return true;
                
                // 同じレルムなら出せる
                if (field === hand) return true;

                // 基本サイクルチェック
                const currentIdx = CYCLE_ORDER.indexOf(field);
                const nextRealm = CYCLE_ORDER[(currentIdx + 1) % 6];
                if (hand === nextRealm) return true;

                // 特殊コンボ
                if (field === 'ARCHIVE' && hand === 'ICEAGE') return true; // 古文書を凍らせる
                if (field === 'ICEAGE' && hand === 'BATTERY') return true; // 氷河期を充電
                if (field === 'ICEAGE' && hand === 'FOUNTAIN') return true; // 氷を溶かす

                return false;
            };

            const handlePlay = (card) => {
                if (!canPlay(card)) return;
                
                // WILD効果を持つ場合
                if (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial)) {
                    setShowWildMenu(card);
                } else {
                    socket.emit('play-card', { roomId: room, card });
                }
            };

            const selectWildRealm = (targetRealm) => {
                socket.emit('play-card', { roomId: room, card: showWildMenu, chosenRealm: targetRealm });
                setShowWildMenu(null);
            };

            if (!joined) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950 px-6">
                        <div className="glass p-10 rounded-3xl w-full max-w-md border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.15)] text-center">
                            <h1 className="text-4xl font-black italic tracking-tighter mb-2 text-cyan-400">CROSS REALM</h1>
                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10">Tactical Command Link</p>
                            
                            <div className="space-y-6">
                                <div className="text-left">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block ml-1">Pilot Signature</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-black/40 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none font-bold" />
                                </div>
                                <div className="text-left">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block ml-1">Sector Code</label>
                                    <input type="text" value={room} onChange={e => setRoom(e.target.value)} className="w-full bg-black/40 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none font-bold" />
                                </div>
                                <button onClick={() => { socket.emit('join-room', { roomId: room, playerName: name }); setJoined(true); }} className="w-full bg-cyan-600 hover:bg-cyan-500 py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">ESTABLISH LINK</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!gs || gs.status === 'waiting') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-950">
                        <div className="mb-12 text-center">
                            <div className="w-20 h-20 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin mx-auto mb-6"></div>
                            <h2 className="text-2xl font-black italic text-cyan-400">WAITING FOR PILOTS...</h2>
                            <p className="text-slate-500 font-bold uppercase tracking-widest mt-2">Room: {room}</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4 w-full max-w-lg px-6">
                            {gs?.players.map((p, i) => (
                                <div key={i} className="glass p-4 rounded-2xl flex items-center gap-4 border-slate-800">
                                    <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-xl">👨‍🚀</div>
                                    <span className="font-bold truncate">{p.name}</span>
                                </div>
                            ))}
                        </div>
                        {gs?.players[0]?.id === socket?.id && gs?.players.length >= 2 && (
                            <button onClick={() => socket.emit('start-game', { roomId: room })} className="mt-12 bg-emerald-600 px-12 py-5 rounded-full font-black text-2xl hover:bg-emerald-500 transition-all shadow-xl shadow-emerald-900/20">MISSION START</button>
                        )}
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden relative">
                    {/* 背景オーラ */}
                    <div className={`absolute inset-0 transition-all duration-1000 opacity-20 pointer-events-none bg-gradient-to-b ${REALMS[gs.fieldCard.realm].color} to-transparent`}></div>
                    
                    {/* ヘッダー: 敵プレイヤー */}
                    <div className="p-4 glass border-b border-white/5 z-10 flex gap-4 overflow-x-auto scrollbar-hide">
                        {others.map((p, i) => (
                            <div key={i} className={`flex-shrink-0 min-w-[140px] p-3 rounded-xl border transition-all ${gs.currentTurnPlayerId === p.id ? 'border-cyan-500 bg-cyan-950/30 active-turn-ring' : 'border-slate-800 bg-slate-900/50'}`}>
                                <div className="flex justify-between items-start mb-1">
                                    <span className="text-xs font-black truncate max-w-[80px]">{p.name}</span>
                                    <span className="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded font-black text-cyan-400">{p.handCount}</span>
                                </div>
                                <div className="flex gap-0.5 h-1.5">
                                    {[...Array(Math.min(p.handCount, 12))].map((_, idx) => (
                                        <div key={idx} className="flex-1 bg-cyan-500/40 rounded-full"></div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 中央: フィールド */}
                    <div className="flex-1 flex flex-col items-center justify-center relative p-6">
                        {/* サイクルステータス */}
                        <div className="absolute top-4 glass py-2 px-4 rounded-full flex items-center gap-4 border-slate-800 scale-90 md:scale-100">
                            {CYCLE_ORDER.map((r, i) => {
                                const isActive = gs.fieldCard.realm === r;
                                return (
                                    <React.Fragment key={r}>
                                        <span className={`text-xs font-black transition-all ${isActive ? 'text-white scale-110 drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]' : 'text-slate-600'}`}>{REALMS[r].n}</span>
                                        {i < 5 && <span className="text-slate-800">→</span>}
                                    </React.Fragment>
                                );
                            })}
                        </div>

                        {/* 特殊状態表示 */}
                        <div className="absolute right-6 top-20 flex flex-col gap-2 items-end">
                            {gs.nextDrawAmount > 1 && (
                                <div className="bg-red-600 px-4 py-2 rounded-xl font-black text-lg animate-bounce shadow-lg flex items-center gap-2">
                                    <span>⚠️</span> DRAW +{gs.nextDrawAmount}
                                </div>
                            )}
                            {gs.isReversed && (
                                <div className="bg-indigo-600 px-4 py-2 rounded-xl font-black text-xs uppercase tracking-tighter shadow-lg">
                                    🔄 REVERSED
                                </div>
                            )}
                        </div>

                        {/* 場札本体 */}
                        <div className="relative group">
                            <div className={`absolute -inset-8 blur-3xl opacity-30 bg-gradient-to-br ${REALMS[gs.fieldCard.realm].color}`}></div>
                            <div className={`w-48 h-64 md:w-56 md:h-80 glass rounded-3xl border-2 border-white/20 shadow-2xl relative flex flex-col overflow-hidden`}>
                                <div className={`p-4 bg-gradient-to-br ${REALMS[gs.fieldCard.realm].color} flex justify-between items-center`}>
                                    <span className="font-black italic text-xl drop-shadow-md">{REALMS[gs.fieldCard.realm].n}</span>
                                    <span className="text-2xl">{REALMS[gs.fieldCard.realm].icon}</span>
                                </div>
                                <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Current Realm</div>
                                    <div className="text-xs font-medium px-4 opacity-80 leading-relaxed">{REALMS[gs.fieldCard.realm].desc}</div>
                                </div>
                                {gs.fieldCard.isSpecial && (
                                    <div className="absolute bottom-4 left-0 right-0 text-center">
                                        <span className="bg-white text-black text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Special Triggered</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* ターン表示 */}
                        <div className="mt-8 text-center z-10">
                            <div className={`text-xl font-black italic tracking-widest uppercase ${isMyTurn ? 'text-cyan-400 animate-pulse' : 'text-slate-600'}`}>
                                {isMyTurn ? ">>> Your Turn <<<" : `Waiting for Pilot...`}
                            </div>
                        </div>
                    </div>

                    {/* 下部: アクションと手札 */}
                    <div className="p-6 glass border-t border-white/10 z-20">
                        <div className="max-w-4xl mx-auto flex flex-col">
                            <div className="flex justify-between items-end mb-4">
                                <div>
                                    <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Deck Stability</div>
                                    <div className={`text-2xl font-black italic ${me.hand.length >= 10 ? 'text-red-500' : 'text-white'}`}>
                                        {me.hand.length} <span className="text-sm text-slate-600">/ 12</span>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => socket.emit('draw-card', { roomId: room })}
                                    disabled={!isMyTurn}
                                    className={`px-8 py-4 rounded-2xl font-black text-lg transition-all ${isMyTurn ? 'bg-cyan-600 hover:bg-cyan-500 shadow-lg shadow-cyan-900/30' : 'bg-slate-800 text-slate-600 opacity-50'}`}
                                >
                                    {gs.nextDrawAmount > 1 ? `DRAW +${gs.nextDrawAmount}` : "DRAW / PASS"}
                                </button>
                            </div>

                            {/* 手札のファン表示 */}
                            <div className="relative h-48 flex justify-center mt-6">
                                <div className="flex justify-center w-full max-w-full overflow-x-auto scrollbar-hide py-4 px-20">
                                    <div className="relative flex items-end h-40" style={{ width: `${me.hand.length * 50 + 150}px` }}>
                                        {me.hand.map((card, idx) => {
                                            const playable = canPlay(card);
                                            const total = me.hand.length;
                                            const angle = (idx - (total - 1) / 2) * (total > 8 ? 6 : 10);
                                            const xPos = (idx - (total - 1) / 2) * (total > 10 ? 35 : 55);
                                            const yPos = Math.abs(idx - (total - 1) / 2) * 4;

                                            return (
                                                <div 
                                                    key={card.id}
                                                    onClick={() => handlePlay(card)}
                                                    className={`card-fan-item absolute bottom-0 w-32 h-44 rounded-2xl border-2 transition-all cursor-pointer shadow-xl flex flex-col overflow-hidden bg-slate-900 
                                                        ${playable ? 'border-white z-20' : 'border-slate-800 grayscale-[0.6] opacity-60 pointer-events-none'}`}
                                                    style={{
                                                        transform: `translateX(${xPos}px) rotate(${angle}deg) translateY(${yPos}px)`,
                                                        zIndex: idx
                                                    }}
                                                >
                                                    <div className={`h-1.5 w-full bg-gradient-to-r ${REALMS[card.realm].color}`}></div>
                                                    <div className="p-2 flex justify-between items-start">
                                                        <span className="text-[10px] font-black truncate">{REALMS[card.realm].n}</span>
                                                        <span className="text-xs">{REALMS[card.realm].icon}</span>
                                                    </div>
                                                    <div className="flex-1 flex items-center justify-center opacity-30 text-2xl">
                                                        {REALMS[card.realm].icon}
                                                    </div>
                                                    {card.isSpecial && (
                                                        <div className="bg-white/10 py-1 text-center">
                                                            <span className="text-[8px] font-black text-white/60 uppercase">Special</span>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* WILD選択モーダル */}
                    {showWildMenu && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="glass p-8 rounded-3xl max-w-sm w-full text-center border-white/10">
                                <h2 className="text-2xl font-black italic mb-2">REALM SHIFT</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase mb-8">遷移先の領域を選択してください</p>
                                <div className="grid grid-cols-2 gap-3">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} onClick={() => selectWildRealm(r)} className={`p-4 rounded-xl font-black text-sm bg-gradient-to-br ${REALMS[r].color} shadow-lg active:scale-95 transition-transform`}>
                                            {REALMS[r].n}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setShowWildMenu(null)} className="mt-8 text-slate-500 font-bold hover:text-white transition-colors">CANCEL</button>
                            </div>
                        </div>
                    )}

                    {/* 終了画面 */}
                    {gs.status === 'finished' && (
                        <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[200] flex flex-col items-center justify-center p-6">
                            <h2 className="text-6xl font-black italic text-cyan-400 mb-2 rotate-[-4deg]">SESSION END</h2>
                            <div className="glass p-10 rounded-3xl max-w-md w-full border-cyan-500/20 shadow-2xl">
                                <div className="text-xs font-black text-slate-500 uppercase tracking-[0.4em] mb-8 text-center">Pilot Standings</div>
                                <div className="space-y-4 mb-10">
                                    {gs.players.slice().sort((a,b) => a.handCount - b.handCount).map((p, i) => (
                                        <div key={p.id} className={`flex items-center justify-between p-4 rounded-xl border ${p.handCount === 0 ? 'border-emerald-500 bg-emerald-500/10' : 'border-slate-800'}`}>
                                            <div className="flex items-center gap-4">
                                                <span className="font-black italic text-slate-500 text-xl">#{i+1}</span>
                                                <span className="font-bold">{p.name}</span>
                                            </div>
                                            <span className="font-black text-cyan-400">{p.handCount} CARDS</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => socket.emit('play-again', { roomId: room })} className="w-full bg-cyan-600 hover:bg-cyan-500 py-5 rounded-2xl font-black text-xl shadow-lg shadow-cyan-900/30">RE-ESTABLISH LINK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
