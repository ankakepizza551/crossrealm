<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --danger: #FF4500;
            --bg: #050505; 
            --card-w: 140px; 
            --card-h: 200px;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .viewport-container {
            width: 100%; height: 100%; max-width: 550px; 
            background: var(--bg); position: relative; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,1);
            display: flex; flex-direction: column;
        }

        @keyframes pulseBorder {
            0% { box-shadow: inset 0 0 5px var(--accent); }
            50% { box-shadow: inset 0 0 30px var(--accent); }
            100% { box-shadow: inset 0 0 5px var(--accent); }
        }
        .my-turn-active { animation: pulseBorder 2s infinite; }

        .bg-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, transparent 70%);
            opacity: 0.25; pointer-events: none; z-index: 0;
            transition: 1.5s ease;
        }

        .game-container { 
            display: flex; flex-direction: column; flex-grow: 1; height: 100%; width: 100%; 
            padding: 15px; box-sizing: border-box; position: relative; z-index: 1;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 20px;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 10px; min-height: 80px;}
        
        .opponent-status { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px 12px; border-radius: 12px; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); min-width: 90px; transition: 0.3s;
        }
        .opponent-status.active { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); background: rgba(64,224,208,0.1); }
        .opp-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #fff; }
        .opp-card-count { font-family: 'Courier New', monospace; font-size: 18px; color: var(--accent); font-weight: 900; }

        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 14px; border: 2px solid rgba(255,255,255,0.2);
            background: #000; position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden; cursor: pointer; flex-shrink: 0;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .card-ui { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); 
            padding: 10px 0; text-align: center; font-size: 15px; font-weight: 900;
        }

        .hand-card.focused {
            transform: translateY(-60px) scale(1.25) !important;
            z-index: 500 !important;
            box-shadow: 0 30px 60px rgba(0,0,0,1), 0 0 30px var(--accent);
            border-color: #fff;
        }

        .center-stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
        
        .btn-action { 
            padding: 20px 40px; border-radius: 40px; border: 3px solid var(--accent); 
            background: rgba(0,0,0,0.7); color: var(--accent); font-weight: 900; 
            cursor: pointer; font-size: 20px; transition: 0.3s; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .btn-action:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }
        .btn-action:disabled { opacity: 0.5; border-color: #555; color: #555; }

        .hand-container { 
            padding: 40px 0; width: 100%; overflow-x: auto; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .hand-container::-webkit-scrollbar { height: 4px; }
        .hand-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .hand-flex { 
            display: flex; padding: 0 80px; width: max-content; margin: 0 auto;
            align-items: flex-end; height: 260px;
        }

        .slot { transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; }
        
        .hand-info-bar { text-align: center; font-size: 14px; margin-top: -15px; z-index: 10; padding: 8px; font-weight: bold;}

        .cycle-guide {
            display: flex; flex-direction: row; justify-content: center; gap: 6px;
            padding: 12px; margin-bottom: 10px; flex-wrap: wrap;
        }
        .guide-item {
            font-size: 12px; padding: 6px 12px; border-radius: 8px;
            border: 1px solid transparent; transition: 0.4s; color: #777;
            background: rgba(255,255,255,0.02);
        }
        .guide-item.active {
            color: #fff; border-color: var(--active-color);
            box-shadow: 0 0 20px var(--active-color); background: rgba(0,0,0,0.8);
            transform: scale(1.1); font-weight: bold;
        }

        .next-badge {
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px;
            font-size: 14px; margin-top: 15px; border-left: 4px solid var(--next-color);
        }

        .btn-exit {
            background: rgba(255, 68, 68, 0.1); border: 2px solid #ff4444; color: #ff4444;
            padding: 10px 18px; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 900;
        }

        .special-badge {
            position: absolute; top: 12px; left: 12px;
            background: var(--badge-bg, #FF4500); color: white;
            padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); z-index: 5;
        }

        @media (max-width: 500px) {
            :root { --card-w: 120px; --card-h: 170px; }
            .hand-flex { padding: 0 50px; height: 230px; }
            .btn-action { font-size: 18px; padding: 15px 30px; }
        }
    </style>
</head>
<body>
    <div class="viewport-container" id="viewport">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', canDuplicate: true, desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', canDuplicate: false, desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', canDuplicate: true, desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', canDuplicate: false, desc: 'エネルギーが充填。' },
            MACHINE: { n: '機械', color: '#ADFF2F', canDuplicate: true, desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', canDuplicate: false, desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];
        const SORT_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE', 'PLANET', 'RUINS'];

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [focusedCardId, setFocusedCardId] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                return () => socket.off('update-game');
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id && gs?.status === 'playing';
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            const sortedHand = useMemo(() => {
                if (!me.hand) return [];
                return [...me.hand].sort((a, b) => SORT_ORDER.indexOf(a.realm) - SORT_ORDER.indexOf(b.realm));
            }, [me.hand]);

            const dynamicMargin = useMemo(() => {
                const count = sortedHand.length;
                if (count <= 1) return 0;
                const base = window.innerWidth < 450 ? 70 : 85;
                return -(base + Math.min(20, count * 1.5));
            }, [sortedHand.length]);

            const nextRealm = useMemo(() => {
                if (!gs?.fieldCard) return null;
                const idx = CYCLE_ORDER.indexOf(gs.fieldCard.realm);
                if (idx === -1) return null;
                return CYCLE_ORDER[(idx + 1) % 6];
            }, [gs?.fieldCard]);

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial); 
                const f = gs.fieldCard.realm;
                const h = c.realm;           
                if (REALMS[h].w || REALMS[f].w) return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                if (f === 'ICEAGE' && h === 'BATTERY') return true;
                if (f === 'ARCHIVE' && h === 'ICEAGE') return true;
                if (f === h) return REALMS[h].canDuplicate;
                return (h === nextRealm);
            };

            const CardView = ({ card, disabled, onClick, isField, isFocused }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.wasFountain) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className={`card ${isField ? 'field-card' : 'hand-card'} ${disabled ? 'disabled' : ''} ${isFocused ? 'focused' : ''}`} onClick={onClick} style={isField ? {borderColor: REALMS[card.realm].color, scale: '1.1'} : {}}>
                        {card.realm === 'GEAR' && card.isSpecial && <div className="special-badge">+2 DRAW</div>}
                        {(card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) && <div className="special-badge" style={{'--badge-bg':'#00CED1'}}>WILD</div>}
                        <img src={src} alt={card.realm} />
                        <div className="card-ui" style={{borderTop:`4px solid ${REALMS[card.realm].color}`}}>{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="overlay">
                    <h1 style={{letterSpacing:10, fontSize:36, color: 'var(--accent)', marginBottom: 50, fontWeight:900}}>CROSS REALM</h1>
                    <div className="glass-panel" style={{padding:40, width:'80%', display:'flex', flexDirection:'column', gap:20}}>
                        <input style={{padding:20, borderRadius:15, border:'2px solid #444', background:'#000', color:'#fff', fontSize:18, textAlign:'center'}} placeholder="名前を入力" value={name} maxLength={10} onChange={e=>setName(e.target.value.toUpperCase())} />
                        <input style={{padding:20, borderRadius:15, border:'2px solid #444', background:'#000', color:'#fff', fontSize:18, textAlign:'center'}} placeholder="ルームID" value={room} onChange={e=>setRoom(e.target.value)} />
                        <button className="btn-action" onClick={()=>{if(room&&name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>ゲーム開始</button>
                    </div>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="glass-panel" style={{padding:'40px', textAlign:'center', width:'80%'}}>
                        <h2 style={{fontSize:28, marginBottom:20}}>待機中...</h2>
                        <div style={{margin:'20px 0', textAlign:'left', fontSize:18}}>
                            {gs?.players?.map((p, idx) => <div key={`${p.id}-${idx}`} style={{padding:'10px 0', borderBottom:'1px solid #333'}}>● {p.name}</div>)}
                        </div>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 ? (
                            <button className="btn-action" style={{width:'100%'}} onClick={()=>socket.emit('start-game',{roomId:room})}>システム起動</button>
                        ) : <p style={{fontSize:14, opacity:0.6}}>ホストの開始を待っています</p>}
                    </div>
                </div>
            );

            return (
                <div className={`game-container ${isMyTurn ? 'my-turn-active' : ''}`} style={{'--realm-color': REALMS[gs.fieldCard.realm].color}}>
                    <div className="bg-aura"></div>
                    
                    <div className="top-bar glass-panel">
                        <button className="btn-exit" onClick={() => window.location.reload()}>中断</button>
                        <div style={{display:'flex', gap:'12px'}}>
                            {others.map((p, idx) => (
                                <div key={`${p.id}-${idx}`} className={`opponent-status ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-name">{p.name}</div>
                                    <div className="opp-card-count">{p.handCount}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="cycle-guide glass-panel">
                        {CYCLE_ORDER.map((r) => (
                            <div key={r} className={`guide-item ${gs.fieldCard.realm === r ? 'active' : ''}`} style={{'--active-color': REALMS[r].color}}>
                                {REALMS[r].n}
                            </div>
                        ))}
                    </div>

                    <div className="center-stage">
                        <div style={{display:'flex', alignItems:'center', gap: 30, width:'100%', justifyContent:'center'}}>
                            <CardView card={gs.fieldCard} isField={true} />
                            <div style={{maxWidth: '200px'}}>
                                <div style={{fontSize:32, color:REALMS[gs.fieldCard.realm].color, fontWeight:900, letterSpacing:2, textShadow:`0 0 20px ${REALMS[gs.fieldCard.realm].color}`}}>{REALMS[gs.fieldCard.realm].n}</div>
                                <div style={{fontSize:15, opacity:0.8, marginTop:10, lineHeight:1.5}}>{REALMS[gs.fieldCard.realm].desc}</div>
                                {nextRealm && (
                                    <div className="next-badge" style={{'--next-color': REALMS[nextRealm].color}}>
                                        NEXT: <span style={{color:REALMS[nextRealm].color, fontWeight:900}}>{REALMS[nextRealm].n}</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        <button className="btn-action" onClick={()=>socket.emit('draw-card',{roomId:room})} disabled={!isMyTurn}>
                            {gs.nextDrawAmount > 1 ? `強制ドロー: ${gs.nextDrawAmount}枚` : (isMyTurn ? "カードを引く / パス" : "相手の番です")}
                        </button>
                    </div>

                    <div className="hand-info-bar">
                        <span style={{color: me.hand.length >= 10 ? 'var(--danger)' : '#fff', fontSize:16}}>
                            手札: {me.hand.length} / 12
                        </span>
                        {isMyTurn && <div style={{fontSize:12, color: 'var(--accent)', marginTop:5}}>カードを選んでからもう一度タップでプレイ</div>}
                    </div>

                    <div className="hand-container" onClick={(e) => { if(e.target === e.currentTarget) setFocusedCardId(null); }}>
                        <div className="hand-flex">
                            {sortedHand.map((c, i) => (
                                <div key={`${c.id}-${i}`} className="slot" style={{ marginLeft: i === 0 ? 0 : `${dynamicMargin}px`, zIndex: focusedCardId === c.id ? 500 : i }}>
                                    <CardView 
                                        card={c} 
                                        disabled={!canPlay(c)} 
                                        isFocused={focusedCardId === c.id}
                                        onClick={() => {
                                            if(!canPlay(c)) { setFocusedCardId(null); return; }
                                            if(focusedCardId === c.id) {
                                                const isWild = (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial));
                                                if(isWild) setSelectorCard(c);
                                                else socket.emit('play-card', {roomId:room, card:c});
                                                setFocusedCardId(null);
                                            } else setFocusedCardId(c.id);
                                        }}
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    {gs?.status === 'finished' && (
                        <div className="overlay" style={{background:'rgba(0,0,0,0.95)'}}>
                            <h2 style={{fontSize:50, color:'var(--accent)', fontWeight:900}}>GAME OVER</h2>
                            <p style={{fontSize:28, margin:'20px 0'}}>{gs.players.find(p => p.handCount === 0)?.name} の勝利！</p>
                            <button className="btn-action" onClick={() => window.location.reload()}>タイトルへ戻る</button>
                        </div>
                    )}

                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay" style={{background:'rgba(0,0,0,0.9)'}}>
                            <div className="glass-panel" style={{padding:30, textAlign:'center', width:'90%'}}>
                                <h3 style={{fontSize:24, marginBottom:25, letterSpacing:4}}>属性を選択せよ</h3>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:15}}>
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="btn-action" style={{fontSize:16, padding:20, borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={() => {
                                            if(selectorCard) {
                                                socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r, preventSpecial:true});
                                                setSelectorCard(null);
                                            } else socket.emit('set-initial-realm',{roomId:room, chosenRealm:r});
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
