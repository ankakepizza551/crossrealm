<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm Online - Final Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #40E0D0; --bg: #121212; --card-w: 85px; --card-h: 125px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* プレイヤーエリア（上部） */
        .opponents { display: flex; justify-content: center; gap: 15px; padding: 10px; background: rgba(0,0,0,0.4); border-bottom: 1px solid #333; height: 60px; }
        .opp-box { text-align: center; padding: 4px 12px; border-radius: 12px; border: 1px solid #444; background: #1a1a1a; min-width: 70px; transition: 0.3s; }
        .opp-box.active { border-color: var(--accent); box-shadow: 0 0 10px rgba(64, 224, 208, 0.4); background: rgba(64, 224, 208, 0.1); }
        .opp-hand { display: flex; align-items: center; justify-content: center; gap: 5px; font-weight: bold; margin-top: 2px; }
        .card-mini { width: 10px; height: 14px; background: #666; border: 1px solid #999; border-radius: 2px; }

        .game-area { height: calc(100vh - 80px); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px; }
        
        /* 属性サイクルガイド */
        .cycle-bar { font-size: 10px; color: #777; display: flex; gap: 4px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; }
        .active-realm { color: var(--accent); font-weight: bold; text-shadow: 0 0 5px var(--accent); }

        /* フィールド（場） */
        .field-box { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin: 10px 0; }
        .turn-msg { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; height: 1.5em; color: var(--accent); }

        /* カードの基本デザイン */
        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 10px; overflow: hidden; 
            position: relative; border: 2px solid #333; background: #000; transition: transform 0.2s;
        }
        .card.disabled { opacity: 0.2; filter: grayscale(1); transform: scale(0.9); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-ui { position: absolute; inset: 0; padding: 6px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(rgba(0,0,0,0.6) 0%, transparent 50%, rgba(0,0,0,0.7) 100%); pointer-events: none; }
        .card-num { font-size: 2.2em; font-weight: bold; text-align: right; line-height: 0.8; }
        .card-name { font-size: 0.6em; font-weight: bold; }

        /* 手札（スマホ最適化） */
        .my-hand-wrapper { width: 100%; overflow-x: auto; padding: 20px 0; display: flex; justify-content: center; }
        .my-hand { display: flex; padding: 0 40px; }
        .hand-slot { margin-left: -35px; transition: 0.2s; }
        .hand-slot:first-child { margin-left: 0; }
        .hand-slot:hover { transform: translateY(-20px); z-index: 100 !important; }

        /* 操作ボタン */
        .draw-btn-wrap { position: relative; margin-top: 15px; }
        .btn { padding: 12px 30px; border-radius: 25px; border: 2px solid #555; background: #222; color: white; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }
        .draw-badge { position: absolute; top: -12px; right: -12px; background: #ff4444; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid white; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車' }, ICEAGE: { n: '氷河期' }, FOUNTAIN: { n: '噴水' },
            BATTERY: { n: 'バッテリー' }, MACHINE: { n: '機械' }, ARCHIVE: { n: '古文書' },
            PLANET: { n: '惑星', w: true }, RUINS: { n: '廃墟', w: true }
        };
        const CYCLE = { GEAR:'ICEAGE', ICEAGE:'FOUNTAIN', FOUNTAIN:'BATTERY', BATTERY:'MACHINE', MACHINE:'ARCHIVE', ARCHIVE:'GEAR' };

        const Card = ({ card, onClick, disabled }) => {
            let img = card.realm === 'MACHINE' ? (card.number <= 2 ? 'MACHINE_reverse.png' : 'MACHINE_normal.png') :
                      card.realm === 'FOUNTAIN' ? (card.number <= 2 ? 'FOUNTAIN_wild.png' : 'FOUNTAIN_normal.png') :
                      (card.realm === 'GEAR' && card.number === 0) ? 'GEAR_frame.png' : `${card.realm}.png`;
            
            return (
                <div className={`card ${disabled ? 'disabled' : ''}`} onClick={onClick}>
                    <img src={`./images/${img}`} onError={(e)=>e.target.style.visibility='hidden'} />
                    <div className="card-ui">
                        <div className="card-name">{REALMS[card.realm].n}</div>
                        <div className="card-num">{card.number}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState({ players: [], fieldCard: null, nextDrawAmount: 1 });
            const [roomId, setRoomId] = useState('');
            const [joined, setJoined] = useState(false);

            useEffect(() => {
                socket.on('update-game', setData);
                return () => socket.off();
            }, []);

            const me = data.players.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = data.currentTurnPlayerId === socket.id;
            const others = data.players.filter(p => p.id !== socket.id);

            const canPlay = (c) => {
                if (!isMyTurn || !data.fieldCard) return false;
                if (REALMS[c.realm].w || (c.realm === 'FOUNTAIN' && c.number <= 2)) return true;
                const f = data.fieldCard;
                return c.realm === f.realm || c.number === f.number || CYCLE[f.realm] === c.realm;
            };

            if (!joined) return (
                <div style={{paddingTop: '150px', textAlign: 'center'}}>
                    <h1>Cross Realm</h1>
                    <input className="btn" style={{background:'#fff', color:'#000'}} value={roomId} onChange={e=>setRoomId(e.target.value)} placeholder="ROOM ID" />
                    <button className="btn" onClick={()=>{if(roomId){socket.emit('join-room', roomId); setJoined(true)}}}>START</button>
                </div>
            );

            return (
                <div>
                    <div className="opponents">
                        {others.map(p => (
                            <div key={p.id} className={`opp-box ${data.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                <div style={{fontSize:'10px'}}>PLAYER</div>
                                <div className="opp-hand"><div className="card-mini"/>{p.handCount}</div>
                            </div>
                        ))}
                    </div>

                    <div className="game-area">
                        <div className="cycle-bar">
                            {Object.keys(CYCLE).map(r => (
                                <span key={r} className={data.fieldCard?.realm === r ? 'active-step active-realm' : ''}>{REALMS[r].n} ➔</span>
                            ))} <span>歯車</span>
                        </div>

                        <div className="field-box">
                            <div className="turn-msg">{isMyTurn ? "★ YOUR TURN ★" : "Waiting..."}</div>
                            {data.fieldCard && <Card card={data.fieldCard} />}
                            <div className="draw-btn-wrap">
                                <button className="btn" onClick={()=>socket.emit('draw-card',{roomId})} disabled={!isMyTurn}>DRAW</button>
                                {data.nextDrawAmount > 1 && <div className="draw-badge">+{data.nextDrawAmount}</div>}
                            </div>
                        </div>

                        <div className="my-hand-wrapper">
                            <div className="my-hand">
                                {me.hand.map((c, i) => (
                                    <div key={c.id} className="hand-slot" style={{zIndex: i}}>
                                        <Card card={c} onClick={()=>isMyTurn && canPlay(c) && socket.emit('play-card',{roomId, card:c})} disabled={!canPlay(c)} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
