<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --cyber-pink: #FF00FF;
            --steam-gold: #D4AF37;
            --magic-purple: #8A2BE2;
            --danger: #FF4500;
            --bg: #050508; 
            --card-w: 115px; 
            --card-h: 165px;
            --opp-card-w: 28px;
            --opp-card-h: 42px;
            --border: rgba(212, 175, 55, 0.45);
        }
        
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Exo 2', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* PC環境での16:9縦型ラッパー */
        .screen-wrapper {
            width: 100vw; height: 100vh;
            max-width: calc(100vh * 9 / 16); max-height: 100vh;
            background: var(--bg);
            position: relative; overflow: hidden;
            box-shadow: 0 0 150px rgba(0,0,0,1);
            display: flex; flex-direction: column;
            border-left: 2px solid var(--steam-gold);
            border-right: 2px solid var(--steam-gold);
        }

        /* 背景レイヤー：ウォーターマークとアニメーション */
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
        
        .bg-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 160%; height: 160%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="0.8"/><circle cx="100" cy="100" r="70" fill="none" stroke="rgba(64,224,208,0.04)" stroke-width="0.6"/></svg>');
            animation: rotate-magical 180s linear infinite;
        }

        .bg-gears {
            position: absolute; width: 220%; height: 220%; top: -60%; left: -60%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><path fill="rgba(212,175,55,0.025)" d="M50 5l5 12h12l-10 8 4 12-11-9-11 9 4-12-10-8h12z"/></svg>');
            animation: rotate-reverse 100s linear infinite;
            opacity: 0.6;
        }

        @keyframes rotate-magical { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .bg-magic-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--realm-color, #111) 0%, transparent 85%);
            opacity: 0.45; transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-scanline {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.2) 50%);
            background-size: 100% 4px; z-index: 5;
        }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* ヘッダーエリア */
        .opponents-area {
            display: flex; flex-direction: column; gap: 12px; padding: 30px 15px 15px 15px;
            background: linear-gradient(to bottom, rgba(5,5,10,0.98), transparent);
            border-bottom: 1.5px solid var(--border);
        }
        .opp-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; border-radius: 6px; background: rgba(255,255,255,0.03);
            border-left: 6px solid var(--border); transition: all 0.3s;
        }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.12); box-shadow: inset 0 0 25px rgba(64, 224, 208, 0.15); }
        .opp-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--steam-gold); letter-spacing: 2px; }
        .opp-hand-visual { display: flex; gap: -22px; margin-top: 10px; }
        .mini-card-back {
            width: var(--opp-card-w); height: var(--opp-card-h);
            background: #111; border: 1.5px solid var(--steam-gold); border-radius: 3px;
            box-shadow: -4px 0 12px rgba(0,0,0,0.85);
        }

        /* フィールドエリア */
        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; gap: 25px; }
        
        .field-info-panel {
            background: rgba(10,10,15,0.92); border: 1.5px solid var(--steam-gold);
            padding: 18px; border-radius: 10px; width: 75%; text-align: center;
            backdrop-filter: blur(12px); box-shadow: 0 0 30px rgba(0,0,0,0.6);
            z-index: 20;
        }
        .field-realm-name { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 900; color: var(--realm-color); margin-bottom: 8px; letter-spacing: 3px; text-shadow: 0 0 10px var(--realm-color); }
        .field-effect-desc { font-size: 14px; font-weight: 700; color: #fff; opacity: 0.95; margin-bottom: 12px; line-height: 1.5; }
        .field-next-info { font-size: 12px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; border-top: 1.5px solid rgba(212,175,55,0.25); padding-top: 10px; }

        .turn-indicator-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif; font-size: 120px; font-weight: 900; opacity: 0.05;
            pointer-events: none; color: var(--accent); white-space: nowrap;
            animation: pulse-indicator 6s infinite ease-in-out;
        }
        @keyframes pulse-indicator { 0%, 100% { scale: 1; opacity: 0.04; } 50% { scale: 1.2; opacity: 0.08; } }

        /* 凡例パネル */
        .cycle-legend {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            background: rgba(10,10,15,0.95); padding: 20px 15px; border: 2px solid var(--steam-gold);
            border-radius: 8px; display: flex; flex-direction: column; gap: 12px; z-index: 30;
            box-shadow: 0 0 30px rgba(0,0,0,1); backdrop-filter: blur(15px);
        }
        .legend-item { display: flex; align-items: center; gap: 12px; font-size: 11px; font-weight: 900; letter-spacing: 1px; }
        .legend-dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 15px currentColor; }

        /* カードスタイル */
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 6px; border: 2.5px solid var(--steam-gold);
            background: #000; overflow: hidden; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.95);
            transition: all 0.45s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
        .card-footer {
            position: absolute; bottom: 0; width: 100%; background: rgba(5,5,10,0.98);
            font-size: 12px; font-weight: 900; padding: 10px 0; text-align: center;
            border-top: 3px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif;
        }

        /* 手札ホバー演出 */
        .my-card { margin-left: -50px; transform-origin: bottom center; cursor: pointer; }
        .my-card.playable:hover {
            transform: translateY(-65px) scale(1.45) !important;
            z-index: 1000 !important;
            border-color: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 45px var(--accent);
        }
        .my-card.not-playable { opacity: 0.2; filter: grayscale(1) brightness(0.35); cursor: not-allowed; }

        /* メインアクションボタン */
        .btn-main {
            background: linear-gradient(135deg, var(--steam-gold), #B8860B);
            color: #000; border: 3px solid #000;
            padding: 20px 0; border-radius: 6px; font-weight: 900; font-size: 18px;
            box-shadow: 0 0 30px rgba(212,175,55,0.45); cursor: pointer;
            width: 90%; transition: all 0.3s; letter-spacing: 8px; font-family: 'Cinzel', serif;
            position: relative; overflow: hidden;
        }
        .btn-main:hover { filter: brightness(1.3); transform: scale(1.04); box-shadow: 0 0 50px var(--accent); }
        .btn-main:disabled { background: #222; color: #555; box-shadow: none; border-color: #333; cursor: not-allowed; }

        .my-hand-area {
            background: linear-gradient(to top, rgba(5,5,10,1) 0%, rgba(5,5,10,0.92) 85%, transparent 100%);
            padding-bottom: 50px; display: flex; flex-direction: column; align-items: center;
        }
        .hand-container { display: flex; justify-content: center; padding: 25px 50px; min-height: 210px; align-items: flex-end; }

        /* オーバーレイ・パネル */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(18px); }
        .panel { 
            background: #08080c; border: 3.5px solid var(--steam-gold); 
            padding: 60px 40px; border-radius: 8px; text-align: center; 
            width: 85%; display: flex; flex-direction: column; align-items: center; gap: 30px;
            box-shadow: 0 0 70px rgba(212,175,55,0.3);
        }
        .panel input {
            width: 100%; padding: 22px; background: #000; border: 2.5px solid var(--steam-gold); 
            color: var(--accent); text-align: center; font-size: 18px; font-family: 'Exo 2', sans-serif;
            border-radius: 5px; outline: none; transition: 0.3s; font-weight: 700;
        }
        .panel input:focus { border-color: var(--accent); box-shadow: 0 0 25px rgba(64,224,208,0.3); }

        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; }
        .realm-btn { 
            padding: 18px; border: 2.5px solid var(--steam-gold); 
            background: rgba(255,255,255,0.04); color: #fff; font-weight: 900; 
            cursor: pointer; font-size: 14px; transition: 0.3s; font-family: 'Cinzel', serif;
        }
        .realm-btn:hover { background: var(--steam-gold); color: #000; }

        .status-badge { 
            background: #000; color: var(--danger); border: 2.5px solid var(--danger);
            padding: 14px 35px; font-weight: 900; font-size: 17px; margin-bottom: 35px; 
            animation: glitch-fx 0.3s infinite; text-transform: uppercase; letter-spacing: 5px;
        }
        @keyframes glitch-fx {
            0% { transform: translate(0); text-shadow: 3px 0 var(--accent); }
            50% { transform: translate(-4px, 2px); text-shadow: -3px 0 var(--cyber-pink); }
            100% { transform: translate(0); }
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: 'GEAR', color: '#FF8C00', desc: '機構の歯車。次に2枚引かせる。' },
            ICEAGE: { n: 'ICEAGE', color: '#00BFFF', desc: '全てを凍結させる領域。' },
            FOUNTAIN: { n: 'FOUNTAIN', color: '#4169E1', desc: '魔法の泉。属性を自在に変える。' },
            BATTERY: { n: 'BATTERY', color: '#32CD32', desc: '動力を蓄える緑の魔力。' },
            MACHINE: { n: 'MACHINE', color: '#2F4F4F', desc: '因果を操る。順番を逆転させる。' },
            ARCHIVE: { n: 'ARCHIVE', color: '#8B4513', desc: '古の記録。智恵の貯蔵庫。' },
            PLANET: { n: 'PLANET', color: '#9400D3', desc: '星々の加護。属性を上書きする。' },
            RUINS: { n: 'RUINS', color: '#696969', desc: '遺跡の記憶。属性を上書きする。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);
            const [previewStatus, setPreviewStatus] = useState('waiting');

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            // ゲーム状態の統合と手札の自動ソート (サイクル順)
            const effectiveGameState = useMemo(() => {
                const state = gs || (joined ? {
                    status: previewStatus,
                    currentTurnPlayerId: 'mock-me',
                    fieldCard: { realm: 'GEAR', isSpecial: false },
                    players: [
                        { id: 'mock-me', name: name || 'PILOT', handCount: 6, hand: [
                            { id: 'c1', realm: 'GEAR', isSpecial: true },
                            { id: 'c2', realm: 'ICEAGE', isSpecial: false },
                            { id: 'c3', realm: 'PLANET', isSpecial: false },
                            { id: 'c4', realm: 'ARCHIVE', isSpecial: false },
                            { id: 'c5', realm: 'MACHINE', isSpecial: true },
                            { id: 'c6', realm: 'BATTERY', isSpecial: false }
                        ] },
                        { id: 'mock-1', name: 'CYBER-WITCH', handCount: 4 },
                        { id: 'mock-2', name: 'BRASS-KNIGHT', handCount: 3 }
                    ],
                    nextDrawAmount: 1,
                    isReversed: false
                } : null);

                if (state && state.players) {
                    state.players = state.players.map(p => {
                        if (p.hand) {
                            p.hand.sort((a, b) => {
                                let idxA = CYCLE_ORDER.indexOf(a.realm);
                                let idxB = CYCLE_ORDER.indexOf(b.realm);
                                // 特殊カード(PLANET等)は末尾へ
                                if (idxA === -1) idxA = 99;
                                if (idxB === -1) idxB = 99;
                                if (idxA !== idxB) return idxA - idxB;
                                // 同属性なら特殊カードを先に
                                return (a.isSpecial ? 0 : 1) - (b.isSpecial ? 0 : 1);
                            });
                        }
                        return p;
                    });
                }
                return state;
            }, [gs, joined, name, previewStatus]);

            const me = effectiveGameState?.players?.find(p => p.id === (socket?.id || 'mock-me')) || { hand: [] };
            const isMyTurn = effectiveGameState?.currentTurnPlayerId === (socket?.id || 'mock-me');
            const others = effectiveGameState?.players?.filter(p => p.id !== (socket?.id || 'mock-me')) || [];

            const canPlay = (card) => {
                if (!isMyTurn || effectiveGameState.status !== 'playing') return false;
                if (effectiveGameState.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const field = effectiveGameState.fieldCard?.realm || 'GEAR';
                const hand = card.realm;
                if (hand === 'PLANET' || hand === 'RUINS' || (hand === 'FOUNTAIN' && card.isSpecial)) return true;
                if (field === hand) return true;
                const currentIdx = CYCLE_ORDER.indexOf(field);
                if (currentIdx !== -1 && hand === CYCLE_ORDER[(currentIdx + 1) % 6]) return true;
                if (field === 'ARCHIVE' && hand === 'ICEAGE') return true;
                if (field === 'ICEAGE' && (hand === 'BATTERY' || hand === 'FOUNTAIN')) return true;
                return false;
            };

            const Card = ({ card, playable, onClick, isField }) => {
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';

                return (
                    <div className={`card ${playable ? 'playable' : 'not-playable'} ${isField ? '' : 'my-card'}`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) {
                return (
                    <div className="screen-wrapper">
                        <div className="bg-layer bg-scanline"></div>
                        <div className="bg-layer bg-gears"></div>
                        <div className="overlay">
                            <div className="panel">
                                <h1 style={{color:'var(--steam-gold)', fontSize:36, fontWeight:900, fontStyle:'italic', fontFamily:'Cinzel', letterSpacing:6}}>CROSS REALM</h1>
                                <p style={{fontSize:11, color:'var(--accent)', letterSpacing:10, marginBottom:10}}>ETERNAL PUNK PROTOCOL</p>
                                <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="プレイヤー名" />
                                <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} placeholder="ルームID" />
                                <button onClick={()=>{setJoined(true); if(socket?.connected) socket.emit('join-room',{roomId:room, playerName:name});}} className="btn-main">接続</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (effectiveGameState?.status === 'waiting') {
                return (
                    <div className="screen-wrapper">
                        <div className="bg-layer bg-scanline"></div>
                        <div className="bg-layer bg-gears"></div>
                        <div className="container" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', zIndex:10}}>
                            <h2 style={{letterSpacing:12, opacity:0.8, fontSize:20, fontWeight:900, fontFamily:'Cinzel', color:'var(--steam-gold)'}}>AWAITING LINKAGE</h2>
                            <div style={{marginTop:12, fontSize:14, color:'var(--accent)', fontWeight:900, letterSpacing:4}}>ルームID: {room}</div>
                            <div style={{marginTop:50, display:'flex', flexDirection:'column', gap:18, width:'75%'}}>
                                {effectiveGameState.players.map(p => (
                                    <div key={p.id} style={{padding:20, background:'rgba(255,255,255,0.05)', borderLeft:'5px solid var(--steam-gold)', fontSize:16, fontWeight:900, letterSpacing:2}}>
                                        {p.name}
                                    </div>
                                ))}
                            </div>
                            {effectiveGameState.players[0]?.id === (socket?.id || 'mock-me') && (
                                <button onClick={()=>{ if(socket?.connected) { socket.emit('start-game',{roomId:room}); } else { setPreviewStatus('playing'); } }} className="btn-main" style={{marginTop:70, width:'75%'}}>コア起動</button>
                            )}
                        </div>
                    </div>
                );
            }

            const currentRealm = effectiveGameState?.fieldCard?.realm || 'GEAR';
            const nextRealmIdx = (CYCLE_ORDER.indexOf(currentRealm) + 1) % 6;
            const nextRealm = CYCLE_ORDER[nextRealmIdx === -1 ? 0 : nextRealmIdx];

            return (
                <div className="screen-wrapper">
                    <div className="bg-layer bg-magic-aura" style={{ '--realm-color': REALMS[currentRealm].color }}></div>
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-scanline"></div>
                    <div className="bg-layer bg-gears"></div>

                    <div className="game-container">
                        <div className="opponents-area">
                            {others.map(p => (
                                <div key={p.id} className={`opp-row ${effectiveGameState.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-info">
                                        <div className="opp-name">{p.name}</div>
                                        <div className="opp-hand-visual">
                                            {[...Array(p.handCount)].map((_, i) => <div key={i} className="mini-card-back" />)}
                                        </div>
                                    </div>
                                    <div style={{fontWeight:900, color: 'var(--accent)', fontSize:22}}>{p.handCount}</div>
                                </div>
                            ))}
                        </div>

                        <div className="field">
                            <div className="turn-indicator-watermark">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                            
                            <div className="cycle-legend scrollbar-hide">
                                <div style={{fontSize:10, fontWeight:900, color: 'var(--steam-gold)', opacity:0.6, marginBottom:10, textAlign:'center'}}>CYCLE</div>
                                {CYCLE_ORDER.map((r) => (
                                    <div key={r} className="legend-item" style={{color: REALMS[r].color, opacity: currentRealm === r ? 1 : 0.2}}>
                                        <div className="legend-dot" style={{background: REALMS[r].color}} />
                                        <span>{r}</span>
                                    </div>
                                ))}
                            </div>

                            {effectiveGameState.nextDrawAmount > 1 && <div className="status-badge">WARNING: DRAW +{effectiveGameState.nextDrawAmount}</div>}
                            
                            <div className="field-card-container">
                                <Card card={effectiveGameState.fieldCard} playable={true} isField={true} />
                            </div>

                            <div className="field-info-panel">
                                <div className="field-realm-name" style={{'--realm-color': REALMS[currentRealm].color}}>{REALMS[currentRealm].n}</div>
                                <div className="field-effect-desc">
                                    {effectiveGameState.fieldCard?.isSpecial ? '特殊効果起動中: ' : ''}
                                    {REALMS[currentRealm].desc}
                                </div>
                                <div className="field-next-info">
                                    NEXT: <span style={{color: REALMS[nextRealm].color}}>{nextRealm}</span> または <span style={{color: '#fff'}}>同属性</span>
                                </div>
                            </div>
                        </div>

                        <div className="my-hand-area">
                            <div style={{display:'flex', justifyContent:'center', padding:'20px 0', width:'100%'}}>
                                <button className="btn-main" disabled={!isMyTurn} onClick={() => {if(socket?.connected) socket.emit('draw-card',{roomId:room})}}>
                                    {effectiveGameState.nextDrawAmount > 1 ? `DRAW OVERRIDE +${effectiveGameState.nextDrawAmount}` : 'カードを引く / パス'}
                                </button>
                            </div>

                            <div className="hand-container scrollbar-hide">
                                {me.hand.map((card) => (
                                    <Card key={card.id} card={card} playable={canPlay(card)} 
                                          onClick={() => {
                                            if (!canPlay(card)) return;
                                            if (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial)) {
                                                setSelectorCard(card);
                                            } else if (socket?.connected) {
                                                socket.emit('play-card', { roomId: room, card });
                                            }
                                          }} />
                                ))}
                            </div>
                            <div style={{textAlign:'center', fontSize:11, fontWeight:900, marginTop:18, opacity:0.6, color:'var(--steam-gold)', letterSpacing:5}}>
                                同期状態: {me.hand.length} / 12
                            </div>
                        </div>
                    </div>

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:22, fontWeight:900, marginBottom:15, color:'var(--steam-gold)', fontFamily:'Cinzel', letterSpacing:4}}>REALM RE-ALIGN</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => {
                                                    if(socket?.connected) socket.emit('play-card', {roomId:room, card:selectorCard, chosenRealm:r});
                                                    setSelectorCard(null);
                                                }}>{r}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{marginTop:35, opacity:0.7, background:'transparent', border:'none', color:'#fff', cursor:'pointer', fontWeight:900, fontSize:16, letterSpacing:4}}>キャンセル</button>
                            </div>
                        </div>
                    )}

                    {effectiveGameState.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--steam-gold)', fontSize:32, fontWeight:900, fontFamily:'Cinzel', letterSpacing:6}}>MISSION END</h2>
                                <div style={{width:'100%', margin:'30px 0', textAlign:'left'}}>
                                    {effectiveGameState.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i)=>(
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'20px 10px', borderBottom:'1px solid var(--border)', fontSize:16}}>
                                            <span style={{fontWeight:900, color: i===0 ? 'var(--accent)' : '#fff'}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount} Units</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>{ if(socket?.connected) socket.emit('play-again',{roomId:room}); else setPreviewStatus('waiting'); }} className="btn-main">再接続</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
