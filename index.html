<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Tactical Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --accent: #40E0D0; 
            --danger: #FF4500;
            --bg: #050505; 
            --card-w: 140px; 
            --card-h: 200px;
            --slot-ml: -70px;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Exo 2', 'Hiragino Kaku Gothic ProN', sans-serif; 
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .viewport-container {
            width: 100%; height: 100%; max-width: 500px;
            background: var(--bg); position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        @keyframes pulseBorder {
            0% { box-shadow: inset 0 0 0px var(--accent); }
            50% { box-shadow: inset 0 0 30px var(--accent); }
            100% { box-shadow: inset 0 0 0px var(--accent); }
        }
        .my-turn-active { animation: pulseBorder 2s infinite; }

        @keyframes dangerPulse {
            0% { background: rgba(255, 69, 0, 0); }
            50% { background: rgba(255, 69, 0, 0.15); }
            100% { background: rgba(255, 69, 0, 0); }
        }
        .stack-active { animation: dangerPulse 1.5s infinite; }

        .bg-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--realm-color, #111) 0%, transparent 70%);
            opacity: 0.2; pointer-events: none; z-index: 0;
            transition: 1.5s ease;
        }

        .game-container { 
            display: flex; flex-direction: column; height: 100%; width: 100%; padding: 15px; box-sizing: border-box; 
            position: relative; z-index: 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 16px;
        }

        .cycle-guide {
            display: flex; flex-direction: row; justify-content: center; gap: 4px;
            padding: 8px; margin-bottom: 10px; flex-wrap: wrap;
        }
        .guide-item {
            font-size: 10px; padding: 4px 8px; border-radius: 6px;
            border: 1px solid transparent; transition: 0.4s; color: #555;
            background: rgba(255,255,255,0.02);
        }
        .guide-item.active {
            color: #fff; border-color: var(--active-color);
            box-shadow: 0 0 15px var(--active-color); background: rgba(0,0,0,0.6);
            transform: scale(1.15); font-weight: bold;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 60px; margin-bottom: 10px;}
        
        .opponent-status { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 6px 12px; border-radius: 10px; background: rgba(0,0,0,0.5); 
            border: 1.5px solid transparent; min-width: 70px;
        }
        .opponent-status.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.2);
            background: #000; position: relative; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); 
            overflow: hidden; cursor: pointer; flex-shrink: 0;
        }
        .hand-card:hover:not(.disabled) { transform: translateY(-20px) scale(1.05); z-index: 100; box-shadow: 0 15px 30px rgba(0,0,0,0.8), 0 0 20px var(--accent); }
        
        /* 回避可能カードの強調 */
        @keyframes counterFlash {
            0% { box-shadow: 0 0 5px #fff; border-color: #fff; }
            50% { box-shadow: 0 0 25px #40E0D0; border-color: #40E0D0; }
            100% { box-shadow: 0 0 5px #fff; border-color: #fff; }
        }
        .can-counter { animation: counterFlash 1s infinite !important; transform: translateY(-10px); }

        .field-card { cursor: default; border-width: 2px; }

        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .card-ui { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 6px 0; text-align: center; font-size: 13px; font-weight: 900; }
        
        .center-stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        
        .btn-action { 
            padding: 15px 30px; border-radius: 30px; border: 2px solid var(--accent); 
            background: rgba(0,0,0,0.6); color: var(--accent); font-weight: 900; 
            cursor: pointer; font-size: 16px; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-action:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover:not(:disabled) { background: var(--danger); color: #fff; box-shadow: 0 0 20px var(--danger); }

        .hand-container { padding: 20px 0 40px; overflow-x: auto; scrollbar-width: none; }
        .hand-flex { display: flex; padding: 0 50px; width: max-content; margin: 0 auto; }
        .slot { margin-left: var(--slot-ml); transition: 0.3s; position: relative; }
        .slot:first-child { margin-left: 0; }
        
        .overlay { 
            position: absolute; inset: 0; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; padding: 30px;
        }
        .input-field { 
            width: 100%; padding: 18px; border-radius: 12px; border: 2px solid var(--border); 
            background: rgba(255,255,255,0.05); color: white; font-size: 18px; text-align: center; 
            margin-bottom: 20px; outline: none;
        }

        .btn-exit {
            background: transparent; border: 1px solid #ff4444; color: #ff4444;
            padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
        }

        .stack-banner {
            background: linear-gradient(90deg, transparent, var(--danger), transparent);
            color: white; padding: 5px 20px; font-weight: bold; font-size: 14px;
            margin-bottom: 10px; text-shadow: 0 0 10px black;
        }
        
        @media (max-width: 400px) {
            :root { --card-w: 110px; --card-h: 157px; --slot-ml: -60px; }
            .btn-action { font-size: 14px; padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <div class="viewport-container" id="viewport">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', canDuplicate: true, desc: '機構が動き出す。+2ドロー。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', canDuplicate: false, desc: 'すべてが静止する。' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', canDuplicate: true, desc: 'マナが溢れ出す。WILD。' },
            BATTERY: { n: 'バッテリー', color: '#FFD700', canDuplicate: false, desc: 'エネルギーが充填。' },
            MACHINE: { n: '機械', color: '#ADFF2F', canDuplicate: true, desc: '因果が逆転する。反転。' },
            ARCHIVE: { n: '古文書', color: '#DEB887', canDuplicate: false, desc: '智恵が未来を創る。' },
            PLANET: { n: '惑星', color: '#9370DB', w: true, desc: '未知の天体。' },
            RUINS: { n: '廃墟', color: '#708090', w: true, desc: '忘れ去られた文明。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];
        const SORT_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE', 'PLANET', 'RUINS'];

        const App = () => {
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                socket.on('update-game', (data) => setGs(data));
                return () => socket.off('update-game');
            }, []);

            const me = gs?.players?.find(p => p.id === socket.id) || { hand: [] };
            const isMyTurn = gs?.currentTurnPlayerId === socket.id && gs?.status === 'playing';
            const others = gs?.players?.filter(p => p.id !== socket.id) || [];
            
            const sortedHand = useMemo(() => {
                if (!me.hand) return [];
                return [...me.hand].sort((a, b) => SORT_ORDER.indexOf(a.realm) - SORT_ORDER.indexOf(b.realm));
            }, [me.hand]);

            const nextRealm = useMemo(() => {
                if (!gs?.fieldCard) return null;
                const idx = CYCLE_ORDER.indexOf(gs.fieldCard.realm);
                if (idx === -1) return null;
                return CYCLE_ORDER[(idx + 1) % 6];
            }, [gs?.fieldCard]);

            const canPlay = (c) => {
                if (!isMyTurn || !gs?.fieldCard || gs.needsInitialChoice) return false;
                if (gs.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial); 
                const f = gs.fieldCard.realm;
                const h = c.realm;           
                if (REALMS[h].w || REALMS[f].w) return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                if (f === 'ICEAGE' && h === 'BATTERY') return true;
                if (f === 'ARCHIVE' && h === 'ICEAGE') return true;
                if (f === h) return REALMS[h].canDuplicate;
                return (h === nextRealm);
            };

            const CardView = ({ card, disabled, onClick, isField, canCounter }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                if (card.wasPlanet) src = './images/PLANET.png';
                if (card.wasFountain) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'FOUNTAIN') src = card.isSpecial ? './images/FOUNTAIN_wild.png' : './images/FOUNTAIN_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';

                return (
                    <div className={`card ${isField ? 'field-card' : 'hand-card'} ${disabled ? 'disabled' : ''} ${canCounter ? 'can-counter' : ''}`} 
                         onClick={onClick} 
                         style={isField ? {borderColor: REALMS[card.realm].color, boxShadow: `0 0 20px ${REALMS[card.realm].color}44`} : {}}>
                        <img src={src} alt={card.realm} />
                        {card.realm === 'GEAR' && card.isSpecial && <div style={{position:'absolute',top:8,left:8,background:'#FF4500',padding:'2px 8px',borderRadius:4,fontWeight:'bold',fontSize:12,boxShadow:'0 0 10px rgba(0,0,0,0.5)'}}>+2</div>}
                        {(card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) && <div style={{position:'absolute',top:8,left:8,background:'#00CED1',color:'#000',padding:'2px 8px',borderRadius:4,fontWeight:'bold',fontSize:12}}>WILD</div>}
                        <div className="card-ui" style={{borderTop:`3px solid ${REALMS[card.realm].color}`}}>{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            const leaveRoom = () => {
                socket.emit('leave-room', {roomId: room});
                setJoined(false);
                setGs(null);
            };

            if (!joined) return (
                <div className="overlay">
                    <h1 style={{letterSpacing:8, fontSize:32, color: 'var(--accent)', marginBottom: 40}}>CROSS REALM</h1>
                    <input className="input-field" placeholder="あなたの名前" value={name} maxLength={10} onChange={e=>setName(e.target.value)} />
                    <input className="input-field" placeholder="ルームID" value={room} onChange={e=>setRoom(e.target.value)} />
                    <button className="btn-action" style={{width:'100%'}} onClick={()=>{if(room&&name){socket.emit('join-room',{roomId:room,playerName:name});setJoined(true)}}}>ゲーム開始</button>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="overlay">
                    <div className="glass-panel" style={{padding:'40px', textAlign:'center', width:'80%'}}>
                        <h2 style={{margin:'0 0 10px 0'}}>待機中...</h2>
                        <p style={{fontSize:12, opacity:0.6}}>ROOM: {room}</p>
                        <div style={{margin:'20px 0', textAlign:'left'}}>
                            {gs?.players?.map(p => <div key={p.id} style={{padding:'5px 0'}}>・{p.name}</div>)}
                        </div>
                        {gs?.players?.[0]?.id === socket.id && gs?.players?.length >= 2 ? (
                            <button className="btn-action" style={{width:'100%'}} onClick={()=>socket.emit('start-game',{roomId:room})}>システム起動</button>
                        ) : <p style={{fontSize:11, opacity:0.7}}>ホストの開始を待っています</p>}
                        <button className="btn-exit" style={{marginTop:20, width:'100%'}} onClick={leaveRoom}>退出する</button>
                    </div>
                </div>
            );

            const isStacking = gs.nextDrawAmount > 1;

            return (
                <div className={`game-container ${isMyTurn ? 'my-turn-active' : ''} ${isStacking ? 'stack-active' : ''}`} style={{'--realm-color': REALMS[gs.fieldCard.realm].color}}>
                    <div className="bg-aura"></div>
                    
                    <div className="top-bar glass-panel">
                        <button className="btn-exit" onClick={leaveRoom}>中断</button>
                        <div style={{display:'flex', gap:'8px'}}>
                            {others.map(p => (
                                <div key={p.id} className={`opponent-status ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div style={{fontSize:12, fontWeight:'bold', maxWidth:80, overflow:'hidden', textOverflow:'ellipsis'}}>{p.name}</div>
                                    <div style={{fontSize:10, opacity:0.8}}>{p.handCount} 枚</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="cycle-guide glass-panel">
                        {CYCLE_ORDER.map((r) => (
                            <div key={r} className={`guide-item ${gs.fieldCard.realm === r ? 'active' : (r === nextRealm ? 'next' : '')}`} style={{'--active-color': REALMS[r].color}}>
                                {REALMS[r].n}
                            </div>
                        ))}
                    </div>

                    <div className="center-stage">
                        {isStacking && (
                            <div className="stack-banner">
                                ⚠️ {gs.nextDrawAmount} 枚のペナルティが蓄積中！
                            </div>
                        )}
                        
                        <div style={{display:'flex', alignItems:'center', gap: 20}}>
                            <CardView card={gs.fieldCard} isField={true} />
                            <div style={{flex:1}}>
                                <div style={{fontSize:22, color:REALMS[gs.fieldCard.realm].color, fontWeight:900}}>{REALMS[gs.fieldCard.realm].n}</div>
                                <div style={{fontSize:12, opacity:0.8, marginTop:5, lineHeight:1.4}}>{REALMS[gs.fieldCard.realm].desc}</div>
                                {nextRealm && !isStacking && <div style={{marginTop:10, fontSize:11, color:'#fff', background:'rgba(255,255,255,0.1)', padding:'4px 8px', borderRadius:4, display:'inline-block'}}>
                                    NEXT: <span style={{color:REALMS[nextRealm].color, fontWeight:'bold'}}>{REALMS[nextRealm].n}</span>
                                </div>}
                            </div>
                        </div>

                        <button 
                            className={`btn-action ${isStacking && isMyTurn ? 'btn-danger' : ''}`} 
                            onClick={()=>socket.emit('draw-card',{roomId:room})} 
                            disabled={!isMyTurn}
                        >
                            {isStacking ? `回避不可：${gs.nextDrawAmount}枚引く` : (isMyTurn ? "カードを引く / パス" : "相手の番です")}
                        </button>
                        
                        {isStacking && isMyTurn && (
                            <div style={{fontSize:11, color: 'var(--danger)', fontWeight:'bold'}}>
                                ※ギアの特殊カードを出せば回避＆上乗せできます
                            </div>
                        )}
                    </div>

                    <div className="hand-container">
                        <div className="hand-flex">
                            {sortedHand.map((c, i) => {
                                const counterable = isStacking && isMyTurn && c.realm === 'GEAR' && c.isSpecial;
                                return (
                                    <div key={c.id} className="slot" style={{zIndex: i}}>
                                        <CardView 
                                            card={c} 
                                            disabled={!canPlay(c)} 
                                            canCounter={counterable}
                                            onClick={() => {
                                                if(!canPlay(c)) return;
                                                const isWild = (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial));
                                                if(isWild) setSelectorCard(c);
                                                else socket.emit('play-card', {roomId:room, card:c});
                                            }}/>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {gs?.status === 'finished' && (
                        <div className="overlay" style={{background:'rgba(0,0,0,0.92)'}}>
                            <h2 style={{fontSize:40, color:'var(--accent)', textShadow: '0 0 20px var(--accent)'}}>GAME OVER</h2>
                            <p style={{fontSize:24, marginTop:10}}>{gs.players.find(p => p.handCount === 0)?.name} の勝利！</p>
                            <button className="btn-action" style={{marginTop:40, width:200}} onClick={() => socket.emit('play-again', {roomId: room})}>もう一度プレイ</button>
                            <button className="btn-exit" style={{marginTop:15, width:200}} onClick={leaveRoom}>終了する</button>
                        </div>
                    )}

                    {/* WILD選択モーダル */}
                    {(selectorCard || (gs.needsInitialChoice && gs.players[0].id === socket.id)) && (
                        <div className="overlay" style={{background:'rgba(0,0,0,0.85)'}}>
                            <div className="glass-panel" style={{padding:25, textAlign:'center', width:'90%'}}>
                                <h3 style={{margin:'0 0 20px 0', letterSpacing:2}}>SELECT REALM</h3>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="btn-action" style={{fontSize:14, padding:15, borderColor:REALMS[r].color, color:REALMS[r].color}} onClick={() => {
                                            if(selectorCard) {
                                                socket.emit('play-card',{roomId:room, card:selectorCard, chosenRealm:r, preventSpecial:true});
                                                setSelectorCard(null);
                                            } else socket.emit('set-initial-realm',{roomId:room, chosenRealm:r});
                                        }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
