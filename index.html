<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Realm Online</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .card { width: 75px; height: 110px; border-radius: 8px; color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 1px solid #000; }
        .field-card { width: 100px; height: 140px; border-radius: 10px; border: 4px solid #fff; margin: 20px auto; color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 10px 20px; background: #444; color: #fff; border: 1px solid #fff; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('https://crossrealm-server.onrender.com');

        const REALMS = {
            GEAR: { name: '歯車', color: '#B8860B' }, ICEAGE: { name: '氷河期', color: '#ADD8E6' },
            FOUNTAIN: { name: '噴水', color: '#00BFFF' }, BATTERY: { name: 'バッテリー', color: '#FFFF00' },
            MACHINE: { name: '機械', color: '#00FF7F' }, ARCHIVE: { name: '古文書', color: '#DEB887' },
            PLANET: { name: '惑星', color: '#FFFACD', isWild: true }, RUINS: { name: '廃墟', color: '#696969', isWild: true }
        };

        const App = () => {
            const [roomId, setRoomId] = useState('');
            const [isJoined, setIsJoined] = useState(false);
            const [fieldCard, setFieldCard] = useState(null);
            const [myHand, setMyHand] = useState([]);
            const [isMyTurn, setIsMyTurn] = useState(false);

            useEffect(() => {
                socket.on('init-game', (data) => {
                    setMyHand(data.hand);
                    setFieldCard(data.fieldCard);
                    setIsMyTurn(data.isMyTurn);
                });
                socket.on('update-game', (data) => {
                    setFieldCard(data.fieldCard);
                    setIsMyTurn(socket.id === data.currentTurnPlayerId);
                });
                return () => { socket.off('init-game'); socket.off('update-game'); };
            }, []);

            const canPlay = (card) => {
                if (!isMyTurn || !fieldCard) return false;
                if (REALMS[card.realm].isWild || REALMS[fieldCard.realm].isWild) return true;
                return card.realm === fieldCard.realm || card.number === fieldCard.number;
            };

            const playCard = (card) => { if (canPlay(card)) socket.emit('play-card', { roomId, card }); };
            const drawCard = () => { if (isMyTurn) socket.emit('draw-card', { roomId }); };

            if (!isJoined) return (
                <div style={{marginTop: '100px'}}>
                    <input value={roomId} onChange={e => setRoomId(e.target.value)} placeholder="合言葉" style={{padding: '10px'}} />
                    <button className="btn" onClick={() => { if(roomId) { socket.emit('join-room', roomId); setIsJoined(true); }}}>入室</button>
                </div>
            );

            return (
                <div>
                    <div style={{ background: isMyTurn ? '#00FF7F' : '#333', color: isMyTurn ? '#000' : '#fff', padding: '10px' }}>
                        {isMyTurn ? "あなたの番です！" : "相手の番を待っています..."}
                    </div>
                    {fieldCard && (
                        <div className="field-card" style={{backgroundColor: REALMS[fieldCard.realm].color}}>
                            <small>{REALMS[fieldCard.realm].name}</small>
                            <div style={{fontSize: '2em'}}>{fieldCard.number}</div>
                        </div>
                    )}
                    <button className="btn" onClick={drawCard} disabled={!isMyTurn}>山札から引く (パス)</button>
                    <div style={{ display: 'flex', justifyContent: 'center', flexWrap: 'wrap', gap: '10px', marginTop: '30px' }}>
                        {myHand.map(card => (
                            <div key={card.id} className="card" onClick={() => playCard(card)} 
                                 style={{ backgroundColor: REALMS[card.realm].color, opacity: canPlay(card) ? 1 : 0.4 }}>
                                <small>{REALMS[card.realm].name}</small>
                                <div>{card.number}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
