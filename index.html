<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Eternal Punk Edition -</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #40E0D0; 
            --cyber-pink: #FF00FF;
            --steam-gold: #D4AF37;
            --magic-purple: #8A2BE2;
            --danger: #FF4500;
            --bg: #050508; 
            --card-w: 115px; 
            --card-h: 165px;
            --opp-card-w: 30px;
            --opp-card-h: 44px;
            --border: rgba(212, 175, 55, 0.45);
        }
        
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Exo 2', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .screen-wrapper {
            width: 100vw; height: 100vh;
            max-width: calc(100vh * 9 / 16); max-height: 100vh;
            background: var(--bg);
            position: relative; overflow: hidden;
            box-shadow: 0 0 150px rgba(0,0,0,1);
            display: flex; flex-direction: column;
            border-left: 2px solid var(--steam-gold);
            border-right: 2px solid var(--steam-gold);
        }

        /* 背景レイヤー */
        .bg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
        .bg-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 165%; height: 165%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="0.8"/><circle cx="100" cy="100" r="70" fill="none" stroke="rgba(64,224,208,0.04)" stroke-width="0.6"/></svg>');
            animation: rotate-eternal 200s linear infinite;
        }
        @keyframes rotate-eternal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .bg-magic-aura {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--realm-color, #111) 0%, transparent 85%);
            opacity: 0.45; transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-scanline {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.2) 50%);
            background-size: 100% 4px; z-index: 5;
        }

        .game-container { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* 相手エリア */
        .opponents-area {
            display: flex; flex-direction: column; gap: 12px; padding: 30px 15px 15px 15px;
            background: linear-gradient(to bottom, rgba(5,5,10,0.98), transparent);
            border-bottom: 2px solid var(--border);
        }
        .opp-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; border-radius: 8px; background: rgba(255,255,255,0.03);
            border-left: 6px solid var(--border); transition: 0.3s;
        }
        .opp-row.active { border-left-color: var(--accent); background: rgba(64, 224, 208, 0.12); box-shadow: inset 0 0 25px rgba(64, 224, 208, 0.2); }
        .opp-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--steam-gold); letter-spacing: 2px; }
        .opp-hand-visual { display: flex; gap: -20px; margin-top: 10px; min-height: var(--opp-card-h); }
        .mini-card-back {
            width: var(--opp-card-w); height: var(--opp-card-h);
            background: linear-gradient(135deg, #111, #222);
            border: 1.5px solid var(--steam-gold); border-radius: 4px;
            box-shadow: -4px 0 12px rgba(0,0,0,0.9);
        }

        /* 属性サイクル（上部バー） */
        .cycle-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px 25px 10px; background: rgba(0,0,0,0.85);
            border-bottom: 2px solid var(--border); gap: 4px;
        }
        .cycle-dot {
            flex: 1; height: 6px; border-radius: 3px; background: #1a1a1a; position: relative;
            transition: 0.5s;
        }
        .cycle-dot.active { background: var(--dot-color); box-shadow: 0 0 15px var(--dot-color); }
        .cycle-dot.active::after {
            content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 18px; border-radius: 50%; background: var(--dot-color);
            box-shadow: 0 0 20px var(--dot-color), inset 0 0 5px #fff;
        }
        .cycle-label { 
            position: absolute; top: 18px; left: 50%; transform: translateX(-50%); 
            font-size: 11px; font-weight: 900; color: #fff; opacity: 0.4;
            letter-spacing: 0.5px; transition: 0.3s;
            white-space: nowrap; /* 改行を禁止 */
        }
        .cycle-dot.active .cycle-label { opacity: 1; color: var(--dot-color); font-size: 12px; text-shadow: 0 0 10px #000; }

        /* フィールド */
        .field { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; gap: 30px; }
        .field-main-area { display: flex; align-items: center; gap: 30px; width: 100%; justify-content: center; z-index: 10; }

        .info-panel {
            flex: 1; background: rgba(10,10,15,0.94); border: 2px solid var(--steam-gold);
            padding: 22px; border-radius: 12px; backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0,0,0,0.8); max-width: 230px;
        }
        .realm-title { font-family: 'Cinzel', serif; font-size: 30px; font-weight: 900; color: var(--realm-color); margin-bottom: 10px; letter-spacing: 3px; text-shadow: 0 0 15px var(--realm-color); }
        .realm-desc { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.6; }
        .next-hint { margin-top: 15px; padding-top: 12px; border-top: 2px solid rgba(212,175,55,0.3); font-size: 14px; font-weight: 900; color: var(--accent); }

        .turn-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif; font-size: 130px; font-weight: 900; opacity: 0.05;
            color: var(--accent); white-space: nowrap; pointer-events: none;
        }

        /* カード */
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 6px; border: 3px solid var(--steam-gold);
            background: #000; overflow: hidden; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-footer {
            position: absolute; bottom: 0; width: 100%; background: rgba(10,10,15,0.98);
            font-size: 13px; font-weight: 900; padding: 10px 0; text-align: center;
            border-top: 3px solid var(--r-color); color: var(--steam-gold); font-family: 'Cinzel', serif;
        }

        /* 手札ホバー */
        .my-card { margin-left: -55px; transform-origin: bottom center; cursor: pointer; }
        .my-card.playable:hover {
            transform: translateY(-70px) scale(1.45) !important;
            z-index: 1000 !important;
            border-color: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 50px var(--accent);
        }
        .my-card.not-playable { opacity: 0.2; filter: grayscale(1) brightness(0.3); }

        /* アクションボタン */
        .action-area { padding: 20px; display: flex; justify-content: center; z-index: 100; }
        .btn-main {
            background: linear-gradient(135deg, var(--steam-gold), #B8860B);
            color: #000; border: 4px solid #000;
            padding: 22px 0; border-radius: 8px; font-weight: 900; font-size: 22px;
            box-shadow: 0 0 35px rgba(212,175,55,0.5); cursor: pointer;
            width: 90%; transition: 0.3s; letter-spacing: 8px; font-family: 'Cinzel', serif;
        }
        .btn-main:hover:not(:disabled) { filter: brightness(1.3); transform: scale(1.04); box-shadow: 0 0 60px var(--accent); }
        .btn-main:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }

        .hand-area {
            background: linear-gradient(to top, rgba(5,5,10,1) 0%, rgba(5,5,10,0.95) 85%, transparent 100%);
            padding-bottom: 55px; display: flex; flex-direction: column; align-items: center;
        }
        .hand-flex { display: flex; justify-content: center; padding: 30px 60px; min-height: 220px; align-items: flex-end; }

        /* モーダル・パネル */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .panel { 
            background: #08080c; border: 4px solid var(--steam-gold); padding: 65px 40px; border-radius: 12px;
            text-align: center; width: 85%; display: flex; flex-direction: column; align-items: center; gap: 35px;
        }
        .panel input {
            width: 100%; padding: 24px; background: #000; border: 3px solid var(--steam-gold); 
            color: var(--accent); text-align: center; font-size: 22px; border-radius: 8px; outline: none; font-weight: 700;
        }

        .realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .realm-btn { padding: 20px; border: 3px solid var(--steam-gold); background: rgba(255,255,255,0.04); color: #fff; font-weight: 900; font-size: 16px; font-family: 'Cinzel', serif; cursor: pointer; transition: 0.2s; }
        .realm-btn:hover { background: var(--steam-gold); color: #000; transform: scale(1.05); }

        .status-badge { background: #000; color: var(--danger); border: 3px solid var(--danger); padding: 16px 40px; font-weight: 900; font-size: 20px; margin-bottom: 40px; animation: glitch 0.3s infinite; text-transform: uppercase; letter-spacing: 6px; }
        @keyframes glitch { 0% { transform: translate(0); text-shadow: 4px 0 var(--accent); } 50% { transform: translate(-5px, 2px); text-shadow: -4px 0 var(--cyber-pink); } 100% { transform: translate(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', desc: '機構の歯車。次に2枚引かせる。' },
            ICEAGE: { n: '氷河期', color: '#00BFFF', desc: '全てを凍結させる領域。' },
            FOUNTAIN: { n: '噴水', color: '#4169E1', desc: '魔法の泉。属性を自在に変える。' },
            BATTERY: { n: '電池', color: '#32CD32', desc: '動力を蓄える緑の魔力。' },
            MACHINE: { n: '機械', color: '#2F4F4F', desc: '因果を操る。順番を逆転させる。' },
            ARCHIVE: { n: '古文書', color: '#8B4513', desc: '古の記録。智恵の貯蔵庫。' },
            PLANET: { n: '惑星', color: '#9400D3', desc: '星々の加護。属性を上書き。' },
            RUINS: { n: '廃墟', color: '#696969', desc: '遺跡の記憶。属性を上書き。' }
        };

        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selectorCard, setSelectorCard] = useState(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); 
                setSocket(s);
                s.on('update-game', (data) => setGs(data));
                return () => s.disconnect();
            }, []);

            // 手札の自動ソート (サイクル順)
            const sortedHand = useMemo(() => {
                const playerMe = gs?.players?.find(p => p.id === socket?.id);
                if (!playerMe || !playerMe.hand) return [];
                return [...playerMe.hand].sort((a, b) => {
                    let idxA = CYCLE_ORDER.indexOf(a.realm);
                    let idxB = CYCLE_ORDER.indexOf(b.realm);
                    if (idxA === -1) idxA = 99;
                    if (idxB === -1) idxB = 99;
                    if (idxA !== idxB) return idxA - idxB;
                    return (a.isSpecial ? 0 : 1) - (b.isSpecial ? 0 : 1);
                });
            }, [gs, socket]);

            const isMyTurn = gs?.currentTurnPlayerId === socket?.id && gs?.status === 'playing';
            const currentRealm = gs?.fieldCard?.realm || 'GEAR';
            const nextRealm = useMemo(() => {
                const idx = CYCLE_ORDER.indexOf(currentRealm);
                return idx === -1 ? 'GEAR' : CYCLE_ORDER[(idx + 1) % 6];
            }, [currentRealm]);

            const canPlay = (card) => {
                if (!isMyTurn) return false;
                if (gs.nextDrawAmount > 1) return (card.realm === 'GEAR' && card.isSpecial);
                const h = card.realm;
                if (h === 'PLANET' || h === 'RUINS' || (h === 'FOUNTAIN' && card.isSpecial)) return true;
                if (currentRealm === h) return true;
                if (h === nextRealm) return true;
                if (currentRealm === 'ARCHIVE' && h === 'ICEAGE') return true;
                if (currentRealm === 'ICEAGE' && (h === 'BATTERY' || h === 'FOUNTAIN')) return true;
                return false;
            };

            const CardView = ({ card, playable, onClick, isField }) => {
                if (!card) return null;
                let src = `./images/${card.realm}.png`;
                if (card.wasRuins) src = './images/RUINS.png';
                else if (card.wasPlanet) src = './images/PLANET.png';
                else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) src = './images/FOUNTAIN_wild.png';
                else if (card.realm === 'MACHINE') src = card.isSpecial ? './images/MACHINE_reverse.png' : './images/MACHINE_normal.png';
                else if (card.realm === 'GEAR' && card.isSpecial) src = './images/GEAR_frame.png';
                else if (card.realm === 'FOUNTAIN') src = './images/FOUNTAIN_normal.png';

                return (
                    <div className={`card ${isField ? '' : (playable ? 'playable my-card' : 'not-playable my-card')}`} 
                         style={{'--r-color': REALMS[card.realm].color}} onClick={onClick}>
                        <img src={src} onError={(e) => { e.target.src = 'https://via.placeholder.com/130x185/000/D4AF37?text=' + card.realm; }} />
                        <div className="card-footer">{REALMS[card.realm].n}</div>
                    </div>
                );
            };

            if (!joined) return (
                <div className="screen-wrapper">
                    <div className="overlay">
                        <div className="panel">
                            <h1 style={{color:'var(--steam-gold)', fontSize:36, fontWeight:900, fontFamily:'Cinzel', letterSpacing:6}}>CROSS REALM</h1>
                            <p style={{fontSize:11, color:'var(--accent)', letterSpacing:10, marginBottom:10}}>ETERNAL PUNK PROTOCOL</p>
                            <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="プレイヤー名" maxLength={10} />
                            <input type="text" value={room} onChange={e=>setRoom(e.target.value.toUpperCase())} placeholder="ルームID" />
                            <button onClick={()=>{setJoined(true); if(socket?.connected) socket.emit('join-room',{roomId:room, playerName:name});}} className="btn-main">接続</button>
                        </div>
                    </div>
                </div>
            );

            if (!gs || gs.status === 'waiting') return (
                <div className="screen-wrapper">
                    <div className="bg-layer bg-watermark"></div>
                    <div className="container" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', padding:40, zIndex:100}}>
                        <h2 style={{letterSpacing:12, opacity:0.8, fontSize:22, fontWeight:900, fontFamily:'Cinzel', color:'var(--steam-gold)'}}>AWAITING LINKAGE</h2>
                        <div style={{marginTop:15, fontSize:20, color:'var(--accent)', fontWeight:900, letterSpacing:4, textShadow:'0 0 10px rgba(64,224,208,0.5)'}}>ルームID: {room}</div>
                        <div style={{marginTop:50, display:'flex', flexDirection:'column', gap:20, width:'100%'}}>
                            {gs?.players?.map(p => (
                                <div key={p.id} style={{padding:24, background:'rgba(255,255,255,0.06)', borderLeft:'6px solid var(--steam-gold)', fontSize:20, fontWeight:900}}>
                                    {p.name}
                                </div>
                            ))}
                        </div>
                        {gs?.players?.[0]?.id === socket?.id && (
                            <button onClick={()=>socket.emit('start-game',{roomId:room})} className="btn-main" style={{marginTop:70}}>ゲーム開始</button>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="screen-wrapper">
                    <div className="bg-layer bg-watermark"></div>
                    <div className="bg-layer bg-magic-aura" style={{ '--realm-color': REALMS[currentRealm].color }}></div>
                    <div className="bg-layer bg-scanline"></div>

                    <div className="game-container">
                        <div className="opponents-area">
                            {gs.players.filter(p => p.id !== socket?.id).map(p => (
                                <div key={p.id} className={`opp-row ${gs.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                    <div className="opp-info">
                                        <div className="opp-name">{p.name}</div>
                                        <div className="opp-hand-visual">
                                            {[...Array(p.handCount)].map((_, i) => <div key={i} className="mini-card-back" />)}
                                        </div>
                                    </div>
                                    <div style={{fontWeight:900, color: 'var(--accent)', fontSize:26}}>{p.handCount} Units</div>
                                </div>
                            ))}
                        </div>

                        <div className="cycle-bar">
                            {CYCLE_ORDER.map(r => (
                                <div key={r} className={`cycle-dot ${currentRealm === r ? 'active' : ''}`} style={{'--dot-color': REALMS[r].color}}>
                                    <div className="cycle-label">{REALMS[r].n}</div>
                                </div>
                            ))}
                        </div>

                        <div className="field">
                            <div className="turn-watermark">{isMyTurn ? 'YOUR TURN' : 'WAITING'}</div>
                            {gs.nextDrawAmount > 1 && <div className="status-badge">WARNING: DRAW +{gs.nextDrawAmount}</div>}
                            
                            <div className="field-main-area">
                                <CardView card={gs.fieldCard} isField={true} />
                                <div className="info-panel">
                                    <div className="realm-title" style={{'--realm-color': REALMS[currentRealm].color}}>{REALMS[currentRealm].n}</div>
                                    <div className="realm-desc">{REALMS[currentRealm].desc}</div>
                                    <div className="next-hint">NEXT: <span style={{color: REALMS[nextRealm].color}}>{REALMS[nextRealm].n}</span> / 同属性</div>
                                </div>
                            </div>
                        </div>

                        <div className="action-area">
                            <button className="btn-main" disabled={!isMyTurn} onClick={() => socket.emit('draw-card',{roomId:room})}>
                                {gs.nextDrawAmount > 1 ? `DRAW OVERRIDE +${gs.nextDrawAmount}` : 'カードを引く / パス'}
                            </button>
                        </div>

                        <div className="hand-area">
                            <div className="hand-flex">
                                {sortedHand.map((card) => (
                                    <CardView key={card.id} card={card} playable={canPlay(card)} 
                                              onClick={() => {
                                                if (!canPlay(card)) return;
                                                const isWild = (card.realm === 'PLANET' || card.realm === 'RUINS' || (card.realm === 'FOUNTAIN' && card.isSpecial));
                                                if (isWild) setSelectorCard(card);
                                                else socket.emit('play-card', { roomId: room, card });
                                              }} />
                                ))}
                            </div>
                            <div style={{textAlign:'center', fontSize:13, fontWeight:900, marginTop:18, opacity:0.8, color:'var(--steam-gold)', letterSpacing:5}}>
                                CORE SYNC: {sortedHand.length} / 12
                            </div>
                        </div>
                    </div>

                    {selectorCard && (
                        <div className="overlay">
                            <div className="panel">
                                <h3 style={{fontSize:26, fontWeight:900, marginBottom:15, color:'var(--steam-gold)', fontFamily:'Cinzel'}}>REALM RE-ALIGN</h3>
                                <div className="realm-grid">
                                    {CYCLE_ORDER.map(r => (
                                        <button key={r} className="realm-btn" style={{borderColor:REALMS[r].color, color:REALMS[r].color}} 
                                                onClick={() => {
                                                    socket.emit('play-card', {roomId:room, card:selectorCard, chosenRealm:r});
                                                    setSelectorCard(null);
                                                }}>{REALMS[r].n}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setSelectorCard(null)} style={{marginTop:35, opacity:0.8, color:'#fff', cursor:'pointer', border:'none', background:'none', fontWeight:900, fontSize:20}}>キャンセル</button>
                            </div>
                        </div>
                    )}

                    {gs?.status === 'finished' && (
                        <div className="overlay">
                            <div className="panel">
                                <h2 style={{color:'var(--steam-gold)', fontSize:36, fontWeight:900, fontFamily:'Cinzel'}}>MISSION END</h2>
                                <div style={{width:'100%', margin:'40px 0'}}>
                                    {gs.players.slice().sort((a,b)=>a.handCount-b.handCount).map((p,i)=>(
                                        <div key={p.id} style={{display:'flex', justifyContent:'space-between', padding:'22px 15px', borderBottom:'1px solid var(--border)', fontSize:20}}>
                                            <span style={{fontWeight:900}}>{i+1}. {p.name}</span>
                                            <span style={{color:'var(--steam-gold)', fontWeight:900}}>{p.handCount} Units</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => socket.emit('play-again', {roomId: room})} className="btn-main">再接続</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
