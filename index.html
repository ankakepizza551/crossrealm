<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Realm - Overload Edition v21.0</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg: #05050A; --card-w: 90px; --card-h: 130px; --opp-card-w: 24px; --opp-card-h: 34px; 
            --border: rgba(212, 175, 55, 0.45); --guide-gold: #FFD700;
        }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Exo 2', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; min-height: -webkit-fill-available; overflow: hidden; 
        }
        .screen-wrapper { 
            width: 100vw; height: 100vh; height: 100dvh; min-height: -webkit-fill-available;
            max-width: calc(100vh * 9 / 16); max-width: calc(100dvh * 9 / 16); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            border-left: 2px solid rgba(212,175,55,0.4); border-right: 2px solid rgba(64,224,208,0.4); 
            box-shadow: 0 0 80px rgba(138, 43, 226, 0.3); background: var(--bg);
        }

        /* === 究極アニメーション === */
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes digital-rain { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(200%); opacity: 0; } }
        @keyframes liquid-morph { 0% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; } 100% { border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%; } }
        @keyframes arcane-shimmer { 0% { transform: rotate(0deg) scale(1); opacity: 0.2; } 50% { transform: rotate(180deg) scale(1.05); opacity: 0.5; } 100% { transform: rotate(360deg) scale(1); opacity: 0.2; } }
        @keyframes sweepBtn { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes spark-float { 0% { transform: translate(0, 0) scale(1); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }

        /* === 盛り盛りのタイトルロゴ === */
        .logo-overload { position: relative; display: inline-block; padding: 20px; }
        .logo-main-text { 
            font-family: 'Cinzel', serif; font-size: clamp(24px, 8vw, 42px); font-weight: 900; letter-spacing: 4px; 
            background: linear-gradient(to bottom, #FFF8DC 0%, #FFD700 30%, #D4AF37 70%, #8B6B23 100%); 
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.6)); line-height: 1;
        }
        .logo-x { font-family: 'Orbitron', sans-serif; color: var(--accent); margin: 0 8px; font-size: 1.1em; text-shadow: 0 0 20px var(--accent); display: inline-block; -webkit-text-fill-color: var(--accent); }
        .logo-sub-text { font-family: 'Audiowide', sans-serif; font-size: 10px; letter-spacing: 10px; color: var(--accent); text-shadow: 0 0 15px var(--accent); margin-top: 12px; opacity: 0.9; text-transform: uppercase; }

        /* === 3Dカードマテリアル (Showcase v29.5 移植) === */
        .mat-steam { background: radial-gradient(circle at 50% 10%, #FF8C00 0%, #0d0400 100%); border: 3px solid #4a2f1c; border-radius: 4px; box-shadow: 0 10px 30px #000, inset 1px 1px 2px rgba(255,255,255,0.1); position: relative; }
        .mat-fantasy { background: radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%); border: 2px solid rgba(255,255,255,0.9); border-radius: 12px 4px; box-shadow: 0 0 30px var(--r-color-glow); position: relative; }
        .mat-cyber { background: #000; border: none; border-radius: 0; clip-path: polygon(0 15%, 15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%); box-shadow: inset 0 0 40px var(--r-color-dim); border-left: 4px solid var(--r-color); position: relative; }
        .mat-void-planet { background: radial-gradient(circle at 50% 50%, #fff4 0%, #000 100%); border: none; animation: liquid-morph 5s infinite alternate ease-in-out; }
        .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #000 100%); border: none; animation: liquid-morph 8s infinite alternate-reverse ease-in-out; }

        /* カード共通パーツ */
        .card-wrapper-3d { position: relative; perspective: 1000px; flex-shrink: 0; width: var(--card-w); height: var(--card-h); transition: z-index 0.3s; }
        .card-3d { box-sizing: border-box; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 4px; overflow: hidden; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; border-radius: inherit; overflow: hidden; }
        .card-info-top { position: absolute; top: 8px; left: 8px; padding: 2px 8px; background: #000; border-left: 4px solid var(--r-color); transform: translateZ(60px); z-index: 100; box-shadow: 0 4px 10px #000; }
        .card-info-top span { font-size: 8px; font-weight: 900; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        .card-icon-overload { position: absolute; top: 58%; left: 50%; width: 55px; height: 55px; transform: translate(-50%, -50%) translateZ(100px); filter: drop-shadow(0 0 10px var(--r-color)); z-index: 90; }
        .card-footer-peak { position: absolute; bottom: 0; width: 100%; padding: 12px 0 6px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%); text-align: center; color: #fff; z-index: 100; transform: translateZ(50px); text-shadow: 0 0 10px var(--r-color); font-weight: 900; font-size: 13px; letter-spacing: 2px; }
        
        /* 特殊バッジ */
        .badge-extreme { position: absolute; top: 35px; left: -12px; background: #a00000; border: 2px solid #FFD700; padding: 4px 10px; transform: translateZ(150px) rotate(-12deg); box-shadow: 10px 10px 30px rgba(0,0,0,0.9); z-index: 200; font-family: 'Special Elite'; font-size: 10px; font-weight: 900; color: #fff; }

        /* カード背景装飾 */
        .steam-meter-abs { position: absolute; top: 10px; right: 8px; width: 24px; height: 24px; background: #2a1508; border: 2px solid #5d3a1a; border-radius: 50%; transform: translateZ(80px); z-index: 150; box-shadow: inset 0 0 10px #000; }
        .steam-needle { position: absolute; top: 50%; left: 50%; width: 1px; height: 10px; background: #f33; transform-origin: bottom center; transform: translate(-50%, -100%) rotate(-45deg); animation: gear-spin 5s infinite alternate ease-in-out; }
        .cyber-rain-layer { position: absolute; inset: 0; overflow: hidden; opacity: 0.5; z-index: 30; pointer-events: none; }
        .rain-bit { position: absolute; color: var(--r-color); font-family: 'Orbitron'; font-size: 6px; writing-mode: vertical-rl; animation: digital-rain 2.5s linear infinite; }
        .arcane-circle-layer { position: absolute; inset: -20%; display: flex; align-items: center; justify-content: center; z-index: 20; opacity: 0.4; animation: arcane-shimmer 30s linear infinite; }
        .rivet { position: absolute; width: 3px; height: 3px; background: #8B6B23; border-radius: 50%; box-shadow: inset 1px 1px 1px #FFF8DC, 1px 1px 2px #000; }

        /* === パネル設計 (中央寄せ) === */
        .hud-frame-fixed { position: absolute; inset: 0; pointer-events: none; border: 2px solid rgba(64,224,208,0.5); clip-path: polygon(0 40px, 40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%); z-index: 5; }
        .hud-corner { position: absolute; width: 25px; height: 25px; border: 3px solid #40E0D0; filter: drop-shadow(0 0 8px #40E0D0); }
        .hud-tl { top: 0; left: 0; border-right: none; border-bottom: none; } .hud-tr { top: 0; right: 0; border-left: none; border-bottom: none; } .hud-bl { bottom: 0; left: 0; border-right: none; border-top: none; } .hud-br { bottom: 0; right: 0; border-left: none; border-top: none; }

        .panel-omega { position: relative; z-index: 500; pointer-events: auto; width: 100%; max-width: 440px; background: rgba(5,10,15,0.98); border: 2px solid var(--accent); padding: 50px 35px; clip-path: polygon(0 40px, 40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%); box-shadow: 0 0 80px rgba(64,224,208,0.25); }
        .panel-omega input { width: 100%; padding: 22px; background: rgba(0,0,0,0.85); border: 1px solid rgba(64,224,208,0.3); border-bottom: 3px solid var(--accent); color: #fff; text-align: center; font-size: 22px; outline: none; margin-bottom: 25px; font-family: 'Exo 2', sans-serif; font-weight: 900; transition: 0.3s; }
        .panel-omega input:focus { border-color: #fff; box-shadow: 0 0 30px rgba(64,224,208,0.5), inset 0 0 20px #000; transform: scale(1.02); }

        .btn-omega-peak { display: flex; align-items: center; justify-content: center; min-height: 60px; background: linear-gradient(90deg, #B8860B, #FFDF73, #D4AF37, #B8860B); background-size: 200% auto; color: #000; border: 1px solid #FFF8DC; border-radius: 8px; font-weight: 900; font-size: 24px; cursor: pointer; width: 100%; position: relative; overflow: hidden; animation: sweepBtn 3s linear infinite; box-shadow: 0 10px 40px rgba(212,175,55,0.5); }
        .btn-omega-peak:active { transform: scale(0.98); filter: brightness(1.2); }

        /* 待機スロット */
        .waiting-slot-peak { 
            background: linear-gradient(90deg, rgba(64,224,208,0.1), rgba(138,43,226,0.15)); 
            border: 1px solid rgba(255,255,255,0.1); border-left: 6px solid var(--accent); 
            padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; 
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px)); 
            margin-bottom: 12px; width: 100%; min-height: 75px;
        }
        .waiting-slot-peak.empty { border: 1px dashed rgba(138,43,226,0.4); background: rgba(255,255,255,0.02); opacity: 0.4; }

        /* === 対戦画面 (v17.3黄金レイアウト) === */
        .game-header { flex-shrink: 0; background: linear-gradient(90deg, transparent, rgba(0,40,40,0.9), transparent); padding: 10px; border-bottom: 2px solid var(--accent); text-align: center; font-family: 'Orbitron'; font-weight: 900; color: var(--accent); letter-spacing: 4px; }
        .opp-area { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; background: rgba(0,0,0,0.7); border-bottom: 1px solid var(--border); }
        .opp-box-omega { padding: 12px; border-radius: 6px; background: linear-gradient(135deg, rgba(30,30,45,1), rgba(10,10,15,1)); border-left: 3px solid rgba(255,255,255,0.2); box-shadow: inset 0 0 15px #000; position: relative; }
        .opp-box-omega.active { border-left-color: var(--accent); background: rgba(64,224,208,0.2); box-shadow: 0 0 30px rgba(64,224,208,0.4); }
        
        .cycle-bar-classic { flex-shrink: 0; display: flex; justify-content: space-between; padding: 10px 8px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--border); }
        .cycle-dot-classic { flex: 1; margin: 0 4px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .cycle-dot-classic.active { height: 5px; background: var(--c); box-shadow: 0 0 20px var(--c); }
        
        .field-core { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .magic-ring-field { position: absolute; width: 240px; height: 240px; border: 2px dashed rgba(64,224,208,0.2); border-radius: 50%; animation: gear-spin 30s linear infinite; }
        .info-panel-Omega { border: 2px solid var(--steam-gold); padding: 15px 22px; border-radius: 12px; width: 180px; text-align: center; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px); z-index: 10; box-shadow: 0 0 40px rgba(212,175,55,0.3); }
        
        .log-terminal-omega { height: 55px; margin: 0 15px 15px; padding: 8px 15px; font-size: 11px; background: rgba(0,0,0,0.9); border-left: 3px solid var(--accent); overflow-y: auto; font-family: 'Orbitron', monospace; color: rgba(255,255,255,0.7); }
        .hand-area-Omega { flex-shrink: 0; display: flex; justify-content: center; align-items: flex-end; height: 165px; padding-bottom: 20px; background: linear-gradient(to top, rgba(0,0,0,1) 40%, transparent 100%); }
        .action-area-peak { flex-shrink: 0; padding: 22px 15px; border-top: 2px solid var(--magic-purple); background: #000; }
        
        .mini-card-back-classic { width: var(--opp-card-w); height: var(--opp-card-h); background: linear-gradient(135deg, #4a1a6a, #000); border: 1px solid var(--steam-gold); border-radius: 2px; position: absolute; top: 0; box-shadow: -3px 0 8px rgba(0,0,0,0.9); }
    </style>
</head>
<body>
    <script>
        const SFX = { turn: 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3', play: 'https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3', draw: 'https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3', alert: 'https://assets.mixkit.co/active_storage/sfx/2862/2862-preview.mp3' };
        window.audioPool = {}; for(let k in SFX) { window.audioPool[k] = new Audio(SFX[k]); }
        window.safePlay = (k) => { try { window.audioPool[k].currentTime = 0; window.audioPool[k].play(); } catch(e){} };
        window.unlock = () => { for(let k in window.audioPool) { window.audioPool[k].volume = 0; window.audioPool[k].play().then(()=>window.audioPool[k].pause()); } };
    </script>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#8B4513', bright: '#FF8C00', glow: 'rgba(139,69,19,0.8)', dim: 'rgba(139,69,19,0.3)', theme: 'steam', font: 'Special Elite', desc: 'セットA：維持。' },
            ARCHIVE: { n: '古文書', color: '#B22222', bright: '#FF3131', glow: 'rgba(178,34,34,0.8)', dim: 'rgba(178,34,34,0.3)', theme: 'steam', font: 'Special Elite', desc: 'セットC→A：遷移。' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#00BFFF', glow: 'rgba(30,144,255,0.9)', dim: 'rgba(30,144,255,0.3)', theme: 'fantasy', font: 'Cinzel Decorative', desc: 'セットB：維持。' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,0.8)', dim: 'rgba(0,243,255,0.3)', theme: 'fantasy', font: 'Cinzel Decorative', desc: 'セットA→B：遷移。' },
            MACHINE: { n: '機械', color: '#9D00FF', bright: '#E2B0FF', glow: 'rgba(157,0,255,0.8)', dim: 'rgba(157,0,255,0.4)', theme: 'cyber', font: 'Orbitron', desc: 'セットC：維持。' },
            BATTERY: { n: '電池', color: '#32CD32', bright: '#ADFF2F', glow: 'rgba(50,205,50,0.7)', dim: 'rgba(50,205,50,0.4)', theme: 'cyber', font: 'Orbitron', desc: 'セットB→C：遷移。' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#FFFFFF', glow: 'rgba(255,255,255,0.8)', dim: 'rgba(255,255,255,0.3)', theme: 'void-planet', font: 'Audiowide', desc: '星々の加護。' },
            RUINS:   { n: '廃墟', color: '#999999', bright: '#CCCCCC', glow: 'rgba(150,150,150,0.5)', dim: 'rgba(60,60,60,0.6)', theme: 'void-ruins', font: 'Audiowide', desc: '遺跡の記憶。' }
        };
        const CYCLE_ORDER = ['GEAR', 'ICEAGE', 'FOUNTAIN', 'BATTERY', 'MACHINE', 'ARCHIVE'];

        const IconRenderer = ({ r, spec }) => {
            const sw = spec ? 3.5 : 1.8;
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: sw, className: "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /><path d="M9 10h6" strokeWidth="1.2" opacity={spec ? 1 : 0} /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ card, playable, onClick, isField, style, index = 0 }) => {
            if (!card?.realm) return null;
            let dr = card.realm;
            if (card.wasRuins) dr = 'RUINS'; else if (card.wasPlanet) dr = 'PLANET'; else if (card.wasFountain || (card.realm === 'FOUNTAIN' && card.isSpecial)) dr = 'FOUNTAIN';
            const spec = card.isSpecial || card.wasFountain;
            const rD = REALMS[dr] || REALMS.GEAR;
            const cardRef = useRef(null);
            const [tilt, setTilt] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });
            const [hov, setHov] = useState(false);

            const handleMove = (e) => {
                if (!playable && !isField) return;
                const r = cardRef.current.getBoundingClientRect();
                const rx = ((e.clientY - r.top - r.height/2) / (r.height/2)) * -22;
                const ry = ((e.clientX - r.left - r.width/2) / (r.width/2)) * 22;
                setTilt({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, '--mx': `${((e.clientX - r.left)/r.width)*100}%`, '--my': `${((e.clientY - r.top)/r.height)*100}%`, transition: 'none' });
            };
            const reset = () => { setHov(false); setTilt({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: '0.4s ease-out' }); };

            return (
                <div className={`card-wrapper-3d ${hov ? 'z-[2000]' : ''} ${!playable && !isField ? 'not-playable' : ''}`} style={style} onMouseMove={handleMove} onMouseLeave={reset} onMouseEnter={() => playable && !isField && setHov(true)} onClick={() => playable && !isField && onClick()} ref={cardRef}>
                    <div className={`card-3d mat-${rD.theme}`} style={{'--r-color': rD.color, '--r-color-glow': rD.glow, '--r-color-dim': rD.dim, '--r-color-bright': rD.bright, transform: `${(hov && !isField) ? 'translateY(-20px) scale(1.15)' : ''} ${tilt.transform}`}}>
                        <div className="card-content">
                            {rD.theme === 'steam' && (
                                <>
                                    <div className="steam-meter-abs"><div className="steam-needle"></div></div>
                                    <div className="rivet top-2 left-2"/><div className="rivet top-2 right-2"/><div className="rivet bottom-2 left-2"/><div className="rivet bottom-2 right-2"/>
                                </>
                            )}
                            {rD.theme === 'fantasy' && <div className="arcane-circle-layer"><svg viewBox="0 0 100 100" style={{color:rD.color, width:'130%', height:'130%'}}><circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" strokeWidth="1" strokeDasharray="2 4"/><path d="M50 5 L89 75 L11 75 Z" fill="none" stroke="currentColor" strokeWidth="0.5"/><circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" strokeWidth="2" strokeDasharray="4 2"/></svg></div>}
                            {rD.theme === 'cyber' && <div className="cyber-rain-layer">{[...Array(6)].map((_,i)=><div key={i} className="rain-bit" style={{left:`${i*16+5}%`, animationDelay:`${i*0.4}s`}}>10101</div>)}</div>}

                            <div className="card-info-top"><span>{dr}</span></div>
                            {spec && dr === 'GEAR' && <div className="badge-extreme"><span>DRAW +2</span></div>}
                            {spec && dr === 'MACHINE' && <div className="badge-extreme" style={{background:'#1a012a', borderLeftColor:rD.color}}><span>REVERSE</span></div>}
                            <div className="card-icon-overload" style={{ color: rD.color }}><IconRenderer r={dr} isSpec={spec} /></div>
                            <div className="card-footer-peak"><span>{rD.n}</span></div>
                        </div>
                        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-80" style={{ background: `radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 65%)` }}></div>
                    </div>
                </div>
            );
        };

        const Sparkle = () => {
            const sparks = useMemo(() => [...Array(20)].map((_, i) => ({ id: i, x: Math.random() * 100, y: Math.random() * 100, tx: (Math.random() - 0.5) * 300, ty: (Math.random() - 0.5) * 300, delay: Math.random() * 3, size: Math.random() * 3 + 1 })), []);
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    {sparks.map(s => (
                        <div key={s.id} className="absolute bg-[#FFD700] rounded-full blur-[1px]" style={{ left: `${s.x}%`, top: `${s.y}%`, width: `${s.size}px`, height: `${s.size}px`, '--tx': `${s.tx}px`, '--ty': `${s.ty}px`, animation: `spark-float 4s infinite`, animationDelay: `${s.delay}s` }} />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [gs, setGs] = useState(null);
            const [room, setRoom] = useState('');
            const [name, setName] = useState('');
            const [joined, setJoined] = useState(false);
            const [selector, setSelector] = useState(null);
            const [bgR, setBgR] = useState('GEAR');
            const logEndRef = useRef(null);

            useEffect(() => {
                const s = io('https://crossrealm-server.onrender.com'); setSocket(s);
                s.on('update-game', setGs);
                return () => s.disconnect();
            }, []);

            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollTop = logEndRef.current.scrollHeight; }, [gs?.logs]);

            const currentR = (gs?.status === 'playing' && gs?.fieldCard) ? gs.fieldCard.realm : bgR;
            const sortedHand = useMemo(() => {
                const me = gs?.players?.find(p => p.id === socket?.id);
                return (me?.hand || []).slice().sort((a,b) => CYCLE_ORDER.indexOf(a.realm) - CYCLE_ORDER.indexOf(b.realm));
            }, [gs, socket]);

            const canPlay = (c) => {
                if (gs?.currentTurnPlayerId !== socket?.id || !c || !gs?.fieldCard) return false;
                if (gs?.nextDrawAmount > 1) return (c.realm === 'GEAR' && c.isSpecial);
                const h = c.realm; const f = currentR;
                if (h === 'PLANET' || h === 'RUINS' || f === 'PLANET' || f === 'RUINS') return true;
                if (h === 'FOUNTAIN' && c.isSpecial) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                const cyc = { GEAR:['GEAR','ICEAGE'], ICEAGE:['FOUNTAIN','BATTERY'], FOUNTAIN:['FOUNTAIN','BATTERY'], BATTERY:['MACHINE','ARCHIVE'], MACHINE:['MACHINE','ARCHIVE'], ARCHIVE:['GEAR','ICEAGE'] };
                if (['ICEAGE', 'BATTERY', 'ARCHIVE'].includes(f) && f === h) return false;
                return f === h || (cyc[f]?.includes(h));
            };

            const handlePlay = (c) => {
                if (!canPlay(c)) return;
                window.safePlay('play');
                const isW = (c.realm === 'PLANET' || c.realm === 'RUINS' || (c.realm === 'FOUNTAIN' && c.isSpecial));
                if (isW && sortedHand.length > 1) setSelector(c);
                else socket.emit('play-card', { roomId: room.toUpperCase(), card: c, chosenRealm: isW ? 'GEAR' : undefined });
            };

            return (
                <div className="screen-wrapper" style={{ '--realm-color': REALMS[currentR]?.color || '#000' }}>
                    <div className="bg-container">
                        <div className="layer-steam"></div><div className="layer-fantasy"></div><div className="layer-cyber"></div>
                    </div>
                    <div className="bg-magic-aura"></div>
                    
                    {!joined ? (
                        <div className="absolute inset-0 flex items-center justify-center p-6 z-[1000] backdrop-filter blur(20px) bg-black/60">
                            <div className="magic-ring-bg"></div>
                            <div className="panel-omega">
                                <Sparkle />
                                <div className="hud-frame-fixed"><div className="hud-corner hud-tl"/><div className="hud-corner hud-tr"/><div className="hud-corner hud-bl"/><div className="hud-corner hud-br"/></div>
                                <div className="text-center mb-12 relative z-10">
                                    <div className="logo-overload">
                                        <div className="logo-main-text">CROSS<span className="logo-x">X</span>REALM</div>
                                        <div className="logo-sub-text">ETERNAL PUNK EDITION</div>
                                    </div>
                                </div>
                                <div className="relative z-[600]">
                                    <input type="text" value={name} placeholder="プレイヤー名" onChange={e=>setName(e.target.value)} maxLength={10} />
                                    <input type="text" value={room} placeholder="ルームID" onChange={e=>setRoom(e.target.value.toUpperCase())} />
                                    <button onClick={()=>{ window.unlock(); setJoined(true); socket.emit('join-room',{roomId:room, playerName:name}); }} className="btn-omega-peak">接続開始</button>
                                </div>
                            </div>
                        </div>
                    ) : (gs?.status === 'waiting') ? (
                        <div className="absolute inset-0 flex items-center justify-center p-6 z-[1000] backdrop-filter blur(20px) bg-black/60">
                            <div className="magic-ring-bg"></div>
                            <div className="panel-omega" style={{borderColor: 'var(--magic-purple)', maxWidth: '460px'}}>
                                <div className="hud-frame-fixed"><div className="hud-corner hud-tl" style={{borderColor:'#8A2BE2'}}/><div className="hud-corner hud-tr" style={{borderColor:'#8A2BE2'}}/><div className="hud-corner hud-bl" style={{borderColor:'#8A2BE2'}}/><div className="hud-corner hud-br" style={{borderColor:'#8A2BE2'}}/></div>
                                <div className="text-center mb-10"><div className="text-4xl text-steam-gold font-bold font-['Cinzel'] tracking-widest steam-glow">ROOM: {room}</div></div>
                                <div className="space-y-3 mb-12">
                                    {[...Array(4)].map((_, i) => {
                                        const p = gs?.players?.[i];
                                        return (
                                            <div key={i} className={`waiting-slot-peak ${!p ? 'empty' : ''}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-full ${p ? 'bg-accent/20 text-accent border border-accent/30' : 'bg-white/5 text-white/5 border border-white/10'} flex items-center justify-center font-bold text-xl`}>{p ? '👤' : ''}</div>
                                                    <span className="font-black text-2xl tracking-wide">{p ? p.name : '空きスロット'}</span>
                                                </div>
                                                {p && i === 0 && <div className="bg-steam-gold text-black text-[11px] px-3 py-1 font-black rounded-sm shadow-lg">HOST</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                {gs?.players?.[0]?.id === socket?.id && (
                                    <div className="flex gap-4">
                                        <button onClick={()=>socket.emit('add-cpu',{roomId:room})} className="flex-1 p-4 border border-magic-purple text-[#e2b0ff] font-bold rounded-lg text-lg bg-magic-purple/10">CPU追加</button>
                                        <button onClick={()=>socket.emit('start-game',{roomId:room})} className="flex-1 btn-omega-peak" disabled={gs?.players?.length < 2}>開始</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : gs?.fieldCard && (
                        <div className="game-container">
                            <div className="game-header">DIRECTION: {gs?.isReversed ? '⟲ REVERSE' : '⟳ NORMAL'}</div>
                            <div className="opp-area">
                                {gs?.players?.map(p => (
                                    <div key={p.id} className={`opp-box-omega ${gs?.currentTurnPlayerId === p.id ? 'active' : ''}`}>
                                        <div className="flex justify-between items-center text-xs mb-1">
                                            <div className="font-bold">{p.id === socket?.id ? '⭐' : '👤'} {p.name}</div>
                                            <div className="text-accent font-black text-sm">{p.handCount}</div>
                                        </div>
                                        <div className="relative h-8 flex justify-start">
                                            {[...Array(Math.min(p.handCount, 4))].map((_, i) => <div key={i} className="mini-card-back-classic" style={{left: `${i*6}px`, zIndex: i}} />)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="cycle-bar-classic">{CYCLE_ORDER.map(r => (<div key={r} className="cycle-dot-classic active" style={{'--c': REALMS[r].color, opacity: currentR === r ? 1 : 0.1}}/>))}</div>
                            <div className="field-core">
                                <div className={`text-xs mb-4 font-black tracking-[4px] ${gs?.currentTurnPlayerId === socket?.id ? 'text-accent animate-pulse' : 'text-slate-500'}`}>{gs?.currentTurnPlayerId === socket?.id ? 'YOUR TURN' : 'WAITING'}</div>
                                <div className="relative w-[90px] h-[130px] mb-8">
                                    <div className="magic-ring-field" />
                                    <div className="relative z-10"><CardView card={gs?.fieldCard} isField={true} /></div>
                                </div>
                                <div className="info-panel-Omega">
                                    <div className="realm-title-omega" style={{'--realm-color': REALMS[currentR]?.color}}>{REALMS[currentR]?.n}</div>
                                    <div className="text-[10px] opacity-60 mt-1 leading-tight font-bold">{REALMS[currentR]?.desc}</div>
                                </div>
                            </div>
                            <div ref={logEndRef} className="log-terminal-omega">{gs?.logs?.slice(-10).map((l) => (<div key={l.id} className={`mb-1 ${l.text.includes('PLAY') ? 'text-accent font-black' : ''}`}>{l.text}</div>))}</div>
                            <div className="hand-area-Omega">{(() => {
                                const cnt = sortedHand.length; const ov = cnt > 8 ? (window.innerWidth * 0.8 / cnt) : 60;
                                return sortedHand.map((c, i) => (<CardView key={c.id || i} card={c} playable={canPlay(c)} onClick={() => handlePlay(c)} index={i} style={{ marginLeft: i === 0 ? 0 : `-${90 - ov}px` }} />));
                            })()}</div>
                            <div className="action-area-peak"><button className="btn-omega-peak" disabled={gs?.currentTurnPlayerId !== socket?.id} onClick={() => { window.safePlay('draw'); socket.emit('draw-card',{roomId:room}); }}>{gs?.nextDrawAmount > 1 ? `${gs.nextDrawAmount}枚引く` : 'ドロー'}</button></div>
                        </div>
                    )}
                    {selector && (
                        <div className="absolute inset-0 flex items-center justify-center p-6 z-[100000] backdrop-filter blur(20px) bg-black/80">
                            <div className="panel-omega" style={{borderColor: 'var(--steam-gold)', padding: '45px 25px'}}>
                                <h3 className="text-3xl font-black text-center mb-10 text-steam-gold font-['Cinzel'] steam-glow">属性を選択</h3>
                                <div className="grid grid-cols-2 gap-5">{CYCLE_ORDER.map(r => (<button key={r} className="p-4 border border-white/20 rounded-lg flex items-center gap-4 hover:bg-white/10" style={{color: REALMS[r].color}} onClick={() => { socket.emit('play-card', {roomId: room, card:selector, chosenRealm:r}); setSelector(null); }}><div className="w-7 h-7"><IconRenderer r={r} isSpec={false}/></div><span className="font-black text-xl">{REALMS[r].n}</span></button>))}</div>
                                <button onClick={()=>setSelector(null)} className="w-full mt-8 text-white/40 text-sm py-2 tracking-widest font-black">CANCEL</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
