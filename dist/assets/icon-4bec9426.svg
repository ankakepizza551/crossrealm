<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&amp;family=Orbitron:wght@900&amp;display=swap');
            .bg { fill: #05010a; }
            .accent { stroke: #40E0D0; }
            .purple { stroke: #8A2BE2; }
            .gold { stroke: #D4AF37; }
            .text-main {
                font-family: 'Cinzel', serif;
                font-weight: 900;
                font-size: 64px;
                text-anchor: middle;
                fill: url(#text-grad);
                letter-spacing: 4px;
            }
            .text-sub {
                font-family: 'Orbitron', sans-serif;
                font-weight: 900;
                font-size: 22px;
                text-anchor: middle;
                fill: #40E0D0;
                letter-spacing: 8px;
            }
        </style>
        <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fff" />
            <stop offset="20%" stop-color="#D4AF37" />
            <stop offset="50%" stop-color="#8A2BE2" />
            <stop offset="80%" stop-color="#40E0D0" />
            <stop offset="100%" stop-color="#fff" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- 背景 -->
    <rect width="512" height="512" rx="100" class="bg"/>
    <rect width="500" height="500" x="6" y="6" rx="94" fill="none" stroke="#40E0D0" stroke-width="4" opacity="0.3"/>
    
    <!-- エンブレム本体 (スケールと位置調整) -->
    <g transform="translate(256, 210) scale(3)" filter="url(#glow)">
        <!-- ComplexEmblemの内容を静的に配置 -->
        <circle cx="0" cy="0" r="48" fill="none" class="accent" stroke-width="1.5" stroke-dasharray="4 8 12 4" opacity="0.8" />
        <circle cx="0" cy="0" r="45" fill="none" class="accent" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6" />
        <circle cx="0" cy="0" r="38" fill="none" class="purple" stroke-width="1.5" stroke-dasharray="1 4" opacity="0.9" />
        
        <polygon points="0,-38 5,-18 25,-18 10,-5 15,15 0,3 -15,15 -10,-5 -25,-18 -5,-18" fill="none" class="purple" stroke-width="1" opacity="0.8" />
        
        <path d="M0 -34 L29.4 -17 L29.4 17 L0 34 L-29.4 17 L-29.4 -17 Z" fill="none" class="gold" stroke-width="2" opacity="0.7" />
        <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="none" class="gold" stroke-width="1" opacity="0.5" />
        
        <circle cx="0" cy="0" r="12" fill="#FF4500" opacity="0.3" />
        
        <path d="M-14 -14 L14 14 M14 -14 L-14 14" stroke="#fff" stroke-width="5" stroke-linecap="square" opacity="1" />
        <path d="M-20 -20 L20 20 M20 -20 L-20 20" class="accent" stroke-width="1.5" stroke-linecap="square" opacity="0.7" />
        
        <text x="0" y="4" fill="#40E0D0" font-size="12" font-family="Orbitron" font-weight="900" text-anchor="middle">X</text>
    </g>

    <!-- テキスト -->
    <text x="256" y="420" class="text-main">CROSS REALM</text>
    <text x="256" y="460" class="text-sub">- OMEGA -</text>
</svg>
