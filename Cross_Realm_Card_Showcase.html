<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Realm - Identity Overload v29.5 -</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --card-w: 300px; 
            --card-h: 420px; 
        }
        body { 
            margin: 0; background-color: #000000; color: white; font-family: 'Exo 2', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            perspective: 3000px;
        }

        /* === 究極アニメーション === */
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes digital-rain { 0% { transform: translateY(-100%); opacity: 0; } 20% { opacity: 0.6; } 80% { opacity: 0.6; } 100% { transform: translateY(180%); opacity: 0; } }
        @keyframes liquid-morph { 0% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; } 100% { border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%; } }
        @keyframes steam-rise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 0.3; } 100% { transform: translateY(-120px) scale(3.2); opacity: 0; } }
        @keyframes aura-pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.5; } }
        @keyframes needle-move { 0% { transform: rotate(-45deg); } 50% { transform: rotate(65deg); } 100% { transform: rotate(-45deg); } }
        @keyframes needle-panic { 0% { transform: rotate(85deg); } 50% { transform: rotate(105deg); } 100% { transform: rotate(85deg); } }
        @keyframes alert-glow { 0%, 100% { box-shadow: 0 0 15px #f00; filter: brightness(1); } 50% { box-shadow: 0 0 50px #f00; filter: brightness(1.5); } }
        @keyframes arcane-spin { 0% { transform: rotate(0deg) scale(1); opacity: 0.2; } 50% { transform: rotate(180deg) scale(1.05); opacity: 0.4; } 100% { transform: rotate(360deg) scale(1); opacity: 0.2; } }

        /* === 背景セクション === */
        .section-wrapper { position: relative; padding: 140px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .section-aura { 
            position: absolute; top: 50%; left: 50%; width: 80vw; height: 80vh; 
            transform: translate(-50%, -50%); filter: blur(150px); 
            z-index: -1; pointer-events: none; border-radius: 50%; 
            animation: aura-pulse 12s infinite alternate;
        }

        /* === カードマテリアル設計 === */
        
        /* スチームパンク：真鍮・レッドメタルの強化フレーム */
        .mat-steam {
            background: radial-gradient(circle at 50% 10%, var(--r-color-bright) 0%, #0d0400 100%);
            border: 14px solid #4a2f1c; 
            border-radius: 6px;
            /* 重厚な金属プレートの削り出し質感を演出 */
            box-shadow: 
                0 50px 100px #000, 
                inset 4px 4px 8px rgba(255, 255, 255, 0.15),
                inset -4px -4px 8px rgba(0, 0, 0, 0.8),
                inset 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }
        /* 金属表面の曲線模様 */
        .mat-steam::before {
            content: ''; position: absolute; inset: 0;
            background-image: 
                radial-gradient(circle at 0% 0%, transparent 58%, rgba(255,255,255,0.05) 60%, transparent 63%),
                radial-gradient(circle at 100% 100%, transparent 38%, rgba(255,255,255,0.03) 40%, transparent 44%),
                radial-gradient(circle at 50% 50%, transparent 70%, rgba(255,255,255,0.02) 72%, transparent 75%);
            background-size: 120px 120px;
            opacity: 0.8; z-index: 1;
        }

        .mat-fantasy {
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.85) 100%),
                        radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%);
            border: 6px solid rgba(255,255,255,0.95); border-radius: 80px 20px;
            box-shadow: 0 0 120px var(--r-color-glow), inset 0 0 60px rgba(255,255,255,0.2);
            position: relative; backdrop-filter: blur(15px);
        }

        .mat-cyber {
            background: #000; border: none; border-radius: 0;
            clip-path: polygon(0 20%, 20% 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
            box-shadow: inset 0 0 150px var(--r-color-dim);
            position: relative;
        }

        .mat-void-planet { background: radial-gradient(circle at 50% 50%, #fff4 0%, #000 100%); border: none; box-shadow: 0 0 140px #fff7, inset 0 0 250px #fff2; animation: liquid-morph 5s infinite alternate ease-in-out; }
        .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #000 100%); border: none; box-shadow: 0 0 110px #444, inset 0 0 250px #111; animation: liquid-morph 8s infinite alternate-reverse ease-in-out; }

        /* === レイヤー管理 === */
        .card-wrapper { perspective: 2500px; margin: 40px; position: relative; }
        .card { width: var(--card-w); height: var(--card-h); position: relative; transform-style: preserve-3d; transition: transform 0.12s ease-out; cursor: pointer; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; overflow: hidden; border-radius: inherit; }

        /* 情報・文字を最前面に (z-index: 500) */
        .card-info-top { 
            position: absolute; top: 25px; left: 25px; padding: 12px 28px; border-radius: 2px;
            background: rgba(0,0,0,1); border-left: 12px solid var(--r-color);
            transform: translateZ(160px); z-index: 500; box-shadow: 0 15px 40px rgba(0,0,0,1);
        }
        .card-info-top span { font-size: 16px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; }

        .mat-void-planet .card-info-top { background: #fff !important; border-left: 15px solid #fff !important; box-shadow: 0 0 60px #fff; }
        .mat-void-planet .card-info-top span { color: #000 !important; }

        /* アイコン位置：下部へ。ドロップシャドウを強化し、背景とのコントラストを確保 */
        .card-icon-overload {
            position: absolute; top: 58%; left: 50%; width: 170px; height: 170px;
            transform: translate(-50%, -50%) translateZ(200px);
            z-index: 450; 
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.9)) drop-shadow(0 0 35px var(--r-color));
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .card:hover .card-icon-overload { transform: translate(-50%, -50%) translateZ(300px) scale(1.15); filter: drop-shadow(0 0 20px rgba(0,0,0,1)) drop-shadow(0 0 90px var(--r-color)) brightness(2.2); }

        .card-footer-peak {
            position: absolute; bottom: 0; width: 100%; padding: 75px 0 35px;
            /* 暗さを緩和しアイコンが見えるようにグラデーションを調整 */
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 30%, transparent 100%);
            text-align: center; color: #fff; z-index: 500; transform: translateZ(140px);
            text-shadow: 0 0 30px var(--r-color), 0 0 10px #000; letter-spacing: 12px; font-weight: 900; font-size: 36px;
        }

        /* スチームパンク：圧力計 */
        .steam-meter-abs {
            position: absolute; top: 35px; right: 20px; width: 62px; height: 62px;
            background: #2a1508; border: 5px solid #5d3a1a; border-radius: 50%;
            transform: translateZ(170px); z-index: 460; box-shadow: inset 0 0 20px #000;
        }
        .steam-needle {
            position: absolute; top: 50%; left: 50%; width: 2px; height: 30px;
            background: #f33; transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(-45deg);
            animation: needle-move 5s infinite ease-in-out;
        }
        .special-overload .steam-needle { animation: needle-panic 0.1s infinite linear; }
        .steam-meter-psi { position: absolute; bottom: 12px; width: 100%; text-align: center; font-size: 8px; color: var(--r-color); font-family: 'Special Elite'; font-weight: 900; }

        /* サイバー：デジタル・レイン */
        .cyber-rain-layer { position: absolute; inset: 0; overflow: hidden; opacity: 0.7; z-index: 50; pointer-events: none; }
        .rain-bit { 
            position: absolute; color: var(--r-color); font-family: 'Orbitron'; font-size: 10px; font-weight: 900;
            writing-mode: vertical-rl; animation: digital-rain 2.5s linear infinite; text-shadow: 0 0 8px var(--r-color);
        }

        /* 特殊バッジ：DRAW +2 (GEAR専用) */
        .badge-draw2-alert {
            position: absolute; top: 70px; left: -30px; background: #a00000; border: 5px solid #FFD700;
            padding: 15px 30px; transform: translateZ(280px) rotate(-12deg);
            box-shadow: 20px 20px 60px rgba(0,0,0,1); z-index: 550;
            animation: alert-shimmer 1s infinite alternate;
        }
        .badge-draw2-alert span { font-family: 'Special Elite', cursive; font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 15px #000; }

        /* 特殊バッジ：REVERSE (MACHINE専用) */
        .badge-reverse-final {
            position: absolute; top: 70px; left: -30px; background: #1a012a; border: 5px solid var(--r-color);
            padding: 12px 25px; transform: translateZ(280px) rotate(-15deg);
            box-shadow: 20px 20px 60px rgba(0,0,0,1); z-index: 550;
        }
        .badge-reverse-final span { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 2px; }

        /* 幻想：魔導陣 */
        .arcane-circle-layer { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            z-index: 40; pointer-events: none; overflow: hidden; border-radius: inherit;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // 色変え・属性の定義（古文書：赤、噴水：青、機械：紫）
        const REALMS = {
            GEAR:    { n: '歯車', color: '#8B4513', bright: '#5d3a1a', glow: 'rgba(139,69,19,0.7)', dim: 'rgba(139,69,19,0.2)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#B22222', bright: '#7a1010', glow: 'rgba(178,34,34,0.7)', dim: 'rgba(178,34,34,0.2)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#004a99', glow: 'rgba(30,144,255,0.8)', dim: 'rgba(30,144,255,0.2)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#005577', glow: 'rgba(0,243,255,0.7)', dim: 'rgba(0,243,255,0.2)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#9D00FF', bright: '#3a0066', glow: 'rgba(157,0,255,0.7)', dim: 'rgba(157,0,255,0.3)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#32CD32', bright: '#000', glow: 'rgba(50,205,50,0.6)', dim: 'rgba(50,205,50,0.3)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#000', glow: 'rgba(255,255,255,0.8)', dim: 'rgba(255,255,255,0.2)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#999999', bright: '#000', glow: 'rgba(150,150,150,0.4)', dim: 'rgba(60,60,60,0.5)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const IconRenderer = ({ realmKey, isSpecial }) => {
            const sw = isSpecial ? 3.5 : 1.7;
            const props = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: sw, strokeLinecap: "round", strokeLinejoin: "round", className: "w-full h-full" };

            const SpecialBurst = () => isSpecial && (
                <g className="animate-[gear-spin_10s_linear_infinite]">
                    <circle cx="12" cy="12" r="11" strokeWidth="0.8" strokeDasharray="4 2" opacity="0.6" />
                    {[0, 60, 120, 180, 240, 300].map(d => (
                        <path key={d} d="M12 2 L13 5 L11 5 Z" fill="currentColor" transform={`rotate(${d} 12 12)`} />
                    ))}
                </g>
            );

            switch (realmKey) {
                case 'GEAR': return <svg {...props}><SpecialBurst/><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...props}><SpecialBurst/><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /><path d="M9 10h6" strokeWidth="1.5" opacity={isSpecial ? 1 : 0} /></svg>;
                case 'FOUNTAIN': return <svg {...props}><SpecialBurst/><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...props}><SpecialBurst/><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': 
                    if (isSpecial) return <svg {...props}><SpecialBurst/><path d="M12 2v20M7 7l5-5 5 5M17 17l-5 5-5-5" strokeWidth="3.5" /></svg>;
                    return <svg {...props}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...props}><SpecialBurst/><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...props}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...props}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ realmKey, isSpecial }) => {
            const realm = REALMS[realmKey];
            const cardRef = useRef(null);
            const [transform, setTransform] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });

            const handleMove = (e) => {
                if (!cardRef.current) return;
                const r = cardRef.current.getBoundingClientRect();
                const x = e.clientX - r.left;
                const y = e.clientY - r.top;
                const rx = ((y - r.height/2) / (r.height/2)) * -32;
                const ry = ((x - r.width/2) / (r.width/2)) * 32;
                setTransform({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, '--mx': `${(x/r.width)*100}%`, '--my': `${(y/r.height)*100}%` });
            };

            const reset = () => setTransform({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: '1.2s cubic-bezier(0.19, 1, 0.22, 1)' });

            return (
                <div className="card-wrapper" onMouseMove={handleMove} onMouseLeave={reset}>
                    <div ref={cardRef} className={`card mat-${realm.theme} ${isSpecial ? 'special-overload' : ''}`} style={{'--r-color': realm.color, '--r-color-glow': realm.glow, '--r-color-dim': realm.dim, '--r-color-bright': realm.bright, ...transform}}>
                        
                        {/* 背景装飾レイヤー */}
                        {realm.theme === 'steam' && (
                            <>
                                <div className="steam-meter-abs">
                                    <div className="steam-needle"></div>
                                    <div className="steam-meter-psi">PSI</div>
                                </div>
                                {[...Array(6)].map((_, i) => (
                                    <div key={i} className="absolute bg-white/10 blur-2xl rounded-full" style={{ left: `${15+Math.random()*70}%`, bottom: '5%', width: '50px', height: '50px', animation: `steam-float ${3+Math.random()*2}s infinite`, animationDelay: `${Math.random()*4}s` }} />
                                ))}
                                <div className="rivet-gold top-5 left-5"></div><div className="rivet-gold top-5 right-5"></div>
                                <div className="rivet-gold bottom-5 left-5"></div><div className="rivet-gold bottom-5 right-5"></div>
                            </>
                        )}

                        {realm.theme === 'fantasy' && (
                            <div className="arcane-circle-layer">
                                <svg viewBox="0 0 200 200" className="w-[125%] h-[125%] animate-[arcane-shimmer_45s_linear_infinite]" style={{ color: realm.color }}>
                                    <circle cx="100" cy="100" r="96" fill="none" stroke="currentColor" strokeWidth="2.5" strokeDasharray="3 7"/>
                                    <circle cx="100" cy="100" r="82" fill="none" stroke="currentColor" strokeWidth="1"/>
                                    <path d="M100 8 L188 155 L12 155 Z" fill="none" stroke="currentColor" strokeWidth="0.8"/>
                                    <path d="M100 192 L12 45 L188 45 Z" fill="none" stroke="currentColor" strokeWidth="0.8"/>
                                    <circle cx="100" cy="100" r="48" fill="none" stroke="currentColor" strokeWidth="3" strokeDasharray="8 4"/>
                                    {[0, 60, 120, 180, 240, 300].map(d => (
                                        <text key={d} x="100" y="32" transform={`rotate(${d} 100 100)`} fill="currentColor" fontSize="12" fontWeight="bold" opacity="0.8">❈</text>
                                    ))}
                                </svg>
                                {[...Array(12)].map((_, i) => (
                                    <div key={i} className="absolute w-2 h-2 rounded-full" style={{ left: `${Math.random()*100}%`, bottom: '0%', background: realm.color, boxShadow: `0 0 20px ${realm.color}`, animation: `mana-flow ${4+Math.random()*2}s infinite`, animationDelay: `${Math.random()*5}s` }} />
                                ))}
                            </div>
                        )}

                        {realm.theme === 'cyber' && (
                            <div className="cyber-rain-layer">
                                {[...Array(15)].map((_, i) => (
                                    <div key={i} className="rain-bit" style={{ left: `${i*6.5 + 4}%`, animationDuration: `${1.2+Math.random()*2.8}s`, animationDelay: `${Math.random()*3}s` }}>
                                        {Array(18).fill(0).map(() => Math.floor(Math.random()*2)).join('')}
                                    </div>
                                ))}
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-white/20 to-transparent w-full h-[6px] animate-[scanline-fast_2.5s_linear_infinite]"></div>
                            </div>
                        )}

                        {/* メイン情報レイヤー (Z-index: 500) */}
                        <div className="card-content">
                            <div className="card-info-top">
                                <span className={`font-['${realm.font}']`}>{realmKey}</span>
                            </div>

                            {/* GEAR DRAW +2 */}
                            {isSpecial && realmKey === 'GEAR' && (
                                <div className="badge-draw2-alert">
                                    <span>DRAW +2</span>
                                </div>
                            )}
                            
                            {/* REVERSE (MACHINE専用) */}
                            {isSpecial && realmKey === 'MACHINE' && (
                                <div className="badge-reverse-final">
                                    <span className={`font-['${realm.font}']`}>REVERSE</span>
                                </div>
                            )}

                            {/* LIMIT WILD (FOUNTAIN) */}
                            {isSpecial && realmKey === 'FOUNTAIN' && (
                                <div className="absolute bottom-[100px] left-0 w-full text-center z-[600]" style={{transform: 'translateZ(250px)'}}>
                                    <span className="text-white font-['Cinzel_Decorative'] text-5xl font-black italic animate-[prism-shimmer_3s_linear_infinite] drop-shadow-[0_0_50px_#fff]">LIMIT WILD</span>
                                </div>
                            )}

                            {/* アイコン配置：下部 */}
                            <div className="card-icon-overload" style={{ color: realm.color, animation: realm.theme.includes('void') ? 'prism-shimmer 6s linear infinite' : 'none' }}>
                                <IconRenderer realmKey={realmKey} isSpecial={isSpecial} />
                            </div>

                            <div className={`card-footer-peak font-['${realm.font}']`}>
                                {realm.n}
                            </div>
                        </div>

                        {/* 最終鏡面反射 */}
                        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-80 z-[700]"
                             style={{ background: `radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 65%)` }}>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const categories = [
                { title: "Steam Punk", color: "#8B4513", cards: [{k:'GEAR', s:false}, {k:'GEAR', s:true}, {k:'ARCHIVE', s:false}] },
                { title: "Fantasy", color: "#1E90FF", cards: [{k:'FOUNTAIN', s:false}, {k:'FOUNTAIN', s:true}, {k:'ICEAGE', s:false}] },
                { title: "Cyber Punk", color: "#9D00FF", cards: [{k:'MACHINE', s:false}, {k:'MACHINE', s:true}, {k:'BATTERY', s:false}] },
                { title: "The Void", color: "#FFFFFF", cards: [{k:'PLANET', s:false}, {k:'RUINS', s:false}] }
            ];

            return (
                <div className="py-24 px-4 overflow-hidden">
                    <header className="text-center mb-60 relative">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-1 bg-gradient-to-r from-transparent via-[#FFD700] to-transparent shadow-[0_0_80px_#FFD700]"></div>
                        <h1 className="text-6xl md:text-[14rem] font-black font-['Cinzel'] tracking-[0.2em] text-[#FFD700] mb-10 drop-shadow-[0_0_120px_rgba(255,215,0,0.7)] leading-none select-none">CROSS REALM</h1>
                        <p className="font-mono text-sm md:text-3xl tracking-[1.6em] text-slate-300 uppercase opacity-40">Eternal Identity // v29.5 [Corrected Rules]</p>
                    </header>

                    {categories.map((cat, idx) => (
                        <section key={idx} className="section-wrapper">
                            <div className="section-aura" style={{ background: cat.color }}></div>
                            <div className="text-center mb-40 px-4 relative">
                                <h2 className="text-5xl md:text-[13rem] font-black font-['Cinzel'] uppercase opacity-10 leading-none select-none" style={{color: cat.color}}>
                                    {cat.title}
                                </h2>
                                <div className="mt-[-3rem] text-2xl md:text-8xl font-bold tracking-[1.8em] text-white uppercase drop-shadow-2xl">
                                    {cat.title}
                                </div>
                            </div>
                            <div className="flex flex-wrap justify-center items-center gap-24 relative z-[800]">
                                {cat.cards.map((c, i) => <CardView key={i} realmKey={c.k} isSpecial={c.s} />)}
                            </div>
                        </section>
                    ))}

                    <footer className="mt-96 text-center border-t border-slate-900 pt-60 pb-60">
                        <p className="font-mono text-xl text-slate-600 tracking-[1.5em] uppercase mb-10 opacity-30">Visual Singularity Refined. Rules synchronized.</p>
                        <div className="w-64 h-1 bg-slate-900 mx-auto"></div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
