<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Realm - Card Showcase (Ultimate All-Cards)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg-deep: #05010a; 
            --card-w: 200px; 
            --card-h: 280px; 
        }
        body { 
            margin: 0; background-color: var(--bg-deep); color: white; font-family: 'Exo 2', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }

        .astral-canvas { 
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at 50% 50%, #0a0514 0%, var(--bg-deep) 100%);
        }

        /* --- Ultimate Eco Animations --- */
        @keyframes ultimate-rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes ultimate-rotate-rev { from { transform: translate(-50%, -50%) rotate(360deg); } to { transform: translate(-50%, -50%) rotate(0deg); } }
        @keyframes ultimate-shine { 0% { transform: translateX(-200%) skewX(-30deg); } 20%, 100% { transform: translateX(200%) skewX(-30deg); } }
        @keyframes ultimate-pulse { 0%, 100% { opacity: 0.2; transform: scale(0.95); } 50% { opacity: 0.5; transform: scale(1.05); } }
        @keyframes ultimate-flicker { 0%, 100% { opacity: 0.3; } 95% { opacity: 0.3; } 96% { opacity: 0.8; } 98% { opacity: 0.4; } }
        @keyframes ultimate-scan { 0% { transform: translateY(-100%); opacity: 0; } 10%, 90% { opacity: 0.4; } 100% { transform: translateY(350%); opacity: 0; } }
        @keyframes ultimate-float { 
            0%, 100% { transform: translate(-50%, -50%); } 
            50% { transform: translate(-50%, calc(-50% - 6px)); } 
        }
        @keyframes ultimate-star-pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.2); } }

        /* --- Ultimate Eco Foundation --- */
        .card-ultimate {
            width: var(--card-w); height: var(--card-h);
            position: relative; overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #000;
        }
        .card-ultimate:hover { transform: translateY(-10px) scale(1.05); z-index: 100; }
        .card-ultimate::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.03) 50%, transparent 55%);
            pointer-events: none; z-index: 5;
        }

        /* STEAM */
        .mat-steam {
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(255,255,255,0.01) 3px), linear-gradient(135deg, #2a1a10 0%, #111 100%);
            border: 2px solid #3d2616; border-top: 2px solid rgba(255,255,255,0.3);
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }
        .u-steam-frame { position: absolute; inset: 4px; border: 1px solid rgba(212,175,55,0.15); pointer-events: none; }
        .u-steam-gauge { position: absolute; bottom: 15%; left: 8%; width: 30px; height: 30px; border: 1.5px solid rgba(212,175,55,0.2); border-radius: 50%; opacity: 0.6; }
        .u-steam-needle { position: absolute; top: 50%; left: 50%; width: 1px; height: 14px; background: #D4AF37; transform-origin: bottom; animation: ultimate-rotate 4s ease-in-out infinite alternate; }

        /* FANTASY */
        .mat-fantasy {
            background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 80%), linear-gradient(135deg, #010614 0%, #000 100%);
            border: 1px solid rgba(138, 43, 226, 0.4); border-top: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 20% 5% 20% 5% !important;
        }
        .u-fantasy-shine { position: absolute; top: 0; left: 0; width: 50%; height: 200%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent); animation: ultimate-shine 6s linear infinite; }
        .u-fantasy-ring { position: absolute; top: 55%; left: 50%; width: 140px; height: 140px; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 50%; animation: ultimate-rotate 30s linear infinite; }

        /* CYBER */
        .mat-cyber {
            background: conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 25%, rgba(255,255,255,0.02) 50%, transparent 75%), #000;
            border: 1px solid rgba(64,224,208,0.3); border-top: 1.5px solid rgba(255,255,255,0.4);
            clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
        }
        .u-cyber-grid { position: absolute; inset: 0; background: linear-gradient(rgba(64,224,208,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(64,224,208,0.03) 1px, transparent 1px); background-size: 10px 10px; }
        .u-cyber-edge { position: absolute; inset: 0; border: 2px solid var(--accent); opacity: 0.1; animation: ultimate-flicker 5s step-end infinite; }
        .u-cyber-scan { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to right, transparent, var(--accent), transparent); opacity: 0.3; animation: ultimate-scan 3s linear infinite; }

        /* VOID */
        .mat-void-planet, .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); border-radius: 50% !important; border: 1px solid rgba(255,255,255,0.15); }
        .u-void-vortex { position: absolute; top: 55%; left: 50%; width: 160px; height: 160px; background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.05), transparent); border-radius: 50%; animation: ultimate-rotate 12s linear infinite; }
        .u-void-core { position: absolute; top: 55%; left: 50%; width: 70px; height: 70px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); animation: ultimate-pulse 4s ease-in-out infinite; }
        .u-void-star { position: absolute; width: 1.5px; height: 1.5px; background: white; border-radius: 50%; animation: ultimate-star-pulse var(--d) infinite; opacity: 0.4; }

        .card-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 1rem; z-index: 10; }
        .card-header-tech { width: 90%; background: rgba(0,0,0,0.8); border-left: 3px solid var(--r-color); padding: 2px 8px; z-index: 50; position: absolute; top: 2%; left: 50%; transform: translateX(-50%); }
        .card-header-tech span { font-size: 0.65rem; font-weight: 900; color: var(--r-bright); font-family: 'Orbitron'; letter-spacing: 1px; }
        .card-icon { width: 50%; height: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); animation: ultimate-float 5s ease-in-out infinite; z-index: 20; color: var(--r-bright); }
        .card-footer-tech { width: 100%; text-align: center; font-weight: 900; font-size: calc(var(--card-w)*0.15); letter-spacing: 2px; padding-bottom: 12px; text-shadow: 0 0 8px var(--r-color); }

        .special-badge { 
            position: absolute; left: -5px; top: 35%; background: linear-gradient(90deg, #e60000, #800000); 
            border: 1px solid #FFF; color: #FFF; font-size: 6px; font-weight: 1000; padding: 2px 6px; 
            border-radius: 2px 6px 6px 2px; box-shadow: 0 3px 10px rgba(0,0,0,0.8); z-index: 200; transform: rotate(-3deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#FF8C00', bright: '#FFD700', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#FF3131', bright: '#FF6347', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#87CEFA', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#E2B0FF', bright: '#DDA0DD', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#ADFF2F', bright: '#7FFF00', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#F0F8FF', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#CCCCCC', bright: '#D3D3D3', theme: 'void-ruins', font: 'Audiowide' }
        };

        const IconRenderer = ({ r, spec, color }) => {
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: spec ? 3.5 : 2.2, strokeLinecap: "round", strokeLinejoin: "round", className: "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="5" /><g style={{ transformOrigin: 'center' }}>{[...Array(8)].map((_, i) => (<rect key={i} x="11" y="2" width="2" height="4" fill={color} transform={`rotate(${i * 45} 12 12)`} />))}</g><circle cx="12" cy="12" r="2.5" fill={color} stroke="none" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M6 20.5A2.5 2.5 0 0 1 8.5 18H20M8.5 5H20v15.5H8.5a2.5 2.5 0 0 1 0-5H20" /><circle cx="18" cy="12.5" r="1.5" fill={color} stroke="none" /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 19c3.8 0 7-3.2 7-7 0-4.5-7-10-7-10S5 7.5 5 12c0 3.8 3.2 7 7 7z" /><path d="M12 16c2 0 3.5-1.5 3.5-3.5 0-2.5-3.5-5.5-3.5-5.5S8.5 10 8.5 12.5c0 2 1.5 3.5 3.5 3.5z" fill={color} stroke="none" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 3v18 M3 12h18 M5.6 5.6l12.8 12.8 M5.6 18.4l12.8-12.8" strokeWidth="1.2" opacity="0.7" /><polygon points="12 7 17 12 12 17 7 12" /><circle cx="12" cy="12" r="2.5" fill={color} stroke="none" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="1" opacity="0.3" /><rect x="8" y="8" width="8" height="8" strokeWidth="1.5" /><path d="M12 8v8 M8 12h8" opacity="0.5" /><rect x="11" y="11" width="2" height="2" fill={color} stroke="none" /></svg>;
                case 'BATTERY': return <svg {...p}><rect x="5" y="3" width="14" height="18" rx="2" /><path d="M9 1h6 M5 8h14 M5 16h14" /><path d="M12.5 4.5l-2.5 6h4l-2.5 6" strokeWidth="1.5" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardOrnaments = ({ theme }) => {
            if (theme === 'steam') return <React.Fragment><div className="u-steam-frame" /><div className="u-steam-gauge"><div className="u-steam-needle" /></div></React.Fragment>;
            if (theme === 'fantasy') return <React.Fragment><div className="u-fantasy-shine" /><div className="u-fantasy-ring" /></React.Fragment>;
            if (theme === 'cyber') return <React.Fragment><div className="u-cyber-grid" /><div className="u-cyber-edge" /><div className="u-cyber-scan" /></React.Fragment>;
            if (theme.includes('void')) return <React.Fragment><div className="u-void-vortex" /><div className="u-void-core" />{[...Array(4)].map((_, i) => (<div key={i} className="u-void-star" style={{ top: `${20+Math.random()*60}%`, left: `${20+Math.random()*60}%`, '--d': `${2+Math.random()*4}s`, animationDelay: `${Math.random()*5}s` }} />))}</React.Fragment>;
            return null;
        }

        const CardPreview = ({ rKey, spec }) => {
            const r = REALMS[rKey];
            const matClass = `mat-${r.theme}`;
            let specLabel = "";
            if (spec) {
                if (rKey === 'GEAR') specLabel = "DRAW 2";
                else if (rKey === 'MACHINE') specLabel = "REVERSE";
                else if (rKey === 'FOUNTAIN') specLabel = "LIMIT WILD";
                else specLabel = "WILD";
            }

            return (
                <div className={`card-ultimate ${matClass}`} style={{ '--r-color': r.color, '--r-bright': r.bright }}>
                    <CardOrnaments theme={r.theme} />
                    <div className="card-inner">
                        <div className="card-header-tech"><span>{rKey}</span></div>
                        <div className="card-icon"><IconRenderer r={rKey} spec={spec} color={r.bright} /></div>
                        <div className="card-footer-tech" style={{ color: r.bright, fontFamily: r.font }}>{r.n}</div>
                        {spec && <div className="special-badge">{specLabel.split(' ').map((w, i) => <div key={i}>{w}</div>)}</div>}
                    </div>
                </div>
            );
        };

        const App = () => (
            <div className="p-8">
                <div className="text-center mb-12">
                    <h1 className="text-4xl font-black text-[var(--accent)] tracking-[10px] uppercase mb-4" style={{fontFamily:'Orbitron'}}>Ultimate Collection</h1>
                    <p className="text-white/60 text-sm tracking-widest uppercase">全11種のカードデザイン・アルティメット省エネ版</p>
                </div>
                <div className="flex flex-wrap gap-8 justify-center max-w-7xl mx-auto">
                    <CardPreview rKey="GEAR" />
                    <CardPreview rKey="GEAR" spec />
                    <CardPreview rKey="ARCHIVE" />
                    <CardPreview rKey="FOUNTAIN" />
                    <CardPreview rKey="FOUNTAIN" spec />
                    <CardPreview rKey="ICEAGE" />
                    <CardPreview rKey="MACHINE" />
                    <CardPreview rKey="MACHINE" spec />
                    <CardPreview rKey="BATTERY" />
                    <CardPreview rKey="PLANET" spec />
                    <CardPreview rKey="RUINS" spec />
                </div>
                <AstralBackground />
            </div>
        );

        const AstralBackground = () => <div className="astral-canvas"></div>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
