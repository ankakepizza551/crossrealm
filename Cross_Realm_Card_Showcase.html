<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Realm - Card Showcase</title>

    <!-- Discord OGP Tags -->
    <meta property="og:title" content="Cross Realm - Card Showcase" />
    <meta property="og:description" content="Cross Realmの美麗なカードデザインとそのスケール耐性を確認できる公式ショーケース。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ankakepizza551.github.io/crossrealm/Cross_Realm_Card_Showcase.html" />
    <meta property="og:image" content="https://ankakepizza551.github.io/crossrealm/ogp.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#40E0D0" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            /* 本来のデザイン基準サイズ */
            --card-w: 300px; 
            --card-h: 420px; 
        }
        body { 
            margin: 0; background-color: #000000; color: white; font-family: 'Exo 2', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            perspective: 3000px;
        }

        .bg-core { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .layer-grid { position: absolute; inset: -50%; background-image: linear-gradient(rgba(64, 224, 208, 0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(64, 224, 208, 0.1) 2px, transparent 2px); background-size: 100px 100px; transform: perspective(1000px) rotateX(75deg); mask-image: radial-gradient(circle at center, black, transparent 80%); }

        .card-wrapper-3d { width: var(--card-w); height: var(--card-h); perspective: 1000px; position: relative; }
        .card-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); border-radius: 8px; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; overflow: hidden; border-radius: inherit; }

        .mat-steam { background: radial-gradient(circle at 50% 10%, var(--r-color-bright) 0%, #0d0400 100%); border: 14px solid #4a2f1c; border-radius: 6px; box-shadow: 0 50px 100px #000, inset 4px 4px 8px rgba(255, 255, 255, 0.15), inset -4px -4px 8px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(0,0,0,0.9); position: relative; }
        .mat-fantasy { background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.85) 100%), radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%) !important; border: 6px solid rgba(255,255,255,0.95) !important; border-radius: 80px 20px !important; box-shadow: 0 0 120px var(--r-color-glow), inset 0 0 60px rgba(255,255,255,0.2); position: relative; backdrop-filter: blur(15px); }
        .mat-cyber { background: #000; border: none; border-radius: 0; clip-path: polygon(0 20%, 20% 0, 100% 0, 100% 80%, 80% 100%, 0 100%); box-shadow: inset 0 0 150px var(--r-color-dim); position: relative; border-left: 12px solid var(--r-color); }
        .mat-void-planet { background: radial-gradient(circle at 50% 50%, #fff4 0%, #000 100%); border: none; box-shadow: 0 0 140px #fff7, inset 0 0 250px #fff2; border-radius: 50% !important; }
        .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #000 100%); border: none; box-shadow: 0 0 110px #444, inset 0 0 250px #111; border-radius: 50% !important; }

        .card-info-top { position: absolute; top: 25px; left: 25px; padding: 12px 28px; border-radius: 2px; background: rgba(0,0,0,1); border-left: 12px solid var(--r-color); transform: translateZ(160px); z-index: 500; box-shadow: 0 15px 40px rgba(0,0,0,1); }
        .card-info-top span { font-size: 16px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; }
        .mat-void-planet .card-info-top { background: #fff !important; border-left: 15px solid #fff !important; box-shadow: 0 0 60px #fff; }
        .mat-void-planet .card-info-top span { color: #000 !important; }

        .card-icon-overload { position: absolute; top: 58%; left: 50%; width: 170px; height: 170px; transform: translate(-50%, -50%) translateZ(200px); z-index: 450; filter: drop-shadow(0 0 15px rgba(0,0,0,0.9)) drop-shadow(0 0 35px var(--r-color)); transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
        .card-footer-peak { position: absolute; bottom: 0; width: 100%; padding: 75px 0 35px; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 30%, transparent 100%); text-align: center; color: #fff; z-index: 500; transform: translateZ(140px); text-shadow: 0 0 30px var(--r-color), 0 0 10px #000; letter-spacing: 12px; font-weight: 900; font-size: 36px; }

        .special-badge-base { position: absolute; top: 6px; right: 6px; background: rgba(200, 0, 0, 0.9); border: 2px solid rgba(255, 100, 100, 0.8); color: #fff; font-size: 18px; font-weight: 900; padding: 10px 15px; text-align: center; border-radius: 8px; transform: translateZ(180px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 600; line-height: 1.1; letter-spacing: 1px; display: flex; flex-direction: column; justify-content: center; }

        .showcase-grid { display: grid; grid-template-columns: 1fr; gap: 4rem; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 1024px) { .showcase-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#8B4513', bright: '#FF8C00', glow: 'rgba(212,175,55,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#B22222', bright: '#FF3131', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#00BFFF', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#9D00FF', bright: '#E2B0FF', glow: 'rgba(157,0,255,1)', dim: 'rgba(157,0,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#32CD32', bright: '#ADFF2F', glow: 'rgba(50,205,50,1)', dim: 'rgba(50,205,50,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#FFFFFF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#999999', bright: '#CCCCCC', glow: 'rgba(150,150,150,1)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const IconRenderer = ({ r, spec }) => {
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: spec ? 4 : 2, strokeLinecap: "round", className: "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /><path d="M9 10h6" strokeWidth="1.5" opacity={spec ? 1 : 0} /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ realmKey, isSpecial }) => {
            const rData = REALMS[realmKey];
            let specialLabel = "";
            if (isSpecial) {
                if (realmKey === 'GEAR') specialLabel = "DRAW 2";
                else if (realmKey === 'MACHINE') specialLabel = "REVERSE";
                else if (realmKey === 'FOUNTAIN') specialLabel = "LIMIT WILD";
                else if (realmKey === 'PLANET' || realmKey === 'RUINS') specialLabel = "WILD";
            }

            const cardRef = useRef(null);
            const [tilt, setTilt] = useState({ transform: 'rotateX(0deg) rotateY(0deg)' });

            const handleMove = (e) => {
                const r = cardRef.current.getBoundingClientRect();
                const rx = ((e.clientY - r.top - r.height/2) / (r.height/2)) * -15;
                const ry = ((e.clientX - r.left - r.width/2) / (r.width/2)) * 15;
                setTilt({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, transition: 'none' });
            };
            const reset = () => setTilt({ transform: 'rotateX(0deg) rotateY(0deg)', transition: '0.6s' });

            return (
                <div className="card-wrapper-3d" ref={cardRef} onMouseMove={handleMove} onMouseLeave={reset}>
                    <div className={`card-3d mat-${rData.theme}`} style={{'--r-color': rData.color, '--r-color-glow': rData.glow, '--r-color-dim': rData.dim || 'rgba(0,0,0,0.5)', ...tilt}}>
                        <div className="card-content">
                            <div className="card-info-top"><span>{realmKey}</span></div>
                            <div className="card-icon-overload" style={{ color: rData.bright }}><IconRenderer r={realmKey} spec={isSpecial} /></div>
                            <div className={`card-footer-peak font-['${rData.font}']`}>{rData.n}</div>
                            {isSpecial && (
                                <div className="special-badge-base">
                                    {specialLabel.split(' ').map((word, i) => <div key={i}>{word}</div>)}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ShowcaseItem = ({ realmKey, isSpecial }) => {
            const realm = REALMS[realmKey];
            let specialTitle = "NORMAL";
            if (isSpecial) {
                if (realmKey === 'GEAR') specialTitle = "DRAW 2 (S)";
                else if (realmKey === 'MACHINE') specialTitle = "REVERSE (S)";
                else if (realmKey === 'FOUNTAIN') specialTitle = "LIMIT WILD (S)";
                else if (realmKey === 'PLANET' || realmKey === 'RUINS') specialTitle = "WILD (S)";
            }

            const IN_GAME_WIDTH = 85;
            const ORIGINAL_WIDTH = 300;
            const scaleFactor = IN_GAME_WIDTH / ORIGINAL_WIDTH;
            const IN_GAME_HEIGHT = IN_GAME_WIDTH * 1.4; 

            return (
                <div className="flex flex-col bg-black/60 border border-white/10 rounded-2xl p-6 md:p-8 shadow-2xl backdrop-blur-md">
                    <h3 className="text-2xl md:text-3xl font-black text-center tracking-[4px] uppercase mb-10" style={{color: realm.bright, fontFamily: realm.font}}>
                        {realm.n} <span className="text-white/50 text-sm md:text-lg ml-2 tracking-[2px] block mt-2 md:inline md:mt-0">[ {specialTitle} ]</span>
                    </h3>

                    <div className="flex flex-col xl:flex-row items-center justify-center gap-12 xl:gap-24">
                        <div className="flex flex-col items-center">
                            <div className="text-sm text-accent mb-6 tracking-[4px] font-bold text-center">
                                ORIGINAL DESIGN<br/><span className="text-xs text-white/50">(300px × 420px)</span>
                            </div>
                            <CardView realmKey={realmKey} isSpecial={isSpecial} />
                        </div>

                        <div className="flex flex-col items-center">
                            <div className="text-sm text-white/70 mb-6 tracking-[4px] font-bold text-center">
                                IN-GAME SIZE<br/><span className="text-xs text-white/50">(85px × 119px)</span>
                            </div>
                            <div className="relative border border-dashed border-white/30 rounded-lg flex justify-center items-center overflow-hidden bg-black/50" style={{ width: IN_GAME_WIDTH + 20, height: IN_GAME_HEIGHT + 20 }}>
                                <div style={{ transform: `scale(${scaleFactor})`, transformOrigin: 'center' }}>
                                    <div style={{ margin: 0 }}><CardView realmKey={realmKey} isSpecial={isSpecial} /></div>
                                </div>
                            </div>
                            <p className="text-[10px] text-white/40 mt-6 max-w-[180px] text-center leading-relaxed">
                                ※元の300pxデザインをtransform: scaleで縮小表示し、比率とレイアウトの崩れを防いでいます。
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const realms = Object.keys(REALMS);
            
            return (
                <div className="min-h-screen w-full relative py-12 px-4 md:px-8">
                    <div className="bg-core"><div className="layer-grid"/></div>
                    <div className="relative z-10 max-w-6xl mx-auto">
                        <div className="text-center mb-16">
                            <h1 className="text-3xl md:text-5xl font-black text-accent tracking-widest mb-4 drop-shadow-[0_0_15px_rgba(64,224,208,0.4)]" style={{fontFamily:'Orbitron'}}>CARD DESIGN SHOWCASE</h1>
                            <p className="text-white/60 tracking-[4px] text-sm font-bold uppercase">Cross Realm - Comparison Mode</p>
                        </div>
                        <div className="showcase-grid">
                            {realms.map(r => {
                                if (r === 'PLANET' || r === 'RUINS') return <ShowcaseItem key={r} realmKey={r} isSpecial={true} />;
                                const hasSpecialCard = ['GEAR', 'FOUNTAIN', 'MACHINE'].includes(r);
                                return (
                                    <React.Fragment key={r}>
                                        <ShowcaseItem realmKey={r} isSpecial={false} />
                                        {hasSpecialCard && <ShowcaseItem realmKey={r} isSpecial={true} />}
                                    </React.Fragment>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
