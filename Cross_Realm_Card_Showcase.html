<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Realm - Prime Overload Gallery v25 -</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --card-w: 300px; 
            --card-h: 420px; 
        }
        body { 
            margin: 0; background-color: #010103; color: white; font-family: 'Exo 2', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            perspective: 3000px;
        }

        /* === アニメーション === */
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes digital-rain { 0% { transform: translateY(-100%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(150%); opacity: 0; } }
        @keyframes mana-flow { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-130px) scale(1.6); opacity: 0; } }
        @keyframes liquid-morph { 0% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; } 100% { border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%; } }
        @keyframes steam-rise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 0.4; } 100% { transform: translateY(-120px) scale(3); opacity: 0; } }
        @keyframes aura-breathe { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.15); opacity: 0.55; } }
        @keyframes prism-shimmer { 0% { filter: hue-rotate(0deg) brightness(1); } 50% { filter: hue-rotate(180deg) brightness(1.6); } 100% { filter: hue-rotate(360deg) brightness(1); } }
        @keyframes meter-needle { 0% { transform: rotate(-45deg); } 50% { transform: rotate(60deg); } 100% { transform: rotate(-45deg); } }
        @keyframes meter-panic { 0% { transform: rotate(80deg); } 50% { transform: rotate(100deg); } 100% { transform: rotate(80deg); } }
        @keyframes array-pulse { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.2; } 50% { transform: scale(1.05) rotate(180deg); opacity: 0.4; } }

        /* === セクション背景 === */
        .section-wrapper { position: relative; padding: 120px 0; border-bottom: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .section-aura { 
            position: absolute; top: 50%; left: 50%; width: 80vw; height: 80vh; 
            transform: translate(-50%, -50%); filter: blur(140px); 
            z-index: -1; pointer-events: none; border-radius: 50%; 
            animation: aura-breathe 10s infinite alternate;
        }

        /* === カードマテリアル === */
        .mat-steam {
            background: radial-gradient(circle at 50% 0%, var(--r-color-bright) 0%, #100601 100%);
            border: 12px solid #5d3a1a; border-radius: 4px;
            box-shadow: 0 40px 100px #000, inset 0 0 100px rgba(0,0,0,0.95);
            position: relative;
        }
        .mat-steam::before {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.5) 0, rgba(0,0,0,0.5) 1px, transparent 1px, transparent 6px);
            opacity: 0.7; z-index: 1;
        }

        .mat-fantasy {
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.8) 100%),
                        radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #030110 100%);
            border: 6px solid rgba(255,255,255,0.9); border-radius: 80px 20px;
            box-shadow: 0 0 120px var(--r-color-glow), inset 0 0 40px rgba(255,255,255,0.3);
            position: relative; backdrop-filter: blur(15px);
        }

        .mat-cyber {
            background: #000; border: none; border-radius: 0;
            clip-path: polygon(0 20%, 20% 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
            box-shadow: inset 0 0 130px var(--r-color-dim);
            position: relative;
        }

        /* === 共通パーツ === */
        .card-wrapper { perspective: 2500px; margin: 40px; position: relative; }
        .card { width: var(--card-w); height: var(--card-h); position: relative; transform-style: preserve-3d; transition: transform 0.12s ease-out; cursor: pointer; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; overflow: hidden; border-radius: inherit; }

        .card-label-fixed { 
            position: absolute; top: 25px; left: 25px; padding: 12px 28px; border-radius: 2px;
            background: rgba(0,0,0,1); border-left: 12px solid var(--r-color);
            transform: translateZ(130px); z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,1);
        }
        .card-label-fixed span { font-size: 16px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; }

        /* アイコン位置：重なりを完全に防ぐため top: 52% */
        .card-icon-overload {
            position: absolute; top: 52%; left: 50%; width: 155px; height: 155px;
            transform: translate(-50%, -50%) translateZ(180px);
            z-index: 20; filter: drop-shadow(0 0 40px var(--r-color));
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .card:hover .card-icon-overload { transform: translate(-50%, -50%) translateZ(280px) scale(1.15); filter: drop-shadow(0 0 100px var(--r-color)) brightness(2.2); }

        .card-footer-abs {
            position: absolute; bottom: 0; width: 100%; padding: 60px 0 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 75%, transparent 100%);
            text-align: center; color: #fff; z-index: 100; transform: translateZ(110px);
            text-shadow: 0 0 35px var(--r-color); letter-spacing: 12px; font-weight: 900; font-size: 34px;
        }

        /* スチームパンク：メーター位置調整 */
        .steam-meter-unit {
            position: absolute; top: 30px; right: 25px; width: 55px; height: 55px;
            background: #2a1508; border: 4px solid #5d3a1a; border-radius: 50%;
            transform: translateZ(140px); z-index: 60; box-shadow: inset 0 0 15px #000;
        }
        .steam-needle {
            position: absolute; top: 50%; left: 50%; width: 2px; height: 24px;
            background: #f44; transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(-45deg);
            animation: meter-needle 5s infinite ease-in-out;
        }
        .special-overload .steam-needle { animation: meter-panic 0.1s infinite linear; }

        /* サイバー：流れる数字 */
        .cyber-rain-box { position: absolute; inset: 0; overflow: hidden; opacity: 0.3; mix-blend-mode: screen; }
        .rain-line { 
            position: absolute; color: var(--r-color); font-family: 'Orbitron'; font-size: 9px; font-weight: 900;
            writing-mode: vertical-rl; animation: digital-rain 3s linear infinite; white-space: nowrap;
        }

        /* 特殊バッジ */
        .badge-extreme {
            position: absolute; top: 65px; left: -35px; background: #a50b0b; border: 5px solid #FFD700;
            padding: 14px 28px; transform: translateZ(240px) rotate(-15deg);
            box-shadow: 25px 25px 70px rgba(0,0,0,1); animation: aura-breathe 1s infinite alternate;
        }
        .badge-extreme span { font-family: 'Special Elite', cursive; font-size: 20px; font-weight: 900; color: #fff; }

        /* 幻想：魔法陣背景 */
        .magic-array-bg { position: absolute; inset: 0; pointer-events: none; mix-blend-mode: color-dodge; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#FFD700', bright: '#8b5a2b', glow: 'rgba(255,215,0,0.6)', dim: 'rgba(255,215,0,0.2)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#CD7F32', bright: '#5d3a1a', glow: 'rgba(205,127,50,0.6)', dim: 'rgba(205,127,50,0.2)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#BF40FF', bright: '#3a0b6a', glow: 'rgba(191,64,255,0.7)', dim: 'rgba(191,64,255,0.2)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#005577', glow: 'rgba(0,243,255,0.7)', dim: 'rgba(0,243,255,0.2)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#00F3FF', bright: '#000', glow: 'rgba(0,243,255,0.6)', dim: 'rgba(0,243,255,0.3)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#32CD32', bright: '#000', glow: 'rgba(50,205,50,0.6)', dim: 'rgba(50,205,50,0.3)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#000', glow: 'rgba(255,255,255,0.8)', dim: 'rgba(255,255,255,0.2)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#999999', bright: '#000', glow: 'rgba(120,120,120,0.4)', dim: 'rgba(60,60,60,0.5)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const IconRenderer = ({ realmKey, isSpecial }) => {
            const sw = isSpecial ? 2.8 : 1.5;
            const props = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: sw, strokeLinecap: "round", strokeLinejoin: "round", className: "w-full h-full" };

            const SpecialRing = () => isSpecial && (
                <g className="animate-[gear-spin_12s_linear_infinite]">
                    <circle cx="12" cy="12" r="11" strokeWidth="0.5" strokeDasharray="3 3" opacity="0.4" />
                    <path d="M12 2 L13 6 L11 6 Z" fill="currentColor" opacity="0.8" transform="rotate(0 12 12)" />
                    <path d="M12 2 L13 6 L11 6 Z" fill="currentColor" opacity="0.8" transform="rotate(120 12 12)" />
                    <path d="M12 2 L13 6 L11 6 Z" fill="currentColor" opacity="0.8" transform="rotate(240 12 12)" />
                </g>
            );

            switch (realmKey) {
                case 'GEAR': return <svg {...props}><SpecialRing/><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...props}><SpecialRing/><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /><path d="M9 10h6" opacity={isSpecial ? 1 : 0} /></svg>;
                case 'FOUNTAIN': return <svg {...props}><SpecialRing/><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...props}><SpecialRing/><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': 
                    if (isSpecial) return <svg {...props}><SpecialRing/><path d="M12 3v18M7 8l5-5 5 5M7 16l5 5 5-5" strokeWidth="2.5" /></svg>; // Reverse Icon
                    return <svg {...props}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...props}><SpecialRing/><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...props}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...props}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ realmKey, isSpecial }) => {
            const realm = REALMS[realmKey];
            const cardRef = useRef(null);
            const [transform, setTransform] = useState({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%' });

            const handleMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rx = ((y - rect.height / 2) / (rect.height / 2)) * -32;
                const ry = ((x - rect.width / 2) / (rect.width / 2)) * 32;
                setTransform({ transform: `rotateX(${rx}deg) rotateY(${ry}deg)`, '--mx': `${(x/rect.width)*100}%`, '--my': `${(y/rect.height)*100}%` });
            };

            const reset = () => setTransform({ transform: 'rotateX(0deg) rotateY(0deg)', '--mx': '50%', '--my': '50%', transition: '1.2s cubic-bezier(0.19, 1, 0.22, 1)' });

            return (
                <div className="card-wrapper" onMouseMove={handleMove} onMouseLeave={reset}>
                    <div ref={cardRef} className={`card mat-${realm.theme} ${isSpecial ? 'special-overload' : ''}`} style={{'--r-color': realm.color, '--r-color-glow': realm.glow, '--r-color-dim': realm.dim, '--r-color-bright': realm.bright, ...transform}}>
                        
                        {/* 属性ギミック */}
                        {realm.theme === 'steam' && (
                            <>
                                <div className="steam-meter-unit">
                                    <div className="steam-needle"></div>
                                    <div className="absolute bottom-2 width-full text-center text-[7px] text-amber-500 font-bold w-full">PSI</div>
                                </div>
                                {/* 背景歯車テクスチャ */}
                                <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 10% 10%, #fff 1px, transparent 1px), radial-gradient(circle at 90% 90%, #fff 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                                <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-25">
                                    <svg viewBox="0 0 100 100" className="absolute -top-10 -right-10 w-48 h-48 animate-[gear-spin_15s_linear_infinite]"><circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" strokeWidth="0.5" stroke-dasharray="10 5"/></svg>
                                    <svg viewBox="0 0 100 100" className="absolute -bottom-16 -left-16 w-64 h-64 animate-[gear-spin_25s_linear_infinite_reverse] opacity-20"><circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" strokeWidth="0.3" stroke-dasharray="4 12"/></svg>
                                </div>
                                {[...Array(8)].map((_, i) => (
                                    <div key={i} className="absolute bg-white/10 blur-lg rounded-full" style={{ left: `${20+Math.random()*60}%`, bottom: '5%', width: `${30+Math.random()*50}px`, height: `${30+Math.random()*50}px`, animation: `steam-rise ${2+Math.random()*2}s infinite`, animationDelay: `${Math.random()*4}s` }} />
                                ))}
                                <div className="rivet-gold top-4 left-4"></div><div className="rivet-gold top-4 right-4"></div>
                                <div className="rivet-gold bottom-4 left-4"></div><div className="rivet-gold bottom-4 right-4"></div>
                            </>
                        )}

                        {realm.theme === 'fantasy' && (
                            <>
                                {/* 究極魔法陣背景 */}
                                <div className="magic-array-bg flex items-center justify-center inset-0">
                                    <svg viewBox="0 0 200 200" className="w-[120%] h-[120%] animate-[array-pulse_30s_linear_infinite] opacity-30" style={{ color: realm.color }}>
                                        <circle cx="100" cy="100" r="95" fill="none" stroke="currentColor" strokeWidth="1" stroke-dasharray="5 10"/>
                                        <circle cx="100" cy="100" r="70" fill="none" stroke="currentColor" strokeWidth="0.5"/>
                                        <path d="M100 5 L195 150 L5 150 Z" fill="none" stroke="currentColor" strokeWidth="0.5"/>
                                        <path d="M100 195 L5 50 L195 50 Z" fill="none" stroke="currentColor" strokeWidth="0.5"/>
                                        <circle cx="100" cy="100" r="40" fill="none" stroke="currentColor" strokeWidth="2" stroke-dasharray="2 4"/>
                                        {/* ルーン文字風の点 */}
                                        {[...Array(12)].map((_, i) => (
                                            <circle key={i} cx={100 + Math.cos(i*30 * Math.PI/180)*85} cy={100 + Math.sin(i*30 * Math.PI/180)*85} r="2" fill="currentColor" />
                                        ))}
                                    </svg>
                                </div>
                                {[...Array(15)].map((_, i) => (
                                    <div key={i} className="absolute w-2 h-2 rounded-full pointer-events-none" style={{ left: `${Math.random()*100}%`, bottom: '0%', background: realm.color, boxShadow: `0 0 15px ${realm.color}`, animation: `mana-flow ${4+Math.random()*3}s infinite`, animationDelay: `${Math.random()*6}s` }} />
                                ))}
                            </>
                        )}

                        {realm.theme === 'cyber' && (
                            <>
                                <div className="cyber-rain-box">
                                    {[...Array(8)].map((_, i) => (
                                        <div key={i} className="rain-line" style={{ left: `${i*12 + 5}%`, animationDuration: `${2+Math.random()*2}s`, animationDelay: `${Math.random()*3}s` }}>
                                            {Array(15).fill(0).map(() => Math.floor(Math.random()*2)).join('')}
                                        </div>
                                    ))}
                                </div>
                                <div className="absolute inset-0 border-[8px] border-white/5 border-l-cyan-400/50"></div>
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-white/30 to-transparent w-full h-[4px] animate-[scanline-fast_2.5s_linear_infinite] pointer-events-none"></div>
                            </>
                        )}

                        {realm.theme === 'void-planet' && (
                            <>
                                {[...Array(35)].map((_, i) => (
                                    <div key={i} className="absolute bg-white rounded-full opacity-40 animate-pulse" style={{ left: `${Math.random()*100}%`, top: `${Math.random()*100}%`, width: `${Math.random()*3}px`, height: `${Math.random()*3}px`, animationDelay: `${Math.random()*3}s` }} />
                                ))}
                                <div className="absolute inset-0 bg-[radial-gradient(circle,rgba(255,255,255,0.3)_0%,transparent_80%)] animate-[prism-shimmer_12s_linear_infinite]"></div>
                            </>
                        )}

                        {realm.theme === 'void-ruins' && (
                            <>
                                {[...Array(15)].map((_, i) => (
                                    <div key={i} className="absolute bg-neutral-600/50 rounded-full blur-[20px]" style={{ left: `${Math.random()*100}%`, bottom: '0%', width: `${60+Math.random()*70}px`, height: `${60+Math.random()*70}px`, animation: `smoke-drift 6s infinite`, animationDelay: `${Math.random()*5}s` }} />
                                ))}
                                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-90"></div>
                            </>
                        )}

                        <div className="card-content">
                            <div className="card-label-fixed">
                                <span className={`font-['${realm.font}']`}>{realmKey}</span>
                            </div>

                            {isSpecial && realm.theme === 'steam' && (
                                <div className="badge-extreme">
                                    <span>PRESSURE MAX</span>
                                </div>
                            )}

                            {isSpecial && realmKey === 'FOUNTAIN' && (
                                <div className="absolute bottom-36 left-0 w-full text-center z-50" style={{transform: 'translateZ(250px)'}}>
                                    <span className="text-white font-['Cinzel_Decorative'] text-5xl font-black italic animate-[prism-shimmer_3s_linear_infinite] drop-shadow-[0_0_40px_#fff]">ULTRA WILD</span>
                                </div>
                            )}

                            {/* アイコン位置：top: 52% で他の要素との干渉を防止 */}
                            <div className="card-icon-overload" style={{ color: realm.color, animation: realm.theme.includes('void') ? 'prism-shimmer 5s linear infinite' : 'none' }}>
                                <IconRenderer realmKey={realmKey} isSpecial={isSpecial} />
                            </div>

                            <div className={`card-footer-abs font-['${realm.font}']`}>
                                {realm.n}
                            </div>
                        </div>

                        {/* 最終反射レイヤー */}
                        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-75"
                             style={{ background: `radial-gradient(circle at var(--mx) var(--my), #fff 0%, transparent 60%)` }}>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const categories = [
                { title: "Steam Punk", color: "#FFD700", cards: [{k:'GEAR', s:false}, {k:'GEAR', s:true}, {k:'ARCHIVE', s:false}] },
                { title: "Fantasy", color: "#BF40FF", cards: [{k:'FOUNTAIN', s:false}, {k:'FOUNTAIN', s:true}, {k:'ICEAGE', s:false}] },
                { title: "Cyber Punk", color: "#00F3FF", cards: [{k:'MACHINE', s:false}, {k:'MACHINE', s:true}, {k:'BATTERY', s:false}] },
                { title: "The Void", color: "#FFFFFF", cards: [{k:'PLANET', s:false}, {k:'RUINS', s:false}] }
            ];

            return (
                <div className="py-24 px-4 overflow-hidden">
                    <header className="text-center mb-60 relative">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-1 bg-gradient-to-r from-transparent via-[#FFD700] to-transparent shadow-[0_0_80px_#FFD700]"></div>

        root.render(<App />);
