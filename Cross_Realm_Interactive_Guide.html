<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross Realm - Interactive Guide</title>

    <!-- Discord OGP Tags -->
    <meta property="og:title" content="Cross Realm - Interactive Guide" />
    <meta property="og:description" content="Cross Realmの基本ルールや特殊カードの効果を、実際にカードをタップしながら学べるインタラクティブな公式ルールブック。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ankakepizza551.github.io/crossrealm/Cross_Realm_Interactive_Guide.html" />
    <meta property="og:image" content="https://ankakepizza551.github.io/crossrealm/ogp.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#40E0D0" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg: #010103; 
            /* ガイド表示用にカードを最適化（スマホで扇状に並べやすいサイズ） */
            --card-w: clamp(70px, 18vw, 110px); 
            --card-h: calc(var(--card-w) * 1.4); 
            --border: rgba(212, 175, 15, 0.45);
        }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Exo 2', sans-serif; 
            overflow-x: hidden;
        }

        .bg-core { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .layer-grid { position: absolute; inset: -50%; background-image: linear-gradient(rgba(64, 224, 208, 0.08) 2px, transparent 2px), linear-gradient(90deg, rgba(64, 224, 208, 0.08) 2px, transparent 2px); background-size: 80px 80px; transform: perspective(1000px) rotateX(75deg); mask-image: radial-gradient(circle at center, black, transparent 80%); }

        /* === カードマテリアル === */
        .card-wrapper-3d { width: var(--card-w); height: var(--card-h); perspective: 1000px; position: relative; margin: 0 auto; flex-shrink: 0; }
        .card-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1); border-radius: calc(var(--card-w)*0.02); cursor: pointer; }
        .card-content { position: absolute; inset: 0; transform-style: preserve-3d; pointer-events: none; overflow: hidden; border-radius: inherit; }

        .mat-steam { background: radial-gradient(circle at 50% 10%, var(--r-color-bright) 0%, #0d0400 100%); border: calc(var(--card-w)*0.046) solid #4a2f1c; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 2px 2px 4px rgba(255,255,255,0.15), inset -2px -2px 4px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.9); }
        .mat-fantasy { background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.85) 100%), radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%); border: calc(var(--card-w)*0.02) solid rgba(255,255,255,0.95); border-radius: 26% 6% !important; box-shadow: 0 0 30px var(--r-color-glow), inset 0 0 10px rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .mat-cyber { background: #000; clip-path: polygon(0 20%, 20% 0, 100% 0, 100% 80%, 80% 100%, 0 100%); box-shadow: inset 0 0 40px var(--r-color-dim); border-left: calc(var(--card-w)*0.03) solid var(--r-color); border-radius: 0 !important; }
        .mat-void-planet { background: radial-gradient(circle at 50% 50%, #fff4 0%, #000 100%); box-shadow: 0 0 30px #fff7, inset 0 0 50px #fff2; border-radius: 40% !important; }
        .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #000 100%); box-shadow: 0 0 25px #444, inset 0 0 50px #111; border-radius: 40% !important; }

        .card-info-top { position: absolute; top: 8%; left: 8%; padding: 4% 9%; background: #000; border-left: calc(var(--card-w)*0.04) solid var(--r-color); transform: translateZ(40px); z-index: 50; box-shadow: 0 4px 10px #000; border-radius: 2px; }
        .card-info-top span { font-size: calc(var(--card-w)*0.065); font-weight: 900; letter-spacing: 1px; color: #fff; }
        .mat-void-planet .card-info-top { background: #fff; border-left-color: #fff; box-shadow: 0 0 10px #fff; }
        .mat-void-planet .card-info-top span { color: #000; }

        .card-icon-overload { position: absolute; top: 58%; left: 50%; width: 56%; height: 56%; transform: translate(-50%, -50%) translateZ(50px); z-index: 45; filter: drop-shadow(0 0 3px rgba(0,0,0,0.9)) drop-shadow(0 0 8px var(--r-color)); }
        .card-footer-peak { position: absolute; bottom: 0; width: 100%; padding: 25% 0 10%; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 40%, transparent 100%); text-align: center; color: #fff; z-index: 50; transform: translateZ(35px); text-shadow: 0 0 8px var(--r-color), 0 0 4px #000; letter-spacing: 2px; font-weight: 900; font-size: calc(var(--card-w)*0.13); }

        .special-badge-base { position: absolute; top: 6px; right: 6px; background: rgba(200, 0, 0, 0.9); border: 1px solid rgba(255, 100, 100, 0.8); color: #fff; font-size: 7px; font-weight: 900; padding: 2px 4px; text-align: center; border-radius: 4px; transform: translateZ(50px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 200; line-height: 1.1; letter-spacing: 0.5px; display: flex; flex-direction: column; justify-content: center; }

        .guide-section { background: rgba(0,0,0,0.7); border: 1px solid rgba(64,224,208,0.2); border-radius: 12px; padding: 24px; margin-bottom: 32px; backdrop-filter: blur(10px); }
        .guide-title { font-family: 'Orbitron'; font-weight: 900; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-bottom: 20px; }
        
        .not-playable { opacity: 0.4 !important; filter: brightness(0.6) grayscale(60%) !important; transform: translateY(5px) scale(0.9) !important; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#8B4513', bright: '#FF8C00', glow: 'rgba(212,175,55,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#B22222', bright: '#FF3131', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#00BFFF', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#9D00FF', bright: '#E2B0FF', glow: 'rgba(157,0,255,1)', dim: 'rgba(157,0,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#32CD32', bright: '#ADFF2F', glow: 'rgba(50,205,50,1)', dim: 'rgba(50,205,50,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#FFFFFF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#999999', bright: '#CCCCCC', glow: 'rgba(150,150,150,1)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const NEXT_MAP = { GEAR: ['GEAR','ICEAGE'], ICEAGE: ['FOUNTAIN','BATTERY'], FOUNTAIN: ['FOUNTAIN','BATTERY'], BATTERY: ['MACHINE','ARCHIVE'], MACHINE: ['MACHINE','ARCHIVE'], ARCHIVE: ['GEAR','ICEAGE'] };

        const IconRenderer = ({ r, spec, className }) => {
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: spec ? 4 : 2, strokeLinecap: "round", className: className || "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardView = ({ realmKey, isSpecial, playable = true, onClick }) => {
            const rData = REALMS[realmKey];
            const cardRef = useRef(null);
            const [isHovered, setIsHovered] = useState(false);

            let specialLabel = "";
            if (isSpecial) {
                if (realmKey === 'GEAR') specialLabel = "DRAW 2";
                else if (realmKey === 'MACHINE') specialLabel = "REVERSE";
                else if (realmKey === 'FOUNTAIN') specialLabel = "LIMIT WILD";
                else if (realmKey === 'PLANET' || realmKey === 'RUINS') specialLabel = "WILD";
            }

            return (
                <div 
                    className={`card-wrapper-3d ${!playable ? 'not-playable' : ''}`} 
                    style={{ transform: isHovered && playable ? 'translateY(-10px)' : 'none', transition: '0.2s' }}
                    ref={cardRef} 
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    onClick={onClick}
                >
                    <div className={`card-3d mat-${rData.theme}`}>
                        <div className="card-content">
                            <div className="card-info-top"><span>{realmKey}</span></div>
                            <div className="card-icon-overload" style={{ color: rData.bright }}><IconRenderer r={realmKey} spec={isSpecial} /></div>
                            <div className={`card-footer-peak font-['${rData.font}']`}>{rData.n}</div>
                            
                            {isSpecial && (
                                <div className="special-badge-base">
                                    {specialLabel.split(' ').map((word, i) => <div key={i}>{word}</div>)}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 円形のサイクル・ダイアグラム・コンポーネント
        const CycleDiagram = () => {
            const items = [
                { id: 'GEAR', n: '歯車', color: '#FF8C00' },
                { id: 'ICEAGE', n: '氷河期', color: '#ADFCFF' },
                { id: 'FOUNTAIN', n: '噴水', color: '#00BFFF' },
                { id: 'BATTERY', n: '電池', color: '#ADFF2F' },
                { id: 'MACHINE', n: '機械', color: '#E2B0FF' },
                { id: 'ARCHIVE', n: '古文書', color: '#FF3131' }
            ];
            return (
                <div className="relative w-64 h-64 md:w-80 md:h-80 mx-auto my-12 mt-16 mb-16">
                    <svg className="absolute inset-0 w-full h-full overflow-visible" viewBox="0 0 100 100">
                        <defs>
                            <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L6,3 z" fill="rgba(255,255,255,0.4)" />
                            </marker>
                        </defs>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="0.5" strokeDasharray="2 2" />
                        {items.map((_, i) => {
                            const r = 40;
                            const startAngle = (i * 60 - 90 + 16) * (Math.PI / 180);
                            const endAngle = (i * 60 - 90 + 44) * (Math.PI / 180);
                            const x1 = 50 + r * Math.cos(startAngle);
                            const y1 = 50 + r * Math.sin(startAngle);
                            const x2 = 50 + r * Math.cos(endAngle);
                            const y2 = 50 + r * Math.sin(endAngle);
                            
                            return (
                                <path key={`arrow-${i}`} d={`M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="1" markerEnd="url(#arrow)" />
                            );
                        })}
                    </svg>
                    
                    {items.map((item, i) => {
                        const angle = (i * 60 - 90) * (Math.PI / 180);
                        const r = 40;
                        const left = 50 + r * Math.cos(angle);
                        const top = 50 + r * Math.sin(angle);
                        return (
                            <div key={item.id} className="absolute w-12 h-12 md:w-16 md:h-16 flex flex-col items-center justify-center rounded-full bg-black/80 border-2 backdrop-blur-sm" 
                                 style={{ left: `${left}%`, top: `${top}%`, transform: 'translate(-50%, -50%)', borderColor: item.color, boxShadow: `0 0 15px ${item.color}60`, zIndex: 10 }}>
                                <div className="w-4 h-4 md:w-6 md:h-6 mb-1 opacity-80" style={{color: item.color}}>
                                    <IconRenderer r={item.id} spec={false} />
                                </div>
                                <span className="text-[8px] md:text-[10px] font-black" style={{ color: item.color }}>{item.n}</span>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const [simField, setSimField] = useState({ k: 'GEAR', s: false });
            
            const simHand = [
                {k:'GEAR',s:false}, {k:'ICEAGE',s:false}, {k:'FOUNTAIN',s:false}, {k:'BATTERY',s:false}, {k:'MACHINE',s:false}, {k:'ARCHIVE',s:false},
                {k:'GEAR',s:true}, {k:'FOUNTAIN',s:true}, {k:'MACHINE',s:true}, {k:'PLANET',s:true}, {k:'RUINS',s:true}
            ];

            const canPlay = (c) => {
                const h = c.k; const f = simField.k;
                if (h === 'PLANET' || h === 'RUINS' || f === 'PLANET' || f === 'RUINS') return true;
                if (h === 'FOUNTAIN' && c.s) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                const transition = ['ICEAGE', 'BATTERY', 'ARCHIVE'];
                if (transition.includes(f) && f === h) return false;
                return f === h || (NEXT_MAP[f] && NEXT_MAP[f].includes(h));
            };

            return (
                <div className="min-h-screen relative py-12 px-4 md:px-8">
                    <div className="bg-core"><div className="layer-grid"/></div>
                    
                    <div className="max-w-4xl mx-auto relative z-10">
                        <header className="text-center mb-12">
                            <h1 className="text-3xl md:text-5xl font-black text-accent tracking-widest mb-4 drop-shadow-[0_0_15px_rgba(64,224,208,0.4)]" style={{fontFamily:'Orbitron'}}>INTERACTIVE GUIDE</h1>
                            <p className="text-white/60 tracking-[4px] text-sm font-bold uppercase">Cross Realm Rulebook</p>
                        </header>

                        <div className="guide-section">
                            <h2 className="guide-title text-xl md:text-2xl">1. 基本ルール (BASIC RULES)</h2>
                            <p className="text-sm md:text-base leading-relaxed text-white/80 mb-4">
                                手札のカードを場に出し、誰よりも早く手札を0枚にしたプレイヤーが勝利します。<br/>
                                場に出せるカードは、<strong>「場と同じ属性」</strong>または<strong>「サイクルの次の属性」</strong>のみです。<br/>
                                属性には「維持属性」と「遷移属性」があります。
                            </p>
                            <ul className="list-disc pl-5 text-sm md:text-base text-white/70 space-y-2">
                                <li><strong className="text-white">維持属性 (歯車・噴水・機械)</strong>: 同じ属性を重ねて出すことができます。</li>
                                <li><strong className="text-white">遷移属性 (氷河期・電池・古文書)</strong>: 同じ属性を重ねることはできず、必ず「次の属性」を出さなければなりません。</li>
                            </ul>
                        </div>

                        <div className="guide-section border-magic-purple">
                            <h2 className="guide-title text-magic-purple text-xl md:text-2xl border-magic-purple">2. サイクルシミュレーター</h2>
                            <p className="text-xs md:text-sm text-white/60 mb-8 text-center">
                                中央の「場のカード」に対して、下の「手札」のうち明るく光っているカードが出せます。<br/>
                                出せるカードをタップすると、それが新しい場のカードになります。
                            </p>
                            
                            <div className="bg-black/60 rounded-xl p-6 border border-white/10 mb-8">
                                <div className="text-center mb-8">
                                    <div className="text-accent text-sm font-bold tracking-widest mb-4 animate-pulse">現在の場</div>
                                    <CardView realmKey={simField.k} isSpecial={simField.s} playable={true} />
                                </div>
                                <div className="text-center text-white/50 text-xs mb-4 tracking-widest mt-12">あなたの手札</div>
                                <div className="flex flex-wrap justify-center gap-2 md:gap-4">
                                    {simHand.map((c, i) => (
                                        <CardView key={i} realmKey={c.k} isSpecial={c.s} playable={canPlay(c)} onClick={() => { if(canPlay(c)) setSimField(c); }} />
                                    ))}
                                </div>
                            </div>

                            <div className="text-center mt-10 mb-2">
                                <div className="text-accent text-sm font-bold tracking-widest">属性サイクル</div>
                            </div>
                            <CycleDiagram />
                        </div>

                        <div className="guide-section border-danger">
                            <h2 className="guide-title text-danger text-xl md:text-2xl border-danger">3. 特殊カード (SPECIAL CARDS)</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="GEAR" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-[#FF8C00] mb-2 text-lg">DRAW 2 (歯車)</h3>
                                        <p className="text-xs md:text-sm text-white/70">次のプレイヤーに2枚引かせます。引かされたプレイヤーは手番をスキップされます。<br/>※DRAW 2に対してDRAW 2を重ねて回避・累積させることはできません。</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="MACHINE" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-[#9D00FF] mb-2 text-lg">REVERSE (機械)</h3>
                                        <p className="text-xs md:text-sm text-white/70">手番の順番（サイクル）を逆回りに反転させます。<br/>2人プレイの場合は実質的に「もう一度自分のターン」になります。</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="FOUNTAIN" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-[#1E90FF] mb-2 text-lg">LIMIT WILD (噴水)</h3>
                                        <p className="text-xs md:text-sm text-white/70">いつでも出せるわけではなく、直前の場が「氷河期」か「噴水」の時のみ出せます。<br/>場に出た瞬間に、好きな属性に変化させることができます。</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="PLANET" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-white mb-2 text-lg">WILD (惑星・廃墟)</h3>
                                        <p className="text-xs md:text-sm text-white/70">いつでも無条件で場に出すことができる最強のカードです。<br/>場に出た瞬間に、好きな属性に変化させることができます。（惑星・廃墟の違いはイラストのみです）</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
