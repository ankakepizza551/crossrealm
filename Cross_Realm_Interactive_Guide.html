<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross Realm - Interactive Guide v3.0 SPECIAL</title>

    <!-- Discord OGP Tags -->
    <meta property="og:title" content="Cross Realm - Interactive Guide" />
    <meta property="og:description" content="Cross Realmの基本ルールや特殊カードの効果を、実際にカードをタップしながら学べるインタラクティブな公式ルールブック。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ankakepizza551.github.io/crossrealm/Cross_Realm_Interactive_Guide.html" />
    <meta property="og:image" content="https://ankakepizza551.github.io/crossrealm/ogp.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#40E0D0" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #40E0D0; --steam-gold: #D4AF37; --magic-purple: #8A2BE2; --danger: #FF4500; 
            --bg-deep: #05010a; 
            --card-w: clamp(70px, 18vw, 110px); 
            --card-h: calc(var(--card-w) * 1.4); 
        }
        body { 
            margin: 0; background: var(--bg-deep); color: white; font-family: 'Exo 2', sans-serif; 
            overflow-x: hidden; min-height: 100vh;
        }

        /* === アニメーション === */
        @keyframes gear-roll { 0% { transform: translate(var(--sx), var(--sy)) rotate(0deg); opacity: 0; } 5% { opacity: var(--op); } 95% { opacity: var(--op); } 100% { transform: translate(var(--ex), var(--ey)) rotate(var(--rot)); opacity: 0; } }
        @keyframes magic-mega-zoom { 0% { transform: translate(var(--sx), -30vh) scale(0.3) rotate(0deg); opacity: 0; } 20% { opacity: var(--op); } 80% { opacity: var(--op); } 100% { transform: translate(var(--ex), 120vh) scale(3.5) rotate(var(--rot)); opacity: 0; } }
        @keyframes rotate-inner { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-outer { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes pulse-shimmer { 0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); transform: scale(1); } 50% { opacity: 1; filter: drop-shadow(0 0 8px #fff) brightness(1.5); transform: scale(1.1); color: #fff; } }

        /* === 究極のカードエフェクトアニメーション === */
        @keyframes steam-rise-heavy {
            0% { transform: translateY(30%) translateX(var(--drift-start)) scale(0.5) rotate(0deg); opacity: 0; filter: blur(4px); }
            15% { opacity: 0.85; filter: blur(6px); }
            100% { transform: translateY(-130%) translateX(var(--drift-end)) scale(4) rotate(var(--rot)); opacity: 0; filter: blur(25px); }
        }
        @keyframes ripple-expand { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
        @keyframes cyber-glitch-color {
            0%, 94%, 100% { filter: none; transform: translate(0); }
            95% { filter: drop-shadow(-3px 0 #ff00ea) drop-shadow(3px 0 #00ffff); transform: translate(2px, -0.5px); }
            97% { filter: drop-shadow(2px 0 #ff0000) drop-shadow(-2px 0 #00ff00); transform: translate(-2px, 0.5px); }
            99% { filter: brightness(1.8); }
        }
        @keyframes cyber-scanline { from { transform: translateY(-100%); } to { transform: translateY(100%); } }
        @keyframes void-pulse-wave { 0%, 100% { transform: scale(1); opacity: 0.2; filter: blur(5px); } 50% { transform: scale(1.4); opacity: 0.5; filter: blur(12px); } }

        /* === 背景 === */
        .astral-canvas { 
            position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; 
            background: radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 60%), 
                        radial-gradient(circle at 80% 70%, rgba(64, 224, 208, 0.15) 0%, transparent 60%), var(--bg-deep); 
        }
        .matrix-code-canvas { position: absolute; inset: 0; z-index: 2; opacity: 0.4; pointer-events: none; mix-blend-mode: screen; }
        .grid-floor { position: absolute; bottom: -50px; width: 200%; height: 60%; left: -50%; background-image: linear-gradient(rgba(64,224,208,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(138,43,226,0.1) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(65deg); mask-image: radial-gradient(circle at center, black, transparent 80%); z-index: 3; }
        .flow-gear { position: absolute; top: 0; left: 0; animation-name: gear-roll; animation-timing-function: linear; animation-iteration-count: infinite; opacity: 0; z-index: 4; filter: drop-shadow(0 0 10px var(--glow-color)) drop-shadow(0 0 5px var(--glow-color)); }
        .flow-magic { position: absolute; top: 0; left: 0; animation-name: magic-mega-zoom; animation-timing-function: ease-in-out; animation-iteration-count: infinite; opacity: 0; z-index: 4; filter: drop-shadow(0 0 25px var(--glow-color)); }

        /* === カードコンテナ === */
        .card-anchor { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; position: relative; margin: 0 auto; flex-shrink: 0; z-index: 10; }
        .card-anchor:hover { transform: translateY(-10px) scale(1.05); z-index: 50; filter: brightness(1.2); }
        .card-surface { width: var(--card-w); height: var(--card-h); border-radius: 8px; position: relative; border: none; }
        .card-content { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: inherit; }

        /* === 究極のマテリアル統合 === */
        .mat-steam { background: radial-gradient(circle at 50% 0%, var(--r-color-bright) 0%, #1a0f05 100%); border: calc(var(--card-w)*0.065) solid #3d2616; box-shadow: 0 15px 40px rgba(0,0,0,0.8); overflow: hidden; }
        .steam-rivet { position: absolute; width: 5px; height: 5px; background: #2a1a10; border-radius: 50%; box-shadow: inset 1px 1px 2px #fff3, 1px 1px 4px #000; z-index: 10; }
        .r-tl { top: 4px; left: 4px; } .r-tr { top: 4px; right: 4px; } .r-bl { bottom: 4px; left: 4px; } .r-br { bottom: 4px; right: 4px; }
        .steam-particle { position: absolute; bottom: -20px; left: var(--l); width: 130%; height: 130%; background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.3) 50%, transparent 70%); border-radius: 50%; animation: steam-rise-heavy var(--d) infinite ease-in; animation-delay: var(--delay); mix-blend-mode: screen; }
        .steam-core-glow { position: absolute; bottom: -5px; left: 0; width: 100%; height: 20px; background: linear-gradient(to top, rgba(255,255,255,0.25), transparent); filter: blur(8px); z-index: 2; }
        
        .mat-fantasy { background: radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%); border: calc(var(--card-w)*0.02) solid rgba(255,255,255,0.9); border-radius: 30% 8% !important; box-shadow: 0 0 40px var(--r-color-glow); overflow: hidden; }
        .ripple { position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; border: 4px solid rgba(255,255,255,0.6); border-radius: 50%; animation: ripple-expand 4s infinite cubic-bezier(0.165, 0.84, 0.44, 1); animation-delay: var(--delay); opacity: 0; }
        .magic-circle-bg { position: absolute; top: 55%; left: 50%; width: 160%; height: 160%; transform: translate(-50%, -50%); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 1; animation: rotate-inner 25s linear infinite; }

        .mat-cyber { background: #000; border: none; clip-path: polygon(0 15%, 15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%); box-shadow: inset 0 0 80px var(--r-color-dim); border-left: calc(var(--card-w)*0.06) solid var(--r-color); animation: cyber-glitch-color 4s infinite; overflow: hidden; }
        .cyber-fx-scanline { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: linear-gradient(to bottom, transparent 0%, rgba(64,224,208,0.12) 50%, transparent 100%); background-size: 100% 50px; animation: cyber-scanline 1.6s linear infinite; }
        .cyber-circuit { position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0); background-size: 12px 12px; }

        .mat-void-planet, .mat-void-ruins { background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); border-radius: 50% !important; box-shadow: 0 0 30px #fff2; overflow: hidden; border: none; }
        .void-fluctuation { position: absolute; inset: 0; background: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 10px, rgba(255,255,255,0.04) 11px, rgba(255,255,255,0.04) 12px); animation: void-pulse-wave 8s infinite ease-in-out; }
        .void-singularity-ring { position: absolute; top: 50%; left: 50%; width: 120%; height: 120%; transform: translate(-50%, -50%); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 50%; }

        .card-info-top { position: absolute; top: 6%; left: 6%; padding: 3% 8%; background: #000; border-left: calc(var(--card-w)*0.04) solid var(--r-color); z-index: 50; border-radius: 1px; }
        .card-info-top span { font-size: calc(var(--card-w)*0.068); font-weight: 950; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .card-footer-peak { position: absolute; bottom: 0; width: 100%; padding: 25% 0 12%; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); text-align: center; color: #fff; z-index: 50; font-weight: 900; font-size: calc(var(--card-w)*0.16); text-shadow: 0 0 15px var(--r-color); }
        .special-badge-base { position: absolute; left: -8px; top: 38%; background: linear-gradient(90deg, #e60000, #800000); border: 1.5px solid #FFF; color: #FFF; font-size: calc(var(--card-w)*0.05); font-weight: 1000; padding: 4px 8px; text-align: center; border-radius: 3px 8px 8px 3px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 200; line-height: 1.1; text-transform: uppercase; letter-spacing: 0.5px; transform: rotate(-4deg); }

        /* ガイド用セクション (サイバーターミナル風) */
        .guide-section { background: rgba(10, 15, 35, 0.85); border: 1px solid rgba(64,224,208,0.2); border-radius: 12px; padding: 24px; margin-bottom: 32px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .guide-section::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .guide-title { font-family: 'Orbitron'; font-weight: 900; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: 24px; letter-spacing: 2px; }
        
        .not-playable { opacity: 0.4 !important; filter: brightness(0.6) grayscale(60%) !important; transform: translateY(5px) scale(0.9) !important; pointer-events: none; cursor: default; }
        .emblem-container { position: absolute; top: -50px; right: -50px; width: 300px; height: 300px; z-index: -1; opacity: 0.15; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const REALMS = {
            GEAR:    { n: '歯車', color: '#FF8C00', bright: '#FFD700', glow: 'rgba(255,140,0,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#FF3131', bright: '#FF6347', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN:{ n: '噴水', color: '#1E90FF', bright: '#87CEFA', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE:  { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#E2B0FF', bright: '#DDA0DD', glow: 'rgba(226,176,255,1)', dim: 'rgba(226,176,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#ADFF2F', bright: '#7FFF00', glow: 'rgba(173,255,47,1)', dim: 'rgba(173,255,47,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET:  { n: '惑星', color: '#FFFFFF', bright: '#F0F8FF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS:   { n: '廃墟', color: '#CCCCCC', bright: '#D3D3D3', glow: 'rgba(204,204,204,1)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const NEXT_MAP = { GEAR: ['GEAR','ICEAGE'], ICEAGE: ['FOUNTAIN','BATTERY'], FOUNTAIN: ['FOUNTAIN','BATTERY'], BATTERY: ['MACHINE','ARCHIVE'], MACHINE: ['MACHINE','ARCHIVE'], ARCHIVE: ['GEAR','ICEAGE'] };

        // === SE再生機能 ===
        let audioCtx = null;
        const playSE = () => {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.type = 'square';
                o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            } catch (e) {}
        };

        const ComplexEmblem = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible">
                <defs><filter id="emblem-glow"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter></defs>
                <g filter="url(#emblem-glow)">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="var(--accent)" strokeWidth="0.8" strokeDasharray="4 8 12 4" opacity="0.6" style={{animation: 'rotate-outer 20s linear infinite', transformOrigin: 'center'}} />
                    <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" strokeWidth="0.3" strokeDasharray="2 2" opacity="0.4" style={{animation: 'rotate-inner 15s linear infinite', transformOrigin: 'center'}} />
                    <circle cx="50" cy="50" r="38" fill="none" stroke="var(--magic-purple)" strokeWidth="1" strokeDasharray="1 4" opacity="0.8" style={{animation: 'rotate-inner 30s linear infinite', transformOrigin: 'center'}} />
                    <path d="M50 16 L79.4 33 L79.4 67 L50 84 L20.6 67 L20.6 33 Z" fill="none" stroke="var(--steam-gold)" strokeWidth="1.5" opacity="0.5" style={{animation: 'rotate-inner 45s linear infinite', transformOrigin: 'center'}} />
                    <path d="M50 20 L76 35 L76 65 L50 80 L24 65 L24 35 Z" fill="none" stroke="var(--steam-gold)" strokeWidth="0.5" opacity="0.3" style={{animation: 'rotate-outer 55s linear infinite', transformOrigin: 'center'}} />
                    <path d="M36 36 L64 64 M64 36 L36 64" stroke="#fff" strokeWidth="4" strokeLinecap="square" opacity="0.9" />
                    <text x="50" y="54" fill="var(--accent)" fontSize="10" fontWeight="1000" font-family="Orbitron" textAnchor="middle">X</text>
                </g>
            </svg>
        );

        const IconRenderer = ({ r, spec, className }) => {
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: spec ? 4 : 2, strokeLinecap: "round", className: className || "w-full h-full" };
            switch (r) {
                case 'GEAR': return <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" /></svg>;
                case 'ARCHIVE': return <svg {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15Z" /></svg>;
                case 'FOUNTAIN': return <svg {...p}><path d="M12 22a9.7 9.7 0 0 1-7.1-3 7 7 0 0 1-1.4-8.4l6.8-9.4a2 2 0 0 1 3.4 0l6.8 9.4a7 7 0 0 1-1.4 8.4A9.7 9.7 0 0 1 12 22z" /></svg>;
                case 'ICEAGE': return <svg {...p}><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7" /></svg>;
                case 'MACHINE': return <svg {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><path d="M9 9h6v6H9z" /></svg>;
                case 'BATTERY': return <svg {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2" /><path d="M22 11v2" /></svg>;
                case 'PLANET': return <svg {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
                case 'RUINS': return <svg {...p}><path d="M3 21h18M5 21V10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4" /></svg>;
                default: return null;
            }
        };

        const CardOrnaments = ({ theme }) => {
            if (theme === 'steam') return (
                <React.Fragment>
                    <div className="steam-rivet r-tl" /><div className="steam-rivet r-tr" /><div className="steam-rivet r-bl" /><div className="steam-rivet r-br" />
                    <div className="steam-core-glow" />
                    <div className="steam-particle" style={{ '--l': '-5%', '--d': '2.5s', '--delay': '0s', '--drift-start': '0px', '--drift-end': '30px', '--rot': '90deg' }} />
                    <div className="steam-particle" style={{ '--l': '35%', '--d': '3.2s', '--delay': '1.2s', '--drift-start': '10px', '--drift-end': '-20px', '--rot': '-45deg' }} />
                    <div className="steam-particle" style={{ '--l': '75%', '--d': '2.8s', '--delay': '0.5s', '--drift-start': '-10px', '--drift-end': '25px', '--rot': '120deg' }} />
                </React.Fragment>
            );
            if (theme === 'fantasy') return (
                <React.Fragment>
                    <div className="magic-circle-bg" /><div className="ripple" style={{ '--delay': '0s' }} /><div className="ripple" style={{ '--delay': '2s' }} />
                </React.Fragment>
            );
            if (theme === 'cyber') return (
                <React.Fragment><div className="cyber-circuit" /><div className="cyber-fx-scanline" /></React.Fragment>
            );
            if (theme.includes('void')) return (
                <React.Fragment><div className="void-singularity-ring" /><div className="void-fluctuation" /></React.Fragment>
            );
            return null;
        };

        const CardView = ({ realmKey, isSpecial, playable = true, onClick }) => {
            const rData = REALMS[realmKey];
            
            let specialLabel = "";
            if (isSpecial) {
                if (realmKey === 'GEAR') specialLabel = "DRAW 2";
                else if (realmKey === 'MACHINE') specialLabel = "REVERSE";
                else if (realmKey === 'FOUNTAIN') specialLabel = "LIMIT WILD";
                else if (realmKey === 'PLANET' || realmKey === 'RUINS') specialLabel = "WILD";
            }

            return (
                <div className={`card-anchor ${!playable ? 'not-playable' : ''}`} onClick={onClick}>
                    <div className={`card-surface mat-${rData.theme}`} 
                         style={{ '--r-color': rData.color, '--r-color-bright': rData.bright, '--r-color-glow': rData.glow, '--r-color-dim': rData.dim || 'rgba(0,0,0,0.5)' }}>
                        <CardOrnaments theme={rData.theme} />
                        <div className="card-content">
                            <div className="card-info-top"><span>{realmKey}</span></div>
                            <div className="card-icon-overload" style={{ color: rData.bright, filter: `drop-shadow(0 0 10px ${rData.glow})`, position: 'absolute', top: '55%', left: '50%', transform: 'translate(-50%, -50%)', width: '55%', height: '55%' }}>
                                <IconRenderer r={realmKey} spec={isSpecial} />
                            </div>
                            <div className={`card-footer-peak font-['${rData.font}']`}>{rData.n}</div>
                            {isSpecial && <div className="special-badge-base">{specialLabel.split(' ').map((word, i) => <div key={i}>{word}</div>)}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const CycleDiagram = () => {
            const items = [
                { id: 'GEAR', n: '歯車', color: '#FF8C00' },
                { id: 'ICEAGE', n: '氷河期', color: '#00F3FF' },
                { id: 'FOUNTAIN', n: '噴水', color: '#1E90FF' },
                { id: 'BATTERY', n: '電池', color: '#ADFF2F' },
                { id: 'MACHINE', n: '機械', color: '#E2B0FF' },
                { id: 'ARCHIVE', n: '古文書', color: '#FF3131' }
            ];
            return (
                <div className="relative w-64 h-64 md:w-80 md:h-80 mx-auto mt-16 mb-12">
                    <svg className="absolute inset-0 w-full h-full overflow-visible" viewBox="0 0 100 100">
                        <defs>
                            <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L6,3 z" fill="rgba(255,255,255,0.4)" />
                            </marker>
                        </defs>
                        <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="0.5" strokeDasharray="3 3" />
                        {items.map((_, i) => {
                            const r = 38;
                            const startAngle = (i * 60 - 90 + 16) * (Math.PI / 180);
                            const endAngle = (i * 60 - 90 + 44) * (Math.PI / 180);
                            const x1 = 50 + r * Math.cos(startAngle);
                            const y1 = 50 + r * Math.sin(startAngle);
                            const x2 = 50 + r * Math.cos(endAngle);
                            const y2 = 50 + r * Math.sin(endAngle);
                            return <path key={`arrow-${i}`} d={`M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="1" markerEnd="url(#arrow)" />;
                        })}
                    </svg>
                    
                    {items.map((item, i) => {
                        const angle = (i * 60 - 90) * (Math.PI / 180);
                        const r = 38;
                        const left = 50 + r * Math.cos(angle);
                        const top = 50 + r * Math.sin(angle);
                        return (
                            <div key={item.id} className="absolute w-12 h-12 md:w-16 md:h-16 flex flex-col items-center justify-center rounded-full bg-black/80 border-2 backdrop-blur-sm" 
                                 style={{ left: `${left}%`, top: `${top}%`, transform: 'translate(-50%, -50%)', borderColor: item.color, boxShadow: `0 0 15px ${item.color}60`, zIndex: 10 }}>
                                <div className="w-4 h-4 md:w-6 md:h-6 mb-1 opacity-80" style={{color: item.color}}>
                                    <IconRenderer r={item.id} spec={false} />
                                </div>
                                <span className="text-[8px] md:text-[10px] font-black" style={{ color: item.color }}>{item.n}</span>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const GearSVG = ({ color }) => (
            <svg viewBox="0 0 100 100" className="w-full h-full"><defs><linearGradient id={`grad-gear-${color}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{stopColor: color, stopOpacity: 1}} /><stop offset="100%" style={{stopColor: '#4b2f1c', stopOpacity: 1}} /></linearGradient></defs><path fill={`url(#grad-gear-${color})`} d="M100 56.5v-13l-12.7-2.1c-1.1-4.5-3-8.6-5.4-12.3l7.4-10.4-9.2-9.2-10.4 7.4c-3.7-2.4-7.8-4.3-12.3-5.4L55.3 0h-13l-2.1 12.7c-4.5 1.1-8.6 3-12.3 5.4l-10.4-7.4-9.2 9.2 7.4 10.4c-2.4 3.7-4.3 7.8-5.4 12.3L0 43.5v13l12.7 2.1c1.1 4.5 3 8.6 5.4 12.3l-7.4 10.4 9.2 9.2 10.4-7.4c3.7 2.4 7.8 4.3 12.3 5.4l2.1 12.7h13l2.1-12.7c4.5-1.1 8.6-3 12.3-5.4l10.4 7.4 9.2-9.2-7.4-10.4c2.4-3.7 4.3-7.8 5.4-12.3l12.7-2.1zM50 71c-11.6 0-21-9.4-21-21s9.4-21 21-21 21 9.4 21 21-9.4 21-21 21z" /><circle cx="50" cy="50" r="12" fill="#000" /></svg>
        );
        const MagicCircleSVG = ({ color }) => (
            <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible"><defs><filter id="magic-glow"><feGaussianBlur stdDeviation="2" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter></defs><g filter="url(#magic-glow)"><g style={{ animation: 'rotate-outer 10s linear infinite', transformOrigin: 'center' }}><circle cx="50" cy="50" r="48" fill="none" stroke={color} strokeWidth="1.5" strokeDasharray="10 5" /></g><g style={{ animation: 'rotate-inner 15s linear infinite', transformOrigin: 'center' }}><circle cx="50" cy="50" r="35" fill="none" stroke={color} strokeWidth="1" /><path d="M50 15 L80 70 L20 70 Z M50 85 L20 30 L80 30 Z" fill="none" stroke={color} strokeWidth="1" /><circle cx="50" cy="50" r="10" fill="none" stroke={color} strokeWidth="2" /></g></g></svg>
        );

        const MatrixSequentialRain = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); let animationId;
                const updateSize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                updateSize();
                const fontSize = 16; const columns = Math.floor(canvas.width / fontSize);
                const heads = new Array(columns).fill(0).map(() => Math.floor(Math.random() * (canvas.height / fontSize)));
                const rainColors = ['#FF8C00', '#FF3131', '#00BFFF', '#ADFCFF', '#E2B0FF', '#ADFF2F', '#FFFFFF'];

                const draw = () => {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = `900 ${fontSize}px Orbitron`;
                    for (let i = 0; i < columns; i++) {
                        if (Math.random() > 0.96) {
                            const x = i * fontSize; const y = heads[i] * fontSize;
                            ctx.fillStyle = rainColors[Math.floor(Math.random() * rainColors.length)];
                            ctx.fillText(Math.floor(Math.random()*2).toString(), x, y);
                            heads[i]++; if (heads[i] * fontSize > canvas.height && Math.random() > 0.98) heads[i] = 0;
                        }
                    }
                    animationId = requestAnimationFrame(draw);
                };
                draw();
                window.addEventListener('resize', updateSize);
                return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', updateSize); };
            }, []);
            return <canvas ref={canvasRef} className="matrix-code-canvas" />;
        };

        const AstralBackground = () => {
            const items = useMemo(() => {
                const arr = [];
                for(let i=0; i<6; i++) arr.push({ id: `m${i}`, type: 'magic', color: i%2?'#00F3FF':'#1E90FF', sx: `${(Math.random()*80)-10}vw`, ex: `${(Math.random()*80)-10}vw`, delay: `${Math.random()*20}s`, dur: `${20+Math.random()*15}s`, op: 0.5, rot: `${360+Math.random()*720}deg` });
                
                for(let i=0; i<15; i++) {
                    const isLtr = Math.random() > 0.5;
                    const sx = isLtr ? '-300px' : 'calc(100vw + 300px)';
                    const ex = isLtr ? 'calc(100vw + 300px)' : '-300px';
                    const sy = `${Math.random() * 90}vh`;
                    const rot = isLtr ? `${360+Math.random()*720}deg` : `-${360+Math.random()*720}deg`;
                    const size = 80 + Math.random() * 120;
                    arr.push({ 
                        id: `g${i}`, type: 'gear', color: i%3===0 ? '#8B4513' : (i%3===1 ? '#B22222' : '#555555'), 
                        sx, ex, sy, ey: sy, size: `${size}px`,
                        delay: `${Math.random()*20}s`, dur: `${20+Math.random()*30}s`, op: 0.3 + Math.random()*0.4, rot: rot 
                    });
                }
                return arr;
            }, []);
            
            return (
                <div className="astral-canvas">
                    <MatrixSequentialRain />
                    <div className="grid-floor" />
                    {items.map(it => {
                        if (it.type === 'gear') {
                            return (
                                <div key={it.id} className="flow-gear" style={{ '--sx': it.sx, '--ex': it.ex, '--sy': it.sy, '--ey': it.ey, '--op': it.op, '--rot': it.rot, '--glow-color': it.color, width: it.size, height: it.size, animationDelay: it.delay, animationDuration: it.dur }}>
                                    <GearSVG color={it.color} />
                                </div>
                            );
                        } else {
                            return (
                                <div key={it.id} className="flow-magic" style={{ '--sx': it.sx, '--ex': it.ex, '--op': it.op, '--rot': it.rot, '--glow-color': it.color, width: '150px', height: '150px', animationDelay: it.delay, animationDuration: it.dur }}>
                                    <MagicCircleSVG color={it.color} />
                                </div>
                            );
                        }
                    })}
                </div>
            );
        };

        const App = () => {
            const [simField, setSimField] = useState({ k: 'GEAR', s: false });
            
            const simHand = [
                {k:'GEAR',s:false}, {k:'ICEAGE',s:false}, {k:'FOUNTAIN',s:false}, {k:'BATTERY',s:false}, {k:'MACHINE',s:false}, {k:'ARCHIVE',s:false},
                {k:'GEAR',s:true}, {k:'FOUNTAIN',s:true}, {k:'MACHINE',s:true}, {k:'PLANET',s:true}, {k:'RUINS',s:true}
            ];

            const canPlay = (c) => {
                const h = c.k; const f = simField.k;
                if (h === 'PLANET' || h === 'RUINS' || f === 'PLANET' || f === 'RUINS') return true;
                if (h === 'FOUNTAIN' && c.s) return (f === 'ICEAGE' || f === 'FOUNTAIN');
                const transition = ['ICEAGE', 'BATTERY', 'ARCHIVE'];
                if (transition.includes(f) && f === h) return false;
                return f === h || (NEXT_MAP[f] && NEXT_MAP[f].includes(h));
            };

            return (
                <div className="min-h-screen relative py-12 px-4 md:px-8">
                    <AstralBackground />
                    
                    <div className="max-w-4xl mx-auto relative z-10">
                        <header className="text-center mb-12">
                            <div className="emblem-container"><ComplexEmblem /></div>
                            <h1 className="text-3xl md:text-5xl font-black text-accent tracking-widest mb-4 drop-shadow-[0_0_15px_rgba(64,224,208,0.4)]" style={{fontFamily:'Orbitron'}}>INTERACTIVE GUIDE</h1>
                            <p className="text-white/60 tracking-[4px] text-sm font-bold uppercase bg-black/50 inline-block px-6 py-2 rounded-full border border-white/20">Cross Realm Rulebook v3.0</p>
                        </header>

                        <div className="guide-section">
                            <h2 className="guide-title text-xl md:text-2xl">1. 基本ルール (BASIC RULES)</h2>
                            <p className="text-sm md:text-base leading-relaxed text-white/80 mb-4">
                                手札のカードを場に出し、誰よりも早く手札を0枚にしたプレイヤーが勝利します。<br/>
                                場に出せるカードは、<strong>「場と同じ属性」</strong>または<strong>「サイクルの次の属性」</strong>のみです。<br/>
                                属性には「維持属性」と「遷移属性」があります。
                            </p>
                            <ul className="list-disc pl-5 text-sm md:text-base text-white/70 space-y-2">
                                <li><strong className="text-white">維持属性 (歯車・噴水・機械)</strong>: 同じ属性を重ねて出すことができます。</li>
                                <li><strong className="text-white">遷移属性 (氷河期・電池・古文書)</strong>: 同じ属性を重ねることはできず、必ず「次の属性」を出さなければなりません。</li>
                            </ul>
                        </div>

                        <div className="guide-section border-magic-purple">
                            <h2 className="guide-title text-magic-purple text-xl md:text-2xl border-magic-purple">2. サイクルシミュレーター</h2>
                            <p className="text-xs md:text-sm text-white/60 mb-8 text-center">
                                中央の「場のカード」に対して、下の「手札」のうち明るく光っているカードが出せます。<br/>
                                出せるカードをタップすると、それが新しい場のカードになります。
                            </p>
                            
                            <div className="bg-[#05010a]/90 rounded-xl p-6 border border-white/10 mb-8 shadow-[0_0_30px_rgba(0,0,0,0.8)] backdrop-blur-md">
                                <div className="text-center mb-8 flex flex-col items-center">
                                    <div className="text-accent text-sm font-bold tracking-widest mb-4 animate-[pulse-shimmer_1.5s_infinite]">現在の場</div>
                                    <CardView realmKey={simField.k} isSpecial={simField.s} playable={true} />
                                </div>
                                <div className="text-center text-white/50 text-xs mb-4 tracking-widest mt-12">あなたの手札</div>
                                <div className="flex flex-wrap justify-center gap-2 md:gap-4">
                                    {simHand.map((c, i) => (
                                        <CardView key={i} realmKey={c.k} isSpecial={c.s} playable={canPlay(c)} onClick={() => { if(canPlay(c)) { playSE(); setSimField(c); } }} />
                                    ))}
                                </div>
                            </div>

                            <div className="text-center mt-10 mb-2">
                                <div className="text-accent text-sm font-bold tracking-widest">属性サイクル図</div>
                            </div>
                            <CycleDiagram />
                        </div>

                        <div className="guide-section border-danger">
                            <h2 className="guide-title text-danger text-xl md:text-2xl border-danger">3. 特殊カード (SPECIAL CARDS)</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="GEAR" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-[#FF8C00] mb-2 text-lg">DRAW 2 (歯車)</h3>
                                        <p className="text-xs md:text-sm text-white/70">次のプレイヤーに2枚引かせます。引かされたプレイヤーは手番をスキップされます。<br/>※DRAW 2に対してDRAW 2を重ねて回避・累積させることはできません。</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="MACHINE" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-[#E2B0FF] mb-2 text-lg">REVERSE (機械)</h3>
                                        <p className="text-xs md:text-sm text-white/70">手番の順番（サイクル）を逆回りに反転させます。<br/>2人プレイの場合は実質的に「もう一度自分のターン」になります。</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="FOUNTAIN" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-[#00BFFF] mb-2 text-lg">LIMIT WILD (噴水)</h3>
                                        <p className="text-xs md:text-sm text-white/70">いつでも出せるわけではなく、直前の場が「氷河期」か「噴水」の時のみ出せます。<br/>場に出た瞬間に、好きな属性に変化させることができます。</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-center">
                                    <CardView realmKey="PLANET" isSpecial={true} />
                                    <div>
                                        <h3 className="font-bold text-white mb-2 text-lg">WILD (惑星・廃墟)</h3>
                                        <p className="text-xs md:text-sm text-white/70">いつでも無条件で場に出すことができる最強のカードです。<br/>場に出た瞬間に、好きな属性に変化させることができます。（惑星・廃墟の違いはイラストのみです）</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
