<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross Realm - Interactive Guide</title>
    <meta name="apple-mobile-web-app-title" content="Cross Realm Guide">
    <meta name="application-name" content="Cross Realm Guide">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #40E0D0;
            --steam-gold: #D4AF37;
            --magic-purple: #8A2BE2;
            --danger: #FF4500;
            --bg-deep: #05010a;
            --card-w: clamp(60px, 18vw, 90px);
            --card-h: calc(var(--card-w) * 1.4);
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === アニメーション === */
        @keyframes flow-border-nova {
            0% {
                border-color: var(--steam-gold);
                box-shadow: 0 0 15px var(--steam-gold);
            }

            33% {
                border-color: var(--magic-purple);
                box-shadow: 0 0 15px var(--magic-purple);
            }

            66% {
                border-color: var(--accent);
                box-shadow: 0 0 15px var(--accent);
            }

            100% {
                border-color: var(--steam-gold);
                box-shadow: 0 0 15px var(--steam-gold);
            }
        }

        @keyframes rotate-inner {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotate-outer {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes logo-shine {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes pulse-shimmer {

            0%,
            100% {
                opacity: 0.6;
                filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5));
                transform: scale(1);
            }

            50% {
                opacity: 1;
                filter: drop-shadow(0 0 8px #fff) brightness(1.5);
                transform: scale(1.1);
                color: #fff;
            }
        }

        /* === カードエフェクト === */
        @keyframes steam-rise-heavy {
            0% {
                transform: translateY(30%) translateX(var(--drift-start)) scale(0.5) rotate(0deg);
                opacity: 0;
                filter: blur(4px);
            }

            15% {
                opacity: 0.85;
                filter: blur(6px);
            }

            100% {
                transform: translateY(-130%) translateX(var(--drift-end)) scale(4) rotate(var(--rot));
                opacity: 0;
                filter: blur(15px);
            }
        }

        @keyframes ripple-expand {
            0% {
                transform: translate(-50%, -50%) scale(0.1);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
            }
        }

        @keyframes cyber-glitch-color {

            0%,
            94%,
            100% {
                filter: none;
                transform: translate(0);
            }

            95% {
                filter: drop-shadow(-3px 0 #ff00ea) drop-shadow(3px 0 #00ffff);
                transform: translate(2px, -0.5px);
            }

            97% {
                filter: drop-shadow(2px 0 #ff0000) drop-shadow(-2px 0 #00ff00);
                transform: translate(-2px, 0.5px);
            }

            99% {
                filter: brightness(1.8);
            }
        }

        @keyframes cyber-scanline {
            from {
                transform: translateY(-100%);
            }

            to {
                transform: translateY(100%);
            }
        }

        @keyframes void-pulse-wave {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.2;
                filter: blur(5px);
            }

            50% {
                transform: scale(1.4);
                opacity: 0.5;
                filter: blur(12px);
            }
        }

        /* 背景 */
        @keyframes gear-roll {
            0% {
                transform: translate(var(--sx), var(--sy)) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: var(--op);
            }

            95% {
                opacity: var(--op);
            }

            100% {
                transform: translate(var(--ex), var(--ey)) rotate(var(--rot));
                opacity: 0;
            }
        }

        @keyframes magic-mega-zoom {
            0% {
                transform: translate(var(--sx), -30vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: var(--op);
            }

            80% {
                opacity: var(--op);
            }

            100% {
                transform: translate(var(--ex), 120vh) scale(3.5) rotate(var(--rot));
                opacity: 0;
            }
        }

        .astral-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.2) 0%, transparent 60%), radial-gradient(circle at 80% 70%, rgba(64, 224, 208, 0.15) 0%, transparent 60%), var(--bg-deep);
        }

        .matrix-code-canvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.5;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .flow-gear {
            position: absolute;
            top: 0;
            left: 0;
            animation-name: gear-roll;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            opacity: 0;
            z-index: 3;
            filter: drop-shadow(0 0 10px var(--glow-color));
        }

        .flow-magic {
            position: absolute;
            top: 0;
            left: 0;
            animation-name: magic-mega-zoom;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            opacity: 0;
            z-index: 3;
            filter: drop-shadow(0 0 25px var(--glow-color));
        }

        /* === ロゴエリア === */
        .top-logo-area {
            position: relative;
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1rem;
        }

        .emblem-bg-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 240px;
            height: 240px;
            z-index: 1;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.9;
        }

        .logo-text-layer {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .main-logo-text {
            font-family: 'Cinzel', serif;
            font-weight: 950;
            font-size: clamp(2.5rem, 10vw, 3.6rem);
            line-height: 0.85;
            background: linear-gradient(90deg, #fff, var(--steam-gold), #fff, var(--magic-purple), #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logo-shine 6s linear infinite;
            letter-spacing: 12px;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 1));
        }

        .guide-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem 6rem;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        /* カード装飾 */
        .card-content {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: inherit;
        }

        .mat-steam {
            background: radial-gradient(circle at 50% 0%, var(--r-color-bright) 0%, #1a0f05 100%);
            border: calc(var(--card-w)*0.065) solid #3d2616;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .steam-rivet {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #2a1a10;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #fff3, 1px 1px 4px #000;
            z-index: 10;
        }

        .r-tl {
            top: 4px;
            left: 4px;
        }

        .r-tr {
            top: 4px;
            right: 4px;
        }

        .r-bl {
            bottom: 4px;
            left: 4px;
        }

        .r-br {
            bottom: 4px;
            right: 4px;
        }

        /* === アニメーション・エフェクト === */
        @keyframes screen-shake {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            20% {
                transform: translate(-4px, -3px) rotate(-1deg);
            }

            40% {
                transform: translate(4px, 2px) rotate(1deg);
            }

            60% {
                transform: translate(-2px, 4px) rotate(-1deg);
            }

            80% {
                transform: translate(3px, -2px) rotate(1deg);
            }
        }

        .shake-active {
            animation: screen-shake 0.3s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes cutin-slide {
            0% {
                transform: skewX(-15deg) translateX(-100%);
                opacity: 0;
            }

            10% {
                transform: skewX(-15deg) translateX(0);
                opacity: 1;
            }

            85% {
                transform: skewX(-15deg) translateX(0);
                opacity: 1;
            }

            100% {
                transform: skewX(-15deg) translateX(100%);
                opacity: 0;
            }
        }

        .cutin-container {
            position: fixed;
            top: 40%;
            left: -10%;
            width: 120%;
            z-index: 9000;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cutin-bar {
            background: rgba(0, 0, 0, 0.85);
            border-top: 4px solid var(--c);
            border-bottom: 4px solid var(--c);
            padding: 15px 0;
            width: 100%;
            animation: cutin-slide 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px var(--c);
            backdrop-filter: blur(10px);
        }

        .cutin-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 8vw, 3rem);
            font-weight: 1000;
            color: var(--c);
            text-shadow: 0 0 20px var(--c), 0 0 10px #fff;
            letter-spacing: 4px;
            transform: skewX(15deg);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .steam-particle {
            position: absolute;
            bottom: -20px;
            left: var(--l);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
            border-radius: 50%;
            animation: steam-rise-heavy var(--d) infinite ease-in;
            animation-delay: var(--delay);
            mix-blend-mode: screen;
        }

        .steam-core-glow {
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.25), transparent);
            filter: blur(8px);
            z-index: 2;
        }

        .mat-fantasy {
            background: radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%);
            border: calc(var(--card-w)*0.02) solid rgba(255, 255, 255, 0.9);
            border-radius: 35% 10% !important;
            box-shadow: 0 0 30px var(--r-color-glow);
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: ripple-expand 4s infinite cubic-bezier(0.165, 0.84, 0.44, 1);
            animation-delay: var(--delay);
            opacity: 0;
        }

        .magic-circle-bg {
            position: absolute;
            top: 55%;
            left: 50%;
            width: 140px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            z-index: 1;
            animation: rotate-inner 25s linear infinite;
        }

        .mat-cyber {
            background: #000;
            border: none;
            clip-path: polygon(0 15%, 15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
            box-shadow: inset 0 0 60px var(--r-color-dim);
            border-left: calc(var(--card-w)*0.06) solid var(--r-color);
            animation: cyber-glitch-color 4s infinite;
            overflow: hidden;
        }

        .cyber-fx-scanline {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: linear-gradient(to bottom, transparent 0%, rgba(64, 224, 208, 0.12) 50%, transparent 100%);
            background-size: 100% 50px;
            animation: cyber-scanline 1.6s linear infinite;
        }

        .cyber-circuit {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.06) 1px, transparent 0);
            background-size: 12px 12px;
        }

        .mat-void-planet,
        .mat-void-ruins {
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            border-radius: 50% !important;
            box-shadow: 0 0 30px #fff2;
            overflow: hidden;
            border: none;
        }

        .void-fluctuation {
            position: absolute;
            inset: 0;
            background: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 10px, rgba(255, 255, 255, 0.04) 11px, rgba(255, 255, 255, 0.04) 12px);
            animation: void-pulse-wave 8s infinite ease-in-out;
        }

        .void-singularity-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .card-info-top {
            position: absolute;
            top: 6%;
            left: 6%;
            padding: 3% 8%;
            background: #000;
            border-left: calc(var(--card-w)*0.04) solid var(--r-color);
            z-index: 50;
            border-radius: 1px;
        }

        .card-info-top span {
            font-size: calc(var(--card-w)*0.068);
            font-weight: 950;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-info-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20% 0 8%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            text-align: center;
            z-index: 50;
        }

        .card-info-bottom span {
            font-size: calc(var(--card-w)*0.13);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--r-color);
        }

        .card-footer-peak {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25% 0 12%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            text-align: center;
            color: #fff;
            z-index: 50;
            font-weight: 900;
            font-size: calc(var(--card-w)*0.16);
            text-shadow: 0 0 15px var(--r-color);
        }

        .special-badge-base {
            position: absolute;
            left: -8px;
            top: 38%;
            background: linear-gradient(90deg, #e60000, #800000);
            border: 1.5px solid #FFF;
            color: #FFF;
            font-size: 8px;
            font-weight: 1000;
            padding: 4px 8px;
            text-align: center;
            border-radius: 3px 8px 8px 3px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            z-index: 200;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transform: rotate(-4deg);
        }

        @keyframes simple-fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .guide-section {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            animation: simple-fade-in 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .guide-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--steam-gold), var(--magic-purple), var(--accent));
            opacity: 0.8;
        }

        .sim-card-slot {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .sim-card-slot.clickable {
            cursor: pointer;
            transform: translateY(0);
        }

        .sim-card-slot.clickable:hover {
            transform: translateY(-10px);
            z-index: 20;
        }

        .sim-card-slot.not-playable {
            opacity: 0.3;
            filter: grayscale(100%);
            pointer-events: none;
            transform: scale(0.9);
        }

        .sim-active-indicator {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-weight: 1000;
            font-family: 'Orbitron';
            animation: pulse-shimmer 1.5s infinite;
            text-shadow: 0 0 10px var(--accent);
            white-space: nowrap;
            font-size: 12px;
        }

        h2.section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* === 新規追加: ナビゲーション・装飾 === */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 1, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .nav-link {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
        }

        .nav-link:hover {
            color: var(--accent);
            background: rgba(64, 224, 208, 0.1);
        }

        .realm-transition-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 900;
            font-size: 0.75rem;
            transition: all 0.3s;
        }

        .realm-transition-badge:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--accent);
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(64, 224, 208, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .interactive-node {
            cursor: pointer;
            transition: all 0.4s;
        }

        .interactive-node:hover {
            transform: translate(-50%, -50%) scale(1.15) !important;
            z-index: 100;
        }

        .path-active {
            stroke: var(--accent) !important;
            stroke-width: 4 !important;
            opacity: 1 !important;
            filter: drop-shadow(0 0 8px var(--accent)) !important;
        }

    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', bright: '#FFD700', glow: 'rgba(255,140,0,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#FF3131', bright: '#FF6347', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', bright: '#87CEFA', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE: { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#E2B0FF', bright: '#DDA0DD', glow: 'rgba(226,176,255,1)', dim: 'rgba(226,176,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#ADFF2F', bright: '#7FFF00', glow: 'rgba(173,255,47,1)', dim: 'rgba(173,255,47,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET: { n: '惑星', color: '#FFFFFF', bright: '#F0F8FF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS: { n: '廃墟', color: '#CCCCCC', bright: '#D3D3D3', glow: 'rgba(204,204,204,1)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const playSE = (type, muted = false) => {
            if (muted) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                if (type === 'play') {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'square';
                    o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    o.start(now); o.stop(now + 0.1);
                } else if (type === 'draw') {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'triangle';
                    o.frequency.setValueAtTime(500, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
