<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross Realm - Interactive Guide</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Audiowide&family=Cinzel+Decorative:wght@700&family=Orbitron:wght@700;900&family=Special+Elite&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #40E0D0;
            --steam-gold: #D4AF37;
            --magic-purple: #8A2BE2;
            --danger: #FF4500;
            --bg-deep: #05010a;
            --card-w: clamp(60px, 18vw, 90px);
            --card-h: calc(var(--card-w) * 1.4);
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === アニメーション === */
        @keyframes flow-border-nova {
            0% {
                border-color: var(--steam-gold);
                box-shadow: 0 0 15px var(--steam-gold);
            }

            33% {
                border-color: var(--magic-purple);
                box-shadow: 0 0 15px var(--magic-purple);
            }

            66% {
                border-color: var(--accent);
                box-shadow: 0 0 15px var(--accent);
            }

            100% {
                border-color: var(--steam-gold);
                box-shadow: 0 0 15px var(--steam-gold);
            }
        }

        @keyframes rotate-inner {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotate-outer {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes logo-shine {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes pulse-shimmer {

            0%,
            100% {
                opacity: 0.6;
                filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5));
                transform: scale(1);
            }

            50% {
                opacity: 1;
                filter: drop-shadow(0 0 8px #fff) brightness(1.5);
                transform: scale(1.1);
                color: #fff;
            }
        }

        /* === カードエフェクト === */
        @keyframes steam-rise-heavy {
            0% {
                transform: translateY(30%) translateX(var(--drift-start)) scale(0.5) rotate(0deg);
                opacity: 0;
                filter: blur(4px);
            }

            15% {
                opacity: 0.85;
                filter: blur(6px);
            }

            100% {
                transform: translateY(-130%) translateX(var(--drift-end)) scale(4) rotate(var(--rot));
                opacity: 0;
                filter: blur(15px);
            }
        }

        @keyframes ripple-expand {
            0% {
                transform: translate(-50%, -50%) scale(0.1);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
            }
        }

        @keyframes cyber-glitch-color {

            0%,
            94%,
            100% {
                filter: none;
                transform: translate(0);
            }

            95% {
                filter: drop-shadow(-3px 0 #ff00ea) drop-shadow(3px 0 #00ffff);
                transform: translate(2px, -0.5px);
            }

            97% {
                filter: drop-shadow(2px 0 #ff0000) drop-shadow(-2px 0 #00ff00);
                transform: translate(-2px, 0.5px);
            }

            99% {
                filter: brightness(1.8);
            }
        }

        @keyframes cyber-scanline {
            from {
                transform: translateY(-100%);
            }

            to {
                transform: translateY(100%);
            }
        }

        @keyframes void-pulse-wave {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.2;
                filter: blur(5px);
            }

            50% {
                transform: scale(1.4);
                opacity: 0.5;
                filter: blur(12px);
            }
        }

        /* 背景 */
        @keyframes gear-roll {
            0% {
                transform: translate(var(--sx), var(--sy)) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: var(--op);
            }

            95% {
                opacity: var(--op);
            }

            100% {
                transform: translate(var(--ex), var(--ey)) rotate(var(--rot));
                opacity: 0;
            }
        }

        @keyframes magic-mega-zoom {
            0% {
                transform: translate(var(--sx), -30vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: var(--op);
            }

            80% {
                opacity: var(--op);
            }

            100% {
                transform: translate(var(--ex), 120vh) scale(3.5) rotate(var(--rot));
                opacity: 0;
            }
        }

        .astral-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.2) 0%, transparent 60%), radial-gradient(circle at 80% 70%, rgba(64, 224, 208, 0.15) 0%, transparent 60%), var(--bg-deep);
        }

        .matrix-code-canvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.5;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .flow-gear {
            position: absolute;
            top: 0;
            left: 0;
            animation-name: gear-roll;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            opacity: 0;
            z-index: 3;
            filter: drop-shadow(0 0 10px var(--glow-color));
        }

        .flow-magic {
            position: absolute;
            top: 0;
            left: 0;
            animation-name: magic-mega-zoom;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            opacity: 0;
            z-index: 3;
            filter: drop-shadow(0 0 25px var(--glow-color));
        }

        /* === ロゴエリア === */
        .top-logo-area {
            position: relative;
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1rem;
        }

        .emblem-bg-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 240px;
            height: 240px;
            z-index: 1;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.9;
        }

        .logo-text-layer {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .main-logo-text {
            font-family: 'Cinzel', serif;
            font-weight: 950;
            font-size: clamp(2.5rem, 10vw, 3.6rem);
            line-height: 0.85;
            background: linear-gradient(90deg, #fff, var(--steam-gold), #fff, var(--magic-purple), #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logo-shine 6s linear infinite;
            letter-spacing: 12px;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 1));
        }

        .guide-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem 6rem;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        /* カード装飾 */
        .card-content {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: inherit;
        }

        .mat-steam {
            background: radial-gradient(circle at 50% 0%, var(--r-color-bright) 0%, #1a0f05 100%);
            border: calc(var(--card-w)*0.065) solid #3d2616;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .steam-rivet {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #2a1a10;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #fff3, 1px 1px 4px #000;
            z-index: 10;
        }

        .r-tl {
            top: 4px;
            left: 4px;
        }

        .r-tr {
            top: 4px;
            right: 4px;
        }

        .r-bl {
            bottom: 4px;
            left: 4px;
        }

        .r-br {
            bottom: 4px;
            right: 4px;
        }

        /* === アニメーション・エフェクト === */
        @keyframes screen-shake {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            20% {
                transform: translate(-4px, -3px) rotate(-1deg);
            }

            40% {
                transform: translate(4px, 2px) rotate(1deg);
            }

            60% {
                transform: translate(-2px, 4px) rotate(-1deg);
            }

            80% {
                transform: translate(3px, -2px) rotate(1deg);
            }
        }

        .shake-active {
            animation: screen-shake 0.3s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes flash-bang {
            0% {
                background-color: rgba(255, 255, 255, 0.9);
            }

            100% {
                background-color: transparent;
            }
        }

        .flash-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            animation: flash-bang 0.6s ease-out forwards;
        }

        @keyframes cutin-slide {
            0% {
                transform: skewX(-15deg) translateX(-100%);
                opacity: 0;
            }

            10% {
                transform: skewX(-15deg) translateX(0);
                opacity: 1;
            }

            85% {
                transform: skewX(-15deg) translateX(0);
                opacity: 1;
            }

            100% {
                transform: skewX(-15deg) translateX(100%);
                opacity: 0;
            }
        }

        .cutin-container {
            position: fixed;
            top: 40%;
            left: -10%;
            width: 120%;
            z-index: 9000;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cutin-bar {
            background: rgba(0, 0, 0, 0.85);
            border-top: 4px solid var(--c);
            border-bottom: 4px solid var(--c);
            padding: 15px 0;
            width: 100%;
            animation: cutin-slide 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px var(--c);
            backdrop-filter: blur(10px);
        }

        .cutin-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 1000;
            color: var(--c);
            text-shadow: 0 0 20px var(--c), 0 0 10px #fff;
            letter-spacing: 12px;
            transform: skewX(15deg);
            text-transform: uppercase;
        }

        .steam-particle {
            position: absolute;
            bottom: -20px;
            left: var(--l);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
            border-radius: 50%;
            animation: steam-rise-heavy var(--d) infinite ease-in;
            animation-delay: var(--delay);
            mix-blend-mode: screen;
        }

        .steam-core-glow {
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.25), transparent);
            filter: blur(8px);
            z-index: 2;
        }

        .mat-fantasy {
            background: radial-gradient(circle at 50% 50%, var(--r-color-glow) 0%, #010614 100%);
            border: calc(var(--card-w)*0.02) solid rgba(255, 255, 255, 0.9);
            border-radius: 35% 10% !important;
            box-shadow: 0 0 30px var(--r-color-glow);
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: ripple-expand 4s infinite cubic-bezier(0.165, 0.84, 0.44, 1);
            animation-delay: var(--delay);
            opacity: 0;
        }

        .magic-circle-bg {
            position: absolute;
            top: 55%;
            left: 50%;
            width: 140px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            z-index: 1;
            animation: rotate-inner 25s linear infinite;
        }

        .mat-cyber {
            background: #000;
            border: none;
            clip-path: polygon(0 15%, 15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
            box-shadow: inset 0 0 60px var(--r-color-dim);
            border-left: calc(var(--card-w)*0.06) solid var(--r-color);
            animation: cyber-glitch-color 4s infinite;
            overflow: hidden;
        }

        .cyber-fx-scanline {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: linear-gradient(to bottom, transparent 0%, rgba(64, 224, 208, 0.12) 50%, transparent 100%);
            background-size: 100% 50px;
            animation: cyber-scanline 1.6s linear infinite;
        }

        .cyber-circuit {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.06) 1px, transparent 0);
            background-size: 12px 12px;
        }

        .mat-void-planet,
        .mat-void-ruins {
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            border-radius: 50% !important;
            box-shadow: 0 0 30px #fff2;
            overflow: hidden;
            border: none;
        }

        .void-fluctuation {
            position: absolute;
            inset: 0;
            background: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 10px, rgba(255, 255, 255, 0.04) 11px, rgba(255, 255, 255, 0.04) 12px);
            animation: void-pulse-wave 8s infinite ease-in-out;
        }

        .void-singularity-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .card-info-top {
            position: absolute;
            top: 6%;
            left: 6%;
            padding: 3% 8%;
            background: #000;
            border-left: calc(var(--card-w)*0.04) solid var(--r-color);
            z-index: 50;
            border-radius: 1px;
        }

        .card-info-top span {
            font-size: calc(var(--card-w)*0.068);
            font-weight: 950;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-footer-peak {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25% 0 12%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            text-align: center;
            color: #fff;
            z-index: 50;
            font-weight: 900;
            font-size: calc(var(--card-w)*0.16);
            text-shadow: 0 0 15px var(--r-color);
        }

        .special-badge-base {
            position: absolute;
            left: -8px;
            top: 38%;
            background: linear-gradient(90deg, #e60000, #800000);
            border: 1.5px solid #FFF;
            color: #FFF;
            font-size: 8px;
            font-weight: 1000;
            padding: 4px 8px;
            text-align: center;
            border-radius: 3px 8px 8px 3px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            z-index: 200;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transform: rotate(-4deg);
        }

        .guide-section {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .guide-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--steam-gold), var(--magic-purple), var(--accent));
            opacity: 0.8;
        }

        .sim-card-slot {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .sim-card-slot.clickable {
            cursor: pointer;
            transform: translateY(0);
        }

        .sim-card-slot.clickable:hover {
            transform: translateY(-10px);
            z-index: 20;
        }

        .sim-card-slot.not-playable {
            opacity: 0.3;
            filter: grayscale(100%);
            pointer-events: none;
            transform: scale(0.9);
        }

        .sim-active-indicator {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-weight: 1000;
            font-family: 'Orbitron';
            animation: pulse-shimmer 1.5s infinite;
            text-shadow: 0 0 10px var(--accent);
            white-space: nowrap;
            font-size: 12px;
        }

        h2.section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const REALMS = {
            GEAR: { n: '歯車', color: '#FF8C00', bright: '#FFD700', glow: 'rgba(255,140,0,1)', theme: 'steam', font: 'Special Elite' },
            ARCHIVE: { n: '古文書', color: '#FF3131', bright: '#FF6347', glow: 'rgba(255,49,49,1)', theme: 'steam', font: 'Special Elite' },
            FOUNTAIN: { n: '噴水', color: '#1E90FF', bright: '#87CEFA', glow: 'rgba(30,144,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            ICEAGE: { n: '氷河期', color: '#00F3FF', bright: '#ADFCFF', glow: 'rgba(0,243,255,1)', theme: 'fantasy', font: 'Cinzel Decorative' },
            MACHINE: { n: '機械', color: '#E2B0FF', bright: '#DDA0DD', glow: 'rgba(226,176,255,1)', dim: 'rgba(226,176,255,0.4)', theme: 'cyber', font: 'Orbitron' },
            BATTERY: { n: '電池', color: '#ADFF2F', bright: '#7FFF00', glow: 'rgba(173,255,47,1)', dim: 'rgba(173,255,47,0.4)', theme: 'cyber', font: 'Orbitron' },
            PLANET: { n: '惑星', color: '#FFFFFF', bright: '#F0F8FF', glow: 'rgba(255,255,255,1)', theme: 'void-planet', font: 'Audiowide' },
            RUINS: { n: '廃墟', color: '#CCCCCC', bright: '#D3D3D3', glow: 'rgba(204,204,204,1)', theme: 'void-ruins', font: 'Audiowide' }
        };

        const NEXT_MAP = { GEAR: ['GEAR', 'ICEAGE'], ICEAGE: ['FOUNTAIN', 'BATTERY'], FOUNTAIN: ['FOUNTAIN', 'BATTERY'], BATTERY: ['MACHINE', 'ARCHIVE'], MACHINE: ['MACHINE', 'ARCHIVE'], ARCHIVE: ['GEAR', 'ICEAGE'] };

        // === SE再生機能 ===
        let audioCtx = null;
        const playSE = (type, muted = false) => {
            if (muted) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                if (type === 'play') {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'square';
                    o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    o.start(now); o.stop(now + 0.1);
                } else if (type === 'draw') {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'triangle';
                    o.frequency.setValueAtTime(500, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    o.start(now); o.stop(now + 0.05);
                }
            } catch (e) { }
        };

        const IconRenderer = ({ r, spec, className }) => {
            const p = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: spec ? 5 : 2.5, strokeLinecap: "round", className: className || "w-full h-full" };
            switch (r) {

                        </div>
                        <div className="text-center mb-8">
                            <div className="text-2xl md:text-3xl font-bold tracking-[8px] uppercase mb-4 text-white">Interactive Guide</div>
                            <p className="text-white/80 font-bold tracking-widest bg-black/60 inline-block px-6 py-2 rounded-full border border-white/20 backdrop-blur-md">オメガ・シンギュラリティ 対応マニュアル</p>
                        </div>

                        {/* Core Rules Summary Section */}
                        <div className="guide-section">
                            <h2 className="section-title text-[var(--steam-gold)]" style={{ textShadow: '0 0 15px rgba(212,175,55,0.6)' }}>Core Rules Summary</h2>
                            <div className="bg-black/50 p-6 md:p-8 rounded-xl border border-white/10 text-left max-w-2xl mx-auto shadow-2xl backdrop-blur-md">
                                <ul className="space-y-5 text-white/90 font-bold leading-relaxed">
                                    <li className="flex items-start">
                                        <span className="text-[var(--accent)] font-black text-xl mr-3 mt-0.5">✓</span>
                                        <div className="text-base md:text-lg">
                                            手札を最も早く <span className="text-[var(--accent)] font-black text-xl mx-1 bg-white/10 px-2 py-0.5 rounded">0枚</span> にしたプレイヤーが勝利（MISSION CLEAR）となります。
                                        </div>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="text-[var(--steam-gold)] font-black text-xl mr-3 mt-0.5">✓</span>
                                        <div className="text-base">
                                            出せるカードがない、または戦略的に出したくない場合は、「ドロー」をしてターンを終了します。<br />
                                            <span className="text-white/60 text-sm font-normal">※ゲーム開始時の初期手札は全員5枚です。</span>
                                        </div>
                                    </li>
                                    <li className="flex items-start bg-red-900/20 p-4 rounded-lg border border-red-500/30">
                                        <span className="text-[var(--danger)] font-black text-xl mr-3 mt-0.5">⚠️</span>
                                        <div className="text-base">
                                            <span className="text-[var(--danger)] font-black text-lg">システムオーバーロード（バースト）</span><br />
                                            手札が <span className="text-[var(--danger)] font-black text-xl mx-1 underline decoration-red-500/50">11枚以上</span> になった瞬間、限界突破となり脱落（敗北）します。
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        {/* Tactical Cycle Wheel Section (Large) */}
                        <div className="guide-section text-center">
                            <h2 className="section-title text-[var(--accent)]">Tactical Cycle Chart</h2>
                            <p className="text-white/80 text-sm mb-4 leading-relaxed font-bold">
                                全ての属性は、時計回りに「維持」と「ゲート遷移」を繰り返して循環しています。<br />
                                下記の矢印の方向に沿ってのみ、次のカードを出すことができます。
                            </p>
                            <CycleDiagramLarge />
                        </div>

                        {/* Tactical Simulator Section */}
                        <div className="guide-section">
                            <h2 className="section-title text-[var(--steam-gold)]">Interactive Tactical Simulator</h2>
                            <p className="text-white/80 text-sm mb-8 leading-relaxed font-bold">
                                「タクティカル・ペア・システム」は、場の属性によって次に出せるカードが制限されるルールです。<br />
                                下の手札カードをクリックすると、それが「場のカード」になり、次に出せるカードがハイライトされます。<br />
                                遷移属性（氷河期・電池・古文書）は連続して重ねることはできません。
                            </p>

                            <div className="flex flex-col md:flex-row gap-8 items-center justify-center bg-black/50 p-6 rounded-xl border border-white/10">
                                {/* Field Area */}
                                <div className="flex flex-col items-center">
                                    <div className="text-[var(--accent)] font-['Orbitron'] font-black tracking-[4px] mb-4">CURRENT FIELD</div>
                                    <div className="relative">
                                        <CardView realmKey={fieldRealm} />
                                        <div className="absolute inset-0 ring-4 ring-[var(--accent)] ring-offset-4 ring-offset-black rounded-lg animate-[pulse-shimmer_2s_infinite]"></div>
                                    </div>
                                </div>

                                {/* Cycle Graphic */}
                                <div className="flex-1 w-full max-w-[160px] md:max-w-[200px] mb-6 md:mb-0">
                                    <CycleDiagramSmall currentRealm={fieldRealm} />
                                </div>

                                {/* Hand Area */}
                                <div className="flex flex-col items-center w-full md:w-auto">
                                    <div className="text-white/60 font-['Orbitron'] font-black tracking-[4px] mb-4">YOUR HAND (Click to Play)</div>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        {handRealms.map(r => {
                                            const playable = isPlayable(r);
                                            return (
                                                <div key={r} className={`sim-card-slot ${playable ? 'clickable' : 'not-playable'}`} onClick={() => { if (playable) triggerPlay(r); }}>
                                                    <CardView realmKey={r} />
                                                    {playable && <div className="sim-active-indicator">PLAYABLE</div>}
                                                </div>
                                            );
                                        })}
                                        {/* Draw Action Simulator */}
                                        <div className="sim-card-slot clickable flex flex-col justify-center items-center bg-black/60 border-2 border-dashed border-white/30 rounded-xl w-[90px] h-[130px] md:w-[120px] md:h-[180px] hover:border-white hover:bg-black/80 transition-all" onClick={() => playSE('draw')}>
                                            <div className="text-3xl md:text-4xl mb-2 filter drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">🃏</div>
                                            <div className="text-white/90 font-black font-['Orbitron'] tracking-[2px] md:tracking-widest text-xs md:text-sm">DRAW</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Special Cards Section */}
                        <div className="guide-section">
                            <h2 className="section-title text-[var(--magic-purple)]">Special & Wild Cards</h2>
                            <p className="text-white/80 text-sm mb-8 leading-relaxed font-bold text-center">
                                戦局を大きく覆す特殊な能力を持ったカードたちです。
                            </p>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {/* Attack / Reverse */}
                                <div className="flex items-center gap-6 bg-black/40 p-4 rounded-lg border border-white/5 cursor-pointer hover:bg-white/10 hover:border-white/30 transition-all transform hover:-translate-y-1" onClick={() => triggerSpecial('GEAR')}>
                                    <div className="pointer-events-none"><CardView realmKey="GEAR" isSpecial={true} /></div>
                                    <div className="flex-1">
                                        <h3 className="text-xl font-black text-[#FFD700] mb-2 tracking-widest pointer-events-none">⚙️ 歯車 (S) [+2 DRAW]</h3>
                                        <p className="text-sm text-white/80 font-bold leading-relaxed pointer-events-none">次のプレイヤーに強制的に2枚ドローさせます。手札に同じカードがあれば回避して+4, +6と上乗せ可能です。（クリックで試す）</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-6 bg-black/40 p-4 rounded-lg border border-white/5 cursor-pointer hover:bg-white/10 hover:border-white/30 transition-all transform hover:-translate-y-1" onClick={() => triggerSpecial('MACHINE')}>
                                    <div className="pointer-events-none"><CardView realmKey="MACHINE" isSpecial={true} /></div>
                                    <div className="flex-1">
                                        <h3 className="text-xl font-black text-[#DDA0DD] mb-2 tracking-widest pointer-events-none">🤖 機械 (S) [REVERSE]</h3>
                                        <p className="text-sm text-white/80 font-bold leading-relaxed pointer-events-none">手番の進行方向を反転させます。2人プレイ時は相手の手番をスキップして連続で自分のターンになります。（クリックで試す）</p>
                                    </div>
                                </div>

                                {/* Wilds */}
                                <div className="flex items-center gap-6 bg-black/40 p-4 rounded-lg border border-white/5 cursor-pointer hover:bg-white/10 hover:border-white/30 transition-all transform hover:-translate-y-1" onClick={() => triggerSpecial('FOUNTAIN')}>
                                    <div className="pointer-events-none"><CardView realmKey="FOUNTAIN" isSpecial={true} /></div>
                                    <div className="flex-1">
                                        <h3 className="text-xl font-black text-[#87CEFA] mb-2 tracking-widest pointer-events-none">⛲ 噴水 (S) [LIMIT WILD]</h3>
                                        <p className="text-sm text-white/80 font-bold leading-relaxed pointer-events-none">「氷河期」か「噴水」の場でのみ使用可能。出した瞬間に好きな属性に変更できる限定ワイルドカードです。（クリックで試す）</p>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-4">
                                    <div className="flex items-center gap-6 bg-black/40 p-4 rounded-lg border border-white/5 cursor-pointer hover:bg-white/10 hover:border-white/30 transition-all transform hover:-translate-y-1" onClick={() => triggerSpecial('PLANET')}>
                                        <div className="pointer-events-none"><CardView realmKey="PLANET" /></div>
                                        <div className="flex-1">
                                            <h3 className="text-xl font-black text-[#FFFFFF] mb-2 tracking-widest pointer-events-none">🪐 惑星 [PURE WILD]</h3>
                                            <p className="text-sm text-white/80 font-bold leading-relaxed pointer-events-none">いつでも出せる純粋なワイルド。好きな属性に変更できます。</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-6 bg-black/40 p-4 rounded-lg border border-white/5 cursor-pointer hover:bg-white/10 hover:border-white/30 transition-all transform hover:-translate-y-1" onClick={() => triggerSpecial('RUINS')}>
                                        <div className="pointer-events-none"><CardView realmKey="RUINS" /></div>
                                        <div className="flex-1">
                                            <h3 className="text-xl font-black text-[#CCCCCC] mb-2 tracking-widest pointer-events-none">🏛️ 廃墟 [PURE WILD]</h3>
                                            <p className="text-sm text-white/80 font-bold leading-relaxed pointer-events-none">惑星と同様、いつでも出せる純粋なワイルドです。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Deck Composition Section */}
                        <div className="guide-section text-center mb-16">
                            <h2 className="section-title text-[var(--danger)] text-shadow-[0_0_15px_rgba(255,69,0,0.6)]">Deck Composition <span className="text-sm md:text-base font-normal text-white/60 ml-2 tracking-normal">(Total: 51 Cards)</span></h2>
                            <p className="text-white/80 text-sm mb-8 leading-relaxed font-bold">
                                運の要素を減らし戦略性を高めるため、デッキは常に固定の51枚で構成されます。<br />相手の出したカードを記憶（カウンティング）することで、有利に立ち回ることができます。
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                                <div className="bg-black/50 p-5 rounded-xl border border-white/10 text-left">
                                    <h3 className="text-lg font-black text-white mb-4 tracking-widest border-b border-white/20 pb-2">MAIN <span className="text-sm font-normal float-right mt-1">x30</span></h3>
                                    <ul className="space-y-3 text-sm font-bold text-white/80">
                                        <li className="flex justify-between items-center"><span className="text-[var(--steam-gold)]">⚙️ 歯車 (GEAR)</span><span>10枚</span></li>
                                        <li className="flex justify-between items-center"><span className="text-[var(--magic-purple)]">🤖 機械 (MACHINE)</span><span>10枚</span></li>
                                        <li className="flex justify-between items-center"><span className="text-[#87CEFA]">⛲ 噴水 (FOUNTAIN)</span><span>10枚</span></li>
                                    </ul>
                                    <div className="mt-3 text-xs text-white/50 text-right">※各属性にSpecial 3枚含む</div>
                                </div>
                                <div className="bg-black/50 p-5 rounded-xl border border-white/10 text-left">
                                    <h3 className="text-lg font-black text-white mb-4 tracking-widest border-b border-white/20 pb-2">GATE <span className="text-sm font-normal float-right mt-1">x15</span></h3>
                                    <ul className="space-y-3 text-sm font-bold text-white/80">
                                        <li className="flex justify-between items-center"><span className="text-[#00F3FF]">❄️ 氷河期 (ICEAGE)</span><span>5枚</span></li>
                                        <li className="flex justify-between items-center"><span className="text-[#ADFF2F]">🔋 電池 (BATTERY)</span><span>5枚</span></li>
                                        <li className="flex justify-between items-center"><span className="text-[#FF6347]">📖 古文書 (ARCHIVE)</span><span>5枚</span></li>
                                    </ul>
                                </div>
                                <div className="bg-black/50 p-5 rounded-xl border border-white/10 text-left">
                                    <h3 className="text-lg font-black text-white mb-4 tracking-widest border-b border-white/20 pb-2">WILD <span className="text-sm font-normal float-right mt-1">x6</span></h3>
                                    <ul className="space-y-3 text-sm font-bold text-white/80">
                                        <li className="flex justify-between items-center"><span className="text-[#FFFFFF]">🪐 惑星 (PLANET)</span><span>3枚</span></li>
                                        <li className="flex justify-between items-center"><span className="text-[#CCCCCC]">🏛️ 廃墟 (RUINS)</span><span>3枚</span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>



                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
